let lang = 'el';
const N = LANG.el.steps.length;

// ═══════════════════════════════════════════════════════════════════════════
// GLOBALS
// ═══════════════════════════════════════════════════════════════════════════
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
let W, H, cx, cy;
let cur = 0, tgt = 0, tT = 0, trans = false, time = 0, gA = 0;
let autoP = false, autoTm = null;

// UI elements
const introDiv = document.getElementById('intro');
const introTitle = document.getElementById('intro-title');
const introSub = document.getElementById('intro-sub');
const introClick = document.getElementById('intro-click');
const subBox = document.getElementById('sub');
const stagEl = document.getElementById('stag');
const msubEl = document.getElementById('msub');
const ssciEl = document.getElementById('ssci');
const snEl = document.getElementById('sn');
const pbEl = document.getElementById('pb');
const dotsContainer = document.getElementById('dotsC');
const langBtn = document.getElementById('langBtn');

// ═══════════════════════════════════════════════════════════════════════════
// LANGUAGE SWITCH
// ═══════════════════════════════════════════════════════════════════════════
function updateLanguage() {
  const data = LANG[lang];
  introTitle.innerHTML = data.intro.title;
  introSub.innerHTML = data.intro.sub;
  introClick.innerHTML = data.intro.click;
  if (!trans) {
    const step = data.steps[cur];
    stagEl.textContent = step.tag;
    msubEl.innerHTML = step.sub.replace(/\n/g,'<br>');
    ssciEl.innerHTML = step.sci;
  }
  rebuildDots();
  requestAnimationFrame(()=>{});
}
function setLanguage(l) {
  lang = l;
  updateLanguage();
  localStorage.setItem('tree_pose_lang', l);
}
function toggleLang() {
  setLanguage(lang === 'el' ? 'en' : 'el');
}
langBtn.addEventListener('click', toggleLang);

// ═══════════════════════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════════════════════
function resize() {
  const d = Math.min(devicePixelRatio || 1, 2);
  W = innerWidth; H = innerHeight;
  cv.width = W * d; cv.height = H * d;
  cv.style.width = W + 'px'; cv.style.height = H + 'px';
  ctx.setTransform(d, 0, 0, d, 0, 0);
  cx = W/2; cy = H/2;
}
window.addEventListener('resize', resize);
resize();

function rebuildDots() {
  dotsContainer.innerHTML = '';
  for (let i = 0; i < N; i++) {
    const dot = document.createElement('button');
    dot.className = 'dot' + (i === cur ? ' active' : '');
    dot.onclick = () => goTo(i);
    dotsContainer.appendChild(dot);
  }
}

function updateUI() {
  const data = LANG[lang];
  const step = data.steps[cur];
  stagEl.textContent = step.tag;
  msubEl.innerHTML = step.sub.replace(/\n/g,'<br>');
  ssciEl.innerHTML = step.sci;
  snEl.textContent = `${cur+1} / ${N}`;
  pbEl.style.width = `${(cur/(N-1))*100}%`;
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===cur));
}

function goTo(i) {
  if (i < 0 || i >= N || i === cur || trans) return;
  tgt = i;
  trans = true;
  tT = 0;
  subBox.classList.remove('vis');
  setTimeout(() => {
    cur = tgt;
    trans = false;
    updateUI();
    subBox.classList.add('vis');
  }, 1800);
}

function ease(t) { return t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }

function togAuto() {
  autoP = !autoP;
  document.getElementById('ab').innerHTML = autoP ? '\u23F8 pause' : '\u25B6 auto';
  if (autoP) runAuto();
  else clearTimeout(autoTm);
}
function runAuto() {
  if (!autoP) return;
  autoTm = setTimeout(() => {
    if (cur < N-1) {
      goTo(cur+1);
      setTimeout(runAuto, 2000);
    } else {
      autoP = false;
      document.getElementById('ab').innerHTML = '\u25B6 auto';
    }
  }, 9000);
}

// ═══════════════════════════════════════════════════════════════════════════
// DRAWING FUNCTIONS (with GOLDEN GRAVITY AXIS extended above head & below feet)
// ═══════════════════════════════════════════════════════════════════════════
function drawSkeleton(x, y, sc, alpha, phase) {
  ctx.save(); ctx.translate(x, y); ctx.scale(sc, sc);
  const pulse = Math.sin(time * 1.2) * 0.5 + 0.5;
  const bone = `rgba(200,195,175,${alpha*0.7})`;
  const boneDim = `rgba(200,195,175,${alpha*0.3})`;
  const joint = `rgba(200,175,100,${alpha*0.5})`;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';

  const shifted = phase !== 'stand';
  const treeLegs = (phase === 'lift' || phase === 'tree' || phase === 'breathe' || phase === 'neuro');
  const shiftX = shifted ? 12 : 0;

  // Ground
  ctx.strokeStyle = `rgba(140,130,100,${alpha*0.2})`; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(-80, 110); ctx.lineTo(80, 110); ctx.stroke();

  // Right leg (standing)
  ctx.strokeStyle = bone; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(10+shiftX, -5); ctx.lineTo(14+shiftX, 45); ctx.lineTo(12+shiftX, 95); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(12+shiftX, 95); ctx.lineTo(12+shiftX, 108); ctx.lineTo(20+shiftX, 110); ctx.stroke();
  ctx.fillStyle = joint;
  ctx.beginPath(); ctx.arc(10+shiftX, -5, 3.5, 0, Math.PI*2); ctx.fill(); // hip
  ctx.beginPath(); ctx.arc(14+shiftX, 45, 3, 0, Math.PI*2); ctx.fill();   // knee
  ctx.beginPath(); ctx.arc(12+shiftX, 95, 2.5, 0, Math.PI*2); ctx.fill();  // ankle
  // Standing foot glow
  if (shifted) {
    const fg = ctx.createRadialGradient(14+shiftX, 108, 0, 14+shiftX, 108, 18+pulse*4);
    fg.addColorStop(0, `rgba(180,160,100,${alpha*0.12})`);
    fg.addColorStop(1, 'rgba(180,160,100,0)');
    ctx.fillStyle = fg; ctx.beginPath(); ctx.arc(14+shiftX, 108, 18+pulse*4, 0, Math.PI*2); ctx.fill();
  }

  // Left leg
  if (!treeLegs) {
    ctx.strokeStyle = shifted ? boneDim : bone; ctx.lineWidth = shifted ? 1.8 : 2.5;
    ctx.beginPath(); ctx.moveTo(-10+shiftX, -5); ctx.lineTo(-14+shiftX, 45); ctx.lineTo(-12+shiftX, 95); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-12+shiftX, 95); ctx.lineTo(-12+shiftX, 108); ctx.lineTo(-20+shiftX, 110); ctx.stroke();
    ctx.fillStyle = joint;
    ctx.beginPath(); ctx.arc(-10+shiftX, -5, 3.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(-14+shiftX, 45, 3, 0, Math.PI*2); ctx.fill();
  } else {
    // Bent leg
    ctx.strokeStyle = `rgba(200,195,175,${alpha*0.45})`; ctx.lineWidth = 2;
    const lhx = -10+shiftX, lhy = -5;
    const lkx = -20+shiftX, lky = 25;
    const lfx = 5+shiftX, lfy = 35;
    ctx.beginPath(); ctx.moveTo(lhx, lhy); ctx.quadraticCurveTo(lkx-8, lky-5, lkx, lky); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(lkx, lky); ctx.quadraticCurveTo(lkx+5, lfy-3, lfx, lfy); ctx.stroke();
    ctx.fillStyle = joint; ctx.beginPath(); ctx.arc(lkx, lky, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = `rgba(200,195,175,${alpha*0.3})`;
    ctx.beginPath(); ctx.ellipse(lfx, lfy, 5, 3, -0.3, 0, Math.PI*2); ctx.fill();

    // Warning on right knee
    const rkx = 14+shiftX, rky = 45;
    ctx.strokeStyle = `rgba(210,70,60,${alpha*0.25})`; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.arc(rkx, rky, 7, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(rkx-4, rky-4); ctx.lineTo(rkx+4, rky+4); ctx.stroke();
    ctx.font = '7px Fraunces'; ctx.fillStyle = `rgba(210,70,60,${alpha*0.2})`;
    ctx.textAlign = 'left'; ctx.fillText(LANG[lang].labels.dont, rkx+10, rky+3);
  }

  // Pelvis
  const pelvisTilt = shifted ? 2.5 : 0;
  ctx.save(); ctx.rotate(pelvisTilt * Math.PI/180);
  ctx.strokeStyle = bone; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(-18+shiftX, -8); ctx.quadraticCurveTo(shiftX, -14, 18+shiftX, -8); ctx.stroke();
  ctx.strokeStyle = boneDim; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(-18+shiftX, -8); ctx.quadraticCurveTo(-22+shiftX, -18, -15+shiftX, -22); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(18+shiftX, -8); ctx.quadraticCurveTo(22+shiftX, -18, 15+shiftX, -22); ctx.stroke();
  ctx.restore();

  // Pelvis tilt line (orange)
  if (shifted) {
    ctx.strokeStyle = `rgba(230,130,50,${alpha*0.4})`; ctx.lineWidth = 2; ctx.setLineDash([5,4]);
    ctx.save(); ctx.rotate(pelvisTilt * Math.PI/180);
    ctx.beginPath(); ctx.moveTo(-25+shiftX, -10); ctx.lineTo(25+shiftX, -10); ctx.stroke();
    ctx.restore(); ctx.setLineDash([]);
    ctx.font = '8px Fraunces'; ctx.fillStyle = `rgba(230,130,50,${alpha*0.3})`;
    ctx.textAlign = 'right'; ctx.fillText(LANG[lang].labels.pelvis + ' ↗', shiftX-28, -10);
  }

  // Gluteus medius (right side)
  if (shifted) {
    const gmx = 22+shiftX, gmy = -12;
    const gmGlow = ctx.createRadialGradient(gmx, gmy, 0, gmx, gmy, 14+pulse*4);
    gmGlow.addColorStop(0, `rgba(100,200,150,${alpha*0.18})`);
    gmGlow.addColorStop(0.6, `rgba(100,200,150,${alpha*0.05})`);
    gmGlow.addColorStop(1, 'rgba(100,200,150,0)');
    ctx.fillStyle = gmGlow; ctx.beginPath(); ctx.arc(gmx, gmy, 14+pulse*4, 0, Math.PI*2); ctx.fill();
    for (let i=0; i<6; i++) {
      const a = -0.6 + i*0.2;
      ctx.strokeStyle = `rgba(100,200,150,${alpha*(0.1+pulse*0.06)})`; ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.moveTo(gmx+Math.cos(a)*4, gmy+Math.sin(a)*4);
      ctx.lineTo(gmx+Math.cos(a)*13, gmy+Math.sin(a)*13); ctx.stroke();
    }
    ctx.font = '7px Fraunces'; ctx.fillStyle = `rgba(100,200,150,${alpha*0.25})`;
    ctx.textAlign = 'left'; ctx.fillText(LANG[lang].labels.gluteus, gmx+16, gmy+2);
  }

  // Spine
  ctx.strokeStyle = bone; ctx.lineWidth = 2.2;
  ctx.beginPath(); ctx.moveTo(shiftX, -15); ctx.quadraticCurveTo(shiftX-1, -30, shiftX, -45); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(shiftX, -45); ctx.quadraticCurveTo(shiftX+1, -60, shiftX, -75); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(shiftX, -75); ctx.lineTo(shiftX, -82); ctx.stroke();
  for (let i=0; i<8; i++) {
    const vy = -18 - i*8;
    ctx.fillStyle = `rgba(200,195,175,${alpha*0.15})`;
    ctx.beginPath(); ctx.arc(shiftX, vy, 1.5, 0, Math.PI*2); ctx.fill();
  }

  // Ribcage
  ctx.strokeStyle = `rgba(200,195,175,${alpha*0.2})`; ctx.lineWidth = 1;
  for (let i=0; i<5; i++) {
    const ry = -48 - i*6;
    const rw = 12 + i*1.5;
    ctx.beginPath(); ctx.moveTo(shiftX, ry); ctx.quadraticCurveTo(shiftX+rw, ry+3, shiftX+rw-2, ry+8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(shiftX, ry); ctx.quadraticCurveTo(shiftX-rw, ry+3, shiftX-rw+2, ry+8); ctx.stroke();
  }

  // Shoulders & arms
  ctx.strokeStyle = bone; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(shiftX, -72); ctx.lineTo(shiftX-22, -68); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(shiftX, -72); ctx.lineTo(shiftX+22, -68); ctx.stroke();
  ctx.fillStyle = joint;
  ctx.beginPath(); ctx.arc(shiftX-22, -68, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(shiftX+22, -68, 3, 0, Math.PI*2); ctx.fill();
  if (phase === 'tree' || phase === 'breathe') {
    ctx.strokeStyle = boneDim; ctx.lineWidth = 1.8;
    ctx.beginPath(); ctx.moveTo(shiftX-22, -68); ctx.quadraticCurveTo(shiftX-18, -90, shiftX-4, -105); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(shiftX+22, -68); ctx.quadraticCurveTo(shiftX+18, -90, shiftX+4, -105); ctx.stroke();
    ctx.fillStyle = `rgba(200,195,175,${alpha*0.25})`;
    ctx.beginPath(); ctx.arc(shiftX, -107, 4, 0, Math.PI*2); ctx.fill();
  } else {
    ctx.strokeStyle = boneDim; ctx.lineWidth = 1.8;
    ctx.beginPath(); ctx.moveTo(shiftX-22, -68); ctx.lineTo(shiftX-24, -35); ctx.lineTo(shiftX-22, -5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(shiftX+22, -68); ctx.lineTo(shiftX+24, -35); ctx.lineTo(shiftX+22, -5); ctx.stroke();
  }

  // Head
  ctx.fillStyle = `rgba(200,195,175,${alpha*0.06})`;
  ctx.beginPath(); ctx.arc(shiftX, -95, 13, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = bone; ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = `rgba(200,195,175,${alpha*0.15})`;
  ctx.beginPath(); ctx.arc(shiftX-4, -96, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(shiftX+4, -96, 3, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = boneDim; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(shiftX-8, -88); ctx.quadraticCurveTo(shiftX, -84, shiftX+8, -88); ctx.stroke();

  // ═══════════════════════════════════════════════════════════════════════
  // GOLDEN GRAVITY AXIS (extended above head & below feet)
  // ═══════════════════════════════════════════════════════════════════════
  const axTopX = shiftX;
  const axTopY = -125;   // above head
  const axBottomX = shifted ? 14+shiftX : shiftX;
  const axBottomY = 125;  // below feet

  ctx.strokeStyle = '#C8922A';  // golden
  ctx.lineWidth = 2.5;
  ctx.setLineDash([6, 5]);
  ctx.beginPath();
  ctx.moveTo(axTopX, axTopY);
  ctx.lineTo(axBottomX, axBottomY);
  ctx.stroke();

  // Golden arrow at bottom
  ctx.fillStyle = '#C8922A';
  ctx.beginPath();
  ctx.moveTo(axBottomX, axBottomY);
  ctx.lineTo(axBottomX-4, axBottomY-9);
  ctx.lineTo(axBottomX+4, axBottomY-9);
  ctx.closePath();
  ctx.fill();

  // Small dash above head (optional)
  ctx.setLineDash([2, 4]);
  ctx.beginPath();
  ctx.moveTo(axTopX-2, axTopY+6);
  ctx.lineTo(axTopX+2, axTopY+6);
  ctx.stroke();
  ctx.setLineDash([]);

  // Center of gravity (CoG)
  const cogX = shiftX + (shifted ? 6 : 0), cogY = -10;
  const cs = 6 + pulse*2;
  ctx.fillStyle = `rgba(220,190,80,${alpha*0.25})`;
  ctx.beginPath(); ctx.moveTo(cogX, cogY-cs); ctx.lineTo(cogX+cs*0.6, cogY); ctx.lineTo(cogX, cogY+cs); ctx.lineTo(cogX-cs*0.6, cogY); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = `rgba(220,190,80,${alpha*0.45})`; ctx.lineWidth = 1.2; ctx.stroke();
  ctx.font = '7px Fraunces'; ctx.fillStyle = `rgba(220,190,80,${alpha*0.25})`;
  ctx.textAlign = 'left'; ctx.fillText(LANG[lang].labels.cog, cogX+cs+4, cogY+2);

  // Breath circle (phase 5)
  if (phase === 'breathe') {
    const br = 12 + Math.sin(time*0.4)*6;
    ctx.strokeStyle = `rgba(100,180,170,${alpha*0.1})`; ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.arc(shiftX, -50, br, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(shiftX, -50, br+8, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(100,180,170,${alpha*0.05})`; ctx.stroke();
  }

  // Wall support (neuro phase)
  if (phase === 'neuro') {
    const wx = 55;
    ctx.strokeStyle = `rgba(200,190,160,${alpha*0.1})`; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(wx, -80); ctx.lineTo(wx, 50); ctx.stroke();
    ctx.font = '7px Fraunces'; ctx.fillStyle = `rgba(200,190,160,${alpha*0.12})`;
    ctx.textAlign = 'left'; ctx.fillText(lang === 'el' ? 'τοίχος' : 'wall', wx+4, -20);
    ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(shiftX+24, -35); ctx.lineTo(wx, -35); ctx.stroke();
    ctx.setLineDash([]);
  }

  // Aura for tree/breathe
  if (phase === 'tree' || phase === 'breathe') {
    for (let i=0; i<2; i++) {
      const rr = ((time*6 + i*50) % 120);
      const ra = Math.max(0, 1 - rr/120);
      ctx.globalAlpha = alpha*ra*0.04;
      ctx.strokeStyle = 'rgba(140,200,160,1)'; ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.arc(shiftX, -20, rr, 0, Math.PI*2); ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }

  ctx.restore();
}

function drawScene(idx, alpha) {
  if (alpha <= 0) return;
  const data = LANG[lang];
  const phase = data.steps[idx].phase;
  drawSkeleton(cx, cy+20, Math.min(W,H)/280, alpha, phase);
}

function drawBg(sf) {
  const idx = Math.floor(sf), fr = sf - idx;
  const nx = Math.min(idx+1, N-1);
  const data = LANG[lang];
  const r = data.steps[idx].bg[0]*(1-fr) + data.steps[nx].bg[0]*fr;
  const g = data.steps[idx].bg[1]*(1-fr) + data.steps[nx].bg[1]*fr;
  const b = data.steps[idx].bg[2]*(1-fr) + data.steps[nx].bg[2]*fr;
  const gr = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W,H)*0.7);
  gr.addColorStop(0, `rgb(${r|0}, ${g|0}, ${b|0})`);
  gr.addColorStop(1, 'rgb(5,5,14)');
  ctx.fillStyle = gr; ctx.fillRect(0, 0, W, H);
}

// ═══════════════════════════════════════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════════════════════════════════════
let lt = 0;
function loop(ts) {
  const dt = Math.min((ts - lt) / 1000, 0.05);
  lt = ts;
  time += dt;
  if (gA < 1) gA = Math.min(1, gA + dt*0.5);
  if (trans) tT = Math.min(tT + dt*0.65, 1);
  ctx.clearRect(0, 0, W, H);
  const sf = trans ? cur + (tgt - cur) * ease(tT) : cur;
  drawBg(sf);
  ctx.globalAlpha = gA;
  if (trans) {
    const e2 = ease(tT);
    drawScene(cur, 1-e2);
    drawScene(tgt, e2);
  } else {
    drawScene(cur, 1);
  }
  ctx.globalAlpha = 1;
  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════════════════════════
// INITIALIZE
// ═══════════════════════════════════════════════════════════════════════════
function init() {
  const savedLang = localStorage.getItem('tree_pose_lang');
  if (savedLang === 'en' || savedLang === 'el') lang = savedLang;
  else lang = 'el';
  updateLanguage();
  rebuildDots();
  updateUI();
  subBox.classList.add('vis');
  introDiv.addEventListener('click', () => introDiv.classList.add('hidden'));
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === ' ') goTo(cur+1);
    if (e.key === 'ArrowLeft') goTo(cur-1);
  });
  requestAnimationFrame(loop);
}
init();
</script>
</body>
</html>
