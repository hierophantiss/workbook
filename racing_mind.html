<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060810;overflow:hidden;height:100vh;height:100dvh;width:100vw;font-family:'Cormorant Garamond',serif;color:#e8e4df;user-select:none}
canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:1}
.label{position:fixed;bottom:54px;left:50%;transform:translateX(-50%);z-index:10;text-align:center;width:90%;opacity:0;transition:opacity 1.5s ease}
.label.vis{opacity:1}
.label .main{font-size:clamp(1rem,2.8vw,1.6rem);font-weight:300;letter-spacing:0.25em;text-transform:uppercase}
.label .sci{font-size:clamp(0.45rem,0.9vw,0.6rem);letter-spacing:0.08em;color:rgba(168,213,220,0.22);margin-top:10px;line-height:1.5;max-width:420px;margin-left:auto;margin-right:auto;border-top:1px solid rgba(168,213,220,0.05);padding-top:6px}
.snum{position:fixed;top:22px;right:26px;z-index:10;font-size:0.65rem;letter-spacing:0.3em;color:rgba(232,228,223,0.12)}
.ptrack{position:fixed;bottom:0;left:0;width:100%;height:2px;background:rgba(255,255,255,0.03);z-index:10}
.pbar{height:100%;background:linear-gradient(90deg,rgba(200,80,80,0.5),rgba(180,160,60,0.4),rgba(80,180,160,0.4),rgba(130,200,150,0.5));transition:width 1.5s ease}
.dots{position:fixed;right:18px;top:50%;transform:translateY(-50%);z-index:10;display:flex;flex-direction:column;gap:14px}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(232,228,223,0.1);transition:all .6s;cursor:pointer;border:none;padding:0;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center}
.dot.active{background:rgba(232,228,223,0.5)}
.ctrls{position:fixed;bottom:clamp(8px,2vh,18px);left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:10px}
.ctrls button{background:rgba(232,228,223,0.06);border:1.5px solid rgba(232,228,223,0.15);color:rgba(232,228,223,0.5);padding:10px 22px;font-family:'Cormorant Garamond',serif;font-size:clamp(0.75rem,1.5vw,0.9rem);letter-spacing:0.12em;cursor:pointer;border-radius:24px;transition:all .3s;min-width:48px;min-height:44px}
.ctrls button:active{background:rgba(232,228,223,0.18);transform:scale(0.95)}
.back-link{position:fixed;top:12px;left:12px;z-index:20;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.4);padding:5px 12px;border-radius:14px;font-size:13px;text-decoration:none;font-family:inherit}
.lang-btn{position:fixed;top:12px;right:12px;z-index:20;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.4);padding:4px 10px;border-radius:12px;font-size:11px;cursor:pointer;font-family:inherit}
.intro{position:fixed;inset:0;z-index:100;background:#060810;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:opacity 2s ease}
.intro.hidden{opacity:0;pointer-events:none}
.intro-t{font-size:clamp(1.5rem,4.5vw,2.6rem);font-weight:300;letter-spacing:0.2em;background:linear-gradient(135deg,#e8a090,#c06060);-webkit-background-clip:text;-webkit-text-fill-color:transparent;opacity:0;animation:fi 2s ease 0.5s forwards}
.intro-s{font-size:clamp(0.65rem,1.3vw,0.9rem);letter-spacing:0.3em;color:rgba(232,228,223,0.2);margin-top:8px;font-style:italic;opacity:0;animation:fi 2s ease 1.2s forwards}
.intro-h{position:absolute;bottom:clamp(40px,8vh,80px);left:50%;transform:translateX(-50%);font-size:clamp(0.85rem,2vw,1.1rem);letter-spacing:0.3em;color:rgba(232,228,223,0.55);text-transform:uppercase;cursor:pointer;padding:14px 36px;border:1.5px solid rgba(232,228,223,0.2);border-radius:30px;background:rgba(232,228,223,0.04);transition:all 0.3s;animation:pu 3s ease-in-out infinite;white-space:nowrap}
.intro-h:active{background:rgba(232,228,223,0.12);transform:translateX(-50%) scale(0.96)}
@keyframes fi{to{opacity:1}}
@keyframes pu{0%,100%{opacity:0.55}50%{opacity:0.9}}
@media(prefers-reduced-motion:reduce){*{animation-duration:0.01ms!important;transition-duration:0.01ms!important}}
</style>

<body>
<div class="intro" id="intro">
  <div class="intro-t" id="it">Νους που Τρέχει</div>
  <div class="intro-s" id="is">Διάσπαση → Γείωση → Αναπνοή → Παρουσία</div>
  <div class="intro-h" id="ih">πάτησε για να ξεκινήσεις</div>
</div>
<a class="back-link" href="index.html">←</a>
<button class="lang-btn" id="langBtn" onclick="toggleLang()">EN</button>
<canvas id="c"></canvas>
<div class="label" id="label"><div class="main" id="lm"></div><div class="sci" id="lsci"></div></div>
<div class="snum" id="sn"></div>
<div class="ptrack"><div class="pbar" id="pb"></div></div>
<div class="dots"><button class="dot active" onclick="goTo(0)"></button><button class="dot" onclick="goTo(1)"></button><button class="dot" onclick="goTo(2)"></button><button class="dot" onclick="goTo(3)"></button></div>
<div class="ctrls"><button onclick="goTo(cur-1)">◀ </button><button id="ab" onclick="togAuto()">▶ auto</button><button onclick="goTo(cur+1)"> ▶</button></div>
<script>
var cv=document.getElementById('c'),ctx=cv.getContext('2d');
var W,H,CX,CY;
function resize(){var d=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;cv.width=W*d;cv.height=H*d;cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(d,0,0,d,0,0);CX=W/2;CY=H*0.45}
resize();addEventListener('resize',resize);
var lang='el',t=0,sb=0,gA=0;
var ul=new URLSearchParams(location.search).get('lang');
if(ul==='en'||ul==='el')lang=ul;
function toggleLang(){lang=lang==='el'?'en':'el';document.getElementById('langBtn').textContent=lang==='el'?'EN':'ΕΛ';updUI();uiL()}
function uiL(){document.getElementById('it').textContent=lang==='el'?'Νους που Τρέχει':'Racing Mind';document.getElementById('is').textContent=lang==='el'?'Διάσπαση → Γείωση → Αναπνοή → Παρουσία':'Dispersion → Grounding → Breath → Presence';document.getElementById('ih').textContent=lang==='el'?'πάτησε για να ξεκινήσεις':'click anywhere to begin'}
if(lang==='en'){uiL();document.getElementById('langBtn').textContent='ΕΛ'}
var scenes=[
  {label:'Διάσπαση',label_en:'Dispersion',sci:'Default Mode Network: η νοητική περιπλάνηση ενεργοποιεί αυτοαναφορικά δίκτυα — Brewer et al. (2011) PNAS',sci_en:'Default Mode Network: mind-wandering activates self-referential circuits — Brewer et al. (2011) PNAS',bg:[32,10,14]},
  {label:'Γείωση',label_en:'Grounding',sci:'Η αίσθηση βαρύτητας ενεργοποιεί ιδιοδεκτικότητα & παρασυμπαθητικό — Craig (2002) Nature Reviews Neuroscience',sci_en:'Gravity sense activates proprioception & parasympathetic branch — Craig (2002) Nature Reviews Neuroscience',bg:[12,14,24]},
  {label:'Αναπνοή',label_en:'Breath',sci:'Αργή εκπνοή ενεργοποιεί πνευμονογαστρικό νεύρο — Gerritsen & Band (2018) · Magnon et al. (2021)',sci_en:'Slow exhale activates vagus nerve — Gerritsen & Band (2018) · Magnon et al. (2021)',bg:[10,16,20]},
  {label:'Παρουσία',label_en:'Presence',sci:'Η ενσυνειδητότητα μειώνει τη δραστηριότητα του DMN και ενισχύει τον Προμετωπιαίο Φλοιό — Hölzel et al. (2011)',sci_en:'Mindfulness reduces DMN activity and strengthens Prefrontal Cortex — Hölzel et al. (2011)',bg:[8,20,16]}
];
var cur=0,tgt=0,tT=0,trans=false,autoP=false,autoTm=null;
function ease(x){return x<0.5?4*x*x*x:1-Math.pow(-2*x+2,3)/2}
function sc(){return Math.min(W/420,H/650)*0.85}
var thoughts_el=['παρελθόν','ανησυχία','σχέδια','θυμός','αν...','κρίση','φόβος','πόνος','σενάριο','λάθος'];
var thoughts_en=['past','worry','plans','anger','what if','judgment','fear','pain','scenario','mistake'];
var vortex=[];
for(var i=0;i<60;i++)vortex.push({a:Math.random()*Math.PI*2,r:30+Math.random()*120,speed:(0.8+Math.random()*2)*(Math.random()>0.3?1:-1),y:-80+Math.random()*60,sz:0.8+Math.random()*2.5,al:0.15+Math.random()*0.4,label:i<10?i:-1});
function drawMeditator(s,bodyAlpha,breathPhase){
  ctx.save();ctx.translate(CX,CY);ctx.scale(s,s);ctx.lineCap='round';ctx.lineJoin='round';var ba=bodyAlpha;
  ctx.beginPath();ctx.ellipse(0,-95,28,32,0,0,Math.PI*2);ctx.fillStyle='rgba(32,63,64,'+ba*0.9+')';ctx.fill();
  ctx.beginPath();ctx.ellipse(0,-100,20,22,0,0,Math.PI*2);ctx.fillStyle='rgba(38,78,79,'+ba*0.85+')';ctx.fill();
  ctx.beginPath();ctx.arc(0,-98,14,0,Math.PI*2);ctx.fillStyle='rgba(210,190,160,'+ba*0.45+')';ctx.fill();
  ctx.strokeStyle='rgba(100,80,60,'+ba*0.3+')';ctx.lineWidth=0.8;
  ctx.beginPath();ctx.moveTo(-7,-100);ctx.quadraticCurveTo(-5,-98,-3,-100);ctx.stroke();
  ctx.beginPath();ctx.moveTo(3,-100);ctx.quadraticCurveTo(5,-98,7,-100);ctx.stroke();
  ctx.strokeStyle='rgba(100,80,60,'+ba*0.2+')';ctx.lineWidth=0.6;
  ctx.beginPath();ctx.moveTo(-4,-95);ctx.quadraticCurveTo(0,-92,4,-95);ctx.stroke();
  var te=1+breathPhase*0.03;
  ctx.beginPath();ctx.moveTo(-32,-70);ctx.quadraticCurveTo(-25,-80,0,-82);ctx.quadraticCurveTo(25,-80,32,-70);
  ctx.lineTo(28*te,-15);ctx.quadraticCurveTo(18*te,0,0,2);ctx.quadraticCurveTo(-18*te,0,-28*te,-15);ctx.closePath();
  ctx.fillStyle='rgba(38,78,79,'+ba*0.85+')';ctx.fill();ctx.strokeStyle='rgba(168,213,170,'+ba*0.15+')';ctx.lineWidth=0.8;ctx.stroke();
  ctx.strokeStyle='rgba(210,190,160,'+ba*0.3+')';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(-28,-62);ctx.quadraticCurveTo(-32,-35,-26,-10);ctx.quadraticCurveTo(-20,2,-10,0);ctx.stroke();
  ctx.beginPath();ctx.moveTo(28,-62);ctx.quadraticCurveTo(32,-35,26,-10);ctx.quadraticCurveTo(20,2,10,0);ctx.stroke();
  ctx.beginPath();ctx.ellipse(0,0,12,6,0,0,Math.PI*2);ctx.strokeStyle='rgba(210,190,160,'+ba*0.2+')';ctx.lineWidth=1.5;ctx.stroke();
  ctx.beginPath();ctx.moveTo(-28,-15);ctx.quadraticCurveTo(-22,8,-12,15);ctx.quadraticCurveTo(-4,18,0,14);ctx.quadraticCurveTo(4,18,12,15);ctx.quadraticCurveTo(22,8,28,-15);ctx.fillStyle='rgba(38,78,79,'+ba*0.7+')';ctx.fill();
  ctx.beginPath();ctx.ellipse(0,18,25,4,0,0,Math.PI*2);ctx.fillStyle='rgba(140,130,100,'+ba*0.1+')';ctx.fill();
  if(breathPhase>0.01){var bp=Math.sin(t*0.5);var bg=ctx.createRadialGradient(0,-40,0,0,-40,40+bp*12);bg.addColorStop(0,'rgba(100,190,210,'+breathPhase*0.2*(1+bp*0.3)+')');bg.addColorStop(1,'rgba(100,190,210,0)');ctx.fillStyle=bg;ctx.beginPath();ctx.arc(0,-40,40+bp*12,0,Math.PI*2);ctx.fill()}
  ctx.restore();
}
function drawAxis(alpha,s){
  var top=CY-s*160,bot=CY+s*60;var g=ctx.createLinearGradient(CX,top,CX,bot);
  g.addColorStop(0,'rgba(220,190,60,0)');g.addColorStop(0.1,'rgba(220,190,60,'+alpha*0.3+')');g.addColorStop(0.5,'rgba(220,190,60,'+alpha*0.6+')');g.addColorStop(0.9,'rgba(220,190,60,'+alpha*0.3+')');g.addColorStop(1,'rgba(220,190,60,0)');
  ctx.strokeStyle=g;ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(CX,top);ctx.lineTo(CX,bot);ctx.stroke();
  ctx.strokeStyle='rgba(220,190,60,'+alpha*0.05+')';ctx.lineWidth=18;ctx.beginPath();ctx.moveTo(CX,top);ctx.lineTo(CX,bot);ctx.stroke();
  var gy=CY+s*30;var gg=ctx.createLinearGradient(CX-s*140,gy,CX+s*140,gy);gg.addColorStop(0,'rgba(140,130,100,0)');gg.addColorStop(0.5,'rgba(140,130,100,'+alpha*0.35+')');gg.addColorStop(1,'rgba(140,130,100,0)');
  ctx.strokeStyle=gg;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(CX-s*140,gy);ctx.lineTo(CX+s*140,gy);ctx.stroke();
}
function drawVortex(strength,s){
  var labels=lang==='el'?thoughts_el:thoughts_en;var headY=CY-s*95;
  vortex.forEach(function(p){p.a+=p.speed*0.012*strength;var wobble=Math.sin(t*2+p.a)*8*strength;var r=p.r*s*0.7*strength+10;
    var px=CX+Math.cos(p.a)*r;var py=headY+p.y*s*0.6+Math.sin(p.a*0.7+t)*wobble*s*0.3;py-=Math.abs(Math.sin(p.a))*30*s*strength;
    var pa=p.al*strength*(0.5+Math.sin(t+p.a)*0.3);if(pa<0.01)return;
    var cr=180+strength*40,cg=80+((1-strength)*80),cb=70+((1-strength)*90);
    ctx.beginPath();ctx.arc(px,py,p.sz*(0.5+strength*0.5),0,Math.PI*2);ctx.fillStyle='rgba('+~~cr+','+~~cg+','+~~cb+','+pa+')';ctx.fill();
    if(p.label>=0&&strength>0.2&&pa>0.1){ctx.fillStyle='rgba('+~~cr+','+(~~cg+30)+','+(~~cb+30)+','+(pa*0.9)+')';ctx.font=(9+strength*3)*Math.min(s,1.2)+'px Cormorant Garamond,serif';ctx.textAlign='center';ctx.fillText(labels[p.label],px,py-p.sz-4)}
  });
  if(strength>0.1){for(var i=0;i<3;i++){ctx.beginPath();ctx.strokeStyle='rgba(200,100,80,'+strength*0.06+')';ctx.lineWidth=1;
    for(var a=0;a<Math.PI*4;a+=0.1){var r2=(20+a*12)*s*0.5*strength;var px2=CX+Math.cos(a+t*0.5+i*2.1)*r2;var py2=headY-20*s+Math.sin(a+t*0.3+i)*r2*0.3-a*3*s*strength;a===0?ctx.moveTo(px2,py2):ctx.lineTo(px2,py2)}ctx.stroke()}}
}
function drawBreathFlow(alpha,s){
  var bp=Math.sin(t*0.5);for(var i=0;i<8;i++){var ox=(i-4)*6*s*0.3;var ph=t*0.6+i*0.8;var fa=alpha*(0.1+Math.sin(ph)*0.05);
    ctx.strokeStyle='rgba(140,210,220,'+fa+')';ctx.lineWidth=1;ctx.beginPath();
    for(var y=0;y<60;y+=2){var w=Math.sin(y*0.05+ph)*(6+y*0.03)*s*0.4;var px=CX+ox+w;var py=CY-s*80-y*s*0.5+bp*4;y===0?ctx.moveTo(px,py):ctx.lineTo(px,py)}ctx.stroke()}
}
function drawBg(blend){
  var idx=Math.min(Math.floor(blend),3),fr=blend-idx,nx=Math.min(idx+1,3);
  var r=scenes[idx].bg[0]*(1-fr)+scenes[nx].bg[0]*fr,g=scenes[idx].bg[1]*(1-fr)+scenes[nx].bg[1]*fr,b=scenes[idx].bg[2]*(1-fr)+scenes[nx].bg[2]*fr;
  var grd=ctx.createRadialGradient(CX,CY-30,0,CX,CY,Math.max(W,H)*0.55);
  grd.addColorStop(0,'rgb('+~~r+','+~~g+','+~~b+')');grd.addColorStop(0.7,'rgb('+~~(r*0.4)+','+~~(g*0.4)+','+~~(b*0.4)+')');grd.addColorStop(1,'rgb(4,5,10)');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
}
function updUI(){var s=scenes[cur];document.getElementById('lm').textContent=lang==='el'?s.label:s.label_en;document.getElementById('lsci').textContent=lang==='el'?s.sci:s.sci_en;document.getElementById('label').classList.add('vis');document.getElementById('sn').textContent=(cur+1)+' / 4';document.getElementById('pb').style.width=(cur/3*100)+'%';document.querySelectorAll('.dot').forEach(function(d,i){d.classList.toggle('active',i===cur)})}
function goTo(i){if(i<0||i>3||i===cur||trans)return;tgt=i;trans=true;tT=0;document.getElementById('label').classList.remove('vis');setTimeout(function(){cur=tgt;trans=false;updUI()},1800)}
function togAuto(){autoP=!autoP;document.getElementById('ab').textContent=autoP?'⏸ pause':'▶ auto';if(autoP)runA();else clearTimeout(autoTm)}
function runA(){if(!autoP)return;autoTm=setTimeout(function(){if(cur<3){goTo(cur+1);setTimeout(runA,2200)}else{autoP=false;document.getElementById('ab').textContent='▶ auto'}},7000)}
var lt=performance.now();
function loop(ts){var dt=Math.min((ts-lt)/1000,0.05);lt=ts;t+=dt;
  if(gA<1)gA=Math.min(1,gA+dt*0.4);if(trans)tT=Math.min(tT+dt*0.55,1);
  var target=trans?cur+(tgt-cur)*ease(tT):cur;sb+=(target-sb)*dt*2.5;
  var vortexStr=Math.max(0,1-sb*0.35);var axisAlpha=Math.max(0,Math.min(1,(sb-0.4)*1.5));
  var breathAmt=Math.max(0,Math.min(1,(sb-1.3)*1.4));var presence=Math.max(0,Math.min(1,(sb-2.3)*1.4));
  var bodyAlpha=0.3+axisAlpha*0.4+breathAmt*0.2+presence*0.1;var breathPhase=breathAmt*Math.max(0,Math.sin(t*0.5));
  var s=sc();ctx.clearRect(0,0,W,H);drawBg(sb);ctx.globalAlpha=gA;
  if(axisAlpha>0.01)drawAxis(axisAlpha,s);if(breathAmt>0.01)drawBreathFlow(breathAmt,s);
  drawMeditator(s,bodyAlpha,breathPhase);drawVortex(vortexStr,s);
  ctx.globalAlpha=1;requestAnimationFrame(loop)}
requestAnimationFrame(loop);
document.getElementById('intro').addEventListener('click',function(){this.classList.add('hidden');updUI()});
document.addEventListener('keydown',function(e){if(e.key==='ArrowRight'||e.key===' ')goTo(cur+1);if(e.key==='ArrowLeft')goTo(cur-1)});
</script>
</body>
