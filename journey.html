function aS2(al){if(al<=0)return;aCtx.save();const bp=Math.sin(aTime*0.45);aGnd(al,'80,140,160');aAx(al,'80,140,160',180);aBA(al,bp,'80,165,195',1);for(let i=0;i<7;i++){const ox=(i-3)*9,ph=aTime*0.6+i*0.9,fa=(0.5+Math.sin(ph)*0.5)*0.12;aCtx.beginPath();for(let y=0;y<90;y+=2){const w=Math.sin(y*0.04+ph)*(7+y*0.05),px=aCx+ox+w,py=aCy-45-y;y===0?aCtx.moveTo(px,py):aCtx.lineTo(px,py)}aCtx.strokeStyle=`rgba(100,180,210,${al*fa})`;aCtx.lineWidth=1;aCtx.stroke()}aBody(aCx,aCy+22,1,al,true,bp);aCtx.restore()}
function aS3(al){if(al<=0)return;aCtx.save();const bp=Math.sin(aTime*0.45);aGnd(al,'160,150,80');aAx(al,'140,130,80',180);aBA(al*0.45,bp,'80,165,195',0.85);aBody(aCx,aCy+22,1,al,true,bp);const tx=aCx+Math.min(aW*0.22,170),ty=aCy-35,pu=Math.sin(aTime*2.5),ey=aCy+22-52;for(let b=-1;b<=1;b+=2){const ex=aCx+b*5,bg=aCtx.createLinearGradient(ex,ey,tx,ty);bg.addColorStop(0,`rgba(225,190,65,${al*0.45})`);bg.addColorStop(1,`rgba(225,190,65,${al*0.5})`);aCtx.strokeStyle=bg;aCtx.lineWidth=1.6;aCtx.beginPath();aCtx.moveTo(ex,ey);aCtx.lineTo(tx,ty);aCtx.stroke()}for(let r=35;r>0;r-=7){const tg=aCtx.createRadialGradient(tx,ty,0,tx,ty,r);tg.addColorStop(0,`rgba(235,200,55,${al*(0.1+pu*0.03)})`);tg.addColorStop(1,'rgba(235,200,55,0)');aCtx.fillStyle=tg;aCtx.beginPath();aCtx.arc(tx,ty,r,0,Math.PI*2);aCtx.fill()}aCtx.fillStyle=`rgba(245,215,75,${al*(0.65+pu*0.2)})`;aCtx.beginPath();aCtx.arc(tx,ty,3.5+pu,0,Math.PI*2);aCtx.fill();aCtx.restore()}
function aS4(al){if(al<=0)return;aCtx.save();const bp=Math.sin(aTime*0.35);aGnd(al,'100,170,130');aAx(al*0.55,'100,160,120',170);aBA(al*0.3,bp,'80,165,195',0.8);aBody(aCx,aCy+22,1,al,true,bp);for(let i=0;i<24;i++){const angle=(i/24)*Math.PI*2+aTime*0.03,nv=aFbm(Math.cos(angle)+aTime*0.1,Math.sin(angle)+aTime*0.08,3),len=75+nv*95+Math.sin(aTime*0.25+i*0.5)*25,sr=32,sx=aCx+Math.cos(angle)*sr,sy=(aCy-8)+Math.sin(angle)*sr*0.75,ex=aCx+Math.cos(angle)*len,ey2=(aCy-8)+Math.sin(angle)*len*0.65;const rg=aCtx.createLinearGradient(sx,sy,ex,ey2);rg.addColorStop(0,`rgba(130,200,150,${al*0.28})`);rg.addColorStop(1,'rgba(130,200,150,0)');aCtx.strokeStyle=rg;aCtx.lineWidth=1+nv*0.7;const mx=(sx+ex)/2+Math.sin(angle*3+aTime)*8,my=(sy+ey2)/2+Math.cos(angle*3+aTime)*6;aCtx.beginPath();aCtx.moveTo(sx,sy);aCtx.quadraticCurveTo(mx,my,ex,ey2);aCtx.stroke()}for(let i=0;i<4;i++){const rr=((aTime*11+i*65)%260),ra=Math.max(0,1-rr/260);aCtx.globalAlpha=al*ra*0.1;aCtx.strokeStyle='rgba(130,200,150,1)';aCtx.lineWidth=0.8;aCtx.beginPath();for(let a=0;a<=Math.PI*2+0.1;a+=0.04){const n=aFbm(Math.cos(a)*2+i,Math.sin(a)*2+aTime*0.1,2),r=rr*(1+(n-0.5)*0.08),px=aCx+Math.cos(a)*r,py=aCy-8+Math.sin(a)*r*0.7;a===0?aCtx.moveTo(px,py):aCtx.lineTo(px,py)}aCtx.closePath();aCtx.stroke();aCtx.globalAlpha=1}for(let i=0;i<28;i++){const angle=(i/28)*Math.PI*2+aTime*0.05,dist=55+Math.sin(aTime*0.2+i*0.7)*45+i*2.5,px=aCx+Math.cos(angle)*dist,py=aCy-8+Math.sin(angle)*dist*0.65,pa=0.12+Math.sin(aTime+i)*0.08;aCtx.beginPath();aCtx.arc(px,py,1,0,Math.PI*2);aCtx.fillStyle=`rgba(140,210,160,${al*pa})`;aCtx.fill()}aCtx.restore()}

const aDFns=[aS0,aS1,aS2,aS3,aS4];

function aDrawBg(sf){const idx=Math.floor(sf),fr=sf-idx,nx=Math.min(idx+1,4);const r=aStageBg[idx][0]*(1-fr)+aStageBg[nx][0]*fr,g=aStageBg[idx][1]*(1-fr)+aStageBg[nx][1]*fr,b=aStageBg[idx][2]*(1-fr)+aStageBg[nx][2]*fr;const grd=aCtx.createRadialGradient(aCx,aCy-20,0,aCx,aCy,Math.max(aW,aH)*0.75);grd.addColorStop(0,`rgb(${r|0},${g|0},${b|0})`);grd.addColorStop(1,'rgb(5,5,16)');aCtx.fillStyle=grd;aCtx.fillRect(0,0,aW,aH);aCtx.globalAlpha=aAlpha;aAP.forEach(p=>{p.x+=p.vx+Math.sin(aTime*0.2+p.ph)*0.04;p.y+=p.vy+Math.cos(aTime*0.15+p.ph)*0.03;if(p.x<0)p.x=aW;if(p.x>aW)p.x=0;if(p.y<0)p.y=aH;if(p.y>aH)p.y=0;const pa=p.al*(0.7+Math.sin(aTime*0.5+p.ph)*0.3);aCtx.beginPath();aCtx.arc(p.x,p.y,p.sz,0,Math.PI*2);aCtx.fillStyle=`rgba(200,195,185,${pa})`;aCtx.fill()});aCtx.globalAlpha=1}
function aUI(){const s=t('stages')[aCur];document.getElementById('anim-main').textContent=s.label;document.getElementById('anim-sub-text').textContent=s.sub;document.getElementById('anim-label').classList.add('vis');document.getElementById('anim-snum').textContent=`${aCur+1} / 5`;document.getElementById('anim-pbar').style.width=`${(aCur/4)*100}%`;document.querySelectorAll('.ad').forEach((d,i)=>d.classList.toggle('active',i===aCur))}

function aGo(idx){if(idx<0||idx>4||idx===aCur||aTrans)return;aTgt=idx;aTrans=true;aTT=0;document.getElementById('anim-label').classList.remove('vis');setTimeout(()=>{aCur=aTgt;aTrans=false;aUI()},1800)}
function aEase(t2){return t2<0.5?4*t2*t2*t2:1-Math.pow(-2*t2+2,3)/2}
function aRunAuto(){if(!aAuto)return;aAutoTmr=setTimeout(()=>{if(aCur<4){aGo(aCur+1);setTimeout(aRunAuto,2000)}else{aAuto=false;document.getElementById('anim-auto').innerHTML='▶ auto'}},5000)}

function aLoop(ts){if(!animActive)return;const dt=Math.min((ts-aLastT)/1000,0.05);aLastT=ts;aTime+=dt;if(aAlpha<1)aAlpha=Math.min(1,aAlpha+dt*0.5);if(aTrans)aTT=Math.min(aTT+dt*0.7,1);aCtx.clearRect(0,0,aW,aH);const sf=aTrans?aCur+(aTgt-aCur)*aEase(aTT):aCur;aDrawBg(sf);aCtx.globalAlpha=aAlpha;if(aTrans){const t2=aEase(aTT);aDFns[aCur](1-t2);aDFns[aTgt](t2)}else aDFns[aCur](1);aCtx.globalAlpha=1;animRAF=requestAnimationFrame(aLoop)}
function aDrawBg(sf){var idx=Math.floor(sf),fr=sf-idx,nx=Math.min(idx+1,4);var r=aStageBg[idx][0]*(1-fr)+aStageBg[nx][0]*fr,g=aStageBg[idx][1]*(1-fr)+aStageBg[nx][1]*fr,b=aStageBg[idx][2]*(1-fr)+aStageBg[nx][2]*fr;var grd=aCtx.createRadialGradient(aCx,aCy-20,0,aCx,aCy,Math.max(aW,aH)*0.75);grd.addColorStop(0,'rgb('+(r|0)+','+(g|0)+','+(b|0)+')');grd.addColorStop(1,'rgb(5,5,16)');aCtx.fillStyle=grd;aCtx.fillRect(0,0,aW,aH);aCtx.globalAlpha=aAlpha;aAP.forEach(function(p){p.x+=p.vx+Math.sin(aTime*0.2+p.ph)*0.04;p.y+=p.vy+Math.cos(aTime*0.15+p.ph)*0.03;if(p.x<0)p.x=aW;if(p.x>aW)p.x=0;if(p.y<0)p.y=aH;if(p.y>aH)p.y=0;var pa=p.al*(0.7+Math.sin(aTime*0.5+p.ph)*0.3);aCtx.beginPath();aCtx.arc(p.x,p.y,p.sz,0,Math.PI*2);aCtx.fillStyle='rgba(200,195,185,'+pa+')';aCtx.fill()});aCtx.globalAlpha=1}
function aEase(x){return x<0.5?4*x*x*x:1-Math.pow(-2*x+2,3)/2}
function updUI(){var s=t('stages')[cur];document.getElementById('lm').textContent=s.label;document.getElementById('ls').textContent=s.sub;document.getElementById('label').classList.add('vis');document.getElementById('sn').textContent=(cur+1)+' / 5';document.getElementById('pb').style.width=(cur/4*100)+'%';document.querySelectorAll('.dot').forEach(function(d,i){d.classList.toggle('active',i===cur)})}
function goTo(i){if(i<0||i>4||i===cur||trans)return;tgt=i;trans=true;tT=0;document.getElementById('label').classList.remove('vis');setTimeout(function(){cur=tgt;trans=false;updUI()},1800)}
function togAuto(){autoP=!autoP;document.getElementById('ab').textContent=autoP?'⏸ pause':'▶ auto';if(autoP)runA();else clearTimeout(autoTm)}
function runA(){if(!autoP)return;autoTm=setTimeout(function(){if(cur<4){goTo(cur+1);setTimeout(runA,2000)}else{autoP=false;document.getElementById('ab').textContent='▶ auto'}},5500)}
function loop(ts){var dt=Math.min((ts-aLastT)/1000,0.05);aLastT=ts;aTime+=dt;if(aAlpha<1)aAlpha=Math.min(1,aAlpha+dt*0.5);if(trans)tT=Math.min(tT+dt*0.7,1);aCtx.clearRect(0,0,aW,aH);var sf=trans?cur+(tgt-cur)*aEase(tT):cur;aDrawBg(sf);aCtx.globalAlpha=aAlpha;if(trans){var e2=aEase(tT);aDFns[cur](1-e2);aDFns[tgt](e2)}else aDFns[cur](1);aCtx.globalAlpha=1;requestAnimationFrame(loop)}
// Init particles
for(var i=0;i<90;i++){var co=Math.random()>0.3?(200+Math.random()*55|0)+','+(80+Math.random()*50|0)+','+(60+Math.random()*40|0):(180+Math.random()*40|0)+','+(60+Math.random()*30|0)+','+(60+Math.random()*30|0);aTP.push({angle:Math.random()*Math.PI*2,r:20+Math.random()*170,speed:(0.3+Math.random()*1.5)*(Math.random()>0.5?1:-1),vP:Math.random(),sz:0.8+Math.random()*2.5,al:0.12+Math.random()*0.4,ph:Math.random()*Math.PI*2,co:co,trail:[]})}
for(var i=0;i<40;i++)aAP.push({x:Math.random()*2000,y:Math.random()*2000,vx:(Math.random()-0.5)*0.18,vy:(Math.random()-0.5)*0.12,sz:0.4+Math.random()*1.3,al:0.04+Math.random()*0.1,ph:Math.random()*Math.PI*2});
aLastT=performance.now();requestAnimationFrame(loop);
document.getElementById('intro').addEventListener('click',function(){this.classList.add('hidden');updUI()});
document.addEventListener('keydown',function(e){if(e.key==='ArrowRight'||e.key===' ')goTo(cur+1);if(e.key==='ArrowLeft')goTo(cur-1)});
</script>
