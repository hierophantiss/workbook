<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#f9f7f3">
    <title>Fourfold Axis — 8-Week Program</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=Instrument+Serif:opsz@14..32&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/companion.css">
    <link rel="stylesheet" href="css/companion2.css">
    <style>
        /* ═══════════════════════════════════════
           BASE — calm, predictable, mobile-first
           ═══════════════════════════════════════ */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-page: #f9f7f3;
            --bg-card: #ffffff;
            --bg-soft: #f2efe9;
            --bg-softer: #f7f4ee;
            --bg: #ffffff; /* Fallback for companion v2 */
            --border: #e2ddd4; /* Fallback for companion v2 */
            --text: #2b2a28;
            --teal: #2c6e6b;
            --teal-light: #4f9e9a;
            --text-primary: #2b2a28;
            --text-secondary: #5b5a56;
            --text-muted: #8c8982;
            --border-light: #e2ddd4;
            --border-strong: #cec8bd;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.03);
            --shadow-md: 0 6px 20px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.08);
            --focus-ring: 0 0 0 3px rgba(44, 110, 107, 0.25);
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --radius-sm: 14px;
            --radius-md: 20px;
            --radius-lg: 28px;
            --radius-xl: 32px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-page: #121210;
                --bg-card: #1e1f1c;
                --bg-soft: #2a2b27;
                --bg-softer: #24251f;
                --bg: #1e1f1c; /* Fallback for companion v2 */
                --border: #34332e;
                --text: #ece9e2;
                --teal: #6fc2be;
                --text-primary: #ece9e2;
                --text-secondary: #b8b5ab;
                --text-muted: #827f76;
                --border-light: #34332e;
                --border-strong: #45433e;
                --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
                --shadow-md: 0 6px 20px rgba(0, 0, 0, 0.4);
                --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.5);
            }
            meta[name="theme-color"] { content: #121210; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }

        html { -webkit-text-size-adjust: 100%; }

        body {
            background: var(--bg-page);
            color: var(--text-primary);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            line-height: 1.65;
            font-weight: 400;
            font-size: 17px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            padding-bottom: 120px;
            overflow-x: hidden;
        }

        .container {
            max-width: 640px;
            margin: 0 auto;
            padding: 16px 16px 40px;
        }

        /* ═══════════════════════════════════════
           HEADER — compact, clear progress
           ═══════════════════════════════════════ */
        header {
            background: linear-gradient(135deg, var(--teal) 0%, #1d5552 100%);
            color: white;
            padding: 24px 22px 22px;
            border-radius: var(--radius-xl);
            margin-bottom: 20px;
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
        }

        header::after {
            content: '';
            position: absolute;
            top: -30%; right: -20%;
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(219, 176, 103, 0.18), transparent 60%);
            pointer-events: none;
        }

        header h1 {
            font-family: 'Instrument Serif', serif;
            font-size: 1.75rem;
            font-weight: 400;
            letter-spacing: -0.01em;
            margin-bottom: 4px;
            position: relative;
        }

        .header-sub {
            font-size: 0.8rem;
            opacity: 0.82;
            margin-bottom: 18px;
            letter-spacing: 0.3px;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 10px;
        }

        .header-week {
            font-family: 'Instrument Serif', serif;
            font-size: 1.15rem;
            font-weight: 400;
        }

        .header-day-num {
            font-size: 0.75rem;
            opacity: 0.75;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }

        .header-day-title {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 16px;
            font-weight: 500;
        }

        .progress-track {
            background: rgba(255, 255, 255, 0.2);
            height: 5px;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, var(--gold-soft), #eac688);
            height: 100%;
            border-radius: 5px;
            transition: width 0.6s cubic-bezier(0.2, 0.9, 0.4, 1);
        }

        /* ═══════════════════════════════════════
           WEEK PICKER — collapsed by default
           ═══════════════════════════════════════ */
        .week-picker {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            margin-bottom: 16px;
            overflow: hidden;
            transition: var(--transition);
        }

        .week-picker-header {
            width: 100%;
            padding: 14px 18px;
            background: transparent;
            border: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-weight: 500;
            text-align: left;
            transition: var(--transition);
        }

        .week-picker-header:hover {
            background: var(--bg-soft);
        }

        .week-picker-label {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .week-picker-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--teal);
        }

        .week-picker-chevron {
            font-size: 0.85rem;
            color: var(--text-muted);
            transition: transform 0.3s ease;
        }

        .week-picker.open .week-picker-chevron {
            transform: rotate(180deg);
        }

        .week-grid {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .week-picker.open .week-grid {
            max-height: 500px;
        }

        .week-grid-inner {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            padding: 4px 14px 14px;
        }

        .week-btn {
            background: var(--bg-softer);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-sm);
            padding: 12px 12px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            text-align: left;
            line-height: 1.4;
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 52px;
        }

        .week-btn:hover, .week-btn:focus-visible {
            border-color: var(--teal-light);
            background: var(--bg-soft);
        }

        .week-btn.active {
            background: var(--teal);
            color: white;
            border-color: var(--teal);
            box-shadow: var(--shadow-sm);
        }

        .week-btn-text { display: flex; flex-direction: column; gap: 2px; }
        .week-btn-num { font-weight: 600; font-size: 0.8rem; opacity: 0.9; }
        .week-btn-axis { font-size: 0.75rem; opacity: 0.8; }

        .week-btn-progress {
            font-size: 0.7rem;
            opacity: 0.7;
            font-variant-numeric: tabular-nums;
            min-width: 26px;
            text-align: right;
        }

        .week-btn.completed .week-btn-progress::before {
            content: '✓ ';
            color: var(--gold);
        }
        .week-btn.active .week-btn-progress::before {
            color: var(--gold-soft);
        }

        /* ═══════════════════════════════════════
           DAY DOTS — 7 dots per week
           ═══════════════════════════════════════ */
        .day-dots {
            display: flex;
            justify-content: space-between;
            gap: 6px;
            margin-bottom: 16px;
            padding: 4px;
        }

        .day-dot {
            flex: 1;
            background: var(--bg-card);
            border: 1.5px solid var(--border-light);
            border-radius: 12px;
            padding: 10px 4px;
            font-family: 'Inter', sans-serif;
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            min-height: 52px;
        }

        .day-dot:hover, .day-dot:focus-visible {
            border-color: var(--teal-light);
            color: var(--text-secondary);
        }

        .day-dot.active {
            background: var(--teal);
            color: white;
            border-color: var(--teal);
            font-weight: 600;
        }

        .day-dot.completed {
            background: var(--gold-faint);
            border-color: var(--gold-soft);
            color: var(--gold);
        }
        .day-dot.completed.active {
            background: var(--teal);
            color: white;
            border-color: var(--teal);
        }

        .day-dot-check {
            font-size: 0.7rem;
            line-height: 1;
            height: 10px;
        }

        .day-dot.completed .day-dot-check::before { content: '✓'; }
        .day-dot.active.completed .day-dot-check::before { content: '✓'; color: var(--gold-soft); }

        /* ═══════════════════════════════════════
           BIG PRIMARY CTA — the "next move"
           ═══════════════════════════════════════ */
        .hero-card {
            background: linear-gradient(145deg, var(--bg-card), var(--bg-softer));
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 24px 22px 22px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
            position: relative;
            overflow: hidden;
        }

        .hero-eyebrow {
            font-size: 0.72rem;
            color: var(--teal);
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .hero-title {
            font-family: 'Instrument Serif', serif;
            font-size: 1.55rem;
            font-weight: 400;
            color: var(--text-primary);
            letter-spacing: -0.01em;
            line-height: 1.25;
            margin-bottom: 14px;
        }

        .hero-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 18px;
        }

        .hero-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--bg-soft);
            color: var(--text-secondary);
            font-size: 0.78rem;
            padding: 6px 12px;
            border-radius: 100px;
            font-weight: 500;
        }
        .hero-chip-icon { opacity: 0.7; font-size: 0.85rem; }

        /* ═══════════════════════════════════════
           TABS — Learn / Practice / Reflect
           ═══════════════════════════════════════ */
        .tabs {
            display: flex;
            gap: 4px;
            background: var(--bg-soft);
            padding: 4px;
            border-radius: 100px;
            margin-bottom: 20px;
            position: sticky;
            top: 8px;
            z-index: 20;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .tab {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 8px;
            border-radius: 100px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-height: 40px;
        }

        .tab.active {
            background: var(--bg-card);
            color: var(--teal);
            font-weight: 600;
            box-shadow: var(--shadow-sm);
        }

        .tab-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--gold);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .tab.done .tab-dot { opacity: 1; }

        /* ═══════════════════════════════════════
           TAB PANELS
           ═══════════════════════════════════════ */
        .panel {
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        .panel.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        section.card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 24px 22px;
            margin-bottom: 16px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
        }

        section.card h2 {
            font-family: 'Instrument Serif', serif;
            color: var(--teal);
            font-size: 1.45rem;
            font-weight: 400;
            margin-bottom: 14px;
            letter-spacing: -0.01em;
            line-height: 1.3;
        }

        section.card h3 {
            font-family: 'Instrument Serif', serif;
            color: var(--gold);
            font-size: 1.25rem;
            font-weight: 400;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        section.card h3::before {
            content: '';
            width: 3px;
            height: 22px;
            background: var(--gold);
            border-radius: 2px;
        }

        .lesson-body {
            line-height: 1.7;
            font-size: 1rem;
            color: var(--text-primary);
        }

        .lesson-body p + p {
            margin-top: 1em;
        }

        .lesson-body strong {
            color: var(--teal);
            font-weight: 600;
        }

        .lesson-body em {
            color: var(--text-secondary);
            font-style: italic;
        }

        /* ═══════════════════════════════════════
           EXERCISE STEPS — airy checklist
           ═══════════════════════════════════════ */
        .exercise-box {
            background: linear-gradient(145deg, var(--bg-soft), var(--bg-softer));
            border-radius: var(--radius-md);
            padding: 20px 18px;
            margin-top: 8px;
            border-left: 4px solid var(--teal);
        }

        .ex-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        .ex-title {
            font-weight: 600;
            color: var(--teal);
            font-size: 1rem;
            letter-spacing: -0.01em;
        }

        .ex-timer-btn {
            background: var(--teal);
            color: white;
            border: none;
            border-radius: 100px;
            padding: 6px 14px;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
            min-height: 32px;
        }

        .ex-timer-btn:hover, .ex-timer-btn:focus-visible {
            background: var(--teal-light);
        }

        .ex-timer-btn.running {
            background: var(--gold);
            color: #1e1e1c;
        }

        .steps-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .step-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 10px 4px;
            border-radius: 10px;
            cursor: pointer;
            transition: var(--transition);
            line-height: 1.6;
            font-size: 0.96rem;
            -webkit-tap-highlight-color: transparent;
        }

        .step-item:hover {
            background: rgba(255, 255, 255, 0.4);
        }
        @media (prefers-color-scheme: dark) {
            .step-item:hover { background: rgba(255, 255, 255, 0.03); }
        }

        .step-check {
            flex-shrink: 0;
            width: 22px;
            height: 22px;
            border-radius: 7px;
            border: 1.5px solid var(--border-strong);
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: white;
            transition: var(--transition);
            margin-top: 2px;
        }

        .step-item.checked .step-check {
            background: var(--teal);
            border-color: var(--teal);
        }

        .step-item.checked .step-check::before {
            content: '✓';
        }

        .step-item.checked .step-text {
            color: var(--text-muted);
            text-decoration: line-through;
            text-decoration-color: var(--border-strong);
        }

        .step-text {
            flex: 1;
            color: var(--text-primary);
            transition: var(--transition);
        }

        /* ═══════════════════════════════════════
           BREATHING CARD
           ═══════════════════════════════════════ */
        .breath-card {
            background: var(--lav-faint);
            border-radius: var(--radius-md);
            padding: 18px 18px;
            margin-top: 8px;
            border: 1px solid var(--border-light);
        }

        .breath-card strong {
            color: var(--teal);
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
        }

        .breath-card p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.65;
        }

        /* ═══════════════════════════════════════
           REFLECTION / JOURNAL
           ═══════════════════════════════════════ */
        .reflection-q {
            background: var(--lav-faint);
            padding: 14px 18px;
            border-left: 4px solid var(--lav);
            border-radius: var(--radius-sm);
            margin-bottom: 16px;
            font-weight: 500;
            color: var(--text-primary);
            font-size: 0.98rem;
            line-height: 1.55;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 14px 16px;
            border: 1.5px solid var(--border-light);
            border-radius: var(--radius-md);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            background: var(--bg-card);
            color: var(--text-primary);
            resize: vertical;
            transition: var(--transition);
            line-height: 1.6;
        }

        textarea:focus {
            outline: none;
            border-color: var(--teal);
            box-shadow: var(--focus-ring);
        }

        .journal-status {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            min-height: 18px;
        }

        .journal-status.saved { color: var(--teal); }

        .past-entries {
            margin-top: 18px;
        }

        .past-entries-toggle {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 0.82rem;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            padding: 6px 0;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
        }
        .past-entries-toggle:hover { color: var(--teal); }
        .past-entries-toggle .chev { transition: transform 0.3s ease; font-size: 0.75rem; }
        .past-entries.open .chev { transform: rotate(180deg); }

        .past-entries-list {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease;
        }
        .past-entries.open .past-entries-list {
            max-height: 600px;
            overflow-y: auto;
        }

        .past-entry {
            background: var(--bg-soft);
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            margin-top: 10px;
            font-size: 0.9rem;
            line-height: 1.55;
        }

        .past-entry-date {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-bottom: 4px;
            font-weight: 500;
        }

        .past-entry-text {
            color: var(--text-secondary);
            white-space: pre-wrap;
        }

        /* ═══════════════════════════════════════
           INSIGHT — appears AFTER completion
           ═══════════════════════════════════════ */
        .insight-box {
            background: linear-gradient(145deg, var(--lav-faint), var(--teal-faint));
            border-radius: var(--radius-md);
            padding: 22px 22px;
            font-family: 'Instrument Serif', serif;
            font-size: 1.15rem;
            line-height: 1.55;
            color: var(--text-primary);
            border: 1px solid var(--border-light);
            text-align: center;
            position: relative;
        }

        .insight-locked {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-style: italic;
            background: var(--bg-soft);
            border-radius: var(--radius-md);
            border: 1px dashed var(--border-strong);
        }

        .insight-locked-icon {
            display: block;
            font-size: 1.5rem;
            margin-bottom: 8px;
            opacity: 0.5;
        }

        /* ═══════════════════════════════════════
           BUTTONS
           ═══════════════════════════════════════ */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--teal);
            color: white;
            border: none;
            padding: 15px 24px;
            border-radius: 100px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
            box-shadow: var(--shadow-sm);
            min-height: 52px;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active { transform: scale(0.98); }
        .btn:hover { filter: brightness(1.04); }

        .btn-big {
            padding: 18px 24px;
            font-size: 1.05rem;
            font-weight: 600;
            box-shadow: var(--shadow-md);
            min-height: 58px;
        }

        .btn-outline {
            background: transparent;
            color: var(--text-primary);
            border: 1.5px solid var(--border-strong);
            box-shadow: none;
        }
        .btn-outline:hover {
            border-color: var(--teal);
            background: var(--bg-soft);
            color: var(--teal);
        }

        .btn-done {
            background: var(--gold);
            color: #1e1e1c;
        }

        .btn-done::before { content: '✓'; font-weight: 700; }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .btn-row .btn { flex: 1; }

        /* ═══════════════════════════════════════
           FOCUS MODE — only steps + timer
           ═══════════════════════════════════════ */
        .focus-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-page);
            z-index: 200;
            overflow-y: auto;
            display: none;
            animation: fadeIn 0.3s ease-out;
        }
        .focus-overlay.active { display: block; }

        .focus-inner {
            max-width: 540px;
            margin: 0 auto;
            padding: 24px 20px 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .focus-close {
            align-self: flex-end;
            background: var(--bg-soft);
            border: 1px solid var(--border-light);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            margin-bottom: 20px;
        }
        .focus-close:hover { background: var(--border-light); }

        .focus-title {
            font-family: 'Instrument Serif', serif;
            font-size: 1.5rem;
            color: var(--teal);
            text-align: center;
            margin-bottom: 8px;
            line-height: 1.25;
        }

        .focus-sub {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 32px;
        }

        /* Timer display */
        .timer-ring-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 28px;
        }

        .timer-ring {
            width: 180px;
            height: 180px;
            position: relative;
        }

        .timer-ring svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .timer-track {
            stroke: var(--border-light);
            stroke-width: 6;
            fill: none;
        }

        .timer-progress {
            stroke: var(--teal);
            stroke-width: 6;
            fill: none;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.9s linear;
        }

        .timer-text {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-variant-numeric: tabular-nums;
        }

        .timer-digits {
            font-family: 'Instrument Serif', serif;
            font-size: 2.6rem;
            color: var(--text-primary);
            line-height: 1;
        }

        .timer-label {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-top: 4px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .timer-controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .timer-btn {
            background: var(--bg-card);
            border: 1.5px solid var(--border-light);
            color: var(--text-primary);
            padding: 10px 20px;
            border-radius: 100px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            min-height: 44px;
            min-width: 110px;
        }
        .timer-btn:hover { border-color: var(--teal); }
        .timer-btn.primary { background: var(--teal); color: white; border-color: var(--teal); }

        .focus-steps {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 20px 18px;
            margin-bottom: 20px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
        }

        .focus-steps-title {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        /* ═══════════════════════════════════════
           HOME FAB
           ═══════════════════════════════════════ */
        .home-float {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            background: var(--bg-card) !important;
            color: var(--text-primary);
            border: 1px solid var(--border-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            cursor: pointer;
            box-shadow: var(--shadow-md);
            z-index: 10000;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: var(--transition);
        }

        @media (prefers-color-scheme: dark) {
            .home-float {
                background: var(--bg-soft);
                border-color: var(--border-light);
            }
        }

        .home-float:hover {
            background: var(--teal);
            color: white;
            border-color: var(--teal);
            transform: scale(1.1);
        }

        /* ═══════════════════════════════════════
           TOAST
           ═══════════════════════════════════════ */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--teal);
            color: white;
            padding: 12px 22px;
            border-radius: 100px;
            font-size: 0.9rem;
            font-weight: 500;
            box-shadow: var(--shadow-lg);
            z-index: 300;
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* ═══════════════════════════════════════
           STREAK BADGE
           ═══════════════════════════════════════ */
        .streak-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--gold-faint);
            color: var(--gold);
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 0.72rem;
            font-weight: 600;
            margin-left: 8px;
        }

        /* ═══════════════════════════════════════
           RESPONSIVE
           ═══════════════════════════════════════ */
        @media (max-width: 420px) {
            body { font-size: 16px; }
            .container { padding: 14px 12px 40px; }
            header { padding: 22px 18px 20px; }
            header h1 { font-size: 1.55rem; }
            .hero-card { padding: 22px 18px 18px; }
            .hero-title { font-size: 1.4rem; }
            section.card { padding: 20px 18px; }
            .tab { font-size: 0.8rem; padding: 9px 4px; }
            .timer-ring { width: 160px; height: 160px; }
            .timer-digits { font-size: 2.3rem; }
        }

        @media (min-width: 520px) {
            .week-grid-inner { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header>
            <h1>Fourfold Axis</h1>
            <div class="header-sub">Body · Breath · Attention · Space</div>
            <div class="header-row">
                <div class="header-week" id="headerWeek">Week 1 · Body</div>
                <div class="header-day-num" id="headerDayNum">1 / 56</div>
            </div>
            <div class="header-day-title" id="headerDay">Day 1</div>
            <div class="progress-track">
                <div class="progress-fill" id="progressFill" style="width:0%"></div>
            </div>
        </header>

        <!-- WEEK PICKER (collapsed) -->
        <div class="week-picker" id="weekPicker">
            <button class="week-picker-header" onclick="toggleWeekPicker()" aria-expanded="false">
                <span class="week-picker-label">
                    <span class="week-picker-dot"></span>
                    <span id="weekPickerCurrent">Week 1 of 8</span>
                    <span id="streakBadge"></span>
                </span>
                <span class="week-picker-chevron">▾</span>

            <div class="week-grid">
                <div class="week-grid-inner" id="weekGrid"></div>
            </div>
        </div>

        <!-- DAY DOTS -->
        <div class="day-dots" id="dayDots" role="tablist" aria-label="Days of the week"></div>

        <!-- HERO CARD -->
        <div class="hero-card">
            <div class="hero-eyebrow" id="heroEyebrow">Axis: Body</div>
            <h1 class="hero-title" id="heroTitle">Feel the Soles</h1>
            <div class="hero-meta" id="heroMeta"></div>
            <button class="btn btn-big" onclick="startFocus()">
                <span>🎯</span>
                <span>Start practice</span>
            </button>
        </div>

        <!-- TABS -->
        <nav class="tabs" role="tablist">
            <button class="tab active" data-tab="learn" onclick="switchTab('learn')" role="tab" aria-selected="true">
                Learn
                <span class="tab-dot"></span>
            </button>
            <button class="tab" data-tab="practice" onclick="switchTab('practice')" role="tab" aria-selected="false">
                Practice
                <span class="tab-dot"></span>
            </button>
            <button class="tab" data-tab="reflect" onclick="switchTab('reflect')" role="tab" aria-selected="false">
                Reflect
                <span class="tab-dot"></span>
            </button>
        </nav>

        <!-- PANEL: LEARN -->
        <div class="panel active" id="panel-learn" role="tabpanel">
            <section class="card">
                <h2 id="lessonTitle"></h2>
                <div class="lesson-body" id="lessonBody"></div>
                <div style="margin-top: 24px; display: flex; justify-content: center;">
                    <button class="btn btn-big" onclick="switchTab('practice')">Go to exercise →</button>
                </div>
            </section>
        </div>

        <!-- PANEL: PRACTICE -->
        <div class="panel" id="panel-practice" role="tabpanel">
            <section class="card">
                <h3>Exercise</h3>
                <div id="exerciseContainer"></div>

            <section class="card">
                <h3>Breath</h3>
                <div class="breath-card" id="breathCard"></div>
            </section>

            <button class="btn btn-big btn-done" id="practiceBtn" onclick="markDone()">

        <!-- PANEL: REFLECT -->

            <section class="card">
                <h3>Reflection</h3>

                <div class="journal-status" id="journalStatus"></div>

                <div class="past-entries" id="pastEntries">
                    <button class="past-entries-toggle" onclick="togglePastEntries()" aria-expanded="false">
                        <span class="chev">▾</span>
                        <span id="pastEntriesLabel">See previous notes</span>
                    </button>
                    <div class="past-entries-list" id="pastEntriesList"></div>
                </div>
            </section>

            <section class="card">
                <h3>Open Space</h3>
                <div id="insightWrap">
                    <div class="insight-locked" id="insightLocked">
                        <span class="insight-locked-icon">◯</span>
                        It will appear after you complete today's practice.
                    </div>
                    <div class="insight-box" id="insightBox" style="display:none;"></div>
                </div>

            <div class="btn-row">

                <button class="btn btn-outline" onclick="go(1)">Next →</button>
            </div>
        </div>
    </div>

    <button class="home-float" onclick="goHome()" aria-label="Close">✕</button>

    <!-- FOCUS MODE OVERLAY -->

        <div class="focus-inner">
            <button class="focus-close" onclick="closeFocus()" aria-label="Close">✕</button>

            <div class="timer-ring-wrap">
                <div class="timer-ring">

                                stroke-dasharray="578" stroke-dashoffset="0"></circle>

            <div class="focus-steps">
                <div class="focus-steps-title">Steps</div>
                <div id="focusSteps"></div>

                Completed
            </button>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════
// DATA — CONTENT TRANSLATED TO ENGLISH
// ═══════════════════════════════════════

const AXES = [
    { name: 'Body', icon: '◆', weeks: [1,2] },
    { name: 'Breath', icon: '◆', weeks: [3,4] },
    { name: 'Attention', icon: '◆', weeks: [5,6] },
    { name: 'Space', icon: '◆', weeks: [7,8] },
];

function ax(w) { return AXES.find(a => a.weeks.includes(w)); }

const D = {
1: {
  title: 'The Stability of "Here"',
  days: [
    { title: 'Feel the Soles', where: 'Anywhere', dur: '2-3 min', lesson: '<p>The body is the undeniable foundation of the present moment. Today we start with the simplest: the points that touch the earth.</p><p>Stand or sit. Feel the soles — the pressure, warmth, contact with the ground. Just observe, without changing anything.</p>', exercise: { title: 'Contact Observation', steps: ['Stand or sit comfortably.', 'Close your eyes if you like.', 'Feel the points of contact with the earth — soles or sitting bones.', 'Is there pressure? Warmth? Balance?', 'Stay there for 2 minutes. Just observe.'] }, breathing: '<strong>Natural Observation (2 min)</strong><p>Do not control the breath. Just observe how you breathe naturally while feeling the soles.</p>', reflection: 'What was the first thing I felt?', insight: 'Gravity is always here. The body is always here. That is enough to begin.' },
    { title: 'Feel the Axis', where: 'Quiet place', dur: '3-5 min', lesson: '<p>The body is not just feet on the ground — it has structure. Imagine a line rising inside you: from the soles, through the pelvis, the spine, to the top of the head.</p><p>This vertical axis holds you. You don\'t need to "fix" it — just recognize it.</p>', exercise: { title: 'The Vertical Axis', steps: ['Stand or sit.', 'First feel the soles (from yesterday).', 'Now imagine a line: soles → pelvis → belly → heart → neck → head.', 'Feel how this line holds you upright.', 'Stay here for 3 minutes.'] }, breathing: '<strong>Axis Breath (3 min)</strong><p>Observe how the breath moves along this line. The spine is like a channel for the flow.</p>', reflection: 'Could I feel the axis? Where do I sense it most?', insight: 'Your axis is always there — even when you don\'t pay attention. Today you recognized it.' },
    { title: 'Feel Gravity', where: 'Home or quiet place', dur: '3 min', lesson: '<p>Gravity is not an enemy — it is proof of "Here". It shows us, without doubt, exactly where we exist right now.</p><p>Let your weight drop downward — not forcefully, just let it go. Grounding is the first act of relaxation.</p>', exercise: { title: 'Surrender to Gravity', steps: ['Stand or sit.', 'Feel soles + axis.', 'Now: let the weight sink into the earth.', 'Feel the gravity pulling you — do not resist.', 'Observe: the body becomes more stable, calmer.'] }, breathing: '<strong>Gravity Breath (3 min)</strong><p>On the exhale, let yourself become heavier. On the inhale, feel the earth supporting you.</p>', reflection: 'What did I feel when I let go of the weight? Relief or discomfort?', insight: 'Gravity does not press you down — it embraces you. It is your stability.' },
    { title: 'The Book Exercise', where: 'Home', dur: '5 min', lesson: '<p>This is a classic exercise from the guide. Place a book or box on your head and observe what the body does on its own.</p><p>Do not try to "fix" posture — just observe how the organism self-regulates. When you pay attention, the body aligns naturally.</p>', exercise: { title: 'Book on the Head', steps: ['Stand upright.', 'Place a book or box on your head (optional).', 'Observe how you need to stand so it doesn\'t fall.', 'Feel the weight descending through neck, spine, pelvis.', 'Remove the book — the sense of structure remains.'] }, breathing: '<strong>Stability Breath (5 min)</strong><p>Sit upright. Breathe naturally. Observe how the axis supports the breath.</p>', reflection: 'Which part of the body reacted first?', insight: 'You do nothing. You just observe — and the body responds.' },
    { title: 'Soles + Axis + Gravity', where: 'Anywhere', dur: '3-5 min', lesson: '<p>Today you combine the three elements you learned: soles, axis, gravity. They are not three separate things — they are one unified sense of grounding.</p>', exercise: { title: 'Integrated Grounding', steps: ['Close your eyes (optional).', 'Feel the soles — touching the earth.', 'Feel the axis — the line inside you.', 'Feel gravity — the force that stabilizes you.', 'Open your eyes. All together, simultaneously.'] }, breathing: '<strong>Integrated Breath (5 min)</strong><p>Hold all three: soles, axis, gravity. Breath connects them. Let it flow through the structure.</p>', reflection: 'Could I feel all three? Which do I feel most strongly?', insight: 'You don\'t have three things. You have one body that knows how to stand.' },
    { title: 'Small Returns', where: 'Throughout the day', dur: '6 × 30 sec', lesson: '<p>Today you do not do one long practice. You do 5-6 short ones, at various moments. Consistency in small doses matters more than duration.</p>', exercise: { title: '6 Grounding Points', steps: ['Upon waking: 30" grounding.', 'Before eating: 30" grounding.', 'Mid-work: 30" grounding.', 'After something difficult: 30" grounding.', 'Before sleep: 30" grounding.', 'Each time: soles → axis → gravity → observe.'] }, breathing: '<strong>6 Small Recognitions (30" each)</strong><p>Stop and feel. No judgment, no analysis. Just what is here, now.</p>', reflection: 'How many times did I remember to stop? What was different each time?', insight: 'Presence doesn\'t require hours. It starts with seconds-long victories.' },
    { title: 'Where Do I Hold Tension?', where: 'Quiet place', dur: '5 min', lesson: '<p>The body is a living archive of experiences. Our posture often carries tension — jaw, shoulders, back, pelvis. These tensions are not problems. They are information.</p><p><em>Important: Change takes time. Do not push yourself. Gentleness is the greatest act of self-regulation.</em></p>', exercise: { title: 'Tension Scan', steps: ['Ground: soles → axis → gravity.', 'Slowly scan: jaw → neck → shoulders → back → belly → pelvis.', 'Where do you feel tightness?', 'With each exhale, let that area soften slightly.', 'You are not fixing anything — just making space.'] }, breathing: '<strong>Releasing Tension (5 min)</strong><p>Notice where you hold tension. With each exhale, let that area relax. The axis helps naturally.</p>', reflection: 'Where did I hold tension? What did I learn about my body this week?', insight: 'You don\'t need to "fix" anything. Nothing is broken. The goal is to return, gently, to your living presence.' }
  ]
},
2: {
  title: 'Body in Motion',
  days: [
    { title: 'Grounding in Space', where: 'Different spaces', dur: '3 min', lesson: '<p>Deep ease within the body always presupposes awareness of space. Today try grounding in different places: home, office, street.</p><p>When space is perceived as open, the body receives "permission" to relax.</p>', exercise: { title: 'Grounding in 3 Spaces', steps: ['Try grounding (soles, axis, gravity) in 3 different spaces.', 'Home: How does it feel?', 'Street or park: What changes?', 'Office or public space: How easily do you relax?', 'Observe: Where do you feel safest?'] }, breathing: '<strong>Grounding in Space (3 min per space)</strong><p>Same grounding, different space. What changes?</p>', reflection: 'In which space was grounding easiest? Why?', insight: 'True grounding happens only in a space we feel holds us.' },
    { title: 'Grounding While Walking', where: 'Outdoors', dur: '5 min', lesson: '<p>Grounding doesn\'t require stillness. Today walk slowly, feeling the soles touch the earth with each step. The axis moves with you.</p>', exercise: { title: 'Mindful Walking', steps: ['Start walking slowly.', 'Feel each step: heel → sole → toes.', 'Keep the axis alive inside you.', 'Let gravity in with each step.', '5 minutes. No destination.'] }, breathing: '<strong>Step Breath (5 min)</strong><p>Synchronize steps with breath. 3 steps inhale, 3 steps exhale — or whatever feels natural.</p>', reflection: 'What was it like to feel the earth with each step?', insight: 'The earth holds you with every step. You don\'t need to stop to be present.' },
    { title: 'Escape from Scenarios', where: 'Anywhere', dur: '3 min', lesson: '<p>When the mind lacks a stable base in the present, it falls into the trap of internal analysis. Focusing on gravity gives us the ability to exit mental scenarios.</p><p>No analysis needed. Just return to the body.</p>', exercise: { title: 'Return to "Here"', steps: ['Notice: Is your mind "racing"?', 'Don\'t analyze the thought.', 'Just ground: soles → axis → gravity.', 'Stay with the body sensation.', 'If mind wanders again, return without judgment.'] }, breathing: '<strong>Gravity over Analysis (3 min)</strong><p>Whenever you catch yourself analyzing, return to the sensation of weight. Gravity is undeniable.</p>', reflection: 'How many times did the mind "leave" and how many times did I return?', insight: 'The open mind does not analyze or judge — it understands causes without words.' },
    { title: 'Body and Space Together', where: 'Quiet place', dur: '5 min', lesson: '<p>Body and space collaborate. Today, after grounding, let attention include the space around you — without losing the sense of body.</p>', exercise: { title: 'Body + Space', steps: ['Ground: soles, axis, gravity.', 'Hold that sensation.', 'Now add: what do you hear around you?', 'What do you feel on your skin? (air, temperature)', 'Feel body AND space simultaneously — 5 minutes.'] }, breathing: '<strong>Body-Space Breath (5 min)</strong><p>On inhale feel space. On exhale feel body. Gradually: both together.</p>', reflection: 'Could I feel body and space at the same time?', insight: 'True grounding is not isolation — it is connection with everything around you.' },
    { title: 'Grounding in Tension', where: 'Before or after something difficult', dur: '2 min', lesson: '<p>Today use grounding in a moment of real tension or pressure. This is the test: does practice transfer to life?</p>', exercise: { title: 'Grounding in the Fire', steps: ['Before a difficult call, meeting, or situation:', 'Quick grounding: soles → axis → gravity (10").', 'Enter the situation.', 'After: ground again — what changed?', 'Note: did it help?'] }, breathing: '<strong>Quick Reset (30")</strong><p>Soles. Axis. Gravity. Exhale. You are here.</p>', reflection: 'Did grounding help before the difficult moment?', insight: 'Grounding is not only for quiet moments. It is a tool for life.' },
    { title: 'Observations Throughout the Day', where: 'Everywhere', dur: '6 × 30"', lesson: '<p>Like Week 1, 5-6 small pauses during the day. But now also observe how the sensation changes in different situations.</p>', exercise: { title: '6 Grounding Moments', steps: ['Morning: how does the body wake?', 'Midday: how much tension accumulated?', 'Afternoon: where do I hold tension now?', 'Evening: how does gravity feel?', 'Each moment: ground → observe → release.'] }, breathing: '<strong>6 Moments of Awareness</strong><p>Stop. Feel. Let go. Continue.</p>', reflection: 'What patterns did I notice in my body throughout the day?', insight: 'Persistence in gentleness is the greatest act of self-regulation.' },
    { title: 'Week 2 Review', where: 'Quiet place', dur: '10 min', lesson: '<p>2 weeks completed. Today a full 10-minute practice: everything you have learned, in one unified experience.</p>', exercise: { title: 'Unified 10-Minute Practice', steps: ['Grounding — soles, axis, gravity (3 min).', 'Awareness of tension, release with exhale (3 min).', 'Body + space: both together (3 min).', 'Close with reflection: what changed?', 'Tomorrow: we enter the axis of Breath.'] }, breathing: '<strong>Unified Breath (10 min)</strong><p>Breath connects all elements. It is the bridge from body to space.</p>', reflection: 'What did I gain these 2 weeks? What was difficult?', insight: 'The body is not a prison — it is our home. You have begun to inhabit it.' }
  ]
},
3: {
  title: 'The Rhythm of "Now"',
  days: [
    { title: 'Observing Natural Breath', where: 'Quiet place', dur: '5 min', lesson: '<p>The breath is the second axis. But before we "work" it, we simply observe it. Today: nothing changes. We only listen.</p>', exercise: { title: 'Listening to Breath', steps: ['Ground (2 min).', 'Close your eyes.', 'Observe the breath exactly as it is — shallow, deep, fast.', 'Do not change it.', 'Where do you feel it? Nose? Chest? Belly?'] }, breathing: '<strong>Natural Breath (5 min)</strong><p>You do nothing. You let the breath be what it is.</p>', reflection: 'How is my breath today? Where do I feel it most strongly?', insight: 'Your breath has been here for decades. Today you may have heard it for the first time.' },
    { title: 'Belly Breathing', where: 'Quiet place', dur: '5 min', lesson: '<p>Diaphragmatic breathing (from the belly) activates the parasympathetic nervous system — the calm system. It is the most fundamental self-regulation practice.</p>', exercise: { title: 'Diaphragm Breathing', steps: ['Lie down or sit.', 'Place one hand on chest, one on belly.', 'Breathe: Belly rises first, then chest.', 'Exhale: Belly falls first.', 'Not hyperventilation — just steady, deep.'] }, breathing: '<strong>Belly Breathing (5 min)</strong><p>Inhale 4" → Exhale 6". Longer exhale activates parasympathetic.</p>', reflection: 'What difference did I feel between chest and belly breathing?', insight: 'The breath we learn here is the most basic form of self-care you have.' },
    { title: 'The Rhythm of Exhalation', where: 'Quiet place', dur: '5 min', lesson: '<p>Exhalation, longer than inhalation, is the key to relaxation. Today focus on how the exhale "lets go".</p>', exercise: { title: 'Long Exhale', steps: ['Inhale 4 seconds through nose.', 'Exhale 6-7 seconds through mouth (like blowing out a candle).', 'Repeat. Stay calm — no excess.', 'Observe: does the heart slow?', '5 minutes.'] }, breathing: '<strong>4-7 Breathing (5 min)</strong><p>Inhale 4. Exhale 7. Vagal tone rises, anxiety drops.</p>', reflection: 'What changed inside me after 5 minutes of long exhale?', insight: 'Your exhale tells you: "You are safe. You can let go."' },
    { title: '4-4-4-4 Breathing (Box Breath)', where: 'Anywhere', dur: '5 min', lesson: '<p>Box breath is a tool used by Navy SEALs and astronauts for calm under pressure. Equal, square rhythm.</p>', exercise: { title: 'Box Breath', steps: ['Inhale 4 seconds.', 'Hold 4 seconds.', 'Exhale 4 seconds.', 'Hold 4 seconds.', 'Repeat. Imagine a square.'] }, breathing: '<strong>Box Breath (5 min)</strong><p>4-4-4-4. Steady. Rhythmic. The body enters coherence.</p>', reflection: 'How do I feel after 5 minutes of box breath?', insight: 'When rhythm is steady, the mind has nowhere to go.' },
    { title: 'Breath in a Difficult Moment', where: 'In tension', dur: '2 min', lesson: '<p>Today apply breath in a real moment of anxiety or pressure. This is the real test.</p>', exercise: { title: 'Antidote to Anxiety', steps: ['Recognize: "I am activated."', 'Stop. Do not react.', '3 cycles: Inhale 4, Exhale 7 (or longer).', 'Ground in soles simultaneously.', 'Now decide how to respond.'] }, breathing: '<strong>Quick Reset (60")</strong><p>In any tension: 3 exhale cycles, soles on earth. You find yourself again.</p>', reflection: 'Did the breath help in the difficult moment?', insight: 'Between stimulus and response there is a space. Breath is that space.' },
    { title: 'Breath + Grounding Together', where: 'Quiet place', dur: '10 min', lesson: '<p>Today combine the first two axes: Body (grounding) + Breath (rhythm). This is the foundation for all that comes.</p>', exercise: { title: 'Body + Breath', steps: ['Grounding: soles, axis, gravity (3 min).', 'Breath: 4-7 or box breath (3 min).', 'Now: both together (4 min).', 'Feel how breath moves through the axis.', 'Body grounding, breath flow.'] }, breathing: '<strong>Unified Presence (10 min)</strong><p>Two axes. One presence. Foundation and flow.</p>', reflection: 'How did I feel when body and breath united?', insight: 'Your body holds you. Your breath moves you. Together: life.' },
    { title: 'Mini Breaths Throughout the Day', where: 'Everywhere', dur: '6 × 1 min', lesson: '<p>Today do 5-6 small breathing pauses at various moments. Consistency matters more than duration.</p>', exercise: { title: '6 Mini Breaths', steps: ['Morning (waking): 3 cycles of 4-7.', 'Before breakfast: 1 min box breath.', 'During work: 3 slow exhales.', 'After tension: 1 min 4-7.', 'Before sleep: 5 cycles long exhale.', 'Use every opportunity.'] }, breathing: '<strong>6 Small Resets</strong><p>Each time return to calm. Again and again.</p>', reflection: 'How many times did I remember the breath today?', insight: 'You don\'t need 20 minutes. You need 6 times of 1 minute.' }
  ]
},
4: {
  title: 'Breath as Bridge',
  days: [
    { title: 'Breath in Motion', where: 'Outdoors', dur: '10 min', lesson: '<p>Today connect breath with your steps. Movement becomes mantra, the body\'s rhythm becomes the mind\'s rhythm.</p>', exercise: { title: 'Step Breath', steps: ['Start walking slowly.', '3 steps inhale, 3 steps exhale.', 'If difficult: 2-2 or 4-4.', 'Feel the vertical axis while moving.', '10 minutes. The rhythm becomes yours.'] }, breathing: '<strong>Rhythmic Step Breath</strong><p>Steps + breath = one act. The mind no longer races.</p>', reflection: 'How did I feel when steps and breath synchronized?', insight: 'The body knows rhythm. You just follow it.' },
    { title: 'Calming Breath (4-7-8)', where: 'Quiet place', dur: '5 min', lesson: '<p>The 4-7-8 technique (Dr. Andrew Weil) is a natural tranquilizer. Ideal for anxiety or sleep difficulty.</p>', exercise: { title: '4-7-8 Breathing', steps: ['Inhale 4 seconds through nose.', 'Hold 7 seconds.', 'Exhale 8 seconds through mouth (soft "whoosh" sound).', 'This is 1 cycle. Do 4 cycles.', 'At first only 4 cycles — do not overdo.'] }, breathing: '<strong>4-7-8 (5 min)</strong><p>Let the exhale be long. You show the body: we are safe.</p>', reflection: 'How do I feel after 4 cycles of 4-7-8?', insight: 'Your breath is the most effective calming tool you have.' },
    { title: 'Energy Breath', where: 'Quiet place', dur: '3 min', lesson: '<p>Sometimes you don\'t need calm — you need awakening. Breath of fire (Kapalabhati) activates the sympathetic system in a controlled way.</p>', exercise: { title: 'Breath of Fire', steps: ['Sit with straight back.', 'Short, forceful exhales through nose (like blowing).', 'Inhale comes naturally.', '20-30 breaths, then 1 minute calm.', 'Caution: stop if dizzy.'] }, breathing: '<strong>Kapalabhati (3 min)</strong><p>Energy tool. Not before sleep. Best morning or when drowsy.</p>', reflection: 'How do I feel after? Energy or agitation?', insight: 'Breath is not only calm — it is vitality when you need it.' },
    { title: 'Alternate Nostril Breathing', where: 'Quiet place', dur: '5 min', lesson: '<p>Alternate nostril breathing (Nadi Shodhana) balances the two brain hemispheres. Tool before mental work or decisions.</p>', exercise: { title: 'Nadi Shodhana', steps: ['Close right nostril with thumb.', 'Inhale left nostril.', 'Close left, open right — exhale.', 'Inhale right, switch, exhale left.', 'This is 1 cycle. 5-10 cycles.'] }, breathing: '<strong>Nadi Shodhana (5 min)</strong><p>Balance. Calm. Clarity. Ideal before important decisions.</p>', reflection: 'What changed after alternate nostril breathing?', insight: 'Balance is not a position — it is movement between polarities.' },
    { title: 'Breath with Difficult Emotions', where: 'Anywhere', dur: '5 min', lesson: '<p>Emotions live in the body. Breath lets them flow. Today: instead of running from a difficult emotion, breathe it.</p>', exercise: { title: 'Breath into Emotion', steps: ['Recognize the emotion (fear, anger, sadness).', 'Find where you feel it in the body.', 'Direct breath to that area.', 'Inhale INTO the emotion, exhale letting it flow.', 'You are not fixing — just giving space.'] }, breathing: '<strong>Breath-Healer (5 min)</strong><p>Breath is like water — it washes away what is tight.</p>', reflection: 'What happened when I gave space to the emotion?', insight: 'Emotions are waves. Breath is the ocean that holds them.' },
    { title: 'Breath in Pleasure', where: 'Anywhere', dur: '3 min', lesson: '<p>What happens when we breathe into POSITIVE moments? Breath anchors the experience in the nervous system.</p>', exercise: { title: 'Breath into Joy', steps: ['Find a moment of pleasure (sunset, coffee, loved one).', 'Stop. Breathe consciously.', '3-5 cycles of slow breath WITHIN the moment.', 'Feel: joy is encoded.', 'This is called "savoring" in positive psychology.'] }, breathing: '<strong>Savoring Breath (3 min)</strong><p>Positive experience, when breathed, stays. You build reserves of well-being.</p>', reflection: 'Which positive moment did I "embrace" with breath today?', insight: 'Pleasure is not luxury — it is nourishment.' },
    { title: 'Review: Two Axes', where: 'Quiet place', dur: '15 min', lesson: '<p>4 weeks completed. You now have two solid anchors: Body and Breath. Starting tomorrow: the third axis — Attention.</p>', exercise: { title: 'Full 15\' Practice', steps: ['Full grounding (5 min).', 'Breath 4-7 or box breath (5 min).', 'Both together (5 min).', 'Reflect: what did I learn these 4 weeks?', 'Note one phrase to remember.'] }, breathing: '<strong>Complete Practice (15 min)</strong><p>Body + Breath. Foundation + Rhythm. You are ready for the next step.</p>', reflection: 'How have I changed in 4 weeks? What difficulties remained?', insight: 'Two anchors are enough to not be swept away. You now have both.' }
  ]
},
5: {
  title: 'The Lens of Consciousness',
  days: [
    { title: 'Where Is Attention?', where: 'Quiet place', dur: '5 min', lesson: '<p>Attention is the mind\'s lens — it can focus, open, or scatter. Today simply observe: where does your attention naturally go?</p>', exercise: { title: 'Attention Observation', steps: ['Grounding + Breath (1 min).', 'Close your eyes.', 'Where does attention go? Sounds? Thoughts? Body sensations?', 'Do not direct — just watch.', '5 minutes of observation. How many times did it "move"?'] }, breathing: '<strong>Breath + Observation (5 min)</strong><p>Maintain grounding and breath while observing where attention goes.</p>', reflection: 'Where does my attention tend to go?', insight: 'Attention is not empty of thoughts — it is the ability to notice where you are.' },
    { title: 'Closed Focus', where: 'Quiet place', dur: '5 min', lesson: '<p>Today try closed attention: the beam narrows to one point. Choose a steady focal point — visual, auditory, or bodily.</p>', exercise: { title: 'Steady Point', steps: ['Grounding + Breath (1 min).', 'Open eyes. Choose a point in front of you.', 'Look at it with soft, steady gaze.', 'If attention wanders, return gently.', '5 minutes on one point.'] }, breathing: '<strong>Focus Breath (5 min)</strong><p>The steady point can be the breath itself. Stay there.</p>', reflection: 'How easy was it to stay on one point?', insight: 'Focus is not tension — it is quiet persistence.' },
    { title: 'The Labeling Technique', where: 'Quiet place', dur: '5 min', lesson: '<p>When a thought pulls you, instead of engaging its content, put a simple label: "Planning," "Judging," "Worry," "Scenario." Then return.</p>', exercise: { title: 'Label + Return', steps: ['Grounding + Breath + Focus on point (2 min).', 'Wait for a thought to pull you.', 'Label: "Planning," "Worry," "Past"...', 'Do not analyze the thought — only label.', 'Return to the steady point.'] }, breathing: '<strong>Label Breath (5 min)</strong><p>Thought → Label → Breath → Point. That is the practice. Every return builds new neural pathways.</p>', reflection: 'Which labels did I use most often?', insight: 'Returning attention is not failure — it is the practice itself.' },
    { title: 'Fourfold Awareness', where: 'Quiet place', dur: '10 min', lesson: '<p>At this stage attention becomes fourfold — you hold simultaneously: body, breath, attention itself, and thoughts recognized without being swept away.</p>', exercise: { title: 'Fourfold Awareness', steps: ['Grounding: feel the body.', 'Breath: feel the rhythm.', 'Attention: hold a steady point.', 'Thoughts: if they come, label → return.', '10 minutes. All four together.'] }, breathing: '<strong>Fourfold Breath (10 min)</strong><p>Body. Breath. Point. Thoughts = clouds. You = the observer.</p>', reflection: 'Could I hold all four? Which do I "lose" first?', insight: 'Perfection not needed. Gentle return is needed.' },
    { title: 'Anchored Attention', where: 'Throughout the day', dur: 'Continuous observation', lesson: '<p>Today observe: are there moments when attention "sticks"? On a thought, worry, obsession? This is anchored attention — hyperfocus on something anxious.</p>', exercise: { title: 'Recognizing Anchoring', steps: ['In 5-6 moments during the day:', 'Check: where is my attention now?', 'Racing (scattered)? Or sticking (anchored)?', 'If sticking: label → grounding → breath → open gaze.', 'If racing: grounding → breath → steady point.'] }, breathing: '<strong>Unsticking (30" per moment)</strong><p>Racing: grounding + point. Sticking: grounding + open gaze. Breath always in between.</p>', reflection: 'When does my mind "race"? When does it "stick"? What situations trigger it?', insight: 'The neurodivergent mind is not broken — it functions differently.' },
    { title: 'Attention in Social Moments', where: 'In meeting or conversation', dur: '2-3 min', lesson: '<p>Today try: in a social moment, choose a neutral point (plant, object) as visual reference. Feel feet steady. Use peripheral vision.</p>', exercise: { title: 'Social Grounding', steps: ['In social situation:', 'Choose a neutral point as reference.', 'Feel feet on ground.', 'If jaw tension, release with exhale.', 'Use soft gaze — not tunnel vision.'] }, breathing: '<strong>Presence Breath (During)</strong><p>Keep a quiet breath while in contact with others.</p>', reflection: 'Did grounding help in the social moment?', insight: 'You can be present in the world without losing yourself in it.' },
    { title: 'Review: Three Axes', where: 'Quiet place', dur: '10 min', lesson: '<p>Six weeks. Three axes: Body, Breath, Attention. Starting tomorrow: the fourth and final — <strong>Space</strong>, open awareness.</p>', exercise: { title: 'Three Axes Together', steps: ['Body: grounding (2 min).', 'Breath: rhythm (2 min).', 'Attention: steady point + label (3 min).', 'All three together (3 min).', 'You learned where you stand, how you breathe, where you look.'] }, breathing: '<strong>Full Triple Practice (10 min)</strong><p>Foundation. Rhythm. Lens. Only one missing: the space that holds everything.</p>', reflection: 'Which axis feels strongest? Where do I need more practice?', insight: 'Three anchors. One more remains — the most liberating.' }
  ]
},
6: {
  title: 'Attention in Life',
  days: [
    { title: 'The Racing Mind', where: 'In scattered moment', dur: '3 min', lesson: '<p>The neurodivergent mind often "races" — many stimuli, no filter. The tool: Body (grounding) + Breath (rhythm).</p>', exercise: { title: 'Grounding in Scatter', steps: ['Recognize: "My mind is racing now."', 'Immediate grounding: soles, gravity.', 'Breath: 3 slow exhales.', 'Steady point: one thing in front of you.', 'Stay there 1 minute. Enough.'] }, breathing: '<strong>Antidote to Scatter</strong><p>Grounding → Exhale → One point. Three steps. 30 seconds.</p>', reflection: 'Could I calm the mind?', insight: 'You don\'t fight scatter — you use it as a signal to return.' },
    { title: 'The Locked Mind', where: 'In obsessive moment', dur: '3 min', lesson: '<p>The opposite: the mind "locks" on a thought or obsession (hyperfocus). The tool: Space (open gaze) + Attention (gentle return).</p>', exercise: { title: 'Unlocking', steps: ['Recognize: "My mind is stuck."', 'Label: "Obsession" or "Lock."', 'Soften gaze — peripheral vision.', 'Feel the space around you.', 'The thought shrinks within the vast space.'] }, breathing: '<strong>Antidote to Locking</strong><p>Label → Open gaze → Space. The obsession isn\'t as big as it seems.</p>', reflection: 'What happens when I open space around an obsession?', insight: 'The Engineer Mind is not an enemy — it is a tool that "overheated."' },
    { title: 'Noisy Spaces', where: 'Public place', dur: '5 min', lesson: '<p>In sensory overload: feet on ground, 3 breaths, open peripheral vision. Use earplugs/headphones if needed.</p>', exercise: { title: 'Grounding in Chaos', steps: ['Feel feet on ground — immediate grounding.', '3 quiet breaths, exhale through mouth.', 'Soften gaze — do not focus anywhere.', 'Earplugs or fidget toy if helpful.', 'Remember: you are not the stimuli.'] }, breathing: '<strong>3 Breaths in Chaos</strong><p>Soles. Exhale. Soft gaze. Enough.</p>', reflection: 'How did I react to noise with my tools?', insight: 'Noise is outside. Grounding is inside. You choose where you stay.' },
    { title: 'Mindful Pacing', where: 'Outdoors', dur: '10 min', lesson: '<p>Rhythmic movement "burns" anxiety. Today walk with awareness — vertical axis, open gaze, sense of space.</p>', exercise: { title: 'Rhythmic Walking', steps: ['Stand. Ground.', 'Start walking rhythmically.', 'Keep axis. Open gaze.', 'Awareness of space: what is around you?', '10 minutes. Movement calms without thought.'] }, breathing: '<strong>Breath in Motion (10 min)</strong><p>Steps + breath + open gaze = moving presence.</p>', reflection: 'What was it like to walk with full awareness?', insight: 'Movement is not opposite to presence — it can be presence itself.' },
    { title: 'Mind Racing or Locking?', where: 'Throughout the day', dur: '6 × 30"', lesson: '<p>Today observe your own patterns: when does the mind "race," when does it "lock," what situations trigger them. Use corresponding tools.</p>', exercise: { title: 'Self-Knowledge of Patterns', steps: ['6 moments during the day:', 'Check: racing or locking?', 'Racing → grounding + breath.', 'Locking → label + open gaze.', 'Note what triggers each state.'] }, breathing: '<strong>Tool Switching</strong><p>Each situation asks a different response. Today you learn when to use what.</p>', reflection: 'When does it tend to race, when lock? What triggers them?', insight: 'Self-knowledge is not analysis — it is recognizing the pattern without judgment.' },
    { title: 'Integration of Attention', where: 'Quiet place', dur: '5 min', lesson: '<p>Apply lens stabilization: body + breath + steady point + label + fourfold awareness, in one unified practice.</p>', exercise: { title: 'Lens Stabilization', steps: ['Body & Breath: close eyes. Feel. (2 min)', 'Steady point: open eyes, choose. (1 min)', 'Fourfold awareness: body + breath + point + thoughts. (2 min)', 'Gentle Return: if swept, label → body → breath → point.', 'Every "gentle return" builds new neural pathways.'] }, breathing: '<strong>Lens Breath (5 min)</strong><p>Stabilize the lens. Breath holds it in place.</p>', reflection: 'How many returns did I make? What did I feel after?', insight: 'Every time you return, you become stronger. Returning is the practice itself.' },
    { title: 'Review: Three Axes Complete', where: 'Quiet place', dur: '15 min', lesson: '<p>6 weeks complete — three axes. Tomorrow begins the last and perhaps most liberating: <strong>Space</strong>.</p>', exercise: { title: 'Full Triple Practice', steps: ['Body: grounding (3 min).', 'Breath: rhythm + exhale (3 min).', 'Attention: point + label + fourfold (5 min).', 'All three together (4 min).', 'Open eyes. How do you feel?'] }, breathing: '<strong>15 Min Full Practice</strong><p>Three axes. One body. One presence.</p>', reflection: 'Where am I now compared to the start? What is changing?', insight: 'Body, Breath, Attention — three paths to the same place: here.' }
  ]
},
7: {
  title: 'Open Awareness',
  days: [
    { title: 'Soft Eyes', where: 'Quiet place', dur: '5 min', lesson: '<p>Space is the final center. You learn to open awareness like a sky that holds everything. Start by softening the gaze.</p>', exercise: { title: 'Peripheral Vision', steps: ['Grounding + Breath + Focus point (2 min).', 'Now: soften gaze.', 'Let eyes "see" sideways without moving.', 'You focus nowhere — embrace the whole visual field.', '3 minutes in this. What changes inside?'] }, breathing: '<strong>Open Breath (5 min)</strong><p>Let breath expand beyond the body. Feel connected to the air around you.</p>', reflection: 'What changed in my sensation when I softened the gaze?', insight: 'Open awareness doesn\'t mean lost — it means feeling everything without sticking anywhere.' },
    { title: 'The Sky and the Clouds', where: 'Quiet place', dur: '10 min', lesson: '<p>Thoughts, emotions, sensations — they are clouds. You are the space that holds them. Your identity is not the clouds — it is the sky.</p>', exercise: { title: 'Sky Metaphor', steps: ['Full grounding + breath + focus (3 min).', 'Open peripheral vision.', 'Let thoughts come — do not hold them.', 'Recognize: these are clouds. I am the sky.', '7 minutes in this sense of openness.'] }, breathing: '<strong>Sky Breath (10 min)</strong><p>Breath flows like wind in the sky. Thoughts = clouds. They pass.</p>', reflection: 'Could I feel the "sky" behind the thoughts?', insight: 'You are not your thoughts. You are the space that holds them.' },
    { title: 'Space and Safety', where: 'Quiet place', dur: '10 min', lesson: '<p>The sense of open space sends a safety signal. Narrowing increases danger — widening reduces it. Today try: full grounding + full openness.</p>', exercise: { title: 'Safety through Space', steps: ['Full grounding (2 min).', 'Regulating breath (2 min).', 'Focus closed → gradually open (2 min).', 'Full open awareness: sounds, sensations, thoughts, space (4 min).', 'Feel: this space holds you.'] }, breathing: '<strong>Safety Breath (10 min)</strong><p>Each exhale: space opens. Each inhale: the world enters. You are safe.</p>', reflection: 'How did I feel the space around me? Safety?', insight: 'Openness is not vulnerability — it is the greatest safety.' },
    { title: 'The Four Stages — Full Practice', where: 'Quiet place', dur: '15 min', lesson: '<p>For the first time: the full, sequential practice of the Fourfold Axis. This is the practice that will accompany you from now on.</p>', exercise: { title: 'The 4 Stages', steps: ['St. 1 — Feel the Earth: soles, axis, gravity, relaxation (3 min).', 'St. 2 — Feel the Breath: nose → lungs → belly, natural rhythm (3 min).', 'St. 3 — Focus Ahead: open eyes, soft gaze on point, label if needed (4 min).', 'St. 4 — Open to Space: peripheral vision, feel simultaneously body + breath + earth + sky (5 min).', 'Immediate sense of presence without words or effort.'] }, breathing: '<strong>Full Fourfold Axis (15 min)</strong><p>Stability → Rhythm → Lens → Vastness. One organism, one presence.</p>', reflection: 'Which stage feels most natural? Where do I struggle?', insight: 'These are not four steps. They are four windows into the same presence.' },
    { title: 'Fourfold Axis in Motion', where: 'Outdoors', dur: '15 min', lesson: '<p>Today: the 4 stages while walking. Practice transfers to life — you don\'t need silence or a special space.</p>', exercise: { title: '4 Stages Walking', steps: ['Start standing: St. 1 — Grounding (1 min).', 'Begin slow walk: St. 2 — Breath in steps (3 min).', 'Stabilize: St. 3 — Gaze ahead, awareness (3 min).', 'Open: St. 4 — Soft gaze, space, vastness (5 min).', 'Integration: all 4 together in motion (3 min).'] }, breathing: '<strong>Moving Presence (15 min)</strong><p>No cushion needed. The earth is enough.</p>', reflection: 'How does full practice feel in motion?', insight: 'Mindfulness is not something you do — it is something you are.' },
    { title: 'Almost There', where: 'Quiet place', dur: '15 min', lesson: '<p>One more week remains. Today: full 15-minute practice. Focus on the transition between stages — how smooth is it?</p>', exercise: { title: 'Smooth Transition', steps: ['St. 1 → St. 2: how does breath strengthen grounding?', 'St. 2 → St. 3: how does focus rest on rhythm?', 'St. 3 → St. 4: how does space open through focus?', 'You don\'t jump — you flow.', '15 minutes of flowing presence.'] }, breathing: '<strong>Flowing Breath (15 min)</strong><p>Breath belongs to no single stage — it is in all.</p>', reflection: 'How smoothly do I "flow" between stages?', insight: 'Stages are scaffolding. Gradually they will fall — only presence will remain.' }
  ]
},
8: {
  title: 'Integration',
  days: [
    { title: 'Feel, Don\'t Think', where: 'Quiet place', dur: '15 min', lesson: '<p>Do not try to "experience." Let the influx: air, ground, sky. The difference between effort and surrender.</p>', exercise: { title: 'Passive Presence', steps: ['The 4 stages — but without effort.', 'Control nothing.', 'Let grounding happen.', 'Let breath flow.', 'Let space open. You just... open.'] }, breathing: '<strong>Passive Breath (15 min)</strong><p>Do not control. Let the body breathe you. Feel the difference.</p>', reflection: 'What did I feel after I stopped trying?', insight: 'You do nothing. You just open.' },
    { title: 'Without Separation', where: 'During activity', dur: '20 min', lesson: '<p>Today: apply the 4 axes while doing something everyday — washing dishes, cooking, walking. There is no separation between "practice" and "life."</p>', exercise: { title: 'Life = Practice', steps: ['Choose an everyday activity.', 'Apply: grounding + breath + focus + openness.', 'Hold awareness while active.', 'If lost: gentle return.', 'The activity becomes the practice.'] }, breathing: '<strong>Breath in Action</strong><p>No separation. You live with presence.</p>', reflection: 'What was it like to do something everyday with full awareness?', insight: 'Life doesn\'t wait for practice to end. Life is the practice.' },
    { title: 'Effortless Presence', where: 'Anywhere', dur: '20 min', lesson: '<p>Stop trying. Let all four work on their own. The earth supports. The breath flows. The eyes see. The heart feels.</p>', exercise: { title: 'Without Effort', steps: ['Sit or stand.', 'Do not "do" the 4 stages — let them happen.', 'The body knows. The breath knows.', 'You need do nothing.', '20 minutes of effortless presence.'] }, breathing: '<strong>Effortless Breath (20 min)</strong><p>It happens. You don\'t need to do it.</p>', reflection: 'What do I discover when I stop trying?', insight: 'True presence needs no effort. It needs only acceptance.' },
    { title: 'Presence Worksheet', where: 'Anywhere', dur: '5 min', lesson: '<p>Today practice the "Worksheet" — 4 steps that bring you back to "now" in seconds. This will accompany you after the program.</p>', exercise: { title: 'Worksheet (4 Steps)', steps: ['1. BODY: Feel weight, axis, tensions. Relax jaw, shoulders.', '2. BREATH: How is it? Fast, shallow, tight? Exhale slowly.', '3. ATTENTION: Where is it? Racing? Sticking? Return to point.', '4. SPACE: Feel trapped? Soften gaze. Thoughts = clouds.', 'Do them in order or choose what you need.'] }, breathing: '<strong>Quick Reset (30"-2 min)</strong><p>4 steps. Seconds. Anywhere. Always.</p>', reflection: 'How quickly could I "return" to now?', insight: 'Now you have a tool for every moment. You need nothing else.' },
    { title: 'Autonomy', where: 'Throughout the day', dur: 'As you wish', lesson: '<p>Today there are no instructions. Use whatever you need, as you need. This freedom is the goal.</p>', exercise: { title: 'No Instructions', steps: ['You decide what, when, how.', 'Grounding? Breath? Focus? Space?', 'Full practice? Worksheet?', 'Nothing?', 'Real practice begins when the program ends.'] }, breathing: '<strong>Your Own Breath</strong><p>You know now.</p>', reflection: 'What did I choose? Why?', insight: 'You no longer need a program. You only need yourself.' },
    { title: 'The Practice of Everyday Life', where: 'In every moment', dur: 'Continuous', lesson: '<p>The path has no end. Practice becomes a way of life: small returns, small recognitions, daily. Consistency in small doses is your greatest act of care.</p>', exercise: { title: 'Your Own Routine', steps: ['Morning: 2-5 min full practice.', 'During day: 3-5 small pauses (worksheet).', 'In tension: anxiety or overload protocol.', 'Evening: 5 min review.', 'Every moment can become a small return.'] }, breathing: '<strong>Daily Breath</strong><p>Morning, noon, night. Small doses. Big change.</p>', reflection: 'What will my daily routine be?', insight: 'Mindfulness, ultimately, is remembering that inside you already exists an open space that holds you as you are.' },
