// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let W = 1, DAY = 1;
let completed = {}; // { "w1d1": true, ... }
let journalEntries = {}; // { "w1d1": { text, date } }
let stepStates = {}; // { "w1d1": [true, false, ...] }
let currentTab = 'learn';

// Timer
let timerInterval = null;
let timerRemaining = 0;
let timerTotal = 0;
let timerRunning = false;

// Journal autosave
let autoSaveTimeout = null;

// ═══════════════════════════════════════
// PERSISTENCE
// ═══════════════════════════════════════
function load() {
    try {
        const s = localStorage.getItem('tax-state');
        if (s) {
            const o = JSON.parse(s);
            W = o.w || 1;
            DAY = o.d || 1;
            completed = o.completed || {};
            journalEntries = o.journal || {};
            stepStates = o.steps || {};
        }
        syncWithCompanion();
    } catch(e) {}
    render();
}

function save() {
    try {
        localStorage.setItem('tax-state', JSON.stringify({
            w: W, d: DAY,
            completed,
            journal: journalEntries,
            steps: stepStates
        }));
        syncWithCompanion();
    } catch(e) {}
}

function keyOf(w, d) { return `w${w}d${d}`; }
function currentKey() { return keyOf(W, DAY); }

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function render() {
    const week = D[W], day = week.days[DAY - 1], axis = ax(W);
    const totalDay = (W - 1) * 7 + DAY;
    const pct = Math.round((totalDay / 56) * 100);
    const done = completed[currentKey()];

    // HEADER
    document.getElementById('headerWeek').textContent = `Week ${W} · ${axis.name}`;
    document.getElementById('headerDay').textContent = `Day ${DAY}: ${day.title}`;
    document.getElementById('headerDayNum').textContent = `${totalDay} / 56`;
    document.getElementById('progressFill').style.width = pct + '%';

    // WEEK PICKER
    document.getElementById('weekPickerCurrent').textContent = `Week ${W} of 8`;

    // STREAK
    const streak = calculateStreak();
    const streakEl = document.getElementById('streakBadge');
    if (streak >= 2) {
        streakEl.innerHTML = `<span class="streak-badge">🔥 ${streak}</span>`;
    } else {
        streakEl.innerHTML = '';
    }

    // WEEK GRID
    const grid = document.getElementById('weekGrid');
    grid.innerHTML = '';
    for (let i = 1; i <= 8; i++) {
        const a = ax(i);
        const doneDays = countCompletedDaysInWeek(i);
        const btn = document.createElement('button');
        btn.className = 'week-btn' + (i === W ? ' active' : '') + (doneDays === 7 ? ' completed' : '');
        btn.innerHTML = `
            <span class="week-btn-text">
                <span class="week-btn-num">Week ${i}</span>
                <span class="week-btn-axis">${a.name}</span>
            </span>
            <span class="week-btn-progress">${doneDays}/7</span>
        `;
        btn.onclick = () => { W = i; DAY = 1; save(); render(); };
        grid.appendChild(btn);
    }

    // DAY DOTS
    const dots = document.getElementById('dayDots');
    dots.innerHTML = '';
    for (let d = 1; d <= 7; d++) {
        const dayDone = completed[keyOf(W, d)];
        const dot = document.createElement('button');
        dot.className = 'day-dot' + (d === DAY ? ' active' : '') + (dayDone ? ' completed' : '');
        dot.innerHTML = `
            <span>D${d}</span>
            <span class="day-dot-check">${dayDone ? '' : '•'}</span>
        `;
        dot.setAttribute('role', 'tab');
        dot.setAttribute('aria-selected', d === DAY);
        dot.setAttribute('aria-label', `Day ${d}${dayDone ? ' (completed)' : ''}`);
        dot.onclick = () => { DAY = d; save(); render(); };
        dots.appendChild(dot);
    }

    // HERO
    document.getElementById('heroEyebrow').textContent = `Axis ${axis.name} · Day ${DAY}`;
    document.getElementById('heroTitle').textContent = day.title;
    document.getElementById('heroMeta').innerHTML = `
        <span class="hero-chip"><span class="hero-chip-icon">📍</span>${day.where}</span>
        <span class="hero-chip"><span class="hero-chip-icon">⏱</span>${day.dur}</span>
    `;

    // LESSON
    document.getElementById('lessonTitle').textContent = day.title;
    document.getElementById('lessonBody').innerHTML = day.lesson;

    // EXERCISE
    renderExercise(day);

    // BREATHING
    document.getElementById('breathCard').innerHTML = day.breathing;

    // REFLECTION
    document.getElementById('reflectionQ').textContent = day.reflection;
    const journalEl = document.getElementById('journal');
    const entry = journalEntries[currentKey()];
    journalEl.value = entry ? entry.text : '';
    document.getElementById('journalStatus').textContent = entry ? `Saved ${entry.date}` : '';
    document.getElementById('journalStatus').className = entry ? 'journal-status saved' : 'journal-status';

    // Past entries
    renderPastEntries();

    // INSIGHT (hidden until done)
    const insightLocked = document.getElementById('insightLocked');
    const insightBox = document.getElementById('insightBox');
    if (done) {
        insightLocked.style.display = 'none';
        insightBox.style.display = 'block';
        insightBox.innerHTML = day.insight;
    } else {
        insightLocked.style.display = 'block';
        insightBox.style.display = 'none';
    }

    // PRACTICE BUTTON
    const pb = document.getElementById('practiceBtn');
    if (done) {
        pb.textContent = 'Completed ✓';
        pb.disabled = true;
        pb.style.opacity = '0.75';
    } else {
        pb.textContent = 'I completed today\'s practice';
        pb.disabled = false;
        pb.style.opacity = '1';
    }

    // TAB DOTS
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('done'));
    if (done) {
        document.querySelectorAll('.tab').forEach(t => t.classList.add('done'));
    }

    save();
}

function renderExercise(day) {
    const container = document.getElementById('exerciseContainer');
    const steps = day.exercise.steps;
    const key = currentKey();
    const states = stepStates[key] || steps.map(() => false);
    const timerSec = parseDuration(day.dur);

    let html = `
        <div class="exercise-box">
            <div class="ex-header">
                <div class="ex-title">${day.exercise.title}</div>
                ${timerSec ? `<button class="ex-timer-btn" onclick="quickStartTimer(${timerSec})">⏱ ${formatMinutes(timerSec)}</button>` : ''}
            </div>
            <ul class="steps-list">
                ${steps.map((s, i) => `
                    <li class="step-item ${states[i] ? 'checked' : ''}" onclick="toggleStep(${i})" role="checkbox" aria-checked="${states[i]}">
                        <span class="step-check"></span>
                        <span class="step-text">${s}</span>
                    </li>
                `).join('')}
            </ul>
        </div>
    `;
    container.innerHTML = html;
}

function toggleStep(i) {
    const key = currentKey();
    const day = D[W].days[DAY - 1];
    if (!stepStates[key]) stepStates[key] = day.exercise.steps.map(() => false);
    stepStates[key][i] = !stepStates[key][i];
    renderExercise(day);
    save();
}

function renderPastEntries() {
    const list = document.getElementById('pastEntriesList');
    const entries = Object.entries(journalEntries)
        .filter(([k]) => k !== currentKey())
        .sort((a, b) => (b[1].timestamp || 0) - (a[1].timestamp || 0))
        .slice(0, 20);

    const label = document.getElementById('pastEntriesLabel');
    if (entries.length === 0) {
        label.textContent = 'No previous notes yet';
        list.innerHTML = '';
        return;
    }
    label.textContent = `See previous notes (${entries.length})`;

    list.innerHTML = entries.map(([k, v]) => {
        const match = k.match(/w(\d+)d(\d+)/);
        const w = match ? match[1] : '?';
        const d = match ? match[2] : '?';
        const dayTitle = match && D[w] ? D[w].days[d - 1].title : '';
        return `
            <div class="past-entry">
                <div class="past-entry-date">Week ${w}, Day ${d} — ${dayTitle}</div>
                <div class="past-entry-text">${escapeHtml(v.text)}</div>
            </div>
        `;
    }).join('');
}

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// ═══════════════════════════════════════
// TABS

function switchTab(name) {
    currentTab = name;
    document.querySelectorAll('.tab').forEach(t => {
        const active = t.dataset.tab === name;
        t.classList.toggle('active', active);
        t.setAttribute('aria-selected', active);
    });
    document.querySelectorAll('.panel').forEach(p => {
        p.classList.toggle('active', p.id === `panel-${name}`);
    });

    };

// JOURNAL (autosave)
// ═══════════════════════════════════════
function autoSaveJournal() {
    clearTimeout(autoSaveTimeout);
    document.getElementById('journalStatus').textContent = 'Writing...';
    document.getElementById('journalStatus').className = 'journal-status';
    autoSaveTimeout = setTimeout(() => {
        const text = document.getElementById('journal').value;
        if (text.trim()) {
            journalEntries[currentKey()] = {
                text,
                date: formatDate(new Date()),
                timestamp: Date.now()
            };
            document.getElementById('journalStatus').textContent = `Saved ${formatDate(new Date())}`;
            document.getElementById('journalStatus').className = 'journal-status saved';
        } else {
            delete journalEntries[currentKey()];
            document.getElementById('journalStatus').textContent = '';
        }
        save();
        renderPastEntries();
    }, 800);
}

function formatDate(d) {
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${months[d.getMonth()]} ${d.getDate()}, ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

        else if (W < 8) { W++; DAY = 1; }

}

// ═══════════════════════════════════════
// STREAK & STATS
// ═══════════════════════════════════════
function calculateStreak() {
    const entries = Object.entries(completed)
        .map(([k, v]) => ({ key: k, date: v.date }))
        .filter(e => e.date)
        .sort((a, b) => new Date(b.date) - new Date(a.date));

    if (entries.length === 0) return 0;

    const today = new Date();
    today.setHours(0, 0, 0, 0);
    let streak = 0;
    let cursor = new Date(today);

    for (let i = 0; i < 90; i++) {
        const match = entries.find(e => {
            const d = new Date(e.date);
            d.setHours(0, 0, 0, 0);
            return d.getTime() === cursor.getTime();
        });
        if (match) {
            streak++;
            cursor.setDate(cursor.getDate() - 1);
        } else if (i === 0) {
            cursor.setDate(cursor.getDate() - 1);
        } else {
            break;
        }
    }
    return streak;
}

function countCompletedDaysInWeek(w) {
    let n = 0;
    for (let d = 1; d <= 7; d++) if (completed[keyOf(w, d)]) n++;
    return n;
}

function startFocus() {
    const day = D[W].days[DAY - 1];

    // Hide home float to avoid confusion
    const homeFloat = document.querySelector('.home-float');
    if (homeFloat) homeFloat.style.display = 'none';

    // Reset done button state
    const doneBtn = document.querySelector('.focus-overlay .btn-done');
    if (doneBtn) {
        doneBtn.style.background = '';
        doneBtn.style.color = '';
        doneBtn.style.transform = '';
        doneBtn.textContent = 'I am done';
    }

    document.getElementById('focusTitle').textContent = day.exercise.title;
    document.getElementById('focusSub').textContent = `${day.where} · ${day.dur}`;

    const key = currentKey();
    const states = stepStates[key] || day.exercise.steps.map(() => false);
    document.getElementById('focusSteps').innerHTML = `
        <ul class="steps-list">
            ${day.exercise.steps.map((s, i) => `
                <li class="step-item ${states[i] ? 'checked' : ''}" onclick="toggleStepFocus(${i})">
                    <span class="step-check"></span>
                    <span class="step-text">${s}</span>
                </li>
            `).join('')}
        </ul>
    `;

    const sec = parseDuration(day.dur);
    if (sec) {
        timerTotal = sec;
        timerRemaining = sec;
        updateTimerDisplay();
    } else {
        timerTotal = 300;
        timerRemaining = 300;
        updateTimerDisplay();
    }

    document.getElementById('focusOverlay').classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeFocus() {
    document.getElementById('focusOverlay').classList.remove('active');
    document.body.style.overflow = '';

    // Show home float again
    const homeFloat = document.querySelector('.home-float');
    if (homeFloat) homeFloat.style.display = 'flex';

    if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
        timerRunning = false;
    }
}

function toggleStepFocus(i) {
    toggleStep(i);
    startFocus();
}

// ═══════════════════════════════════════
// TIMER
// ═══════════════════════════════════════
function parseDuration(durStr) {
    if (!durStr) return null;
    const low = durStr.toLowerCase();
    if (/×|x/i.test(low)) return null;
    if (/continuous|as|each/.test(low)) return null;
    const rangeMatch = low.match(/(\d+)\s*-\s*(\d+)\s*min/);
    if (rangeMatch) return parseInt(rangeMatch[1]) * 60;
    const minMatch = low.match(/(\d+)\s*min/);
    if (minMatch) return parseInt(minMatch[1]) * 60;
    const secMatch = low.match(/(\d+)\s*(sec|")/);
    if (secMatch) return parseInt(secMatch[1]);
    return null;
}

function formatMinutes(sec) {
    if (sec >= 60) return `${Math.round(sec / 60)} min`;
    return `${sec}"`;
}

function updateTimerDisplay() {
    const m = Math.floor(timerRemaining / 60);
    const s = timerRemaining % 60;
    document.getElementById('timerDigits').textContent =
        `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

    const circumference = 578;
    const offset = circumference * (1 - timerRemaining / timerTotal);
    document.getElementById('timerProgress').style.strokeDashoffset = offset;

    const label = document.getElementById('timerLabel');
    const btn = document.getElementById('timerStartBtn');
    if (timerRemaining === 0) {
        label.textContent = 'done';
        btn.textContent = 'Start again';
        btn.classList.remove('primary');
    } else if (timerRunning) {
        label.textContent = 'running';
        btn.textContent = 'Pause';
        btn.classList.remove('primary');
    } else {
        label.textContent = timerRemaining === timerTotal ? 'ready' : 'paused';
        btn.textContent = timerRemaining === timerTotal ? 'Start' : 'Resume';
        btn.classList.add('primary');
    }
}

function timerToggle() {
    if (timerRemaining === 0) {
        timerRemaining = timerTotal;
    }
    if (timerRunning) {
        clearInterval(timerInterval);
        timerRunning = false;
    } else {
        timerRunning = true;
        timerInterval = setInterval(() => {
            timerRemaining--;
            updateTimerDisplay();
            if (timerRemaining <= 0) {
                clearInterval(timerInterval);
                timerRunning = false;
                timerDone();
            }
        }, 1000);
    }
    updateTimerDisplay();
}

function timerReset() {
    if (timerInterval) clearInterval(timerInterval);
    timerRunning = false;
    timerRemaining = timerTotal;
    updateTimerDisplay();
}

function timerDone() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const playTone = (freq, start, dur) => {
            const o = ctx.createOscillator();
            const g = ctx.createGain();
            o.connect(g); g.connect(ctx.destination);
            o.frequency.value = freq;
            o.type = 'sine';
            g.gain.setValueAtTime(0, ctx.currentTime + start);
            g.gain.linearRampToValueAtTime(0.15, ctx.currentTime + start + 0.05);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
            o.start(ctx.currentTime + start);
            o.stop(ctx.currentTime + start + dur);
        };
        playTone(528, 0, 0.8);
        playTone(660, 0.3, 0.8);
    } catch(e) {}

    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
    showToast('🔔 Time completed');
    updateTimerDisplay();

    // Make completion button prominent
    const doneBtn = document.querySelector('.focus-overlay .btn-done');
    if (doneBtn) {
        doneBtn.style.background = 'var(--teal)';
        doneBtn.style.color = 'white';
        doneBtn.style.transform = 'scale(1.05)';
        doneBtn.textContent = 'Complete Exercise ✓';
    }
}

function quickStartTimer(sec) {
    startFocus();
    setTimeout(() => {
        if (!timerRunning) timerToggle();
    }, 300);
}

function syncWithCompanion() {
    if (typeof window.companionData === 'undefined') {
        window.companionData = JSON.parse(localStorage.getItem('companion_v1')) || {};
    }
    const d = window.companionData;
    if (!d.programProgress) d.programProgress = { week: 0, day: 0, lastVisit: null };
    
    // Always sync current view state to companion if it's the latest
    if (W > d.programProgress.week || (W === d.programProgress.week && DAY >= d.programProgress.day)) {
        d.programProgress.week = W;
        d.programProgress.day = DAY;
        if (typeof D !== 'undefined' && D[W] && D[W].days[DAY-1]) {
            d.programProgress.title = D[W].days[DAY-1].title;
        }
    }
    d.programProgress.lastVisit = new Date().toISOString();
    
    // Mirror journal entries for unified history
    if (!d.programJournal) d.programJournal = {};
    d.programJournal = { ...d.programJournal, ...journalEntries };
    
    if (typeof c2SaveCompanionData === 'function') {
        c2SaveCompanionData(d);
    } else {
        localStorage.setItem('companion_v1', JSON.stringify(d));
    }
}
