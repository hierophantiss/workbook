    { title: 'Νιώσε, Μην Σκεφθείς', where: 'Ήσυχο μέρος', dur: '15 λεπτά', lesson: '<p>Μην προσπαθήσετε να «βιώσετε». Αφήστε την εισροή: αέρας, έδαφος, ουρανός. Η διαφορά μεταξύ προσπάθειας και παράδοσης.</p>', exercise: { title: 'Παθητική Παρουσία', steps: ['Τα 4 στάδια — αλλά χωρίς προσπάθεια.', 'Μην ελέγχετε τίποτα.', 'Αφήστε τη γείωση να συμβεί.', 'Αφήστε την αναπνοή να ρέει.', 'Αφήστε τον χώρο να ανοίξει. Εσείς απλώς... ανοίγετε.'] }, breathing: '<strong>Παθητική Αναπνοή (15 λεπτά)</strong><p>Μην ελέγχετε. Αφήστε το σώμα να σας αναπνεύσει. Νιώστε τη διαφορά.</p>', reflection: 'Τι ένιωσα αφού σταμάτησα να προσπαθώ;', insight: 'Δεν κάνετε τίποτα. Απλώς ανοίγετε.' },
    { title: 'Χωρίς Διαχωρισμό', where: 'Σε δραστηριότητα', dur: '20 λεπτά', lesson: '<p>Σήμερα: εφαρμόστε τους 4 άξονες ενώ κάνετε κάτι καθημερινό — πλύσιμο πιάτων, μαγείρεμα, περπάτημα. Δεν υπάρχει διαχωρισμός μεταξύ «πρακτικής» και «ζωής».</p>', exercise: { title: 'Ζωή = Πρακτική', steps: ['Επιλέξτε μια καθημερινή δραστηριότητα.', 'Εφαρμόστε: γείωση + αναπνοή + εστίαση + ανοιχτότητα.', 'Κρατήστε την επίγνωση ενώ δραστηριοποιείστε.', 'Αν χαθείτε: απαλή επιστροφή.', 'Η δραστηριότητα γίνεται η πρακτική.'] }, breathing: '<strong>Αναπνοή σε Δράση</strong><p>Δεν ξεχωρίζετε. Ζείτε με παρουσία.</p>', reflection: 'Πώς ήταν να κάνω κάτι καθημερινό με πλήρη επίγνωση;', insight: 'Η ζωή δεν περιμένει να τελειώσει η πρακτική. Η ζωή είναι η πρακτική.' },
    { title: 'Αβίαστη Παρουσία', where: 'Οπουδήποτε', dur: '20 λεπτά', lesson: '<p>Σταματήστε να προσπαθείτε. Αφήστε και τα τέσσερα να δουλέψουν μόνα τους. Η γη υποστηρίζει. Η αναπνοή ρέει. Τα μάτια βλέπουν. Η καρδιά αισθάνεται.</p>', exercise: { title: 'Χωρίς Προσπάθεια', steps: ['Καθίστε ή σταθείτε.', 'Μην «κάνετε» τα 4 στάδια — αφήστε τα να συμβούν.', 'Το σώμα ξέρει. Η αναπνοή ξέρει.', 'Εσείς δεν χρειάζεται να κάνετε τίποτα.', '20 λεπτά αβίαστης παρουσίας.'] }, breathing: '<strong>Αβίαστη Αναπνοή (20 λεπτά)</strong><p>Συμβαίνει. Δεν χρειάζεται να το κάνετε.</p>', reflection: 'Τι ανακαλύπτω όταν σταματώ να προσπαθώ;', insight: 'Η πραγματική παρουσία δεν χρειάζεται προσπάθεια. Χρειάζεται μόνο αποδοχή.' },
    { title: 'Φύλλο Εργασίας Παρουσίας', where: 'Οπουδήποτε', dur: '5 λεπτά', lesson: '<p>Σήμερα εξασκείστε στο «Φύλλο Εργασίας» — 4 βήματα που σας φέρνουν πίσω στο «τώρα» σε δευτερόλεπτα. Αυτό θα σας συνοδεύει μετά το πρόγραμμα.</p>', exercise: { title: 'Φύλλο Εργασίας (4 Βήματα)', steps: ['1. ΣΩΜΑ: Νιώστε βάρος, άξονα, εντάσεις. Χαλαρώστε σαγόνι, ώμους.', '2. ΑΝΑΠΝΟΗ: Πώς είναι; Γρήγορη, ρηχή, σφιγμένη; Εκπνοή αργά.', '3. ΠΡΟΣΟΧΗ: Πού είναι; Τρέχει; Κολλάει; Επιστρέψτε σε σημείο.', '4. ΧΩΡΟΣ: Νιώθετε παγιδευμένοι; Μαλακώστε βλέμμα. Σκέψεις = σύννεφα.', 'Κάντε τα με σειρά ή διαλέξτε αυτό που χρειάζεστε.'] }, breathing: '<strong>Γρήγορη Επαναφορά (30"-2 λεπτά)</strong><p>4 βήματα. Δευτερόλεπτα. Παντού. Πάντα.</p>', reflection: 'Πόσο γρήγορα μπόρεσα να «γυρίσω» στο τώρα;', insight: 'Τώρα έχετε ένα εργαλείο για κάθε στιγμή. Δεν χρειάζεστε τίποτα άλλο.' },

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let W = 1, DAY = 1;
let completed = {}; // { "w1d1": true, ... }
let journalEntries = {}; // { "w1d1": { text, date } }
let stepStates = {}; // { "w1d1": [true, false, ...] }
let currentTab = 'learn';

// Timer
let timerInterval = null;
let timerRemaining = 0;
let timerTotal = 0;
let timerRunning = false;

// Journal autosave
let autoSaveTimeout = null;

// ═══════════════════════════════════════
// PERSISTENCE
// ═══════════════════════════════════════
function load() {
    try {
        const s = localStorage.getItem('tax-state');
        if (s) {
            const o = JSON.parse(s);
            W = o.w || 1;
            DAY = o.d || 1;
            completed = o.completed || {};
            journalEntries = o.journal || {};
            stepStates = o.steps || {};
        }
    } catch(e) {}
    render();
}

function save() {
    try {
        localStorage.setItem('tax-state', JSON.stringify({
            w: W, d: DAY,
            completed,
            journal: journalEntries,
            steps: stepStates
        }));
    } catch(e) {}
}

function keyOf(w, d) { return `w${w}d${d}`; }
function currentKey() { return keyOf(W, DAY); }

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function render() {
    const week = D[W], day = week.days[DAY - 1], axis = ax(W);
    const totalDay = (W - 1) * 7 + DAY;
    const pct = Math.round((totalDay / 56) * 100);
    const done = completed[currentKey()];

    // HEADER
    document.getElementById('headerWeek').textContent = `Εβδομάδα ${W} · ${axis.name}`;
    document.getElementById('headerDay').textContent = `Ημέρα ${DAY}: ${day.title}`;
    document.getElementById('headerDayNum').textContent = `${totalDay} / 56`;
    document.getElementById('progressFill').style.width = pct + '%';

    // WEEK PICKER
    document.getElementById('weekPickerCurrent').textContent = `Εβδομάδα ${W} από 8`;

    // STREAK
    const streak = calculateStreak();
    const streakEl = document.getElementById('streakBadge');
    if (streak >= 2) {
        streakEl.innerHTML = `<span class="streak-badge">🔥 ${streak}</span>`;
    } else {
        streakEl.innerHTML = '';
    }

    // WEEK GRID
    const grid = document.getElementById('weekGrid');
    grid.innerHTML = '';
    for (let i = 1; i <= 8; i++) {
        const a = ax(i);
        const doneDays = countCompletedDaysInWeek(i);
        const btn = document.createElement('button');
        btn.className = 'week-btn' + (i === W ? ' active' : '') + (doneDays === 7 ? ' completed' : '');
        btn.innerHTML = `
            <span class="week-btn-text">
                <span class="week-btn-num">Εβδομάδα ${i}</span>
                <span class="week-btn-axis">${a.name}</span>
            </span>
            <span class="week-btn-progress">${doneDays}/7</span>
        `;
        btn.onclick = () => { W = i; DAY = 1; save(); render(); };
        grid.appendChild(btn);
    }

    // DAY DOTS
    const dots = document.getElementById('dayDots');
    dots.innerHTML = '';
    for (let d = 1; d <= 7; d++) {
        const dayDone = completed[keyOf(W, d)];
        const dot = document.createElement('button');
        dot.className = 'day-dot' + (d === DAY ? ' active' : '') + (dayDone ? ' completed' : '');
        dot.innerHTML = `
            <span>Μ${d}</span>
            <span class="day-dot-check">${dayDone ? '' : '•'}</span>
        `;
        dot.setAttribute('role', 'tab');
        dot.setAttribute('aria-selected', d === DAY);
        dot.setAttribute('aria-label', `Μέρα ${d}${dayDone ? ' (ολοκληρώθηκε)' : ''}`);
        dot.onclick = () => { DAY = d; save(); render(); };
        dots.appendChild(dot);
    }

    // HERO
    document.getElementById('heroEyebrow').textContent = `Άξονας ${axis.name} · Ημέρα ${DAY}`;
    document.getElementById('heroTitle').textContent = day.title;
    document.getElementById('heroMeta').innerHTML = `
        <span class="hero-chip"><span class="hero-chip-icon">📍</span>${day.where}</span>
        <span class="hero-chip"><span class="hero-chip-icon">⏱</span>${day.dur}</span>
    `;

    // LESSON
    document.getElementById('lessonTitle').textContent = day.title;
    document.getElementById('lessonBody').innerHTML = day.lesson;

    // EXERCISE
    renderExercise(day);

    // BREATHING
    document.getElementById('breathCard').innerHTML = day.breathing;

    // REFLECTION
    document.getElementById('reflectionQ').textContent = day.reflection;
    const journalEl = document.getElementById('journal');
    const entry = journalEntries[currentKey()];
    journalEl.value = entry ? entry.text : '';
    document.getElementById('journalStatus').textContent = entry ? `Αποθηκεύτηκε ${entry.date}` : '';
    document.getElementById('journalStatus').className = entry ? 'journal-status saved' : 'journal-status';

    // Past entries
    renderPastEntries();

    // INSIGHT (hidden until done)
    const insightLocked = document.getElementById('insightLocked');
    const insightBox = document.getElementById('insightBox');
    if (done) {
        insightLocked.style.display = 'none';
        insightBox.style.display = 'block';
        insightBox.innerHTML = day.insight;
    } else {
        insightLocked.style.display = 'block';
        insightBox.style.display = 'none';
    }

    // PRACTICE BUTTON
    const pb = document.getElementById('practiceBtn');
    if (done) {
        pb.textContent = 'Ολοκληρώθηκε ✓';
        pb.disabled = true;
        pb.style.opacity = '0.75';
    } else {
        pb.textContent = 'Ολοκλήρωσα τη σημερινή άσκηση';
        pb.disabled = false;
        pb.style.opacity = '1';
    }

    // TAB DOTS
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('done'));
    if (done) {
        document.querySelectorAll('.tab').forEach(t => t.classList.add('done'));
    }

    save();
}

function renderExercise(day) {
    const container = document.getElementById('exerciseContainer');
    const steps = day.exercise.steps;
    const key = currentKey();
    const states = stepStates[key] || steps.map(() => false);
    const timerSec = parseDuration(day.dur);

    let html = `
        <div class="exercise-box">
            <div class="ex-header">
                <div class="ex-title">${day.exercise.title}</div>
                ${timerSec ? `<button class="ex-timer-btn" onclick="quickStartTimer(${timerSec})">⏱ ${formatMinutes(timerSec)}</button>` : ''}
            </div>
            <ul class="steps-list">
                ${steps.map((s, i) => `
                    <li class="step-item ${states[i] ? 'checked' : ''}" onclick="toggleStep(${i})" role="checkbox" aria-checked="${states[i]}">
                        <span class="step-check"></span>
                        <span class="step-text">${s}</span>
                    </li>
                `).join('')}
            </ul>
        </div>
    `;
    container.innerHTML = html;
}

function toggleStep(i) {
    const key = currentKey();
    const day = D[W].days[DAY - 1];
    if (!stepStates[key]) stepStates[key] = day.exercise.steps.map(() => false);
    stepStates[key][i] = !stepStates[key][i];
    renderExercise(day);
    save();
}

function renderPastEntries() {
    const list = document.getElementById('pastEntriesList');
    const entries = Object.entries(journalEntries)
        .filter(([k]) => k !== currentKey())
        .sort((a, b) => (b[1].timestamp || 0) - (a[1].timestamp || 0))
        .slice(0, 20);

    const label = document.getElementById('pastEntriesLabel');
    if (entries.length === 0) {
        label.textContent = 'Δεν υπάρχουν προηγούμενες σημειώσεις ακόμα';
        list.innerHTML = '';
        return;
    }
    label.textContent = `Δες προηγούμενες σημειώσεις (${entries.length})`;

    list.innerHTML = entries.map(([k, v]) => {
        const match = k.match(/w(\d+)d(\d+)/);
        const w = match ? match[1] : '?';
        const d = match ? match[2] : '?';
        const dayTitle = match && D[w] ? D[w].days[d - 1].title : '';
        return `
            <div class="past-entry">
                <div class="past-entry-date">Εβδ. ${w}, Μέρα ${d} — ${dayTitle}</div>
                <div class="past-entry-text">${escapeHtml(v.text)}</div>
            </div>
        `;
    }).join('');
}

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// ═══════════════════════════════════════
// TABS
// ═══════════════════════════════════════
function switchTab(name) {
    currentTab = name;
    document.querySelectorAll('.tab').forEach(t => {
        const active = t.dataset.tab === name;
        t.classList.toggle('active', active);
        t.setAttribute('aria-selected', active);
    });
    document.querySelectorAll('.panel').forEach(p => {
        p.classList.toggle('active', p.id === `panel-${name}`);
    });
    // Scroll to tabs position (not to top)
    document.querySelector('.tabs').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ═══════════════════════════════════════
// WEEK PICKER
// ═══════════════════════════════════════
function toggleWeekPicker() {
    const el = document.getElementById('weekPicker');
    const open = el.classList.toggle('open');
    el.querySelector('.week-picker-header').setAttribute('aria-expanded', open);
}

function togglePastEntries() {
    const el = document.getElementById('pastEntries');
    const open = el.classList.toggle('open');
    el.querySelector('.past-entries-toggle').setAttribute('aria-expanded', open);
}

// ═══════════════════════════════════════
// COMPLETION
// ═══════════════════════════════════════
function markDone() {
    completed[currentKey()] = {
        date: new Date().toISOString()
    };
    save();
    showToast('✓ Μπράβο! Ολοκληρώθηκε η άσκηση');
    render();
    // Switch to reflect tab to reveal insight
    setTimeout(() => switchTab('reflect'), 600);
}

function markDoneFromFocus() {
    completed[currentKey()] = { date: new Date().toISOString() };
    save();
    closeFocus();
    showToast('✓ Μπράβο! Ολοκληρώθηκε η άσκηση');
    render();
    setTimeout(() => switchTab('reflect'), 600);
}

// ═══════════════════════════════════════
// JOURNAL (autosave)
// ═══════════════════════════════════════
function autoSaveJournal() {
    clearTimeout(autoSaveTimeout);
    document.getElementById('journalStatus').textContent = 'Γράφω...';
    document.getElementById('journalStatus').className = 'journal-status';
    autoSaveTimeout = setTimeout(() => {
        const text = document.getElementById('journal').value;
        if (text.trim()) {
            journalEntries[currentKey()] = {
                text,
                date: formatDate(new Date()),
                timestamp: Date.now()
            };
            document.getElementById('journalStatus').textContent = `Αποθηκεύτηκε ${formatDate(new Date())}`;
            document.getElementById('journalStatus').className = 'journal-status saved';
        } else {
            delete journalEntries[currentKey()];
            document.getElementById('journalStatus').textContent = '';
        }
        save();
        renderPastEntries();
    }, 800);
}

function formatDate(d) {
    const months = ['Ιαν','Φεβ','Μαρ','Απρ','Μαϊ','Ιουν','Ιουλ','Αυγ','Σεπ','Οκτ','Νοε','Δεκ'];
    return `${d.getDate()} ${months[d.getMonth()]}, ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ═══════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════
function go(dir) {
    if (dir === 1) {
        if (DAY < 7) DAY++;
        else if (W < 8) { W++; DAY = 1; }
    } else {
        if (DAY > 1) DAY--;
        else if (W > 1) { W--; DAY = 7; }
    }
    currentTab = 'learn';
    switchTab('learn');
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goHome() {
    if (confirm('Επιστροφή στην αρχική;')) window.location.href = 'index.html';
}

// ═══════════════════════════════════════
// TOAST
// ═══════════════════════════════════════
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}

// ═══════════════════════════════════════
// STREAK & STATS
// ═══════════════════════════════════════
function calculateStreak() {
    const entries = Object.entries(completed)
        .map(([k, v]) => ({ key: k, date: v.date }))
        .filter(e => e.date)
        .sort((a, b) => new Date(b.date) - new Date(a.date));

    if (entries.length === 0) return 0;

    const today = new Date();
    today.setHours(0, 0, 0, 0);
    let streak = 0;
    let cursor = new Date(today);

    for (let i = 0; i < 90; i++) {
        const match = entries.find(e => {
            const d = new Date(e.date);
            d.setHours(0, 0, 0, 0);
            return d.getTime() === cursor.getTime();
        });
        if (match) {
            streak++;
            cursor.setDate(cursor.getDate() - 1);
        } else if (i === 0) {
            // Allow missing today — check yesterday
            cursor.setDate(cursor.getDate() - 1);
        } else {
            break;
        }
    }
    return streak;
}

function countCompletedDaysInWeek(w) {
    let n = 0;
    for (let d = 1; d <= 7; d++) if (completed[keyOf(w, d)]) n++;
    return n;
}

// ═══════════════════════════════════════
// FOCUS MODE
// ═══════════════════════════════════════
function startFocus() {
    const day = D[W].days[DAY - 1];
    document.getElementById('focusTitle').textContent = day.exercise.title;
    document.getElementById('focusSub').textContent = `${day.where} · ${day.dur}`;

    // Steps in focus
    const key = currentKey();
    const states = stepStates[key] || day.exercise.steps.map(() => false);
    document.getElementById('focusSteps').innerHTML = `
        <ul class="steps-list">
            ${day.exercise.steps.map((s, i) => `
                <li class="step-item ${states[i] ? 'checked' : ''}" onclick="toggleStepFocus(${i})">
                    <span class="step-check"></span>
                    <span class="step-text">${s}</span>
                </li>
            `).join('')}
        </ul>
    `;

    // Timer setup
    const sec = parseDuration(day.dur);
    if (sec) {
        timerTotal = sec;
        timerRemaining = sec;
        updateTimerDisplay();
    } else {
        timerTotal = 300; // default 5 min
        timerRemaining = 300;
        updateTimerDisplay();
    }

    document.getElementById('focusOverlay').classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeFocus() {
    document.getElementById('focusOverlay').classList.remove('active');
    document.body.style.overflow = '';
    if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
        timerRunning = false;
    }
}

function toggleStepFocus(i) {
    toggleStep(i);
    // Re-render focus steps
    startFocus();
}

// ═══════════════════════════════════════
// TIMER
// ═══════════════════════════════════════
function parseDuration(durStr) {
    if (!durStr) return null;
    const low = durStr.toLowerCase();
    // "2-3 λεπτά" -> use first (2)
    // "5 λεπτά" -> 5
    // "30 δευτερόλεπτα" / "30\"" -> 30 sec
    // "6 × 30\"" -> null (multiple)
    if (/×|x/i.test(low)) return null;
    if (/συνεχ|όσο|κάθε/.test(low)) return null;
    const rangeMatch = low.match(/(\d+)\s*-\s*(\d+)\s*λεπτ/);
    if (rangeMatch) return parseInt(rangeMatch[1]) * 60;
    const minMatch = low.match(/(\d+)\s*λεπτ/);
    if (minMatch) return parseInt(minMatch[1]) * 60;
    const secMatch = low.match(/(\d+)\s*(δευτερόλεπτ|")/);
    if (secMatch) return parseInt(secMatch[1]);
    return null;
}

function formatMinutes(sec) {
    if (sec >= 60) return `${Math.round(sec / 60)} λεπτ`;
    return `${sec}"`;
}

function updateTimerDisplay() {
    const m = Math.floor(timerRemaining / 60);
    const s = timerRemaining % 60;
    document.getElementById('timerDigits').textContent =
        `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

    const circumference = 578; // 2 * π * 92
    const offset = circumference * (1 - timerRemaining / timerTotal);
    document.getElementById('timerProgress').style.strokeDashoffset = offset;

    const label = document.getElementById('timerLabel');
    const btn = document.getElementById('timerStartBtn');
    if (timerRemaining === 0) {
        label.textContent = 'τέλος';
        btn.textContent = 'Ξεκίνα ξανά';
        btn.classList.remove('primary');
    } else if (timerRunning) {
        label.textContent = 'σε εξέλιξη';
        btn.textContent = 'Παύση';
        btn.classList.remove('primary');
    } else {
        label.textContent = timerRemaining === timerTotal ? 'έτοιμο' : 'παύση';
        btn.textContent = timerRemaining === timerTotal ? 'Ξεκίνα' : 'Συνέχεια';
        btn.classList.add('primary');
    }
}

function timerToggle() {
    if (timerRemaining === 0) {
        timerRemaining = timerTotal;
    }
    if (timerRunning) {
        clearInterval(timerInterval);
        timerRunning = false;
    } else {
        timerRunning = true;
        timerInterval = setInterval(() => {
            timerRemaining--;
            updateTimerDisplay();
            if (timerRemaining <= 0) {
                clearInterval(timerInterval);
                timerRunning = false;
                timerDone();
            }
        }, 1000);
    }
    updateTimerDisplay();
}

function timerReset() {
    if (timerInterval) clearInterval(timerInterval);
    timerRunning = false;
    timerRemaining = timerTotal;
    updateTimerDisplay();
}

function timerDone() {
    // Gentle feedback
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const playTone = (freq, start, dur) => {
            const o = ctx.createOscillator();
            const g = ctx.createGain();
            o.connect(g); g.connect(ctx.destination);
            o.frequency.value = freq;
            o.type = 'sine';
            g.gain.setValueAtTime(0, ctx.currentTime + start);
            g.gain.linearRampToValueAtTime(0.15, ctx.currentTime + start + 0.05);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
            o.start(ctx.currentTime + start);
            o.stop(ctx.currentTime + start + dur);
        };
        playTone(528, 0, 0.8);
        playTone(660, 0.3, 0.8);
    } catch(e) {}

    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
    showToast('🔔 Ολοκλήρωση χρόνου');
    updateTimerDisplay();
}

function quickStartTimer(sec) {
    // Start timer from practice tab — switch to focus mode
    startFocus();
    setTimeout(() => {
        if (!timerRunning) timerToggle();
    }, 300);
}

// Handle escape to close focus
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeFocus();
});
