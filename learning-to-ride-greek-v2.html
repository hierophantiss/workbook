<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#f9f7f3">
    <title>Τετραπλός Άξονας — Πρόγραμμα 8 Εβδομάδων</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=Instrument+Serif:opsz@14..32&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════
           BASE — ήρεμη, προβλέψιμη, mobile-first
           ═══════════════════════════════════════ */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-page: #f9f7f3;
            --bg-card: #ffffff;
            --bg-soft: #f2efe9;
            --bg-softer: #f7f4ee;
            --teal: #2c6e6b;
            --teal-light: #4f9e9a;
            --teal-faint: rgba(44, 110, 107, 0.08);
            --gold: #bc8f4b;
            --gold-soft: #dbb067;
            --gold-faint: rgba(188, 143, 75, 0.12);
            --lav: #9c8eaa;
            --lav-faint: rgba(156, 142, 170, 0.1);
            --text-primary: #2b2a28;
            --text-secondary: #5b5a56;
            --text-muted: #8c8982;
            --border-light: #e2ddd4;
            --border-strong: #cec8bd;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.03);
            --shadow-md: 0 6px 20px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.08);
            --focus-ring: 0 0 0 3px rgba(44, 110, 107, 0.25);
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --radius-sm: 14px;
            --radius-md: 20px;
            --radius-lg: 28px;
            --radius-xl: 32px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-page: #121210;
                --bg-card: #1e1f1c;
                --bg-soft: #2a2b27;
                --bg-softer: #24251f;
                --teal: #6fc2be;
                --teal-light: #8fd9d5;
                --teal-faint: rgba(111, 194, 190, 0.12);
                --gold: #e0b062;
                --gold-soft: #ecc67a;
                --gold-faint: rgba(224, 176, 98, 0.14);
                --lav: #b9accc;
                --lav-faint: rgba(185, 172, 204, 0.12);
                --text-primary: #ece9e2;
                --text-secondary: #b8b5ab;
                --text-muted: #827f76;
                --border-light: #34332e;
                --border-strong: #45433e;
                --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
                --shadow-md: 0 6px 20px rgba(0, 0, 0, 0.4);
                --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.5);
            }
            meta[name="theme-color"] { content: #121210; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }

        html { -webkit-text-size-adjust: 100%; }

        body {
            background: var(--bg-page);
            color: var(--text-primary);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            line-height: 1.65;
            font-weight: 400;
            font-size: 17px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            padding-bottom: 120px;
            overflow-x: hidden;
        }

        .container {
            max-width: 640px;
            margin: 0 auto;
            padding: 16px 16px 40px;
        }

        /* ═══════════════════════════════════════
           HEADER — συμπαγής, ξεκάθαρη πρόοδος
           ═══════════════════════════════════════ */
        header {
            background: linear-gradient(135deg, var(--teal) 0%, #1d5552 100%);
            color: white;
            padding: 24px 22px 22px;
            border-radius: var(--radius-xl);
            margin-bottom: 20px;
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
        }

        header::after {
            content: '';
            position: absolute;
            top: -30%; right: -20%;
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(219, 176, 103, 0.18), transparent 60%);
            pointer-events: none;
        }

        header h1 {
            font-family: 'Instrument Serif', serif;
            font-size: 1.75rem;
            font-weight: 400;
            letter-spacing: -0.01em;
            margin-bottom: 4px;
            position: relative;
        }

        .header-sub {
            font-size: 0.8rem;
            opacity: 0.82;
            margin-bottom: 18px;
            letter-spacing: 0.3px;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 10px;
        }

        .header-week {
            font-family: 'Instrument Serif', serif;
            font-size: 1.15rem;
            font-weight: 400;
        }

        .header-day-num {
            font-size: 0.75rem;
            opacity: 0.75;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }

        .header-day-title {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 16px;
            font-weight: 500;
        }

        .progress-track {
            background: rgba(255, 255, 255, 0.2);
            height: 5px;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, var(--gold-soft), #eac688);
            height: 100%;
            border-radius: 5px;
            transition: width 0.6s cubic-bezier(0.2, 0.9, 0.4, 1);
        }

        /* ═══════════════════════════════════════
           WEEK PICKER — collapsed by default
           ═══════════════════════════════════════ */
        .week-picker {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            margin-bottom: 16px;
            overflow: hidden;
            transition: var(--transition);
        }

        .week-picker-header {
            width: 100%;
            padding: 14px 18px;
            background: transparent;
            border: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-weight: 500;
            text-align: left;
            transition: var(--transition);
        }

        .week-picker-header:hover {
            background: var(--bg-soft);
        }

        .week-picker-label {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .week-picker-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--teal);
        }

        .week-picker-chevron {
            font-size: 0.85rem;
            color: var(--text-muted);
            transition: transform 0.3s ease;
        }

        .week-picker.open .week-picker-chevron {
            transform: rotate(180deg);
        }

        .week-grid {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .week-picker.open .week-grid {
            max-height: 500px;
        }

        .week-grid-inner {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            padding: 4px 14px 14px;
        }

        .week-btn {
            background: var(--bg-softer);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-sm);
            padding: 12px 12px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            text-align: left;
            line-height: 1.4;
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 52px;
        }

        .week-btn:hover, .week-btn:focus-visible {
            border-color: var(--teal-light);
            background: var(--bg-soft);
        }

        .week-btn.active {
            background: var(--teal);
            color: white;
            border-color: var(--teal);
            box-shadow: var(--shadow-sm);
        }

        .week-btn-text { display: flex; flex-direction: column; gap: 2px; }
        .week-btn-num { font-weight: 600; font-size: 0.8rem; opacity: 0.9; }
        .week-btn-axis { font-size: 0.75rem; opacity: 0.8; }

        .week-btn-progress {
            font-size: 0.7rem;
            opacity: 0.7;
            font-variant-numeric: tabular-nums;
            min-width: 26px;
            text-align: right;
        }

        .week-btn.completed .week-btn-progress::before {
            content: '✓ ';
            color: var(--gold);
        }
        .week-btn.active .week-btn-progress::before {
            color: var(--gold-soft);
        }

        /* ═══════════════════════════════════════
           DAY DOTS — 7 κουκκίδες ανά εβδομάδα
           ═══════════════════════════════════════ */
        .day-dots {
            display: flex;
            justify-content: space-between;
            gap: 6px;
            margin-bottom: 16px;
            padding: 4px;
        }

        .day-dot {
            flex: 1;
            background: var(--bg-card);
            border: 1.5px solid var(--border-light);
            border-radius: 12px;
            padding: 10px 4px;
            font-family: 'Inter', sans-serif;
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            min-height: 52px;
        }

        .day-dot:hover, .day-dot:focus-visible {
            border-color: var(--teal-light);
            color: var(--text-secondary);
        }

        .day-dot.active {
            background: var(--teal);
            color: white;
            border-color: var(--teal);
            font-weight: 600;
        }

        .day-dot.completed {
            background: var(--gold-faint);
            border-color: var(--gold-soft);
            color: var(--gold);
        }
        .day-dot.completed.active {
            background: var(--teal);
            color: white;
            border-color: var(--teal);
        }

        .day-dot-check {
            font-size: 0.7rem;
            line-height: 1;
            height: 10px;
        }

        .day-dot.completed .day-dot-check::before { content: '✓'; }
        .day-dot.active.completed .day-dot-check::before { content: '✓'; color: var(--gold-soft); }

        /* ═══════════════════════════════════════
           BIG PRIMARY CTA — η "επόμενη κίνηση"
           ═══════════════════════════════════════ */
        .hero-card {
            background: linear-gradient(145deg, var(--bg-card), var(--bg-softer));
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 24px 22px 22px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
            position: relative;
            overflow: hidden;
        }

        .hero-eyebrow {
            font-size: 0.72rem;
            color: var(--teal);
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .hero-title {
            font-family: 'Instrument Serif', serif;
            font-size: 1.55rem;
            font-weight: 400;
            color: var(--text-primary);
            letter-spacing: -0.01em;
            line-height: 1.25;
            margin-bottom: 14px;
        }

        .hero-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 18px;
        }

        .hero-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--bg-soft);
            color: var(--text-secondary);
            font-size: 0.78rem;
            padding: 6px 12px;
            border-radius: 100px;
            font-weight: 500;
        }
        .hero-chip-icon { opacity: 0.7; font-size: 0.85rem; }

        /* ═══════════════════════════════════════
           TABS — Μάθε / Άσκηση / Αναστοχασμός
           ═══════════════════════════════════════ */
        .tabs {
            display: flex;
            gap: 4px;
            background: var(--bg-soft);
            padding: 4px;
            border-radius: 100px;
            margin-bottom: 20px;
            position: sticky;
            top: 8px;
            z-index: 20;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .tab {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 8px;
            border-radius: 100px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-height: 40px;
        }

        .tab.active {
            background: var(--bg-card);
            color: var(--teal);
            font-weight: 600;
            box-shadow: var(--shadow-sm);
        }

        .tab-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--gold);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .tab.done .tab-dot { opacity: 1; }

        /* ═══════════════════════════════════════
           TAB PANELS
           ═══════════════════════════════════════ */
        .panel {
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        .panel.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        section.card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 24px 22px;
            margin-bottom: 16px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
        }

        section.card h2 {
            font-family: 'Instrument Serif', serif;
            color: var(--teal);
            font-size: 1.45rem;
            font-weight: 400;
            margin-bottom: 14px;
            letter-spacing: -0.01em;
            line-height: 1.3;
        }

        section.card h3 {
            font-family: 'Instrument Serif', serif;
            color: var(--gold);
            font-size: 1.25rem;
            font-weight: 400;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        section.card h3::before {
            content: '';
            width: 3px;
            height: 22px;
            background: var(--gold);
            border-radius: 2px;
        }

        .lesson-body {
            line-height: 1.7;
            font-size: 1rem;
            color: var(--text-primary);
        }

        .lesson-body p + p {
            margin-top: 1em;
        }

        .lesson-body strong {
            color: var(--teal);
            font-weight: 600;
        }

        .lesson-body em {
            color: var(--text-secondary);
            font-style: italic;
        }

        /* ═══════════════════════════════════════
           EXERCISE STEPS — checklist με αέρα
           ═══════════════════════════════════════ */
        .exercise-box {
            background: linear-gradient(145deg, var(--bg-soft), var(--bg-softer));
            border-radius: var(--radius-md);
            padding: 20px 18px;
            margin-top: 8px;
            border-left: 4px solid var(--teal);
        }

        .ex-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        .ex-title {
            font-weight: 600;
            color: var(--teal);
            font-size: 1rem;
            letter-spacing: -0.01em;
        }

        .ex-timer-btn {
            background: var(--teal);
            color: white;
            border: none;
            border-radius: 100px;
            padding: 6px 14px;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
            min-height: 32px;
        }

        .ex-timer-btn:hover, .ex-timer-btn:focus-visible {
            background: var(--teal-light);
        }

        .ex-timer-btn.running {
            background: var(--gold);
            color: #1e1e1c;
        }

        .steps-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .step-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 10px 4px;
            border-radius: 10px;
            cursor: pointer;
            transition: var(--transition);
            line-height: 1.6;
            font-size: 0.96rem;
            -webkit-tap-highlight-color: transparent;
        }

        .step-item:hover {
            background: rgba(255, 255, 255, 0.4);
        }
        @media (prefers-color-scheme: dark) {
            .step-item:hover { background: rgba(255, 255, 255, 0.03); }
        }

        .step-check {
            flex-shrink: 0;
            width: 22px;
            height: 22px;
            border-radius: 7px;
            border: 1.5px solid var(--border-strong);
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: white;
            transition: var(--transition);
            margin-top: 2px;
        }

        .step-item.checked .step-check {
            background: var(--teal);
            border-color: var(--teal);
        }

        .step-item.checked .step-check::before {
            content: '✓';
        }

        .step-item.checked .step-text {
            color: var(--text-muted);
            text-decoration: line-through;
            text-decoration-color: var(--border-strong);
        }

        .step-text {
            flex: 1;
            color: var(--text-primary);
            transition: var(--transition);
        }

        /* ═══════════════════════════════════════
           BREATHING CARD
           ═══════════════════════════════════════ */
        .breath-card {
            background: var(--lav-faint);
            border-radius: var(--radius-md);
            padding: 18px 18px;
            margin-top: 8px;
            border: 1px solid var(--border-light);
        }

        .breath-card strong {
            color: var(--teal);
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
        }

        .breath-card p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.65;
        }

        /* ═══════════════════════════════════════
           REFLECTION / JOURNAL
           ═══════════════════════════════════════ */
        .reflection-q {
            background: var(--lav-faint);
            padding: 14px 18px;
            border-left: 4px solid var(--lav);
            border-radius: var(--radius-sm);
            margin-bottom: 16px;
            font-weight: 500;
            color: var(--text-primary);
            font-size: 0.98rem;
            line-height: 1.55;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 14px 16px;
            border: 1.5px solid var(--border-light);
            border-radius: var(--radius-md);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            background: var(--bg-card);
            color: var(--text-primary);
            resize: vertical;
            transition: var(--transition);
            line-height: 1.6;
        }

        textarea:focus {
            outline: none;
            border-color: var(--teal);
            box-shadow: var(--focus-ring);
        }

        .journal-status {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            min-height: 18px;
        }

        .journal-status.saved { color: var(--teal); }

        .past-entries {
            margin-top: 18px;
        }

        .past-entries-toggle {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 0.82rem;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            padding: 6px 0;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
        }
        .past-entries-toggle:hover { color: var(--teal); }
        .past-entries-toggle .chev { transition: transform 0.3s ease; font-size: 0.75rem; }
        .past-entries.open .chev { transform: rotate(180deg); }

        .past-entries-list {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease;
        }
        .past-entries.open .past-entries-list {
            max-height: 600px;
            overflow-y: auto;
        }

        .past-entry {
            background: var(--bg-soft);
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            margin-top: 10px;
            font-size: 0.9rem;
            line-height: 1.55;
        }

        .past-entry-date {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-bottom: 4px;
            font-weight: 500;
        }

        .past-entry-text {
            color: var(--text-secondary);
            white-space: pre-wrap;
        }

        /* ═══════════════════════════════════════
           INSIGHT — εμφανίζεται ΜΕΤΑ την ολοκλήρωση
           ═══════════════════════════════════════ */
        .insight-box {
            background: linear-gradient(145deg, var(--lav-faint), var(--teal-faint));
            border-radius: var(--radius-md);
            padding: 22px 22px;
            font-family: 'Instrument Serif', serif;
            font-size: 1.15rem;
            line-height: 1.55;
            color: var(--text-primary);
            border: 1px solid var(--border-light);
            text-align: center;
            position: relative;
        }

        .insight-locked {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-style: italic;
            background: var(--bg-soft);
            border-radius: var(--radius-md);
            border: 1px dashed var(--border-strong);
        }

        .insight-locked-icon {
            display: block;
            font-size: 1.5rem;
            margin-bottom: 8px;
            opacity: 0.5;
        }

        /* ═══════════════════════════════════════
           BUTTONS
           ═══════════════════════════════════════ */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--teal);
            color: white;
            border: none;
            padding: 15px 24px;
            border-radius: 100px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
            box-shadow: var(--shadow-sm);
            min-height: 52px;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active { transform: scale(0.98); }
        .btn:hover { filter: brightness(1.04); }

        .btn-big {
            padding: 18px 24px;
            font-size: 1.05rem;
            font-weight: 600;
            box-shadow: var(--shadow-md);
            min-height: 58px;
        }

        .btn-outline {
            background: transparent;
            color: var(--text-primary);
            border: 1.5px solid var(--border-strong);
            box-shadow: none;
        }
        .btn-outline:hover {
            border-color: var(--teal);
            background: var(--bg-soft);
            color: var(--teal);
        }

        .btn-done {
            background: var(--gold);
            color: #1e1e1c;
        }

        .btn-done::before { content: '✓'; font-weight: 700; }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .btn-row .btn { flex: 1; }

        /* ═══════════════════════════════════════
           FOCUS MODE — μόνο τα βήματα + timer
           ═══════════════════════════════════════ */
        .focus-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-page);
            z-index: 200;
            overflow-y: auto;
            display: none;
            animation: fadeIn 0.3s ease-out;
        }
        .focus-overlay.active { display: block; }

        .focus-inner {
            max-width: 540px;
            margin: 0 auto;
            padding: 24px 20px 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .focus-close {
            align-self: flex-end;
            background: var(--bg-soft);
            border: 1px solid var(--border-light);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            margin-bottom: 20px;
        }
        .focus-close:hover { background: var(--border-light); }

        .focus-title {
            font-family: 'Instrument Serif', serif;
            font-size: 1.5rem;
            color: var(--teal);
            text-align: center;
            margin-bottom: 8px;
            line-height: 1.25;
        }

        .focus-sub {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 32px;
        }

        /* Timer display */
        .timer-ring-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 28px;
        }

        .timer-ring {
            width: 180px;
            height: 180px;
            position: relative;
        }

        .timer-ring svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .timer-track {
            stroke: var(--border-light);
            stroke-width: 6;
            fill: none;
        }

        .timer-progress {
            stroke: var(--teal);
            stroke-width: 6;
            fill: none;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.9s linear;
        }

        .timer-text {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-variant-numeric: tabular-nums;
        }

        .timer-digits {
            font-family: 'Instrument Serif', serif;
            font-size: 2.6rem;
            color: var(--text-primary);
            line-height: 1;
        }

        .timer-label {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-top: 4px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .timer-controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .timer-btn {
            background: var(--bg-card);
            border: 1.5px solid var(--border-light);
            color: var(--text-primary);
            padding: 10px 20px;
            border-radius: 100px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            min-height: 44px;
            min-width: 110px;
        }
        .timer-btn:hover { border-color: var(--teal); }
        .timer-btn.primary { background: var(--teal); color: white; border-color: var(--teal); }

        .focus-steps {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 20px 18px;
            margin-bottom: 20px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
        }

        .focus-steps-title {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        /* ═══════════════════════════════════════
           HOME FAB
           ═══════════════════════════════════════ */
        .home-float {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            color: var(--teal);
            border: 1px solid var(--border-light);
            padding: 12px 22px;
            border-radius: 100px;
            font-family: 'Inter', sans-serif;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: var(--shadow-md);
            z-index: 100;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: var(--transition);
            min-height: 42px;
        }

        @media (prefers-color-scheme: dark) {
            .home-float {
                background: rgba(30, 31, 28, 0.9);
                color: var(--teal-light);
            }
        }

        .home-float:hover {
            background: var(--teal);
            color: white;
            border-color: var(--teal);
        }

        /* ═══════════════════════════════════════
           TOAST
           ═══════════════════════════════════════ */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--teal);
            color: white;
            padding: 12px 22px;
            border-radius: 100px;
            font-size: 0.9rem;
            font-weight: 500;
            box-shadow: var(--shadow-lg);
            z-index: 300;
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* ═══════════════════════════════════════
           STREAK BADGE
           ═══════════════════════════════════════ */
        .streak-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--gold-faint);
            color: var(--gold);
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 0.72rem;
            font-weight: 600;
            margin-left: 8px;
        }

        /* ═══════════════════════════════════════
           RESPONSIVE
           ═══════════════════════════════════════ */
        @media (max-width: 420px) {
            body { font-size: 16px; }
            .container { padding: 14px 12px 40px; }
            header { padding: 22px 18px 20px; }
            header h1 { font-size: 1.55rem; }
            .hero-card { padding: 22px 18px 18px; }
            .hero-title { font-size: 1.4rem; }
            section.card { padding: 20px 18px; }
            .tab { font-size: 0.8rem; padding: 9px 4px; }
            .timer-ring { width: 160px; height: 160px; }
            .timer-digits { font-size: 2.3rem; }
        }

        @media (min-width: 520px) {
            .week-grid-inner { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header>
            <h1>Τετραπλός Άξονας</h1>
            <div class="header-sub">Σώμα · Αναπνοή · Προσοχή · Χώρος</div>
            <div class="header-row">
                <div class="header-week" id="headerWeek">Εβδομάδα 1 · Σώμα</div>
                <div class="header-day-num" id="headerDayNum">1 / 56</div>
            </div>
            <div class="header-day-title" id="headerDay">Ημέρα 1</div>
            <div class="progress-track">
                <div class="progress-fill" id="progressFill" style="width:0%"></div>
            </div>
        </header>

        <!-- WEEK PICKER (collapsed) -->
        <div class="week-picker" id="weekPicker">
            <button class="week-picker-header" onclick="toggleWeekPicker()" aria-expanded="false">
                <span class="week-picker-label">
                    <span class="week-picker-dot"></span>
                    <span id="weekPickerCurrent">Εβδομάδα 1 από 8</span>
                    <span id="streakBadge"></span>
                </span>
                <span class="week-picker-chevron">▾</span>
            </button>
            <div class="week-grid">
                <div class="week-grid-inner" id="weekGrid"></div>
            </div>
        </div>

        <!-- DAY DOTS -->
        <div class="day-dots" id="dayDots" role="tablist" aria-label="Ημέρες της εβδομάδας"></div>

        <!-- HERO CARD -->
        <div class="hero-card">
            <div class="hero-eyebrow" id="heroEyebrow">Άξονας: Σώμα</div>
            <h1 class="hero-title" id="heroTitle">Νιώσε τα Πέλματα</h1>
            <div class="hero-meta" id="heroMeta"></div>
            <button class="btn btn-big" onclick="startFocus()">
                <span>🎯</span>
                <span>Ξεκίνα άσκηση</span>
            </button>
        </div>

        <!-- TABS -->
        <nav class="tabs" role="tablist">
            <button class="tab active" data-tab="learn" onclick="switchTab('learn')" role="tab" aria-selected="true">
                Μάθε
                <span class="tab-dot"></span>
            </button>
            <button class="tab" data-tab="practice" onclick="switchTab('practice')" role="tab" aria-selected="false">
                Πρακτική
                <span class="tab-dot"></span>
            </button>
            <button class="tab" data-tab="reflect" onclick="switchTab('reflect')" role="tab" aria-selected="false">
                Αναστοχασμός
                <span class="tab-dot"></span>
            </button>
        </nav>

        <!-- PANEL: LEARN -->
        <div class="panel active" id="panel-learn" role="tabpanel">
            <section class="card">
                <h2 id="lessonTitle"></h2>
                <div class="lesson-body" id="lessonBody"></div>
            </section>
        </div>

        <!-- PANEL: PRACTICE -->
        <div class="panel" id="panel-practice" role="tabpanel">
            <section class="card">
                <h3>Άσκηση</h3>
                <div id="exerciseContainer"></div>
            </section>

            <section class="card">
                <h3>Αναπνοή</h3>
                <div class="breath-card" id="breathCard"></div>
            </section>

            <button class="btn btn-big btn-done" id="practiceBtn" onclick="markDone()">
                Ολοκλήρωσα τη σημερινή άσκηση
            </button>
        </div>

        <!-- PANEL: REFLECT -->
        <div class="panel" id="panel-reflect" role="tabpanel">
            <section class="card">
                <h3>Αναστοχασμός</h3>
                <div class="reflection-q" id="reflectionQ"></div>
                <textarea id="journal" placeholder="Τι παρατήρησα σήμερα;" oninput="autoSaveJournal()"></textarea>
                <div class="journal-status" id="journalStatus"></div>

                <div class="past-entries" id="pastEntries">
                    <button class="past-entries-toggle" onclick="togglePastEntries()" aria-expanded="false">
                        <span class="chev">▾</span>
                        <span id="pastEntriesLabel">Δες προηγούμενες σημειώσεις</span>
                    </button>
                    <div class="past-entries-list" id="pastEntriesList"></div>
                </div>
            </section>

            <section class="card">
                <h3>Ανοιχτός Χώρος</h3>
                <div id="insightWrap">
                    <div class="insight-locked" id="insightLocked">
                        <span class="insight-locked-icon">◯</span>
                        Θα εμφανιστεί αφού ολοκληρώσεις την άσκηση σήμερα.
                    </div>
                    <div class="insight-box" id="insightBox" style="display:none;"></div>
                </div>
            </section>

            <div class="btn-row">
                <button class="btn btn-outline" onclick="go(-1)">← Προηγούμενη</button>
                <button class="btn btn-outline" onclick="go(1)">Επόμενη →</button>
            </div>
        </div>
    </div>

    <button class="home-float" onclick="goHome()" aria-label="Αρχική σελίδα">← Αρχική</button>

    <!-- FOCUS MODE OVERLAY -->
    <div class="focus-overlay" id="focusOverlay" role="dialog" aria-label="Άσκηση σε focus mode">
        <div class="focus-inner">
            <button class="focus-close" onclick="closeFocus()" aria-label="Κλείσιμο">✕</button>
            <div class="focus-title" id="focusTitle"></div>
            <div class="focus-sub" id="focusSub"></div>

            <div class="timer-ring-wrap">
                <div class="timer-ring">
                    <svg viewBox="0 0 200 200">
                        <circle class="timer-track" cx="100" cy="100" r="92"></circle>
                        <circle class="timer-progress" id="timerProgress" cx="100" cy="100" r="92"
                                stroke-dasharray="578" stroke-dashoffset="0"></circle>
                    </svg>
                    <div class="timer-text">
                        <div class="timer-digits" id="timerDigits">00:00</div>
                        <div class="timer-label" id="timerLabel">έτοιμο</div>
                    </div>
                </div>
                <div class="timer-controls">
                    <button class="timer-btn primary" id="timerStartBtn" onclick="timerToggle()">Ξεκίνα</button>
                    <button class="timer-btn" onclick="timerReset()">Reset</button>
                </div>
            </div>

            <div class="focus-steps">
                <div class="focus-steps-title">Βήματα</div>
                <div id="focusSteps"></div>
            </div>

            <button class="btn btn-big btn-done" onclick="markDoneFromFocus()">
                Ολοκλήρωσα
            </button>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════
// DATA — ΤΟ ΠΕΡΙΕΧΟΜΕΝΟ ΠΑΡΑΜΕΝΕΙ ΑΚΡΙΒΩΣ ΙΔΙΟ
// ═══════════════════════════════════════

const AXES = [
    { name: 'Σώμα', icon: '◆', weeks: [1,2] },
    { name: 'Αναπνοή', icon: '◆', weeks: [3,4] },
    { name: 'Προσοχή', icon: '◆', weeks: [5,6] },
    { name: 'Χώρος', icon: '◆', weeks: [7,8] },
];

function ax(w) { return AXES.find(a => a.weeks.includes(w)); }

const D = {
1: {
  title: 'Η Σταθερότητα του «Εδώ»',
  days: [
    { title: 'Νιώσε τα Πέλματα', where: 'Οπουδήποτε', dur: '2-3 λεπτά', lesson: '<p>Το σώμα είναι η αναμφισβήτητη βάση της παρούσας στιγμής. Σήμερα ξεκινάμε από το πιο απλό: τα σημεία που αγγίζουν τη γη.</p><p>Σταθείτε ή καθίστε. Νιώστε τα πέλματα — την πίεση, τη θερμότητα, την επαφή με το έδαφος. Απλώς παρατηρήστε, χωρίς να αλλάξετε τίποτα.</p>', exercise: { title: 'Παρατήρηση Επαφής', steps: ['Σταθείτε ή καθίστε με άνεση.', 'Κλείστε τα μάτια αν θέλετε.', 'Νιώστε τα σημεία επαφής με τη γη — πέλματα ή λεκάνη.', 'Υπάρχει πίεση; Θερμότητα; Ισορροπία;', 'Μείνετε εκεί για 2 λεπτά. Απλώς παρατηρήστε.'] }, breathing: '<strong>Φυσική Παρατήρηση (2 λεπτά)</strong><p>Δεν ελέγχετε την αναπνοή. Απλώς παρατηρήστε πώς αναπνέετε φυσικά ενώ νιώθετε τα πέλματα.</p>', reflection: 'Ποιο ήταν το πρώτο πράγμα που ένιωσα;', insight: 'Η βαρύτητα είναι πάντα εδώ. Το σώμα είναι πάντα εδώ. Αυτό είναι αρκετό για να ξεκινήσουμε.' },
    { title: 'Νιώσε τον Άξονα', where: 'Ήσυχο μέρος', dur: '3-5 λεπτά', lesson: '<p>Το σώμα δεν είναι μόνο πόδια στη γη — έχει δομή. Φαντάστε μια γραμμή που ανεβαίνει μέσα σας: από τα πέλματα, μέσω της λεκάνης, τη σπονδυλική στήλη, μέχρι την κορυφή του κεφαλιού.</p><p>Αυτός ο κατακόρυφος άξονας σας κρατά. Δεν χρειάζεται να τον «φτιάξετε» — αρκεί να τον αναγνωρίσετε.</p>', exercise: { title: 'Ο Κατακόρυφος Άξονας', steps: ['Σταθείτε ή καθίστε.', 'Νιώστε πρώτα τα πέλματα (από χθες).', 'Τώρα φαντάστε μια γραμμή: πέλματα → λεκάνη → στομάχι → καρδιά → λαιμός → κεφάλι.', 'Νιώστε πώς αυτή η γραμμή σας κρατά όρθιους.', 'Μείνετε εδώ 3 λεπτά.'] }, breathing: '<strong>Αναπνοή Άξονα (3 λεπτά)</strong><p>Παρατηρήστε πώς η αναπνοή κινείται κατά μήκος αυτής της γραμμής. Η σπονδυλική στήλη είναι σαν κανάλι για τη ροή.</p>', reflection: 'Μπόρεσα να νιώσω τον άξονα; Πού τον αισθάνομαι περισσότερο;', insight: 'Ο άξονας σας είναι πάντα εκεί — ακόμη κι αν δεν τον προσέχετε. Σήμερα τον αναγνωρίσατε.' },
    { title: 'Νιώσε τη Βαρύτητα', where: 'Σπίτι ή ήσυχο μέρος', dur: '3 λεπτά', lesson: '<p>Η βαρύτητα δεν είναι εχθρός — είναι η απόδειξη του «Εδώ». Μας δείχνει, χωρίς αμφιβολία, ακριβώς το σημείο στο οποίο υπάρχουμε αυτή τη στιγμή.</p><p>Αφήστε το βάρος σας να πέσει προς τα κάτω — όχι με δύναμη, απλώς αφήστε το. Η γείωση είναι η πρώτη πράξη χαλάρωσης.</p>', exercise: { title: 'Παράδοση στη Βαρύτητα', steps: ['Σταθείτε ή καθίστε.', 'Νιώστε τα πέλματα + τον άξονα.', 'Τώρα: αφήστε το βάρος να βυθιστεί στη γη.', 'Νιώστε τη βαρύτητα που σας τραβάει — δεν αντιστέκεστε.', 'Παρατηρήστε: το σώμα γίνεται πιο σταθερό, πιο ήρεμο.'] }, breathing: '<strong>Βαρύτητα Αναπνοή (3 λεπτά)</strong><p>Στην εκπνοή, αφήστε τον εαυτό σας να γίνει πιο βαρύς. Στην εισπνοή, νιώστε τη γη να σας υποστηρίζει.</p>', reflection: 'Τι ένιωσα όταν άφησα το βάρος; Ήταν ανακούφιση ή δυσφορία;', insight: 'Η βαρύτητα δεν σας πατάει — σας αγκαλιάζει. Είναι η σταθερότητά σας.' },
    { title: 'Η Άσκηση του Βιβλίου', where: 'Σπίτι', dur: '5 λεπτά', lesson: '<p>Αυτή είναι μια κλασική άσκηση από τον οδηγό. Τοποθετείτε ένα βιβλίο ή κουτί στο κεφάλι σας και παρατηρείτε τι κάνει το σώμα μόνο του.</p><p>Δεν πρέπει να «φτιάξετε» τη στάση — απλώς παρατηρείτε πώς ο οργανισμός αυτορυθμίζεται. Όταν προσέχετε, το σώμα ευθυγραμμίζεται φυσικά.</p>', exercise: { title: 'Το Βιβλίο στο Κεφάλι', steps: ['Σταθείτε όρθιοι.', 'Τοποθετήστε ένα βιβλίο ή κουτί στο κεφάλι (προαιρετικό).', 'Παρατηρήστε πώς χρειάζεται να σταθείτε για να μην πέσει.', 'Νιώστε πώς το βάρος κατεβαίνει μέσα από τον λαιμό, τη σπονδυλική στήλη, τη λεκάνη.', 'Αφαιρέστε το βιβλίο — η αίσθηση δομής παραμένει.'] }, breathing: '<strong>Σταθερότητα Αναπνοή (5 λεπτά)</strong><p>Καθίστε όρθια. Αναπνέετε φυσικά. Παρατηρήστε πώς ο άξονας υποστηρίζει την αναπνοή.</p>', reflection: 'Ποιο μέρος του σώματος αντέδρασε πρώτο;', insight: 'Δεν κάνετε τίποτα. Απλώς παρατηρείτε — και το σώμα ανταποκρίνεται.' },
    { title: 'Πέλματα + Άξονας + Βαρύτητα', where: 'Οπουδήποτε', dur: '3-5 λεπτά', lesson: '<p>Σήμερα ενώνετε τα τρία στοιχεία που μάθατε: πέλματα, άξονας, βαρύτητα. Δεν είναι τρία ξεχωριστά πράγματα — είναι μία ενιαία αίσθηση γείωσης.</p>', exercise: { title: 'Ολοκληρωμένη Γείωση', steps: ['Κλείστε τα μάτια (προαιρετικά).', 'Νιώστε τα πέλματα — αγγίζουν τη γη.', 'Νιώστε τον άξονα — η γραμμή μέσα σας.', 'Νιώστε τη βαρύτητα — η δύναμη που σας σταθεροποιεί.', 'Ανοίξτε τα μάτια. Όλα μαζί, ταυτόχρονα.'] }, breathing: '<strong>Ολοκληρωμένη Αναπνοή (5 λεπτά)</strong><p>Κρατήστε και τα τρία: πέλματα, άξονας, βαρύτητα. Η αναπνοή τα συνδέει. Αφήστε τη να ρέει μέσα από τη δομή.</p>', reflection: 'Μπόρεσα να νιώσω και τα τρία; Ποιο νιώθω πιο δυνατά;', insight: 'Δεν έχετε τρία πράγματα. Έχετε ένα σώμα που ξέρει πώς να σταθεί.' },
    { title: 'Μικρές Επιστροφές', where: 'Σε όλη την ημέρα', dur: '6 × 30 δευτερόλεπτα', lesson: '<p>Σήμερα δεν κάνετε μια μεγάλη άσκηση. Κάνετε 5-6 μικρές, σε διάφορες στιγμές της ημέρας. Η συνέπεια σε μικρές δόσεις είναι πιο σημαντική από τη διάρκεια.</p>', exercise: { title: '6 Σημεία Γείωσης', steps: ['Όταν ξυπνάτε: 30" γείωση.', 'Πριν φάτε: 30" γείωση.', 'Στη μέση της εργασίας: 30" γείωση.', 'Μετά από κάτι δύσκολο: 30" γείωση.', 'Πριν κοιμηθείτε: 30" γείωση.', 'Κάθε φορά: πέλματα → άξονας → βαρύτητα → παρατηρώ.'] }, breathing: '<strong>6 Μικρές Αναγνωρίσεις (30" η κάθε μία)</strong><p>Σταματήστε και νιώστε. Χωρίς κρίση, χωρίς ανάλυση. Απλώς τι υπάρχει, τώρα.</p>', reflection: 'Πόσες φορές θυμήθηκα να σταματήσω; Τι ήταν διαφορετικό κάθε φορά;', insight: 'Η παρουσία δεν χρειάζεται ώρες. Αρχίζει με νίκες λίγων δευτερολέπτων.' },
    { title: 'Πού Κρατάω Ένταση;', where: 'Ήσυχο μέρος', dur: '5 λεπτά', lesson: '<p>Το σώμα είναι ζωντανό αρχείο εμπειριών. Η στάση μας κουβαλά συχνά ένταση — σαγόνι, ώμοι, πλάτη, λεκάνη. Αυτές οι εντάσεις δεν είναι πρόβλημα. Είναι πληροφορία.</p><p><em>Σημαντικό: Η αλλαγή παίρνει χρόνο. Μην πιέζετε τον εαυτό σας. Η ηπιότητα είναι η μεγαλύτερη πράξη αυτορρύθμισης.</em></p>', exercise: { title: 'Σάρωση Έντασης', steps: ['Γειώσου: πέλματα → άξονας → βαρύτητα.', 'Σαρώστε αργά: σαγόνι → λαιμός → ώμοι → πλάτη → κοιλιά → λεκάνη.', 'Πού νιώθετε σφίξιμο;', 'Με κάθε εκπνοή, αφήστε αυτή την περιοχή να μαλακώσει ελαφρά.', 'Δεν διορθώνετε τίποτα — απλώς αφήνετε χώρο.'] }, breathing: '<strong>Αποδέσμευση Έντασης (5 λεπτά)</strong><p>Παρατηρήστε πού κρατάτε ένταση. Με κάθε εκπνοή, αφήστε αυτή την περιοχή να χαλαρώσει. Ο άξονας βοηθά φυσικά.</p>', reflection: 'Πού κρατούσα ένταση; Τι έμαθα για το σώμα μου αυτή την εβδομάδα;', insight: 'Δεν χρειάζεται να «διορθώσετε» τίποτα. Τίποτα δεν είναι σπασμένο. Ο στόχος είναι να επιστρέφετε, απαλά, στη ζωντανή σας παρουσία.' }
  ]
},
2: {
  title: 'Σώμα σε Κίνηση',
  days: [
    { title: 'Γείωση στον Χώρο', where: 'Διαφορετικοί χώροι', dur: '3 λεπτά', lesson: '<p>Η βαθιά χαλαρότητα μέσα στο σώμα προϋποθέτει πάντα την επίγνωση του χώρου. Σήμερα δοκιμάστε τη γείωση σε διαφορετικά μέρη: σπίτι, γραφείο, δρόμος.</p><p>Όταν ο χώρος γίνεται αντιληπτός ως ανοιχτός, το σώμα λαμβάνει «άδεια» να χαλαρώσει.</p>', exercise: { title: 'Γείωση σε 3 Χώρους', steps: ['Δοκιμάστε τη γείωση (πέλματα, άξονας, βαρύτητα) σε 3 διαφορετικούς χώρους.', 'Σπίτι: Πώς νιώθει;', 'Δρόμος ή πάρκο: Τι αλλάζει;', 'Γραφείο ή δημόσιος χώρος: Πόσο εύκολα χαλαρώνετε;', 'Παρατηρήστε: Πού νιώθετε πιο ασφαλείς;'] }, breathing: '<strong>Γείωση σε Χώρο (3 λεπτά ανά χώρο)</strong><p>Ίδια γείωση, διαφορετικός χώρος. Τι αλλάζει;</p>', reflection: 'Σε ποιον χώρο ήταν πιο εύκολη η γείωση; Γιατί;', insight: 'Η αληθινή γείωση επιτυγχάνεται μόνο σε χώρο που νιώθουμε ότι μας χωρά.' },
    { title: 'Γείωση σε Περπάτημα', where: 'Εξωτερικός χώρος', dur: '5 λεπτά', lesson: '<p>Η γείωση δεν χρειάζεται ακινησία. Σήμερα περπατήστε αργά, νιώθοντας τα πέλματα να αγγίζουν τη γη σε κάθε βήμα. Ο άξονας κινείται μαζί σας.</p>', exercise: { title: 'Ενσυνείδητο Περπάτημα', steps: ['Ξεκινήστε να περπατάτε αργά.', 'Νιώστε κάθε βήμα: φτέρνα → πέλμα → δάχτυλα.', 'Κρατήστε τον άξονα ζωντανό μέσα σας.', 'Αφήστε τη βαρύτητα σε κάθε βήμα.', '5 λεπτά. Χωρίς προορισμό.'] }, breathing: '<strong>Αναπνοή Βημάτων (5 λεπτά)</strong><p>Συγχρονίστε τα βήματα με την αναπνοή. 3 βήματα εισπνοή, 3 βήματα εκπνοή — ή ό,τι νιώθετε φυσικό.</p>', reflection: 'Πώς ήταν να νιώθω τη γη σε κάθε βήμα;', insight: 'Η γη σας κρατά σε κάθε βήμα. Δεν χρειάζεται να σταματήσετε για να είστε παρόντες.' },
    { title: 'Απόδραση από τα Σενάρια', where: 'Οπουδήποτε', dur: '3 λεπτά', lesson: '<p>Όταν ο νους δεν έχει σταθερή βάση στο παρόν, πέφτει στην παγίδα της εσωτερικής ανάλυσης. Η εστίαση στη βαρύτητα μας δίνει τη δυνατότητα να βγούμε από τα νοητικά σενάρια.</p><p>Δεν χρειάζεται ανάλυση. Αρκεί η επιστροφή στο σώμα.</p>', exercise: { title: 'Επιστροφή στο «Εδώ»', steps: ['Παρατηρήστε: Ο νους σας «τρέχει»;', 'Μην αναλύετε τη σκέψη.', 'Απλώς γείωση: πέλματα → άξονας → βαρύτητα.', 'Μείνετε στην αίσθηση του σώματος.', 'Αν ο νους φύγει πάλι, επιστρέψτε χωρίς κριτική.'] }, breathing: '<strong>Βαρύτητα αντί Ανάλυσης (3 λεπτά)</strong><p>Κάθε φορά που πιάνετε τον εαυτό σας να αναλύει, επιστρέψτε στην αίσθηση του βάρους. Η βαρύτητα είναι αναμφίβολη.</p>', reflection: 'Πόσες φορές «έφυγε» ο νους και πόσες φορές επέστρεψα;', insight: 'Ο ανοιχτός νους δεν αναλύει ούτε κρίνει — κατανοεί τις αιτίες χωρίς λέξεις.' },
    { title: 'Σώμα και Χώρος Μαζί', where: 'Ήσυχο μέρος', dur: '5 λεπτά', lesson: '<p>Το σώμα και ο χώρος συνεργάζονται. Σήμερα, μετά τη γείωση, αφήστε την προσοχή να περιλάβει και τον χώρο γύρω σας — χωρίς να χάσετε την αίσθηση του σώματος.</p>', exercise: { title: 'Σώμα + Χώρος', steps: ['Γείωση: πέλματα, άξονας, βαρύτητα.', 'Κρατήστε αυτή την αίσθηση.', 'Τώρα προσθέστε: τι ακούτε γύρω σας;', 'Τι νιώθετε στο δέρμα; (αέρας, θερμοκρασία)', 'Νιώστε σώμα ΚΑΙ χώρο ταυτόχρονα — 5 λεπτά.'] }, breathing: '<strong>Αναπνοή Σώματος-Χώρου (5 λεπτά)</strong><p>Στην εισπνοή νιώστε τον χώρο. Στην εκπνοή νιώστε το σώμα. Σιγά σιγά: και τα δύο μαζί.</p>', reflection: 'Μπόρεσα να νιώσω σώμα και χώρο ταυτόχρονα;', insight: 'Η αληθινή γείωση δεν είναι απομόνωση — είναι σύνδεση με τα πάντα γύρω σας.' },
    { title: 'Γείωση σε Ένταση', where: 'Πριν ή μετά από κάτι δύσκολο', dur: '2 λεπτά', lesson: '<p>Σήμερα χρησιμοποιήστε τη γείωση σε στιγμή πραγματικής έντασης ή πίεσης. Αυτό είναι η δοκιμασία: η πρακτική μεταφέρεται στη ζωή;</p>', exercise: { title: 'Γείωση στη Φωτιά', steps: ['Πριν μια δύσκολη κλήση, συνάντηση ή κατάσταση:', 'Γρήγορη γείωση: πέλματα → άξονας → βαρύτητα (10").', 'Μπείτε στην κατάσταση.', 'Μετά: ξανά γείωση — τι άλλαξε;', 'Σημειώστε: βοήθησε;'] }, breathing: '<strong>Γρήγορη Επαναφορά (30")</strong><p>Πέλματα. Άξονας. Βαρύτητα. Εκπνοή. Είστε εδώ.</p>', reflection: 'Βοήθησε η γείωση πριν τη δύσκολη στιγμή;', insight: 'Η γείωση δεν είναι μόνο για ήσυχες στιγμές. Είναι εργαλείο για τη ζωή.' },
    { title: 'Παρατηρήσεις Σε Όλη την Ημέρα', where: 'Παντού', dur: '6 × 30"', lesson: '<p>Όπως την Εβδομάδα 1, 5-6 μικρές στάσεις στη μέρα. Αλλά τώρα παρατηρείτε και πώς αλλάζει η αίσθηση σε διαφορετικές καταστάσεις.</p>', exercise: { title: '6 Στιγμές Γείωσης', steps: ['Πρωί: πώς ξυπνά το σώμα;', 'Μεσημέρι: πόση ένταση μαζεύτηκε;', 'Απόγευμα: πού κρατάω ένταση τώρα;', 'Βράδυ: πώς αλλάζει η βαρύτητα;', 'Σε κάθε στιγμή: γείωση → παρατήρηση → αποδέσμευση.'] }, breathing: '<strong>6 Στιγμές Επίγνωσης</strong><p>Σταματήστε. Νιώστε. Αφήστε. Συνεχίστε.</p>', reflection: 'Τι μοτίβα παρατήρησα στο σώμα μου μέσα στη μέρα;', insight: 'Η επιμονή στην ηπιότητα είναι η μεγαλύτερη πράξη αυτορρύθμισης.' },
    { title: 'Ανασκόπηση Εβδομάδας 2', where: 'Ήσυχο μέρος', dur: '10 λεπτά', lesson: '<p>2 εβδομάδες ολοκληρώθηκαν. Σήμερα μια πλήρης πρακτική 10 λεπτών: όλα όσα έχετε μάθει, σε μια ενιαία εμπειρία.</p>', exercise: { title: 'Ενιαία Πρακτική 10 Λεπτών', steps: ['Γείωση — πέλματα, άξονας, βαρύτητα (3 λεπτά).', 'Επίγνωση έντασης, αποδέσμευση με εκπνοή (3 λεπτά).', 'Σώμα + χώρος: και τα δύο μαζί (3 λεπτά).', 'Κλείστε με αναστοχασμό: τι άλλαξε;', 'Αύριο: μπαίνουμε στον άξονα της Αναπνοής.'] }, breathing: '<strong>Ενιαία Αναπνοή (10 λεπτά)</strong><p>Η αναπνοή συνδέει όλα τα στοιχεία. Είναι η γέφυρα από το σώμα στον χώρο.</p>', reflection: 'Τι κέρδισα αυτές τις 2 εβδομάδες; Τι δυσκολεύτηκα;', insight: 'Το σώμα δεν είναι φυλακή — είναι το σπίτι μας. Έχετε ξεκινήσει να κατοικείτε σε αυτό.' }
  ]
},
3: {
  title: 'Ο Ρυθμός του «Τώρα»',
  days: [
    { title: 'Παρατήρηση Φυσικής Αναπνοής', where: 'Ήσυχο μέρος', dur: '5 λεπτά', lesson: '<p>Η αναπνοή είναι ο δεύτερος άξονας. Αλλά πριν τη «δουλέψουμε», απλώς την παρατηρούμε. Σήμερα: τίποτα δεν αλλάζει. Μόνο ακούμε.</p>', exercise: { title: 'Ακρόαση Αναπνοής', steps: ['Γειωθείτε (2 λεπτά).', 'Κλείστε τα μάτια.', 'Παρατηρήστε την αναπνοή όπως ακριβώς είναι — ρηχή, βαθιά, γρήγορη.', 'Μην την αλλάξετε.', 'Πού την νιώθετε; Μύτη; Στήθος; Κοιλιά;'] }, breathing: '<strong>Φυσική Αναπνοή (5 λεπτά)</strong><p>Δεν κάνετε τίποτα. Αφήνετε την αναπνοή να είναι αυτή που είναι.</p>', reflection: 'Πώς είναι η αναπνοή μου σήμερα; Πού την αισθάνομαι πιο έντονα;', insight: 'Η αναπνοή σας υπάρχει εδώ και δεκαετίες. Σήμερα ίσως την ακούσατε για πρώτη φορά.' },
    { title: 'Αναπνοή Κοιλιάς', where: 'Ήσυχο μέρος', dur: '5 λεπτά', lesson: '<p>Η διαφραγματική αναπνοή (από την κοιλιά) ενεργοποιεί το παρασυμπαθητικό νευρικό σύστημα — το σύστημα ηρεμίας. Είναι η πιο θεμελιώδης πρακτική αυτορρύθμισης.</p>', exercise: { title: 'Αναπνοή Διαφράγματος', steps: ['Ξαπλώστε ή καθίστε.', 'Τοποθετήστε ένα χέρι στο στήθος, ένα στην κοιλιά.', 'Αναπνεύστε: Η κοιλιά ανεβαίνει πρώτη, μετά το στήθος.', 'Εκπνοή: Η κοιλιά κατεβαίνει πρώτη.', 'Όχι υπερανάσα — απλά, σταθερά, βαθιά.'] }, breathing: '<strong>Κοιλιακή Αναπνοή (5 λεπτά)</strong><p>Εισπνοή 4" → Εκπνοή 6". Η εκπνοή μεγαλύτερη ενεργοποιεί παρασυμπαθητικό.</p>', reflection: 'Τι διαφορά ένιωσα μεταξύ στηθικής και κοιλιακής αναπνοής;', insight: 'Η αναπνοή που μαθαίνουμε εδώ είναι η πιο βασική μορφή αυτοφροντίδας που έχετε.' },
    { title: 'Ο Ρυθμός της Εκπνοής', where: 'Ήσυχο μέρος', dur: '5 λεπτά', lesson: '<p>Η εκπνοή, μεγαλύτερη από την εισπνοή, είναι το κλειδί για χαλάρωση. Σήμερα εστιάζετε στο πώς η εκπνοή «αφήνει».</p>', exercise: { title: 'Μακριά Εκπνοή', steps: ['Εισπνοή 4 δευτερόλεπτα από μύτη.', 'Εκπνοή 6-7 δευτερόλεπτα από στόμα (σαν να σβήνετε κερί).', 'Επανάληψη. Μείνετε ήρεμοι — όχι υπερβολή.', 'Παρατηρήστε: η καρδιά επιβραδύνει;', '5 λεπτά.'] }, breathing: '<strong>4-7 Αναπνοή (5 λεπτά)</strong><p>Εισπνοή 4. Εκπνοή 7. Ο βαγονικός τόνος ανεβαίνει, το άγχος πέφτει.</p>', reflection: 'Τι άλλαξε μέσα μου μετά από 5 λεπτά μακριάς εκπνοής;', insight: 'Η εκπνοή σας λέει: «Είστε ασφαλείς. Μπορείτε να αφήσετε».' },
    { title: 'Αναπνοή 4-4-4-4 (Box Breath)', where: 'Οπουδήποτε', dur: '5 λεπτά', lesson: '<p>Το box breath είναι εργαλείο των Navy SEALs και αστροναυτών για ηρεμία υπό πίεση. Ισομερής, τετράγωνος ρυθμός.</p>', exercise: { title: 'Box Breath', steps: ['Εισπνοή 4 δευτερόλεπτα.', 'Κρατήστε 4 δευτερόλεπτα.', 'Εκπνοή 4 δευτερόλεπτα.', 'Κρατήστε 4 δευτερόλεπτα.', 'Επανάληψη. Φανταστείτε ένα τετράγωνο.'] }, breathing: '<strong>Box Breath (5 λεπτά)</strong><p>4-4-4-4. Σταθερό. Ρυθμικό. Το σώμα μπαίνει σε coherence.</p>', reflection: 'Πώς νιώθω μετά από 5 λεπτά box breath;', insight: 'Όταν ο ρυθμός είναι σταθερός, ο νους δεν έχει πού να φύγει.' },
    { title: 'Αναπνοή σε Δύσκολη Στιγμή', where: 'Σε ένταση', dur: '2 λεπτά', lesson: '<p>Σήμερα εφαρμόζετε την αναπνοή σε μια πραγματική στιγμή άγχους ή πίεσης. Αυτό είναι το πραγματικό τεστ.</p>', exercise: { title: 'Αντίδοτο Άγχους', steps: ['Αναγνωρίστε: «Είμαι ενεργοποιημένος/η».', 'Σταματήστε. Μην αντιδράσετε.', '3 κύκλοι: Εισπνοή 4, Εκπνοή 7 (ή μακρύτερη).', 'Γειωθείτε στα πέλματα την ίδια στιγμή.', 'Τώρα αποφασίστε πώς θα αντιδράσετε.'] }, breathing: '<strong>Γρήγορη Επαναφορά (60")</strong><p>Σε οποιαδήποτε ένταση: 3 κύκλοι εκπνοής, πέλματα στη γη. Ξαναβρίσκετε το εαυτό σας.</p>', reflection: 'Βοήθησε η αναπνοή στη δύσκολη στιγμή;', insight: 'Μεταξύ ερεθίσματος και αντίδρασης υπάρχει ένα διάστημα. Η αναπνοή είναι αυτό το διάστημα.' },
    { title: 'Αναπνοή + Γείωση Μαζί', where: 'Ήσυχο μέρος', dur: '10 λεπτά', lesson: '<p>Σήμερα συνδυάζετε τους δύο πρώτους άξονες: Σώμα (γείωση) + Αναπνοή (ρυθμός). Είναι η βάση για όλα όσα έρχονται.</p>', exercise: { title: 'Σώμα + Αναπνοή', steps: ['Γείωση: πέλματα, άξονας, βαρύτητα (3 λεπτά).', 'Αναπνοή: 4-7 ή box breath (3 λεπτά).', 'Τώρα: και τα δύο μαζί (4 λεπτά).', 'Νιώστε πώς η αναπνοή κινείται μέσα από τον άξονα.', 'Το σώμα γείωση, η αναπνοή ροή.'] }, breathing: '<strong>Ενιαία Παρουσία (10 λεπτά)</strong><p>Δύο άξονες. Μία παρουσία. Η βάση και η ροή.</p>', reflection: 'Πώς ένιωσα όταν ενωθήκαν σώμα και αναπνοή;', insight: 'Το σώμα σας κρατά. Η αναπνοή σας κινεί. Μαζί: ζωή.' },
    { title: 'Μίνι Αναπνοές Μέσα στη Μέρα', where: 'Παντού', dur: '6 × 1 λεπτό', lesson: '<p>Σήμερα κάνετε 5-6 μικρές αναπνευστικές στάσεις σε διάφορες στιγμές. Η συνέπεια είναι σημαντικότερη από τη διάρκεια.</p>', exercise: { title: '6 Μίνι Αναπνοές', steps: ['Πρωί (ξύπνημα): 3 κύκλοι 4-7.', 'Πριν πρωινό: 1 λεπτό box breath.', 'Μέσα στη δουλειά: 3 αργές εκπνοές.', 'Μετά από ένταση: 1 λεπτό 4-7.', 'Πριν ύπνο: 5 κύκλοι μακράς εκπνοής.', 'Χρησιμοποιήστε κάθε ευκαιρία.'] }, breathing: '<strong>6 Μικρές Επαναφορές</strong><p>Κάθε φορά επιστρέφετε στην ηρεμία. Ξανά και ξανά.</p>', reflection: 'Πόσες φορές θυμήθηκα την αναπνοή σήμερα;', insight: 'Δεν χρειάζεστε 20 λεπτά. Χρειάζεστε 6 φορές από 1 λεπτό.' }
  ]
},
4: {
  title: 'Αναπνοή ως Γέφυρα',
  days: [
    { title: 'Αναπνοή σε Κίνηση', where: 'Εξωτερικά', dur: '10 λεπτά', lesson: '<p>Σήμερα συνδέετε την αναπνοή με τα βήματά σας. Η κίνηση γίνεται μέντρα, ο ρυθμός του σώματος γίνεται ο ρυθμός του νου.</p>', exercise: { title: 'Αναπνοή Βημάτων', steps: ['Ξεκινήστε να περπατάτε αργά.', '3 βήματα εισπνοή, 3 βήματα εκπνοή.', 'Αν σας δυσκολεύει: 2-2 ή 4-4.', 'Νιώστε τον άξονα κατακόρυφο ενώ κινείστε.', '10 λεπτά. Ο ρυθμός γίνεται δικός σας.'] }, breathing: '<strong>Ρυθμική Αναπνοή σε Βήματα</strong><p>Βήματα + αναπνοή = μία πράξη. Ο νους δεν τρέχει πια.</p>', reflection: 'Πώς ένιωσα όταν βήματα και αναπνοή συγχρονίστηκαν;', insight: 'Το σώμα γνωρίζει τον ρυθμό. Εσείς απλώς τον ακολουθείτε.' },
    { title: 'Αναπνοή Ηρεμίας (4-7-8)', where: 'Ήσυχο μέρος', dur: '5 λεπτά', lesson: '<p>Η τεχνική 4-7-8 (Dr. Andrew Weil) είναι ένα φυσικό υπνωτικό. Ιδανική για άγχος ή δυσκολία στον ύπνο.</p>', exercise: { title: '4-7-8 Αναπνοή', steps: ['Εισπνοή 4 δευτερόλεπτα από μύτη.', 'Κρατήστε 7 δευτερόλεπτα.', 'Εκπνοή 8 δευτερόλεπτα από στόμα (μικρός ήχος «χχχ»).', 'Αυτός είναι 1 κύκλος. Κάντε 4 κύκλους.', 'Στην αρχή μόνο 4 κύκλους — μην υπερβάλλετε.'] }, breathing: '<strong>4-7-8 (5 λεπτά)</strong><p>Αφήστε την εκπνοή να είναι μεγάλη. Δείχνετε στο σώμα: είμαστε ασφαλείς.</p>', reflection: 'Πώς νιώθω μετά από 4 κύκλους 4-7-8;', insight: 'Η αναπνοή σας είναι το πιο αποτελεσματικό εργαλείο ηρεμίας που έχετε.' },
    { title: 'Αναπνοή Ενέργειας', where: 'Ήσυχο μέρος', dur: '3 λεπτά', lesson: '<p>Μερικές φορές δεν χρειάζεστε ηρεμία — χρειάζεστε ξύπνημα. Η αναπνοή φωτιάς (Kapalabhati) ενεργοποιεί το συμπαθητικό σύστημα με ελεγχόμενο τρόπο.</p>', exercise: { title: 'Αναπνοή Φωτιάς', steps: ['Καθίστε με ίσια πλάτη.', 'Σύντομες, δυνατές εκπνοές από μύτη (σαν να φυσάτε).', 'Η εισπνοή έρχεται μόνη της.', '20-30 αναπνοές, μετά 1 λεπτό ηρεμία.', 'Προσοχή: σταματήστε αν ζαλιστείτε.'] }, breathing: '<strong>Kapalabhati (3 λεπτά)</strong><p>Εργαλείο ενέργειας. Όχι πριν ύπνο. Καλύτερα πρωί ή όταν νιώθετε υπνηλία.</p>', reflection: 'Πώς νιώθω μετά; Έχω ενέργεια ή ανησυχία;', insight: 'Η αναπνοή δεν είναι μόνο ηρεμία — είναι και ζωτικότητα όταν τη χρειάζεστε.' },
    { title: 'Αναπνοή Εναλλαγής', where: 'Ήσυχο μέρος', dur: '5 λεπτά', lesson: '<p>Η εναλλασσόμενη αναπνοή ρινικών (Nadi Shodhana) ισορροπεί τα δύο ημισφαίρια του εγκεφάλου. Εργαλείο πριν από πνευματική εργασία ή αποφάσεις.</p>', exercise: { title: 'Nadi Shodhana', steps: ['Κλείστε το δεξί ρουθούνι με αντίχειρα.', 'Εισπνοή από αριστερό ρουθούνι.', 'Κλείστε αριστερό, ανοίξτε δεξί — εκπνοή.', 'Εισπνοή από δεξί, αλλαγή, εκπνοή από αριστερό.', 'Αυτός είναι 1 κύκλος. 5-10 κύκλοι.'] }, breathing: '<strong>Nadi Shodhana (5 λεπτά)</strong><p>Ισορροπία. Ηρεμία. Καθαρότητα. Ιδανικό πριν από σημαντικές αποφάσεις.</p>', reflection: 'Τι άλλαξε μετά την εναλλασσόμενη αναπνοή;', insight: 'Η ισορροπία δεν είναι μια θέση — είναι μια κίνηση ανάμεσα στις πολικότητες.' },
    { title: 'Αναπνοή σε Δύσκολα Συναισθήματα', where: 'Οπουδήποτε', dur: '5 λεπτά', lesson: '<p>Τα συναισθήματα ζουν στο σώμα. Η αναπνοή τα αφήνει να ρεύσουν. Σήμερα: αντί να τρέχετε από ένα δύσκολο συναίσθημα, το αναπνέετε.</p>', exercise: { title: 'Αναπνοή στο Συναίσθημα', steps: ['Αναγνωρίστε το συναίσθημα (φόβος, θυμός, λύπη).', 'Βρείτε πού το νιώθετε στο σώμα.', 'Κατευθύνετε την αναπνοή σε αυτή την περιοχή.', 'Εισπνέετε ΜΕΣΑ στο συναίσθημα, εκπνέετε το αφήνοντάς το να ρεύσει.', 'Δεν το φτιάχνετε — απλώς του δίνετε χώρο.'] }, breathing: '<strong>Αναπνοή-Θεραπευτής (5 λεπτά)</strong><p>Η αναπνοή είναι σαν νερό — ξεπλένει αυτό που είναι σφιγμένο.</p>', reflection: 'Τι συνέβη όταν έδωσα χώρο στο συναίσθημα;', insight: 'Τα συναισθήματα είναι κύματα. Η αναπνοή είναι η θάλασσα που τα χωράει.' },
    { title: 'Αναπνοή σε Ευχαρίστηση', where: 'Οπουδήποτε', dur: '3 λεπτά', lesson: '<p>Τι γίνεται όταν αναπνέουμε μέσα σε ΘΕΤΙΚΕΣ στιγμές; Η αναπνοή εδραιώνει την εμπειρία στο νευρικό σύστημα.</p>', exercise: { title: 'Αναπνοή σε Χαρά', steps: ['Βρείτε μια στιγμή ευχαρίστησης (ηλιοβασίλεμα, καφές, αγαπημένο πρόσωπο).', 'Σταματήστε. Αναπνεύστε συνειδητά.', '3-5 κύκλοι αργής αναπνοής ΜΕΣΑ στη στιγμή.', 'Νιώστε: η χαρά εγγράφεται.', 'Αυτό ονομάζεται «savoring» στη θετική ψυχολογία.'] }, breathing: '<strong>Savoring Breath (3 λεπτά)</strong><p>Η θετική εμπειρία, όταν αναπνέεται, μένει. Χτίζετε αποθέματα ευεξίας.</p>', reflection: 'Ποια θετική στιγμή «αγκάλιασα» με αναπνοή σήμερα;', insight: 'Η ευχαρίστηση δεν είναι πολυτέλεια — είναι θρεπτική ουσία.' },
    { title: 'Ανασκόπηση: Δύο Άξονες', where: 'Ήσυχο μέρος', dur: '15 λεπτά', lesson: '<p>4 εβδομάδες ολοκληρώθηκαν. Έχετε πια δύο στέρεες αγκυρές: Σώμα και Αναπνοή. Από αύριο: ο τρίτος άξονας — η Προσοχή.</p>', exercise: { title: 'Πλήρης Πρακτική 15\'', steps: ['Γείωση πλήρης (5 λεπτά).', 'Αναπνοή 4-7 ή box breath (5 λεπτά).', 'Και τα δύο μαζί (5 λεπτά).', 'Αναστοχαστείτε: τι έμαθα αυτές τις 4 εβδομάδες;', 'Σημειώστε μια φράση για να θυμάστε.'] }, breathing: '<strong>Ολοκληρωμένη Πρακτική (15 λεπτά)</strong><p>Σώμα + Αναπνοή. Βάση + Ρυθμός. Είστε προετοιμασμένοι για το επόμενο βήμα.</p>', reflection: 'Πώς έχω αλλάξει σε 4 εβδομάδες; Τι δυσκολίες συνέχισα;', insight: 'Δύο αγκυρές αρκούν για να μην παρασυρθείτε. Έχετε τώρα και τις δύο.' }
  ]
},
5: {
  title: 'Ο Φακός της Συνείδησης',
  days: [
    { title: 'Πού Είναι η Προσοχή;', where: 'Ήσυχο μέρος', dur: '5 λεπτά', lesson: '<p>Η προσοχή είναι ο φακός του νου — μπορεί να εστιάζει, να ανοίγει ή να διασπάται. Σήμερα απλώς παρατηρήστε: πού πηγαίνει η προσοχή σας φυσικά;</p>', exercise: { title: 'Παρατήρηση Προσοχής', steps: ['Γείωση + Αναπνοή (1 λεπτό).', 'Κλείστε τα μάτια.', 'Πού πηγαίνει η προσοχή; Σε ήχους; Σκέψεις; Σωματικές αισθήσεις;', 'Μην την κατευθύνετε — απλώς παρακολουθήστε.', '5 λεπτά παρατήρησης. Πόσες φορές «μετακινήθηκε»;'] }, breathing: '<strong>Αναπνοή + Παρατήρηση (5 λεπτά)</strong><p>Διατηρήστε τη γείωση και την αναπνοή ενώ παρατηρείτε πού πηγαίνει η προσοχή.</p>', reflection: 'Πού τείνει να πηγαίνει η προσοχή μου;', insight: 'Η προσοχή δεν είναι κενή σκέψεων — είναι η ικανότητα να παρατηρείτε πού βρίσκεστε.' },
    { title: 'Κλειστή Εστίαση', where: 'Ήσυχο μέρος', dur: '5 λεπτά', lesson: '<p>Σήμερα δοκιμάζετε την κλειστή προσοχή: η δέσμη μαζεύεται σε ένα σημείο. Επιλέξτε ένα σταθερό σημείο εστίασης — οπτικό, ακουστικό ή σωματικό.</p>', exercise: { title: 'Σταθερό Σημείο', steps: ['Γείωση + Αναπνοή (1 λεπτό).', 'Ανοίξτε τα μάτια. Επιλέξτε ένα σημείο μπροστά σας.', 'Κοιτάξτε το με απαλό, σταθερό βλέμμα.', 'Αν η προσοχή φύγει, επιστρέψτε απαλά.', '5 λεπτά σε ένα σημείο.'] }, breathing: '<strong>Εστίαση Αναπνοής (5 λεπτά)</strong><p>Το σταθερό σημείο μπορεί να είναι και η ίδια η αναπνοή. Μείνετε εκεί.</p>', reflection: 'Πόσο εύκολο ήταν να μείνω σε ένα σημείο;', insight: 'Η εστίαση δεν είναι ένταση — είναι ήσυχη επιμονή.' },
    { title: 'Η Τεχνική της Ταμπέλας', where: 'Ήσυχο μέρος', dur: '5 λεπτά', lesson: '<p>Όταν μια σκέψη σας τραβάει, αντί να εμπλακείτε στο περιεχόμενό της, βάλτε μια απλή ταμπέλα: «Σχεδιασμός», «Κριτική», «Ανησυχία», «Σενάριο». Μετά επιστρέψτε.</p>', exercise: { title: 'Ταμπέλα + Επιστροφή', steps: ['Γείωση + Αναπνοή + Εστίαση σε σημείο (2 λεπτά).', 'Περιμένετε μια σκέψη να σας τραβήξει.', 'Βάλτε ταμπέλα: «Σχεδιασμός», «Ανησυχία», «Παρελθόν»...', 'Μην αναλύσετε τη σκέψη — μόνο ταμπέλα.', 'Επιστρέψτε στο σταθερό σημείο.'] }, breathing: '<strong>Ταμπέλα Αναπνοή (5 λεπτά)</strong><p>Σκέψη → Ταμπέλα → Αναπνοή → Σημείο. Αυτό είναι η άσκηση. Κάθε επιστροφή χτίζει νέες νευρικές διαδρομές.</p>', reflection: 'Ποιες ταμπέλες χρησιμοποίησα πιο συχνά;', insight: 'Η επιστροφή της προσοχής δεν είναι αποτυχία — είναι η ίδια η άσκηση.' },
    { title: 'Τετραπλή Επίγνωση', where: 'Ήσυχο μέρος', dur: '10 λεπτά', lesson: '<p>Σε αυτό το στάδιο η προσοχή γίνεται τετραπλή — κρατάτε ταυτόχρονα: σώμα, αναπνοή, ίδια την προσοχή, και σκέψεις που αναγνωρίζονται χωρίς να παρασύρουν.</p>', exercise: { title: 'Τετραπλή Επίγνωση', steps: ['Γείωση: νιώστε το σώμα.', 'Αναπνοή: νιώστε τον ρυθμό.', 'Προσοχή: κρατήστε ένα σταθερό σημείο.', 'Σκέψεις: αν έρθουν, ταμπέλα → επιστροφή.', '10 λεπτά. Και τα τέσσερα μαζί.'] }, breathing: '<strong>Τετραπλή Αναπνοή (10 λεπτά)</strong><p>Σώμα. Αναπνοή. Σημείο. Σκέψεις = σύννεφα. Εσείς = ο παρατηρητής.</p>', reflection: 'Μπόρεσα να κρατήσω και τα τέσσερα; Ποιο «χάνω» πρώτο;', insight: 'Δεν χρειάζεται τελειότητα. Χρειάζεται απαλή επιστροφή.' },
    { title: 'Αγκυλωμένη Προσοχή', where: 'Σε όλη τη μέρα', dur: 'Συνεχής παρατήρηση', lesson: '<p>Σήμερα παρατηρήστε: υπάρχουν στιγμές που η προσοχή «κολλάει»; Σε σκέψη, ανησυχία, εμμονή; Αυτή είναι η αγκυλωμένη προσοχή — ο hyperfocus σε κάτι αγχώδες.</p>', exercise: { title: 'Αναγνώριση Αγκύλωσης', steps: ['Σε 5-6 στιγμές μέσα στη μέρα:', 'Ελέγξτε: πού είναι η προσοχή μου τώρα;', 'Τρέχει (διάσπαση); Ή κολλάει (αγκύλωση);', 'Αν κολλάει: ταμπέλα → γείωση → αναπνοή → ανοιχτό βλέμμα.', 'Αν τρέχει: γείωση → αναπνοή → σταθερό σημείο.'] }, breathing: '<strong>Αποκόλληση (30" ανά στιγμή)</strong><p>Τρέχει: γείωση + σημείο. Κολλάει: γείωση + ανοιχτό βλέμμα. Η αναπνοή πάντα στη μέση.</p>', reflection: 'Πότε «τρέχει» ο νους μου; Πότε «κολλάει»; Ποιες καταστάσεις το προκαλούν;', insight: 'Ο νευροδιαφορετικός νους δεν είναι σπασμένος — έχει διαφορετική λειτουργία.' },
    { title: 'Προσοχή σε Κοινωνική Στιγμή', where: 'Σε συνάντηση ή συζήτηση', dur: '2-3 λεπτά', lesson: '<p>Σήμερα δοκιμάστε: σε μια κοινωνική στιγμή, επιλέξτε ένα ουδέτερο σημείο (φυτό, αντικείμενο) ως οπτική αναφορά. Νιώστε τα πόδια σταθερά. Χρησιμοποιήστε περιφερειακή όραση.</p>', exercise: { title: 'Κοινωνική Γείωση', steps: ['Σε κοινωνική κατάσταση:', 'Επιλέξτε ένα ουδέτερο σημείο ως αναφορά.', 'Νιώστε τα πόδια στο έδαφος.', 'Αν νιώθετε ένταση στο σαγόνι, αφήστε την με εκπνοή.', 'Χρησιμοποιήστε μαλακό βλέμμα — όχι τούνελ.'] }, breathing: '<strong>Αναπνοή Παρουσίας (Κατά τη διάρκεια)</strong><p>Κρατήστε μια ήσυχη αναπνοή ενώ είστε σε επαφή με τους άλλους.</p>', reflection: 'Βοήθησε η γείωση στην κοινωνική στιγμή;', insight: 'Μπορείτε να είστε παρόντες στον κόσμο χωρίς να χαθείτε σ\' αυτόν.' },
    { title: 'Ανασκόπηση: Τρεις Άξονες', where: 'Ήσυχο μέρος', dur: '10 λεπτά', lesson: '<p>Έξι εβδομάδες. Τρεις άξονες: Σώμα, Αναπνοή, Προσοχή. Από αύριο: ο τέταρτος και τελευταίος — ο <strong>Χώρος</strong>, η ανοιχτή επίγνωση.</p>', exercise: { title: 'Τρεις Άξονες Μαζί', steps: ['Σώμα: γείωση (2 λεπτά).', 'Αναπνοή: ρυθμός (2 λεπτά).', 'Προσοχή: σταθερό σημείο + ταμπέλα (3 λεπτά).', 'Και τα τρία μαζί (3 λεπτά).', 'Μάθατε πού στέκεστε, πώς αναπνέετε, πού κοιτάτε.'] }, breathing: '<strong>Πλήρης Τριπλή Πρακτική (10 λεπτά)</strong><p>Βάση. Ρυθμός. Φακός. Τώρα λείπει μόνο ένα: ο χώρος που χωράει τα πάντα.</p>', reflection: 'Ποιος άξονας νιώθω πιο δυνατός; Πού χρειάζομαι περισσότερη πρακτική;', insight: 'Τρεις αγκυρές. Μια ακόμη μένει — η πιο απελευθερωτική.' }
  ]
},
6: {
  title: 'Προσοχή στη Ζωή',
  days: [
    { title: 'Ο Νους που Τρέχει', where: 'Σε στιγμή διάσπασης', dur: '3 λεπτά', lesson: '<p>Ο νευροδιαφορετικός νους συχνά «τρέχει» — πολλά ερεθίσματα, χωρίς φίλτρο. Το εργαλείο: Σώμα (γείωση) + Αναπνοή (ρυθμός).</p>', exercise: { title: 'Γείωση στη Διάσπαση', steps: ['Αναγνωρίστε: «Ο νους μου τρέχει τώρα».', 'Άμεση γείωση: πέλματα, βαρύτητα.', 'Αναπνοή: 3 αργές εκπνοές.', 'Σταθερό σημείο: ένα πράγμα μπροστά σας.', 'Μείνετε εκεί 1 λεπτό. Αρκεί.'] }, breathing: '<strong>Αντίδοτο Διάσπασης</strong><p>Γείωση → Εκπνοή → Ένα σημείο. Τρία βήματα. 30 δευτερόλεπτα.</p>', reflection: 'Μπόρεσα να ηρεμήσω τον νου;', insight: 'Δεν πολεμάτε τη διάσπαση — τη χρησιμοποιείτε ως σήμα για επιστροφή.' },
    { title: 'Ο Νους που Κλειδώνει', where: 'Σε στιγμή εμμονής', dur: '3 λεπτά', lesson: '<p>Το αντίθετο: ο νους «κλειδώνει» σε μια σκέψη ή εμμονή (hyperfocus). Το εργαλείο: Χώρος (ανοιχτό βλέμμα) + Προσοχή (απαλή επιστροφή).</p>', exercise: { title: 'Ξεκλείδωμα', steps: ['Αναγνωρίστε: «Ο νους μου κόλλησε».', 'Ταμπέλα: «Εμμονή» ή «Κλείδωμα».', 'Μαλακώστε το βλέμμα — περιφερειακή όραση.', 'Νιώστε τον χώρο γύρω σας.', 'Η σκέψη μικραίνει μέσα στον μεγάλο χώρο.'] }, breathing: '<strong>Αντίδοτο Κλειδώματος</strong><p>Ταμπέλα → Ανοιχτό βλέμμα → Χώρος. Η εμμονή δεν είναι τόσο μεγάλη όσο φαίνεται.</p>', reflection: 'Τι συμβαίνει όταν ανοίγω τον χώρο γύρω από μια εμμονή;', insight: 'Ο Μηχανικός Νους δεν είναι εχθρός — είναι εργαλείο που «υπερθερμάνθηκε».' },
    { title: 'Θορυβώδεις Χώροι', where: 'Δημόσιος χώρος', dur: '5 λεπτά', lesson: '<p>Σε αισθητηριακή υπερφόρτωση: πόδια στο έδαφος, 3 αναπνοές, ανοίξτε περιφερειακή όραση. Μπορείτε να χρησιμοποιήσετε ακουστικά αν χρειαστεί.</p>', exercise: { title: 'Γείωση στο Χάος', steps: ['Νιώστε τα πόδια στο έδαφος — άμεση γείωση.', '3 ήσυχες αναπνοές, εκπνοή από στόμα.', 'Μαλακώστε το βλέμμα — μην εστιάζετε πουθενά.', 'Ακουστικά ή fidget toy αν βοηθά.', 'Θυμηθείτε: δεν είστε τα ερεθίσματα.'] }, breathing: '<strong>3 Αναπνοές στο Χάος</strong><p>Πέλματα. Εκπνοή. Μαλακό βλέμμα. Αρκεί.</p>', reflection: 'Πώς αντέδρασα στον θόρυβο με τα εργαλεία μου;', insight: 'Ο θόρυβος είναι έξω. Η γείωση είναι μέσα. Εσείς επιλέγετε πού μένετε.' },
    { title: 'Mindful Pacing', where: 'Εξωτερικά', dur: '10 λεπτά', lesson: '<p>Η ρυθμική κίνηση «καίει» το άγχος. Σήμερα περπατήστε με επίγνωση — κατακόρυφος άξονας, ανοιχτό βλέμμα, αίσθηση χώρου.</p>', exercise: { title: 'Ρυθμικό Περπάτημα', steps: ['Σταθείτε. Γείωση.', 'Αρχίστε να περπατάτε ρυθμικά.', 'Κρατήστε τον άξονα. Ανοιχτό βλέμμα.', 'Επίγνωση χώρου: τι υπάρχει γύρω σας;', '10 λεπτά. Η κίνηση ηρεμεί χωρίς σκέψη.'] }, breathing: '<strong>Αναπνοή σε Κίνηση (10 λεπτά)</strong><p>Βήματα + αναπνοή + ανοιχτό βλέμμα = κινούμενη παρουσία.</p>', reflection: 'Πώς ήταν να περπατώ με πλήρη επίγνωση;', insight: 'Η κίνηση δεν είναι αντίθετη στην παρουσία — μπορεί να είναι η ίδια η παρουσία.' },
    { title: 'Νους Τρέχει ή Κλειδώνει;', where: 'Σε όλη τη μέρα', dur: '6 × 30"', lesson: '<p>Σήμερα παρατηρήστε τα δικά σας μοτίβα: πότε «τρέχει» ο νους, πότε «κλειδώνει», ποιες καταστάσεις το προκαλούν. Χρησιμοποιήστε τα αντίστοιχα εργαλεία.</p>', exercise: { title: 'Αυτογνωσία Μοτίβων', steps: ['6 στιγμές στη μέρα:', 'Ελέγξτε: τρέχει ή κλειδώνει;', 'Τρέχει → γείωση + αναπνοή.', 'Κλειδώνει → ταμπέλα + ανοιχτό βλέμμα.', 'Σημειώστε τι προκαλεί κάθε κατάσταση.'] }, breathing: '<strong>Εναλλαγή Εργαλείων</strong><p>Κάθε κατάσταση ζητά διαφορετική απάντηση. Σήμερα μαθαίνετε πότε τι.</p>', reflection: 'Πότε τείνει να τρέχει, πότε κλειδώνει; Τι τα προκαλεί;', insight: 'Αυτογνωσία δεν είναι ανάλυση — είναι η αναγνώριση του μοτίβου χωρίς κρίση.' },
    { title: 'Ολοκλήρωση Προσοχής', where: 'Ήσυχο μέρος', dur: '5 λεπτά', lesson: '<p>Εφαρμόστε τη σταθεροποίηση του φακού: σώμα + αναπνοή + σταθερό σημείο + ταμπέλα + τετραπλή επίγνωση, σε μια ενιαία πρακτική.</p>', exercise: { title: 'Σταθεροποίηση Φακού', steps: ['Σώμα & Αναπνοή: κλείστε τα μάτια. Νιώστε. (2 λεπτά)', 'Σταθερό σημείο: ανοίξτε τα μάτια, επιλέξτε. (1 λεπτό)', 'Τετραπλή επίγνωση: σώμα + αναπνοή + σημείο + σκέψεις. (2 λεπτά)', 'Απαλή Επιστροφή: αν παρασυρθείτε, ταμπέλα → σώμα → αναπνοή → σημείο.', 'Κάθε «απαλή επιστροφή» χτίζει νέες νευρικές διαδρομές.'] }, breathing: '<strong>Φακός Αναπνοής (5 λεπτά)</strong><p>Σταθεροποιήστε τον φακό. Η αναπνοή τον κρατά στη θέση του.</p>', reflection: 'Πόσες επιστροφές έκανα; Τι αισθάνθηκα μετά;', insight: 'Κάθε φορά που επιστρέφετε, γίνεστε πιο δυνατοί. Η επιστροφή είναι η ίδια η πρακτική.' },
    { title: 'Ανασκόπηση: Τρεις Άξονες Πλήρεις', where: 'Ήσυχο μέρος', dur: '15 λεπτά', lesson: '<p>Ολοκληρώνονται 6 εβδομάδες — τρεις άξονες. Αύριο ξεκινά ο τελευταίος και ίσως πιο απελευθερωτικός: ο <strong>Χώρος</strong>.</p>', exercise: { title: 'Πλήρης Τριπλή Πρακτική', steps: ['Σώμα: γείωση (3 λεπτά).', 'Αναπνοή: ρυθμός + εκπνοή (3 λεπτά).', 'Προσοχή: σημείο + ταμπέλα + τετραπλή επίγνωση (5 λεπτά).', 'Και τα τρία μαζί (4 λεπτά).', 'Ανοίξτε τα μάτια. Πώς νιώθετε;'] }, breathing: '<strong>15 Λεπτά Πλήρους Πρακτικής</strong><p>Τρεις άξονες. Ένα σώμα. Μια παρουσία.</p>', reflection: 'Πού είμαι τώρα σε σχέση με την αρχή; Τι αλλάζε;', insight: 'Σώμα, Αναπνοή, Προσοχή — τρεις δρόμοι προς το ίδιο μέρος: εδώ.' }
  ]
},
7: {
  title: 'Η Ανοιχτή Επίγνωση',
  days: [
    { title: 'Μαλακά Μάτια', where: 'Ήσυχο μέρος', dur: '5 λεπτά', lesson: '<p>Ο Χώρος είναι το τελευταίο κέντρο. Μαθαίνετε να ανοίγετε την επίγνωση σαν ουρανό που χωράει τα πάντα. Ξεκινήστε μαλακώνοντας το βλέμμα.</p>', exercise: { title: 'Περιφερειακή Όραση', steps: ['Γείωση + Αναπνοή + Σημείο εστίασης (2 λεπτά).', 'Τώρα: μαλακώστε το βλέμμα.', 'Αφήστε τα μάτια να «δούνε» και στα πλάγια χωρίς να κινηθούν.', 'Δεν εστιάζετε πουθενά — αγκαλιάζετε όλο το οπτικό πεδίο.', '3 λεπτά σε αυτό. Τι αλλάζει μέσα σας;'] }, breathing: '<strong>Ανοιχτή Αναπνοή (5 λεπτά)</strong><p>Αφήστε την αναπνοή να διαστέλλεται πέρα από το σώμα. Νιώστε τη συνδεδεμένη με τον αέρα γύρω σας.</p>', reflection: 'Τι άλλαξε στην αίσθηση μου όταν μαλάκωσα το βλέμμα;', insight: 'Η ανοιχτή επίγνωση δεν σημαίνει χαμένος — σημαίνει να νιώθετε τα πάντα χωρίς να κολλάτε πουθενά.' },
    { title: 'Ο Ουρανός και τα Σύννεφα', where: 'Ήσυχο μέρος', dur: '10 λεπτά', lesson: '<p>Σκέψεις, συναισθήματα, αισθήσεις — είναι σύννεφα. Εσείς είστε ο χώρος που τα χωράει. Η ταυτότητα σας δεν είναι τα σύννεφα — είναι ο ουρανός.</p>', exercise: { title: 'Μεταφορά Ουρανού', steps: ['Πλήρης γείωση + αναπνοή + εστίαση (3 λεπτά).', 'Ανοίξτε περιφερειακή όραση.', 'Αφήστε σκέψεις να έρθουν — δεν τις κρατάτε.', 'Αναγνωρίστε: αυτές είναι σύννεφα. Εγώ είμαι ο ουρανός.', '7 λεπτά σε αυτή την αίσθηση ανοιχτότητας.'] }, breathing: '<strong>Αναπνοή Ουρανού (10 λεπτά)</strong><p>Η αναπνοή ρέει σαν αέρας στον ουρανό. Σκέψεις = σύννεφα. Περνούν.</p>', reflection: 'Μπόρεσα να νιώσω τον «ουρανό» πίσω από τις σκέψεις;', insight: 'Δεν είστε οι σκέψεις σας. Είστε ο χώρος που τις χωράει.' },
    { title: 'Χώρος και Ασφάλεια', where: 'Ήσυχο μέρος', dur: '10 λεπτά', lesson: '<p>Η αίσθηση ανοιχτού χώρου στέλνει σήμα ασφάλειας. Η στένωση αυξάνει τον κίνδυνο — η διεύρυνση τον μειώνει. Σήμερα δοκιμάστε: πλήρης γείωση + πλήρης ανοιχτότητα.</p>', exercise: { title: 'Ασφάλεια μέσω Χώρου', steps: ['Πλήρης γείωση (2 λεπτά).', 'Αναπνοή ρύθμισης (2 λεπτά).', 'Εστίαση κλειστή → σιγά σιγά ανοίξτε (2 λεπτά).', 'Πλήρης ανοιχτή επίγνωση: ήχοι, αισθήσεις, σκέψεις, χώρος (4 λεπτά).', 'Νιώστε: αυτός ο χώρος σας χωρά.'] }, breathing: '<strong>Αναπνοή Ασφάλειας (10 λεπτά)</strong><p>Κάθε εκπνοή: ο χώρος ανοίγει. Κάθε εισπνοή: ο κόσμος μπαίνει. Είστε ασφαλείς.</p>', reflection: 'Πώς ένιωσα τον χώρο γύρω μου; Ασφάλεια;', insight: 'Η ανοιχτότητα δεν είναι ευαλωτότητα — είναι η μεγαλύτερη ασφάλεια.' },
    { title: 'Τα Τέσσερα Στάδια — Πλήρης Άσκηση', where: 'Ήσυχο μέρος', dur: '15 λεπτά', lesson: '<p>Για πρώτη φορά: η πλήρης, διαδοχική άσκηση του Τετραπλού Άξονα. Αυτή είναι η πρακτική που θα σας συνοδεύει από εδώ και πέρα.</p>', exercise: { title: 'Τα 4 Στάδια', steps: ['Στ. 1 — Νιώσε τη Γη: πέλματα, άξονας, βαρύτητα, χαλάρωση (3 λεπτά).', 'Στ. 2 — Νιώσε την Αναπνοή: μύτη → πνεύμονες → κοιλιά, φυσικός ρυθμός (3 λεπτά).', 'Στ. 3 — Εστίασε Μπροστά: ανοίξτε τα μάτια, απαλό βλέμμα σε σημείο, ταμπέλα αν χρειαστεί (4 λεπτά).', 'Στ. 4 — Άνοιξε στον Χώρο: περιφερειακή όραση, νιώστε ταυτόχρονα σώμα + αναπνοή + γη + ουρανό (5 λεπτά).', 'Άμεση αίσθηση παρουσίας χωρίς λέξεις ή προσπάθεια.'] }, breathing: '<strong>Πλήρης Τετραπλός Άξονας (15 λεπτά)</strong><p>Σταθερότητα → Ρυθμός → Φακός → Απεραντοσύνη. Ένας οργανισμός, μια παρουσία.</p>', reflection: 'Ποιο στάδιο μου φαίνεται πιο φυσικό; Πού δυσκολεύομαι;', insight: 'Αυτά δεν είναι τέσσερα βήματα. Είναι τέσσερα παράθυρα στην ίδια παρουσία.' },
    { title: 'Τετραπλός Άξονας σε Κίνηση', where: 'Εξωτερικά', dur: '15 λεπτά', lesson: '<p>Σήμερα: τα 4 στάδια ενώ περπατάτε. Η πρακτική μεταφέρεται στη ζωή — δεν χρειάζεστε ησυχία ή ειδικό χώρο.</p>', exercise: { title: '4 Στάδια σε Περπάτημα', steps: ['Ξεκινήστε στεκούμενοι: Στ. 1 — Γείωση (1 λεπτό).', 'Αρχίστε να περπατάτε αργά: Στ. 2 — Αναπνοή σε βήματα (3 λεπτά).', 'Σταθεροποιήστε: Στ. 3 — Βλέμμα μπροστά, επίγνωση (3 λεπτά).', 'Ανοίξτε: Στ. 4 — Μαλακό βλέμμα, χώρος, απεραντοσύνη (5 λεπτά).', 'Ολοκλήρωση: και τα 4 μαζί σε κίνηση (3 λεπτά).'] }, breathing: '<strong>Κινούμενη Παρουσία (15 λεπτά)</strong><p>Δεν χρειάζεστε μαξιλάρι. Η γη είναι αρκετή.</p>', reflection: 'Πώς νιώθει η πλήρης πρακτική σε κίνηση;', insight: 'Η ενσυνειδητότητα δεν είναι κάτι που κάνετε — είναι κάτι που είστε.' },
    { title: 'Σχεδόν Εκεί', where: 'Ήσυχο μέρος', dur: '15 λεπτά', lesson: '<p>Μια ακόμη εβδομάδα μένει. Σήμερα: πλήρης πρακτική 15 λεπτών. Εστιαστείτε στη μετάβαση μεταξύ σταδίων — πόσο ομαλά γίνεται;</p>', exercise: { title: 'Ομαλή Μετάβαση', steps: ['Στ. 1 → Στ. 2: πώς η αναπνοή δυναμώνει τη γείωση;', 'Στ. 2 → Στ. 3: πώς η εστίαση στηρίζεται στον ρυθμό;', 'Στ. 3 → Στ. 4: πώς ο χώρος ανοίγει μέσα από την εστίαση;', 'Δεν πηδάτε — ρέετε.', '15 λεπτά ρέουσας παρουσίας.'] }, breathing: '<strong>Ρέουσα Αναπνοή (15 λεπτά)</strong><p>Η αναπνοή δεν ανήκει σε κανένα στάδιο — είναι σε όλα.</p>', reflection: 'Πόσο ομαλά «ρέω» μεταξύ σταδίων;', insight: 'Τα στάδια είναι σκαλωσιές. Σιγά σιγά θα πέσουν — θα μείνει μόνο η παρουσία.' }
  ]
},
8: {
  title: 'Ολοκλήρωση',
  days: [
