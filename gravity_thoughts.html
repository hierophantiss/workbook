<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Βαρύτητα & Σκέψεις — Η Άγκυρα της Παρουσίας | Gravity & Thoughts — The Anchor of Presence</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,700;1,300&family=Inter:wght@300;400;500&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#121c1f;overflow:hidden;height:100vh;width:100vw;font-family:'Fraunces',serif;color:#e8e4df;user-select:none}
  canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:1}
  .label{position:fixed;bottom:65px;left:50%;transform:translateX(-50%);z-index:10;text-align:center;width:85%;opacity:0;transition:opacity 1.8s ease;background:rgba(18,28,31,0.6);backdrop-filter:blur(8px);padding:14px 22px;border-radius:48px;border:1px solid rgba(232,228,223,0.12)}
  .label.vis{opacity:1}
  .label .main{font-size:clamp(1.1rem,3vw,1.8rem);font-weight:300;letter-spacing:0.3em;text-transform:uppercase}
  .label .sub{font-size:clamp(0.6rem,1.2vw,0.8rem);letter-spacing:0.18em;color:rgba(232,228,223,0.65);margin-top:6px;font-style:italic;line-height:1.6}
  .snum{position:fixed;top:24px;right:28px;z-index:10;font-size:0.7rem;letter-spacing:0.3em;color:rgba(232,228,223,0.3);background:rgba(0,0,0,0.2);padding:4px 12px;border-radius:40px}
  .ptrack{position:fixed;bottom:0;left:0;width:100%;height:3px;background:rgba(255,255,255,0.06);z-index:10}
  .pbar{height:100%;background:linear-gradient(90deg,#6c9ebf,#b4a7d6,#7bc5ae);transition:width 1.5s ease}
  .dots{position:fixed;right:22px;top:50%;transform:translateY(-50%);z-index:10;display:flex;flex-direction:column;gap:14px}
  .dot{width:6px;height:6px;border-radius:50%;background:rgba(232,228,223,0.2);transition:all .6s ease;cursor:pointer;border:none;padding:0}
  .dot.active{background:#c4e0d9;transform:scale(1.6);box-shadow:0 0 12px rgba(180,220,200,0.5)}
  .ctrls{position:fixed;bottom:clamp(12px,3vh,24px);left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:12px;align-items:center}
  .ctrls button{background:rgba(20,35,38,0.75);backdrop-filter:blur(4px);border:1px solid rgba(196,224,217,0.3);color:#e0ddd5;padding:10px 24px;font-family:'Inter',sans-serif;font-size:clamp(0.75rem,1.5vw,0.9rem);letter-spacing:0.12em;cursor:pointer;border-radius:40px;transition:all .25s;min-width:48px;min-height:44px;font-weight:500}
  .ctrls button:active{background:rgba(196,224,217,0.25);color:#f0ede5;transform:scale(0.96)}
  
  .intro{position:fixed;inset:0;z-index:100;background:#121c1f;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:opacity 2s ease}
  .intro.hidden{opacity:0;pointer-events:none}
  .intro-t{font-size:clamp(1.6rem,4.5vw,2.8rem);font-weight:300;letter-spacing:0.2em;background:linear-gradient(135deg,#e8e4df,#b4cfc0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;opacity:0;animation:fi 2s ease 0.5s forwards}
  .intro-s{font-size:clamp(0.7rem,1.4vw,0.95rem);letter-spacing:0.3em;color:rgba(196,224,217,0.6);margin-top:12px;font-style:italic;opacity:0;animation:fi 2s ease 1.2s forwards}
  .intro-h{
    position:absolute;bottom:clamp(40px,8vh,80px);left:50%;transform:translateX(-50%);
    font-size:clamp(0.85rem,2vw,1.1rem);letter-spacing:0.3em;color:rgba(220,240,230,0.8);
    text-transform:uppercase;cursor:pointer;
    padding:14px 36px;border:1.5px solid rgba(180,200,190,0.4);border-radius:60px;
    background:rgba(25,45,50,0.65);backdrop-filter:blur(8px);
    transition:all 0.3s;animation:pu 3s ease-in-out infinite;white-space:nowrap}
  .intro-h:active{background:rgba(100,150,140,0.3);transform:translateX(-50%) scale(0.96)}
  @keyframes fi{to{opacity:1}}
  @keyframes pu{0%,100%{opacity:0.2}50%{opacity:0.6}}
</style>
<link rel="canonical" href="https://mindfulness-practice.site/gravity_thoughts.html">
</head>
<body>
<div class="intro" id="intro">
  <div class="intro-t">Βαρύτητα & Σκέψεις</div>
  <div class="intro-s">Η Άγκυρα της Παρουσίας — Gravity &amp; Thoughts: The Anchor of Presence</div>
  <div class="intro-h">πατήστε / tap to begin</div>
</div>
<canvas id="c"></canvas>
<div class="label" id="label"><div class="main" id="lm"></div><div class="sub" id="ls"></div></div>
<div class="snum" id="sn"></div>
<div class="ptrack"><div class="pbar" id="pb"></div></div>
<div class="dots">
  <button class="dot active" onclick="goTo(0)" aria-label="Scene 1"></button>
  <button class="dot" onclick="goTo(1)" aria-label="Scene 2"></button>
  <button class="dot" onclick="goTo(2)" aria-label="Scene 3"></button>
  <button class="dot" onclick="goTo(3)" aria-label="Scene 4"></button>
</div>
<div class="ctrls"><button onclick="goTo(cur-1)" aria-label="Previous">◀ Prev</button><button id="ab" onclick="togAuto()">▶ Auto</button><button onclick="goTo(cur+1)" aria-label="Next">Next ▶</button></div>

<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let W,H,cx,cy;
function resize(){const d=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;cv.width=W*d;cv.height=H*d;cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(d,0,0,d,0,0);cx=W/2;cy=H/2}
resize();addEventListener('resize',resize);

// Neurodivergent-friendly, calm, high contrast backgrounds (muted deep tones)
const scenes=[
  {label:'Ισορροπία / Balance',sub:'Το κέντρο βάρους στη θέση του — σώμα σταθερό στη γη\nCenter of gravity grounded — body stable on earth',bg:[25,45,48]},    // deep teal
  {label:'Σκέψεις / Thoughts',sub:'Οι σκέψεις εντείνονται: ενοχές, ανησυχία, ντροπή — το κέντρο βάρους ανεβαίνει\nThoughts intensify: guilt, worry, shame — center of gravity rises',bg:[55,35,48]},  // muted plum
  {label:'Ανισορροπία / Imbalance',sub:'Χαμένοι στις σκέψεις — το σώμα χάνει τη γείωση\nLost in thoughts — the body loses grounding',bg:[65,38,42]},     // warm deep rust
  {label:'Επαναφορά / Reset',sub:'Η βαρύτητα ως άγκυρα — πόδια στη γη, νους επιστρέφει\nGravity as anchor — feet on ground, mind returns',bg:[30,58,52]}     // forest teal
];

let cur=0,tgt=0,tT=0,trans=false,time=0,gA=0,autoP=false,autoTm=null;

// Noise helpers for ambient
function n(x,y){const v=Math.sin(x*12.9898+y*78.233)*43758.5453;return v-Math.floor(v)}
function sn(x,y){const ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy;const sx=fx*fx*(3-2*fx),sy=fy*fy*(3-2*fy);return n(ix,iy)+(n(ix+1,iy)-n(ix,iy))*sx+(n(ix,iy+1)-n(ix,iy))*sy+(n(ix,iy)-n(ix+1,iy)-n(ix,iy+1)+n(ix+1,iy+1))*sx*sy}

// ambient particles
const amb=[];for(let i=0;i<40;i++)amb.push({x:Math.random()*2000,y:Math.random()*2000,vx:(Math.random()-0.5)*0.08,vy:(Math.random()-0.5)*0.06,sz:0.5+Math.random()*1.2,al:0.02+Math.random()*0.06,ph:Math.random()*Math.PI*2});

// visual thought particles (circles)
const thP=[];
for(let i=0;i<55;i++){
  thP.push({a:Math.random()*Math.PI*2,r:12+Math.random()*75,sp:(0.5+Math.random()*1.6)*(Math.random()>0.5?1:-1),
    sz:0.9+Math.random()*2.5,al:0.2+Math.random()*0.45,ph:Math.random()*Math.PI*2,
    co:Math.random()>0.4?[210+Math.random()*45,100+Math.random()*50,70+Math.random()*40]:[180+Math.random()*50,80+Math.random()*40,70+Math.random()*35]});
}

// WORD PARTICLES: emotional labels (bilingual)
const thoughtWordsGr = ["ενοχές", "ανησυχία", "ντροπή", "φόβος", "άγχος", "κριτική", "αμφιβολία"];
const thoughtWordsEn = ["guilt", "worry", "shame", "fear", "anxiety", "self-criticism", "doubt"];
let wordParticles = [];
function initWordParticles() {
  wordParticles = [];
  for(let i=0; i<42; i++) {
    const lang = Math.random() > 0.5 ? "gr" : "en";
    const word = lang === "gr" ? thoughtWordsGr[Math.floor(Math.random() * thoughtWordsGr.length)] : thoughtWordsEn[Math.floor(Math.random() * thoughtWordsEn.length)];
    wordParticles.push({
      word: word,
      angle: Math.random() * Math.PI * 2,
      radius: 18 + Math.random() * 85,
      speed: 0.5 + Math.random() * 1.7,
      size: 9 + Math.random() * 8,
      alpha: 0.35 + Math.random() * 0.5,
      orbitOffset: Math.random() * Math.PI * 2,
      wobble: Math.random() * Math.PI * 2,
      active: true
    });
  }
}
initWordParticles();

// ========== HERO DRAWING (hooded figure, enhanced visibility with subtle rim light) ==========
function drawHero(x, y, alpha, tilt, headInflate, breathPhase) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(tilt);
  const op = Math.min(1, alpha);
  
  // soft rim light behind hero for better contrast
  ctx.shadowBlur = 0;
  const rimGlow = ctx.createRadialGradient(0, -30, 0, 0, -30, 65);
  rimGlow.addColorStop(0, `rgba(180, 210, 190, ${op*0.2})`);
  rimGlow.addColorStop(1, `rgba(80, 110, 100, 0)`);
  ctx.fillStyle = rimGlow;
  ctx.beginPath(); ctx.ellipse(0, -20, 45, 55, 0, 0, Math.PI*2); ctx.fill();
  
  const headY = -58 - (headInflate > 1.1 ? 3 : 0);
  const hoodWidth = 30 + (headInflate-1)*6;
  const hoodHeight = 36 + (headInflate-1)*8;
  
  // Hood
  ctx.fillStyle = `rgba(30, 48, 52, ${op*0.95})`;
  ctx.beginPath();
  ctx.ellipse(0, headY-3, hoodWidth*0.8, hoodHeight*0.7, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-26, headY-8);
  ctx.quadraticCurveTo(0, headY-34, 26, headY-8);
  ctx.lineTo(20, headY+14);
  ctx.quadraticCurveTo(0, headY+20, -20, headY+14);
  ctx.fill();
  
  // Face (warm tone)
  ctx.fillStyle = `rgba(235, 205, 165, ${op*0.9})`;
  ctx.beginPath();
  ctx.ellipse(0, headY, 17 + (headInflate-1)*3, 21 + (headInflate-1)*4, 0, 0, Math.PI*2);
  ctx.fill();
  
  // Eyes (peaceful vs worried)
  ctx.strokeStyle = `rgba(35, 25, 20, ${op*0.9})`;
  ctx.lineWidth = 1.8;
  if(headInflate > 1.25) {
    ctx.fillStyle = `rgba(190, 100, 75, ${op*0.65})`;
    ctx.beginPath(); ctx.arc(-8, headY-2, 3.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(8, headY-2, 3.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-12, headY-9); ctx.quadraticCurveTo(-7, headY-12, -3, headY-10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(12, headY-9); ctx.quadraticCurveTo(7, headY-12, 3, headY-10); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.moveTo(-11, headY-1); ctx.quadraticCurveTo(-7, headY+1.5, -4, headY-1); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(11, headY-1); ctx.quadraticCurveTo(7, headY+1.5, 4, headY-1); ctx.stroke();
  }
  
  // Mouth
  if(headInflate > 1.2) {
    ctx.beginPath(); ctx.moveTo(-6, headY+7); ctx.quadraticCurveTo(0, headY+10, 6, headY+7); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.moveTo(-5, headY+7); ctx.quadraticCurveTo(0, headY+11, 5, headY+7); ctx.stroke();
  }
  
  // Neck
  ctx.fillStyle = `rgba(235, 205, 165, ${op*0.75})`;
  ctx.fillRect(-6, headY+13, 12, 15);
  
  // Body tunic (dark charcoal but with slight warm tint for visibility)
  ctx.fillStyle = `rgba(28, 34, 38, ${op*0.98})`;
  ctx.beginPath();
  ctx.moveTo(-24, headY+25);
  ctx.quadraticCurveTo(0, headY+18, 24, headY+25);
  ctx.lineTo(30, headY+90);
  ctx.quadraticCurveTo(0, headY+106, -30, headY+90);
  ctx.fill();
  
  // Energy line (dynamic intensity)
  const energyIntensity = headInflate > 1.1 ? (headInflate-1)*1.4 : 0.3;
  const energyColor = headInflate > 1.2 ? `rgba(255, 120, 80, ${op*(0.6+energyIntensity*0.8)})` : `rgba(230, 210, 100, ${op*0.6})`;
  ctx.shadowBlur = 8;
  ctx.shadowColor = headInflate > 1.1 ? "#ff7a4a" : "#e2cf6e";
  ctx.beginPath();
  ctx.moveTo(0, headY+22);
  ctx.lineTo(0, headY+88);
  ctx.lineWidth = 3 + energyIntensity*2.5;
  ctx.strokeStyle = energyColor;
  ctx.stroke();
  ctx.shadowBlur = 0;
  
  // Rainbow Infinity on chest
  const gradInf = ctx.createLinearGradient(-14, headY+42, 14, headY+58);
  gradInf.addColorStop(0, "#ff8c6b");
  gradInf.addColorStop(0.25, "#ffb347");
  gradInf.addColorStop(0.5, "#f4e3a7");
  gradInf.addColorStop(0.75, "#6ecfba");
  gradInf.addColorStop(1, "#6ea5e0");
  ctx.lineWidth = 3.4;
  ctx.strokeStyle = gradInf;
  ctx.beginPath();
  ctx.ellipse(-8, headY+50, 9, 5.5, -0.2, 0, Math.PI*2);
  ctx.ellipse(8, headY+50, 9, 5.5, 0.2, 0, Math.PI*2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-14, headY+49);
  ctx.quadraticCurveTo(0, headY+56, 14, headY+49);
  ctx.stroke();
  
  // Chakra diamond (lower belly)
  ctx.fillStyle = `rgba(160, 230, 140, ${op*0.8})`;
  ctx.shadowBlur = 5;
  ctx.shadowColor = "#b0f0a0";
  ctx.beginPath();
  ctx.moveTo(0, headY+73);
  ctx.lineTo(7, headY+80);
  ctx.lineTo(0, headY+87);
  ctx.lineTo(-7, headY+80);
  ctx.fill();
  ctx.shadowBlur = 0;
  
  // Arms (tension based on tilt)
  const armTension = Math.abs(tilt)*14 + (headInflate>1.2 ? 10 : 0);
  ctx.lineWidth = 3.2;
  ctx.strokeStyle = `rgba(210, 195, 170, ${op*0.85})`;
  ctx.fillStyle = `rgba(235, 205, 165, ${op*0.8})`;
  // left arm
  ctx.beginPath();
  ctx.moveTo(-24, headY+34);
  ctx.quadraticCurveTo(-36 - armTension*0.3, headY+54, -32 - armTension*0.2, headY+84);
  ctx.stroke();
  ctx.beginPath(); ctx.ellipse(-34 - armTension*0.15, headY+86, 8, 10, -0.3, 0, Math.PI*2); ctx.fill();
  // right arm
  ctx.beginPath();
  ctx.moveTo(24, headY+34);
  ctx.quadraticCurveTo(36 + armTension*0.3, headY+54, 32 + armTension*0.2, headY+84);
  ctx.stroke();
  ctx.beginPath(); ctx.ellipse(34 + armTension*0.15, headY+86, 8, 10, 0.3, 0, Math.PI*2); ctx.fill();
  
  // Legs
  ctx.lineWidth = 3.8;
  ctx.strokeStyle = `rgba(28, 34, 38, ${op*0.96})`;
  ctx.beginPath(); ctx.moveTo(-11, headY+90); ctx.lineTo(-15, headY+146); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(11, headY+90); ctx.lineTo(15, headY+146); ctx.stroke();
  ctx.fillStyle = `rgba(18, 22, 24, ${op*0.95})`;
  ctx.beginPath(); ctx.ellipse(-19, headY+149, 13, 6, 0.1, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(19, headY+149, 13, 6, -0.1, 0, Math.PI*2); ctx.fill();
  
  // Grounding glow (calm green when balanced)
  if(headInflate <= 1.05) {
    ctx.fillStyle = `rgba(110, 180, 140, ${op*0.12})`;
    ctx.beginPath(); ctx.ellipse(0, headY+125, 55, 22, 0, 0, Math.PI*2); ctx.fill();
  }
  
  const localHeadX = 0;
  const localHeadY = headY;
  const worldHeadX = x + localHeadX * Math.cos(tilt) - localHeadY * Math.sin(tilt);
  const worldHeadY = y + localHeadX * Math.sin(tilt) + localHeadY * Math.cos(tilt);
  ctx.restore();
  return { hx: worldHeadX, hy: worldHeadY };
}

// Ground and gravity axis helpers
function drawGround(alpha,y){
  const g=ctx.createLinearGradient(cx-220,y,cx+220,y);
  g.addColorStop(0,'rgba(130,140,120,0)');
  g.addColorStop(0.3,`rgba(130,150,130,${alpha*0.25})`);
  g.addColorStop(0.5,`rgba(140,160,135,${alpha*0.35})`);
  g.addColorStop(0.7,`rgba(130,150,130,${alpha*0.25})`);
  g.addColorStop(1,'rgba(130,140,120,0)');
  ctx.strokeStyle=g;ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(cx-220,y);ctx.lineTo(cx+220,y);ctx.stroke();
  const g2=ctx.createRadialGradient(cx,y,0,cx,y,95);
  g2.addColorStop(0,`rgba(120,160,130,${alpha*0.08})`);
  g2.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g2;ctx.fillRect(cx-220,y-25,440,50);
}
function drawAxis(alpha,x,topY,botY,color,dashed){
  const g=ctx.createLinearGradient(x,topY,x,botY);
  g.addColorStop(0,`rgba(${color},0)`);
  g.addColorStop(0.15,`rgba(${color},${alpha*0.45})`);
  g.addColorStop(0.5,`rgba(${color},${alpha*0.65})`);
  g.addColorStop(0.85,`rgba(${color},${alpha*0.45})`);
  g.addColorStop(1,`rgba(${color},0)`);
  ctx.strokeStyle=g;ctx.lineWidth=1.8;
  if(dashed)ctx.setLineDash([5,7]);
  ctx.beginPath();ctx.moveTo(x,topY);ctx.lineTo(x,botY);ctx.stroke();
  if(dashed)ctx.setLineDash([]);
}
function drawCoG(x,y,alpha,color,size,label){
  ctx.fillStyle=`rgba(${color},${alpha*0.35})`;
  ctx.beginPath();ctx.moveTo(x,y-size);ctx.lineTo(x+size*0.65,y);ctx.lineTo(x,y+size);ctx.lineTo(x-size*0.65,y);ctx.closePath();ctx.fill();
  ctx.strokeStyle=`rgba(${color},${alpha*0.8})`;ctx.lineWidth=1.8;ctx.stroke();
  const g=ctx.createRadialGradient(x,y,0,x,y,size*2.2);
  g.addColorStop(0,`rgba(${color},${alpha*0.15})`);
  g.addColorStop(1,`rgba(${color},0)`);
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,size*2.2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=`rgba(${color},${alpha*0.9})`;
  ctx.beginPath();ctx.arc(x,y,2.5,0,Math.PI*2);ctx.fill();
  if(label){
    ctx.font='10px Fraunces, serif';ctx.fillStyle=`rgba(${color},${alpha*0.7})`;
    ctx.textAlign='left';ctx.fillText(label,x+size+6,y+4);
  }
}

// scene rendering
const groundY=cy+115;
const personY=cy+15;

function s0(alpha){
  if(alpha<=0)return;ctx.save();
  drawGround(alpha,groundY);
  drawAxis(alpha,cx,cy-130,groundY,'170,180,140',false);
  const head = drawHero(cx, personY, alpha, 0, 1, Math.sin(time*0.4));
  drawCoG(cx, personY-20, alpha, '140,190,150', 8, 'Κέντρο Βάρους / Center');
  for(let i=0;i<6;i++){
    const gy=groundY-4+((time*4+i*14)%28);
    const ga=Math.max(0,1-(gy-(groundY-4))/28)*0.18;
    ctx.fillStyle=`rgba(150,190,150,${alpha*ga})`;
    ctx.beginPath();ctx.arc(cx+Math.sin(time*0.25+i)*9,gy,1.3,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}
function s1(alpha){
  if(alpha<=0)return;ctx.save();
  drawGround(alpha,groundY);
  const wobble=Math.sin(time*0.95)*0.045;
  drawAxis(alpha*0.65,cx,cy-130,groundY,'180,160,110',false);
  const head = drawHero(cx, personY, alpha, wobble, 1.42, 0);
  const cogY = personY-26 - Math.sin(time*0.5)*14;
  drawCoG(cx, cogY, alpha, '210,170,90', 9, 'Κέντρο Βάρους ↑');
  // thought circles
  thP.forEach(p=>{
    if(p.r > 65) return;
    p.a+=p.sp*0.02;
    const orbR=p.r*(0.55+Math.sin(time*0.35+p.ph)*0.35);
    const px=head.hx+Math.cos(p.a)*orbR*0.7;
    const py=head.hy+Math.sin(p.a)*orbR*0.45+Math.sin(time*0.55+p.ph)*6;
    ctx.beginPath();ctx.arc(px,py,p.sz,0,Math.PI*2);
    ctx.fillStyle=`rgba(${p.co[0]|0},${p.co[1]|0},${p.co[2]|0},${p.al*alpha*0.5})`;ctx.fill();
  });
  // bilingual word particles
  wordParticles.forEach(wp=>{
    wp.angle += wp.speed * 0.014;
    const rOffset = wp.radius + Math.sin(time*0.8+wp.orbitOffset)*9;
    const px = head.hx + Math.cos(wp.angle) * rOffset * 0.75;
    const py = head.hy + Math.sin(wp.angle) * rOffset * 0.48 + Math.sin(time*0.65+wp.wobble)*8;
    ctx.font = `${Math.floor(11 + wp.size*0.7)}px 'Fraunces', 'Inter', serif`;
    ctx.shadowBlur = 4;
    ctx.shadowColor = "rgba(190,100,70,0.45)";
    ctx.fillStyle = `rgba(235, 195, 150, ${alpha * wp.alpha * 0.9})`;
    ctx.textAlign = "center";
    ctx.fillText(wp.word, px, py);
    ctx.shadowBlur = 0;
  });
  const rg=ctx.createRadialGradient(head.hx,head.hy,0,head.hx,head.hy,70);
  rg.addColorStop(0,`rgba(200,90,70,${alpha*0.06})`);
  ctx.fillStyle=rg;ctx.fillRect(0,0,W,H);
  ctx.restore();
}
function s2(alpha){
  if(alpha<=0)return;ctx.save();
  drawGround(alpha,groundY);
  const tilt=Math.sin(time*0.8)*0.21 + 0.15;
  drawAxis(alpha*0.3,cx,cy-130,groundY,'190,110,90',true);
  const head = drawHero(cx, personY, alpha, tilt, 1.92, 0);
  drawCoG(head.hx, head.hy+8, alpha, '210,100,80', 11, '⚠️ Κέντρο Βάρους');
  // intense particles
  thP.forEach(p=>{
    p.a+=p.sp*0.03;
    const orbR=p.r*(0.85+Math.sin(time*0.6+p.ph)*0.55);
    const px=head.hx+Math.cos(p.a)*orbR*0.85;
    const py=head.hy+Math.sin(p.a)*orbR*0.55+Math.sin(time*0.8+p.ph)*9;
    ctx.beginPath();ctx.arc(px,py,p.sz*1.3,0,Math.PI*2);
    ctx.fillStyle=`rgba(${p.co[0]|0},${p.co[1]|0},${p.co[2]|0},${p.al*alpha*0.75})`;ctx.fill();
  });
  wordParticles.forEach(wp=>{
    wp.angle += wp.speed * 0.025;
    const rOffset = wp.radius + Math.sin(time*1.3+wp.orbitOffset)*14;
    const px = head.hx + Math.cos(wp.angle) * rOffset * 0.95;
    const py = head.hy + Math.sin(wp.angle) * rOffset * 0.65 + Math.sin(time*0.95+wp.wobble)*14;
    ctx.font = `bold ${Math.floor(13 + wp.size)}px 'Fraunces', 'Inter'`;
    ctx.fillStyle = `rgba(245, 150, 110, ${alpha * wp.alpha * 1.0})`;
    ctx.fillText(wp.word, px, py);
  });
  ctx.setLineDash([3,6]);
  ctx.beginPath();ctx.moveTo(cx-42,groundY);ctx.lineTo(cx+42,groundY);ctx.strokeStyle=`rgba(210,90,80,${alpha*0.4})`;ctx.stroke();
  ctx.setLineDash([]);
  const rg=ctx.createRadialGradient(head.hx,head.hy,0,head.hx,head.hy,120);
  rg.addColorStop(0,`rgba(200,70,50,${alpha*0.14})`);
  ctx.fillStyle=rg;ctx.fillRect(0,0,W,H);
  ctx.restore();
}
function s3(alpha){
  if(alpha<=0)return;ctx.save();
  drawGround(alpha,groundY);
  drawAxis(alpha,cx,cy-130,groundY,'130,180,150',false);
  const head = drawHero(cx, personY, alpha, 0, 1.02, Math.sin(time*0.38));
  drawCoG(cx, personY-20, alpha, '130,190,150', 8, '✓ Κέντρο Βάρους');
  for(let i=0;i<11;i++){
    const sp=(i-5)*12,dp=28+Math.abs(i-5)*7;
    ctx.beginPath();ctx.moveTo(cx,groundY);
    ctx.quadraticCurveTo(cx+sp*0.5+Math.sin(time*0.2+i)*4,groundY+dp*0.65,cx+sp+Math.sin(time*0.3+i)*5,groundY+dp);
    ctx.strokeStyle=`rgba(120,180,145,${alpha*(0.08+(1-Math.abs(i-5)/5)*0.1)})`;ctx.lineWidth=1.2;ctx.stroke();
  }
  // fading words drift down (release)
  wordParticles.forEach(wp=>{
    wp.radius += 0.8;
    wp.alpha *= 0.98;
    const px = head.hx + Math.cos(wp.angle+time) * (wp.radius*0.45);
    const py = head.hy + 35 + wp.radius*0.5;
    ctx.font = `${Math.floor(9 + wp.size*0.5)}px 'Fraunces'`;
    ctx.fillStyle = `rgba(170, 210, 180, ${alpha * wp.alpha * 0.5})`;
    ctx.fillText(wp.word, px, py);
  });
  const gg=ctx.createRadialGradient(cx,personY-25,0,cx,personY-25,100);
  gg.addColorStop(0,`rgba(100,190,150,${alpha*0.09})`);
  ctx.fillStyle=gg;ctx.fillRect(0,0,W,H);
  for(let i=0;i<2;i++){
    const rr=((time*6+i*95)%160);
    const ra=Math.max(0,1-rr/160);
    ctx.globalAlpha=alpha*ra*0.06;
    ctx.strokeStyle='rgba(150,210,180,1)';ctx.lineWidth=0.8;
    ctx.beginPath();ctx.arc(cx,personY-25,rr,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;
  }
  ctx.restore();
}
const draws=[s0,s1,s2,s3];

// Background with smooth transitions
function drawBg(sf){
  const idx=Math.floor(sf),fr=sf-idx,nx=Math.min(idx+1,3);
  const r=scenes[idx].bg[0]*(1-fr)+scenes[nx].bg[0]*fr;
  const g=scenes[idx].bg[1]*(1-fr)+scenes[nx].bg[1]*fr;
  const b=scenes[idx].bg[2]*(1-fr)+scenes[nx].bg[2]*fr;
  const gr=ctx.createLinearGradient(0,0,0,H);
  gr.addColorStop(0,`rgb(${r+5|0},${g+8|0},${b+12|0})`);
  gr.addColorStop(1,`rgb(${Math.max(8,r-8)|0},${Math.max(10,g-10)|0},${Math.max(12,b-10)|0})`);
  ctx.fillStyle=gr;ctx.fillRect(0,0,W,H);
  // ambient stars
  ctx.globalAlpha=gA*0.6;
  amb.forEach(p=>{p.x+=p.vx+Math.sin(time*0.2+p.ph)*0.015;p.y+=p.vy+Math.cos(time*0.15+p.ph)*0.01;
    if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
    ctx.beginPath();ctx.arc(p.x,p.y,p.sz*0.8,0,Math.PI*2);
    ctx.fillStyle=`rgba(210,215,190,${p.al*0.5})`;ctx.fill()});
  ctx.globalAlpha=1;
}

function updUI(){const s=scenes[cur];document.getElementById('lm').innerHTML=s.label;
  document.getElementById('ls').innerHTML=s.sub.replace(/\n/g,'<br>');
  document.getElementById('label').classList.add('vis');document.getElementById('sn').textContent=`${cur+1} / 4`;
  document.getElementById('pb').style.width=`${(cur/3)*100}%`;
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===cur))}
function goTo(i){if(i<0||i>3||i===cur||trans)return;tgt=i;trans=true;tT=0;
  document.getElementById('label').classList.remove('vis');
  if(i===1 || i===2) initWordParticles();
  setTimeout(()=>{cur=tgt;trans=false;updUI()},2000)}
function ease(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2}
function togAuto(){autoP=!autoP;document.getElementById('ab').innerHTML=autoP?'⏸ Pause':'▶ Auto';if(autoP)runA();else clearTimeout(autoTm)}
function runA(){if(!autoP)return;autoTm=setTimeout(()=>{if(cur<3){goTo(cur+1);setTimeout(runA,2600)}else{autoP=false;document.getElementById('ab').innerHTML='▶ Auto'}},8500)}
document.getElementById('intro').addEventListener('click',()=>{document.getElementById('intro').classList.add('hidden');updUI()});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' ')goTo(cur+1);if(e.key==='ArrowLeft')goTo(cur-1)});
let lt=0;
function loop(ts){
  const dt=Math.min((ts-lt)/1000,0.05);lt=ts;time+=dt;
  if(gA<1)gA=Math.min(1,gA+dt*0.5);
  if(trans)tT=Math.min(tT+dt*0.6,1);
  ctx.clearRect(0,0,W,H);
  const sf=trans?cur+(tgt-cur)*ease(tT):cur;
  drawBg(sf);ctx.globalAlpha=gA;
  if(trans){const e2=ease(tT);draws[cur](1-e2);draws[tgt](e2)}
  else draws[cur](1);
  ctx.globalAlpha=1;
  requestAnimationFrame(loop)}
requestAnimationFrame(loop);
</script>
