<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Δίνη Σκέψεων · Άγκυρα Βαρύτητας | Grounding Tool</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
  }

  body {
    background: #0c171b;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    color: #f2efe7;
  }

  canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 1;
    display: block;
  }

  /* UI elements */
  .label {
    position: fixed;
    bottom: 75px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 15;
    text-align: center;
    width: 90%;
    max-width: 680px;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(16px);
    padding: 14px 20px;
    border-radius: 56px;
    border: 1px solid rgba(140, 210, 180, 0.4);
    opacity: 0;
    transition: opacity 0.7s ease;
    pointer-events: none;
  }
  .label.vis { opacity: 1; }
  .label .main {
    font-family: 'Fraunces', serif;
    font-size: clamp(1rem, 3.8vw, 1.7rem);
    font-weight: 400;
    letter-spacing: 0.1em;
    background: linear-gradient(135deg, #f3f0e6, #bfe0cf);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .label .sub {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    color: #cde6db;
    margin-top: 5px;
  }
  .cognitive-caption {
    position: fixed;
    bottom: 190px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 14;
    width: 90%;
    max-width: 540px;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(12px);
    padding: 12px 18px;
    border-radius: 28px;
    font-size: 0.75rem;
    line-height: 1.45;
    color: #e2f0ea;
    border-left: 3px solid #7fc1a3;
    opacity: 0;
    transition: opacity 0.6s;
    pointer-events: none;
  }
  .cognitive-caption.vis { opacity: 1; }
  .snum {
    position: fixed;
    top: 18px;
    right: 20px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(5px);
    padding: 4px 14px;
    border-radius: 40px;
    font-size: 0.7rem;
    font-family: monospace;
    z-index: 15;
  }
  .ptrack {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 3px;
    background: rgba(255,255,255,0.1);
    z-index: 15;
  }
  .pbar {
    height: 100%;
    background: linear-gradient(90deg, #5fba9b, #b9a7dc, #efc48a);
    transition: width 1s cubic-bezier(0.2,0.9,0.4,1);
  }
  .dots {
    position: fixed;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 14px;
    z-index: 15;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(200,220,210,0.4);
    border: none;
    cursor: pointer;
    transition: all 0.25s;
  }
  .dot.active { background: #d0f0e0; transform: scale(1.6); box-shadow: 0 0 8px #8cd5b5; }
  .ctrls {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(12px);
    padding: 6px 16px;
    border-radius: 60px;
    z-index: 15;
  }
  .ctrls button {
    background: rgba(30,55,55,0.9);
    border: 1px solid rgba(140,190,170,0.6);
    color: #f0ede5;
    padding: 6px 18px;
    border-radius: 40px;
    font-family: inherit;
    font-size: 0.75rem;
    font-weight: 500;
    cursor: pointer;
    transition: 0.1s;
  }
  .ctrls button:active { transform: scale(0.96); background: #3a7868; }
  .lang-switch {
    position: fixed;
    top: 18px;
    left: 18px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
    padding: 4px 12px;
    border-radius: 40px;
    display: flex;
    gap: 10px;
    z-index: 20;
  }
  .lang-btn {
    background: transparent;
    border: none;
    color: #dae9e2;
    font-size: 0.75rem;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 30px;
    cursor: pointer;
  }
  .lang-btn.active { background: #3f8572; color: white; }
  
  /* INTRO overlay */
  .intro {
    position: fixed;
    inset: 0;
    background: #071013;
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 1s ease;
    cursor: pointer;
    text-align: center;
    padding: 1.5rem;
  }
  .intro.hidden { opacity: 0; pointer-events: none; visibility: hidden; }
  .intro-t {
    font-size: clamp(1.3rem, 4.5vw, 2rem);
    font-weight: 350;
    letter-spacing: 0.1em;
    background: linear-gradient(135deg, #f5f2e9, #bde0cf);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .intro-s {
    font-size: 0.8rem;
    color: #bbd9ce;
    margin-top: 12px;
    max-width: 85%;
  }
  .warning {
    background: rgba(180, 70, 50, 0.25);
    border-left: 3px solid #ffaa77;
    padding: 12px 18px;
    margin-top: 28px;
    max-width: 320px;
    font-size: 0.7rem;
    color: #ffddbb;
    border-radius: 20px;
    backdrop-filter: blur(4px);
  }
  .intro-h {
    margin-top: 32px;
    padding: 10px 28px;
    border: 1px solid rgba(140,200,170,0.6);
    border-radius: 60px;
    background: rgba(30,70,65,0.6);
    backdrop-filter: blur(8px);
    font-size: 0.8rem;
    letter-spacing: 0.2em;
  }
</style>
</head>
<body>
<div class="lang-switch" id="langSwitch">
  <button class="lang-btn" data-lang="el">🇬🇷 ΕΛ</button>
  <button class="lang-btn" data-lang="en">🇬🇧 EN</button>
</div>
<div class="intro" id="intro">
  <div class="intro-t" id="introTitle">Δίνη Σκέψεων · Άγκυρα Βαρύτητας</div>
  <div class="intro-s" id="introSub">Reality Tunnel — Η φούσκα της αυτοκριτικής & η επιστροφή στο σώμα</div>
  <div class="warning" id="warningMsg">⚠️ Προσοχή: Έντονα οπτικά εφέ (κινούμενες λέξεις, δίνες). Κατάλληλο για άτομα που επιθυμούν εξοικείωση με αισθητηριακά ερεθίσματα. Μπορείτε να διακόψετε ανά πάσα στιγμή.</div>
  <div class="intro-h" id="introHint">▶ Ξεκινήστε</div>
</div>

<canvas id="canvas"></canvas>
<div class="label" id="label"><div class="main" id="lm"></div><div class="sub" id="ls"></div></div>
<div class="cognitive-caption" id="cognitiveCaption"></div>
<div class="snum" id="sn">1/4</div>
<div class="ptrack"><div class="pbar" id="pb"></div></div>
<div class="dots" id="dotsContainer"></div>
<div class="ctrls"><button id="prevBtn">◀ Πίσω</button><button id="autoBtn">▶ Αυτόματο</button><button id="nextBtn">Επόμενο ▶</button></div>

<script>
  // ------------------- MULTILINGUAL DATA -------------------
  const localeData = {
    el: {
      scenes: [
        { label:"Γείωση · Βαρύτητα", sub:"Πέλματα στο έδαφος, ηρεμία", bg:[25,45,48], caption:"Το σύστημα ησυχάζει. Νιώθεις τα πέλματα να πατούν γερά. Η αναπνοή ρυθμίζεται. Οι σκέψεις είναι λίγες και διάφανες." },
        { label:"Δίνη Reality Tunnel", sub:"Αυτοκριτική, 'τι θα γίνει αν'", bg:[55,35,48], caption:"Το μυαλό γεμίζει ερωτήσεις και φόβους. Η φούσκα μεγαλώνει. Το κέντρο βάρους ανεβαίνει. Χάνεις την επαφή με το σώμα." },
        { label:"Παγίδευση · Φούσκα τούνελ", sub:"Πλήρης ταύτιση – ταχύτητα, αδιαφάνεια", bg:[65,38,42], caption:"Οι σκέψεις γίνονται τούνελ. Βλέπεις μόνο τον κίνδυνο. Χωρίς άγκυρα, το reality tunnel γίνεται φυλακή." },
        { label:"Επαναφορά · Αναπνοή + Βάρος", sub:"Πνευμονογαστρικό νεύρο – η φούσκα γίνεται διάφανη", bg:[30,58,52], caption:"Η βαθιά αναπνοή ενεργοποιεί το πνευμονογαστρικό. Τα πέλματα γειώνουν. Η φούσκα παραμένει ήρεμη, διάφανη – δεν σε αποκόπτει. Είσαι εδώ." }
      ],
      bubbleWords: ["ενοχές","ανησυχία","ντροπή","φόβος","αυτοκριτική","αμφιβολία","τι θα γίνει αν","reality tunnel","παγίδα","DMN"],
      introTitle:"Δίνη Σκέψεων · Άγκυρα Βαρύτητας",
      introSub:"Reality Tunnel — Η φούσκα της αυτοκριτικής & η επιστροφή στο σώμα",
      introHint:"▶ Ξεκινήστε",
      warning:"⚠️ Προσοχή: Έντονα οπτικά εφέ (κινούμενες λέξεις, δίνες). Κατάλληλο για άτομα που επιθυμούν εξοικείωση με αισθητηριακά ερεθίσματα. Μπορείτε να διακόψετε ανά πάσα στιγμή.",
      ui:{prev:"◀ Πίσω",next:"Επόμενο ▶",auto:"▶ Αυτόματο",pause:"⏸ Παύση"}
    },
    en: {
      scenes: [
        { label:"Grounded · Gravity", sub:"Feet on earth, calm", bg:[25,45,48], caption:"The system calms down. Feel your feet firmly on the ground. Breath steadies. Thoughts are few and transparent." },
        { label:"Reality Tunnel Vortex", sub:"Self-criticism, 'what if'", bg:[55,35,48], caption:"The mind fills with questions and fears. The bubble grows. Center of gravity rises. You lose body connection." },
        { label:"Trapped · Tunnel Bubble", sub:"Full identification – speed, opacity", bg:[65,38,42], caption:"Thoughts become a tunnel. You only see danger. Without an anchor, the reality tunnel becomes a prison." },
        { label:"Reset · Breath + Weight", sub:"Vagus nerve – bubble becomes transparent", bg:[30,58,52], caption:"Deep breathing activates the vagus nerve. Feet ground you. The bubble stays calm, transparent – it doesn't disconnect you. You are here." }
      ],
      bubbleWords: ["guilt","worry","shame","fear","self-criticism","doubt","what if","reality tunnel","trap","DMN"],
      introTitle:"Thought Vortex · Gravity Anchor",
      introSub:"Reality Tunnel — The bubble of self-criticism & return to body",
      introHint:"▶ Begin",
      warning:"⚠️ Caution: Intense visual effects (moving words, vortex). Suitable for those familiar with sensory stimuli. You can stop anytime.",
      ui:{prev:"◀ Prev",next:"Next ▶",auto:"▶ Auto",pause:"⏸ Pause"}
    }
  };

  let currentLang = (navigator.language.startsWith('el') ? 'el' : 'en');
  let scenes = localeData[currentLang].scenes;
  let bubbleWords = localeData[currentLang].bubbleWords;

  // DOM elements
  const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
  let W, H, cx, cy;
  let curScene = 0, targetScene = 0, trans = false, transT = 0;
  let time = 0, globalAlpha = 0;
  let autoPlay = false, autoTimer = null;

  // ---------- ΛΕΞΕΙΣ: δυναμικός αριθμός ανά σκηνή ----------
  let wordParticles = [];
  let vortexSpecks = [];

  // Δημιουργία λέξεων με βάση τον αριθμό (λίγες για ηρεμία, πολλές για καταιγίδα)
  function initWordParticlesForScene(sceneIdx) {
    // Καθορισμός πλήθους: σκηνές 0,3 → ήρεμες (20-25 λέξεις), σκηνές 1,2 → ανεξέλεγκτες (70-80 λέξεις)
    let targetCount = (sceneIdx === 0 || sceneIdx === 3) ? 24 : 72;
    wordParticles = [];
    for(let i=0; i<targetCount; i++) {
      const word = bubbleWords[Math.floor(Math.random() * bubbleWords.length)];
      wordParticles.push({
        word: word,
        angle: Math.random() * Math.PI * 2,
        radius: 20 + Math.random() * 95,
        speed: 0.2 + Math.random() * 1.3,
        size: 14 + Math.random() * 12,
        alpha: 0.6 + Math.random() * 0.4,
        orbitOffset: Math.random() * Math.PI * 2,
        yOffset: (Math.random() - 0.5) * 60
      });
    }
  }

  function initVortexSpecks() {
    vortexSpecks = [];
    for(let i=0;i<70;i++) {
      vortexSpecks.push({ angle:Math.random()*Math.PI*2, radius:20+Math.random()*120, speed:0.3+Math.random()*1.4, size:1.5+Math.random()*3.5 });
    }
  }
  
  // Αρχικοποίηση για την τρέχουσα σκηνή
  function refreshParticlesForCurrentScene() {
    initWordParticlesForScene(curScene);
    initVortexSpecks();
  }
  
  refreshParticlesForCurrentScene();

  // αστέρια φόντου
  const stars = [];
  for(let i=0;i<60;i++) stars.push({ x:Math.random()*2000, y:Math.random()*1000, vx:(Math.random()-0.5)*0.03, vy:(Math.random()-0.5)*0.03, sz:0.5+Math.random()*1.2, alpha:0.1+Math.random()*0.2 });

  function resizeCanvas() {
    const dpr = Math.min(devicePixelRatio || 1, 2);
    W = innerWidth; H = innerHeight;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W+'px'; canvas.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    cx = W/2; cy = H/2;
  }
  resizeCanvas(); addEventListener('resize', resizeCanvas);

  // ------------------- ΣΧΕΔΙΑΣΗ ΗΡΩΑ (πλήρως κεντραρισμένος) -------------------
  function drawHero(x, y, tiltRad, headScale, bodyShiftY, alpha) {
    ctx.save();
    ctx.translate(x, y + bodyShiftY);
    ctx.rotate(tiltRad);
    const op = Math.min(1, alpha);
    
    // Ενεργειακή γραμμή
    ctx.fillStyle = `rgba(255, 224, 102, ${op*0.8})`;
    ctx.fillRect(98, 0, 4, 420);
    
    // Σώμα
    ctx.fillStyle = `rgba(18, 18, 18, ${op*0.95})`;
    ctx.beginPath(); ctx.moveTo(60, 155); ctx.quadraticCurveTo(100, 140, 140, 155); ctx.lineTo(140, 300); ctx.quadraticCurveTo(100, 320, 60, 300); ctx.fill();
    ctx.fillStyle = `rgba(255, 59, 47, ${op*0.7})`;
    ctx.fillRect(99, 155, 2, 145);
    // Χέρια
    ctx.fillStyle = `rgba(18, 18, 18, ${op*0.95})`;
    ctx.beginPath(); ctx.moveTo(60, 170); ctx.quadraticCurveTo(40, 180, 45, 260); ctx.quadraticCurveTo(50, 290, 60, 290); ctx.fill();
    ctx.beginPath(); ctx.moveTo(140, 170); ctx.quadraticCurveTo(160, 180, 155, 260); ctx.quadraticCurveTo(150, 290, 140, 290); ctx.fill();
    // Παλάμες
    ctx.fillStyle = `rgba(243, 197, 154, ${op*0.9})`;
    ctx.beginPath(); ctx.ellipse(52, 300, 9, 13, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(148, 300, 9, 13, 0, 0, Math.PI*2); ctx.fill();
    // Πόδια
    ctx.fillStyle = `rgba(18, 18, 18, ${op*0.95})`;
    ctx.beginPath(); ctx.moveTo(65, 300); ctx.lineTo(95, 300); ctx.lineTo(95, 410); ctx.quadraticCurveTo(80, 420, 65, 410); ctx.fill();
    ctx.beginPath(); ctx.moveTo(105, 300); ctx.lineTo(135, 300); ctx.lineTo(135, 410); ctx.quadraticCurveTo(120, 420, 105, 410); ctx.fill();
    ctx.fillStyle = `rgba(10, 10, 10, ${op})`;
    ctx.beginPath(); ctx.ellipse(80, 415, 16, 7, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(120, 415, 16, 7, 0, 0, Math.PI*2); ctx.fill();
    
    // Κεφάλι με scaling
    ctx.save();
    ctx.translate(100, 95);
    ctx.scale(headScale, headScale);
    ctx.translate(-100, -95);
    ctx.fillStyle = `rgba(31, 47, 48, ${op*0.95})`;
    ctx.beginPath(); ctx.moveTo(50, 95); ctx.quadraticCurveTo(100, 15, 150, 95); ctx.quadraticCurveTo(145, 160, 130, 180); ctx.quadraticCurveTo(100, 155, 70, 180); ctx.quadraticCurveTo(55, 160, 50, 95); ctx.fill();
    ctx.fillStyle = `rgba(243, 197, 154, ${op*0.95})`;
    ctx.beginPath(); ctx.ellipse(100, 115, 26, 30, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = `rgba(34,34,34,${op})`; ctx.lineWidth = 2;
    if(headScale > 1.15) {
      ctx.beginPath(); ctx.arc(88, 115, 4, 0, Math.PI*2); ctx.fillStyle = `rgba(210,100,80,${op*0.6})`; ctx.fill();
      ctx.beginPath(); ctx.arc(112, 115, 4, 0, Math.PI*2); ctx.fill();
    } else {
      ctx.beginPath(); ctx.moveTo(85, 115); ctx.quadraticCurveTo(90, 120, 95, 115); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(105, 115); ctx.quadraticCurveTo(110, 120, 115, 115); ctx.stroke();
    }
    if(headScale > 1.2) {
      ctx.beginPath(); ctx.moveTo(90, 135); ctx.quadraticCurveTo(100, 142, 110, 135); ctx.stroke();
    } else {
      ctx.beginPath(); ctx.moveTo(90, 130); ctx.quadraticCurveTo(100, 138, 110, 130); ctx.stroke();
    }
    ctx.fillStyle = `rgba(243, 197, 154, ${op*0.9})`;
    ctx.fillRect(96, 140, 8, 18);
    ctx.restore();
    
    // Infinity στο στήθος
    const grad = ctx.createLinearGradient(75, 215, 125, 215);
    grad.addColorStop(0, '#ff3c38');
    grad.addColorStop(0.2, '#ff9f1c');
    grad.addColorStop(0.4, '#ffe066');
    grad.addColorStop(0.6, '#2ec4b6');
    grad.addColorStop(0.8, '#3a86ff');
    grad.addColorStop(1, '#8338ec');
    ctx.beginPath();
    ctx.moveTo(75, 215); ctx.bezierCurveTo(75,200,95,200,100,215); ctx.bezierCurveTo(105,230,125,230,125,215); ctx.bezierCurveTo(125,200,105,200,100,215); ctx.bezierCurveTo(95,230,75,230,75,215);
    ctx.strokeStyle = grad; ctx.lineWidth = 5; ctx.stroke();
    ctx.fillStyle = `rgba(183, 255, 0, ${op*0.9})`;
    ctx.save(); ctx.translate(100, 303); ctx.rotate(0.785); ctx.fillRect(-8, -8, 16, 16); ctx.restore();
    
    ctx.fillStyle = `rgba(203, 213, 225, ${op})`;
    ctx.font = '12px Inter';
    ctx.fillText(currentLang === 'el' ? "Κέντρο Βάρους" : "Center of gravity", 135, 305);
    
    ctx.restore();
  }

  // ---------- ΣΧΕΔΙΑΣΗ ΦΟΝΤΟΥ, ΕΔΑΦΟΥΣ, ΑΞΟΝΑ ----------
  function drawGround(alpha, yPos) {
    ctx.beginPath(); ctx.moveTo(cx-300, yPos); ctx.lineTo(cx+300, yPos);
    ctx.strokeStyle = `rgba(140,190,150,${alpha*0.5})`; ctx.lineWidth = 2; ctx.stroke();
    const grad = ctx.createRadialGradient(cx, yPos+8, 0, cx, yPos+8, 70);
    grad.addColorStop(0, `rgba(100,170,130,${alpha*0.2})`); grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad; ctx.fillRect(cx-200, yPos-15, 400, 40);
  }

  function drawAxis(x, topY, botY, alpha) {
    ctx.beginPath(); ctx.moveTo(x, topY); ctx.lineTo(x, botY);
    ctx.strokeStyle = `rgba(160,180,130,${alpha*0.6})`; ctx.lineWidth = 1.5; ctx.setLineDash([6,8]); ctx.stroke();
    ctx.setLineDash([]);
  }

  function drawCoGMarker(x, y, alpha, stressLevel) {
    let color = (stressLevel > 1.2) ? '210,100,80' : (stressLevel > 0.8 ? '210,170,90' : '140,190,150');
    ctx.fillStyle = `rgba(${color},${alpha*0.35})`;
    ctx.beginPath(); ctx.moveTo(x, y-9); ctx.lineTo(x+9, y); ctx.lineTo(x, y+9); ctx.lineTo(x-9, y); ctx.fill();
    ctx.fillStyle = `rgba(${color},${alpha*0.9})`;
    ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI*2); ctx.fill();
    if(stressLevel > 1.2) {
      ctx.fillStyle = `rgba(255,180,120,${alpha})`;
      ctx.font = 'bold 10px Inter';
      ctx.fillText("⚠️", x+12, y+4);
    }
  }

  // ---------- ΦΟΥΣΚΑ ΣΚΕΨΕΩΝ (ανεβασμένη ώστε να καλύπτει το κεφάλι) ----------
  function drawBubbleWords(sceneIdx, alpha, t) {
    let intensityFactor = 1.0;
    if(sceneIdx === 0) intensityFactor = 0.2;
    else if(sceneIdx === 1) intensityFactor = 0.7;
    else if(sceneIdx === 2) intensityFactor = 1.2;
    else if(sceneIdx === 3) intensityFactor = 0.35;
    
    // Η φούσκα ανεβαίνει ψηλότερα: cy - 55 (πριν ήταν cy-20)
    const bubbleCenterX = cx;
    const bubbleCenterY = cy - 55;
    
    // ημιδιαφανής φούσκα
    ctx.save();
    ctx.globalAlpha = alpha * (sceneIdx===0 ? 0.1 : (sceneIdx===3 ? 0.2 : 0.45));
    ctx.fillStyle = `rgba(210,220,190,0.08)`;
    ctx.beginPath(); ctx.ellipse(bubbleCenterX, bubbleCenterY, 88, 74, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = `rgba(210,190,150,0.25)`; ctx.lineWidth = 1.2; ctx.stroke();
    ctx.restore();
    
    // λέξεις
    for(let p of wordParticles) {
      let angle = p.angle + p.speed * 0.018 * intensityFactor + t * 0.12;
      let rad = p.radius + Math.sin(t * 0.7 + p.orbitOffset) * 8;
      let x = bubbleCenterX + Math.cos(angle) * rad * 0.7;
      let y = bubbleCenterY + Math.sin(angle) * rad * 0.6 + p.yOffset * 0.4;
      // όρια ώστε να καλύπτει κεφάλι και άνω στήθος
      if(y < cy-105) y = cy-105;
      if(y > cy-5) y = cy-5;
      let wordAlpha = p.alpha * alpha;
      if(sceneIdx === 0) wordAlpha *= 0.3;
      if(sceneIdx === 3) wordAlpha *= 0.5;
      if(sceneIdx === 2) wordAlpha *= 1.1;
      ctx.font = `${Math.floor(15 + p.size * 0.5)}px 'Fraunces', 'Inter'`;
      ctx.fillStyle = `rgba(250, 215, 160, ${wordAlpha * 0.95})`;
      ctx.fillText(p.word, x, y);
      p.angle += p.speed * 0.004 * intensityFactor;
    }
    
    // σπινθήρες δίνης
    for(let s of vortexSpecks) {
      let ang = s.angle + s.speed * 0.018 * intensityFactor + t;
      let rad = s.radius + Math.sin(t * 1.3) * 12;
      let x = bubbleCenterX + Math.cos(ang) * rad * 0.7;
      let y = bubbleCenterY + Math.sin(ang) * rad * 0.6;
      ctx.beginPath(); ctx.arc(x, y, s.size * (0.4 + intensityFactor*0.5), 0, Math.PI*2);
      ctx.fillStyle = `rgba(210, 140, 100, ${alpha * 0.2 * intensityFactor})`;
      ctx.fill();
      s.angle += s.speed * 0.005 * intensityFactor;
    }
    
    // Δακτύλιος πνευμονογαστρικού (vagus)
    const breath = (Math.sin(t * 1.5) + 1) / 2;
    const radiusRing = 26 + breath * 12;
    ctx.beginPath(); ctx.arc(cx, cy+5, radiusRing, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(140,220,180,${alpha*0.5})`; ctx.lineWidth = 1.8; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy+5, radiusRing-6, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(200,240,200,${alpha*0.6})`; ctx.stroke();
  }

  // ---------- ΣΚΗΝΕΣ & ΑΠΟΔΟΣΗ ----------
  function renderScene(sceneIdx, alpha, t) {
    // φόντο
    const bg = scenes[sceneIdx].bg;
    const grad = ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0, `rgb(${bg[0]+8},${bg[1]+8},${bg[2]+12})`);
    grad.addColorStop(1, `rgb(${Math.max(5,bg[0]-5)},${Math.max(8,bg[1]-6)},${Math.max(10,bg[2]-5)})`);
    ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);
    
    ctx.globalAlpha = 0.25;
    stars.forEach(s=>{ s.x+=s.vx; s.y+=s.vy; if(s.x<0)s.x=W; if(s.x>W)s.x=0; if(s.y<0)s.y=H; if(s.y>H)s.y=0; ctx.beginPath(); ctx.arc(s.x,s.y,s.sz,0,Math.PI*2); ctx.fillStyle=`rgba(210,230,200,${s.alpha})`; ctx.fill(); });
    ctx.globalAlpha = 1;
    
    const groundY = cy + 110;
    drawGround(alpha, groundY);
    drawAxis(cx, cy-130, groundY, alpha);
    
    let tilt = 0, headScale = 1, bodyShift = 0, stressLevel = 1;
    if(sceneIdx === 0) { tilt = 0; headScale = 1; bodyShift = 0; stressLevel = 0.8; }
    else if(sceneIdx === 1) { tilt = Math.sin(t * 1.6) * 0.04; headScale = 1.12; bodyShift = -5; stressLevel = 1.2; }
    else if(sceneIdx === 2) { tilt = Math.sin(t * 2.0) * 0.08 + 0.03; headScale = 1.28; bodyShift = -12; stressLevel = 1.6; }
    else if(sceneIdx === 3) { tilt = Math.sin(t * 0.7) * 0.01; headScale = 1.02; bodyShift = 1; stressLevel = 0.9; }
    
    const heroX = cx - 100;
    const heroY = cy - 210;
    drawHero(heroX, heroY, tilt, headScale, bodyShift, alpha);
    drawBubbleWords(sceneIdx, alpha, t);
    
    let cogY = heroY + 255 + bodyShift;
    if(sceneIdx === 1) cogY += Math.sin(t*2)*3;
    if(sceneIdx === 2) cogY += Math.sin(t*2.5)*5;
    drawCoGMarker(cx, cogY, alpha, stressLevel);
    
    if(sceneIdx === 0 || sceneIdx === 3) {
      ctx.beginPath(); ctx.arc(cx, heroY + 260, 28, 0, Math.PI*2);
      ctx.fillStyle = `rgba(120,200,140,${alpha*0.1*(0.6+Math.sin(t*1.2)*0.3)})`; ctx.fill();
    }
  }

  // ---------- UI & TRANSITIONS ----------
  function updateUITexts() {
    const s = scenes[curScene];
    document.getElementById('lm').innerHTML = s.label;
    document.getElementById('ls').innerHTML = s.sub;
    document.getElementById('cognitiveCaption').innerHTML = s.caption;
    document.getElementById('sn').innerHTML = `${curScene+1}/4`;
    document.getElementById('pb').style.width = `${(curScene/3)*100}%`;
    document.querySelectorAll('.dot').forEach((d,i)=> d.classList.toggle('active', i===curScene));
  }

  function rebuildDots() {
    const container = document.getElementById('dotsContainer');
    container.innerHTML = '';
    for(let i=0;i<4;i++) {
      const btn = document.createElement('button'); btn.classList.add('dot'); if(i===curScene) btn.classList.add('active');
      btn.onclick = () => goToScene(i);
      container.appendChild(btn);
    }
  }

  function goToScene(i) {
    if(i===curScene || trans || i<0 || i>3) return;
    targetScene = i;
    trans = true;
    transT = 0;
    document.getElementById('label').classList.remove('vis');
    document.getElementById('cognitiveCaption').classList.remove('vis');
    setTimeout(() => {
      curScene = targetScene;
      trans = false;
      // Αναδημιουργία λέξεων με βάση τη νέα σκηνή (λίγες ή πολλές)
      initWordParticlesForScene(curScene);
      initVortexSpecks();
      updateUITexts();
      document.getElementById('label').classList.add('vis');
      document.getElementById('cognitiveCaption').classList.add('vis');
      if(bubbleWords !== localeData[currentLang].bubbleWords) {
        bubbleWords = localeData[currentLang].bubbleWords;
        initWordParticlesForScene(curScene);
      }
    }, 900);
  }

  function setLanguage(lang) {
    currentLang = lang;
    scenes = localeData[lang].scenes;
    bubbleWords = localeData[lang].bubbleWords;
    initWordParticlesForScene(curScene);
    initVortexSpecks();
    document.getElementById('introTitle').innerText = localeData[lang].introTitle;
    document.getElementById('introSub').innerText = localeData[lang].introSub;
    document.getElementById('introHint').innerText = localeData[lang].introHint;
    document.getElementById('warningMsg').innerHTML = localeData[lang].warning;
    document.getElementById('prevBtn').innerText = localeData[lang].ui.prev;
    document.getElementById('nextBtn').innerText = localeData[lang].ui.next;
    document.getElementById('autoBtn').innerText = autoPlay ? localeData[lang].ui.pause : localeData[lang].ui.auto;
    document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang));
    if(!trans) updateUITexts();
  }

  function toggleAuto() {
    autoPlay = !autoPlay;
    document.getElementById('autoBtn').innerText = autoPlay ? localeData[currentLang].ui.pause : localeData[currentLang].ui.auto;
    if(autoPlay) {
      function nextStep() {
        if(!autoPlay) return;
        if(curScene < 3) goToScene(curScene+1);
        autoTimer = setTimeout(() => { if(autoPlay && curScene<3) nextStep(); else if(curScene===3) { autoPlay=false; document.getElementById('autoBtn').innerText = localeData[currentLang].ui.auto; } }, 9000);
      }
      if(autoTimer) clearTimeout(autoTimer);
      autoTimer = setTimeout(nextStep, 9000);
    } else { if(autoTimer) clearTimeout(autoTimer); }
  }

  // Intro dismiss
  const introDiv = document.getElementById('intro');
  function dismissIntro() { introDiv.classList.add('hidden'); }
  introDiv.addEventListener('click', dismissIntro);
  introDiv.addEventListener('touchstart', dismissIntro);
  setTimeout(dismissIntro, 4000);

  // Event listeners
  document.getElementById('prevBtn').onclick = () => goToScene(curScene-1);
  document.getElementById('nextBtn').onclick = () => goToScene(curScene+1);
  document.getElementById('autoBtn').onclick = toggleAuto;
  document.querySelectorAll('.lang-btn').forEach(btn => btn.addEventListener('click', (e) => { setLanguage(btn.dataset.lang); }));

  rebuildDots();
  setLanguage(currentLang);
  updateUITexts();
  document.getElementById('label').classList.add('vis');
  document.getElementById('cognitiveCaption').classList.add('vis');

  // Animation loop
  let lastTime = 0;
  function animate(now) {
    requestAnimationFrame(animate);
    const dt = Math.min((now - (lastTime||now))/1000, 0.05);
    lastTime = now;
    time += dt;
    if(globalAlpha < 1) globalAlpha = Math.min(1, globalAlpha + dt*0.6);
    
    if(trans) {
      transT = Math.min(1, transT + dt*0.7);
      const ease = transT<0.5?4*transT*transT*transT:1-Math.pow(-2*transT+2,3)/2;
      renderScene(curScene, globalAlpha*(1-ease), time);
      renderScene(targetScene, globalAlpha*ease, time);
    } else {
      renderScene(curScene, globalAlpha, time);
    }
  }
  requestAnimationFrame(animate);
</script>
</body>
