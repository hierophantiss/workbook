<canvas id="c"></canvas>

<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let W,H;
function resize(){
  const d=Math.min(devicePixelRatio||1,2);
  const r=cv.getBoundingClientRect();
  W=r.width;H=r.height;
  cv.width=W*d;cv.height=H*d;
  ctx.setTransform(d,0,0,d,0,0);
}
resize();addEventListener('resize',resize);

let lang='el',t=0;
const urlLang=new URLSearchParams(location.search).get('lang');
if(urlLang==='en'||urlLang==='el')lang=urlLang;
function toggleLang(){lang=lang==='el'?'en':'el';document.getElementById('langBtn').textContent=lang==='el'?'EN':'ΕΛ'}

// ═══ SCENES ═══
const SCENES=[
  {dur:8,
   el:'Κλειστή Προσοχή · Σάμαθα',
   en:'Focused Attention · Shamatha',
   el2:'Ένα τρίγωνο — ένα σημείο. Η προσοχή εστιάζεται σε ένα αντικείμενο.',
   en2:'One triangle — one point. Attention is fixed on a single object.',
   type:'focused'},
  {dur:3,
   el:'Σκέψη εμφανίζεται... η προσοχή παρασύρεται',
   en:'A thought appears... attention is pulled away',
   el2:'Το τρίγωνο κινείται προς τη σκέψη — φυσιολογική αντίδραση.',
   en2:'The triangle moves toward the thought — a natural reaction.',
   type:'focused_distract'},
  {dur:3,
   el:'Επίγνωση → Επιστροφή στο σημείο',
   en:'Awareness → Return to the point',
   el2:'Η σκέψη αναγνωρίζεται και η προσοχή επανέρχεται. Αυτή είναι η πρακτική.',
   en2:'The thought is recognized and attention returns. This is the practice.',
   type:'focused_return'},
  {dur:8,
   el:'Ανοιχτή Προσοχή · Βιπάσανα',
   en:'Open Attention · Vipassana',
   el2:'Κανένα τρίγωνο — ένας κύκλος. Η προσοχή ανοίγεται σε ό,τι υπάρχει.',
   en2:'No triangle — a circle. Attention opens to whatever arises.',
   type:'open'},
  {dur:5,
   el:'Ερεθίσματα εμφανίζονται μέσα στον κύκλο',
   en:'Stimuli appear within the circle',
   el2:'Ήχοι, αισθήσεις, σκέψεις — ο κύκλος τα φιλοξενεί χωρίς να κολλά.',
   en2:'Sounds, sensations, thoughts — the circle hosts them without clinging.',
   type:'open_stimuli'},
  {dur:8,
   el:'Διασπασμένη Προσοχή',
   en:'Dispersed Attention',
   el2:'Πολλά τρίγωνα ταυτόχρονα — κανένα δεν σβήνει. Νοητική υπερφόρτωση.',
   en2:'Many triangles at once — none release. Cognitive overload.',
   type:'dispersed'},
  {dur:5,
   el:'Σύγκριση: Εστίαση vs Άνοιγμα vs Διάσπαση',
   en:'Comparison: Focus vs Open vs Dispersion',
   el2:'Η ίδια ενέργεια — τρεις διαφορετικοί τρόποι κατεύθυνσης.',
   en2:'Same energy — three different ways of directing it.',
   type:'compare'},
];

const totalDur=SCENES.reduce((a,s)=>a+s.dur,0);
let sceneIdx=0,sceneT=0;

// Build dots
document.getElementById('dots').innerHTML=SCENES.map((_,i)=>`<div class="dot${i===0?' active':''}" id="dot${i}"></div>`).join('');

// ═══ GEOMETRY ═══
function drawHead(cx,cy,sc,stress){
  ctx.save();ctx.translate(cx,cy);ctx.scale(sc,sc);
  // Head
  ctx.beginPath();ctx.ellipse(0,0,30,22,0,0,Math.PI*2);
  ctx.fillStyle='rgba(25,35,45,0.85)';
  const sr=Math.min(200,120+stress*80),sg=Math.max(100,160-stress*60),sb=Math.max(100,180-stress*80);
  ctx.strokeStyle=`rgba(${sr},${sg},${sb},0.5)`;ctx.lineWidth=1.2;ctx.fill();ctx.stroke();
  // Eyes
  const eyeColor=stress>0.5?`rgba(200,80,80,${0.5+stress*0.5})`:'rgba(200,169,110,0.8)';
  ctx.fillStyle=eyeColor;ctx.shadowColor=eyeColor;ctx.shadowBlur=6;
  ctx.beginPath();ctx.arc(-12,-10,3.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(12,-10,3.5,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  // Center dot
  ctx.beginPath();ctx.arc(0,0,2.5,0,Math.PI*2);
  ctx.fillStyle=`rgba(255,255,255,${0.8-stress*0.5})`;ctx.fill();
  ctx.restore();
}

function drawTriangle(cx,cy,tx,ty,alpha,color){
  const eL={x:cx-12,y:cy-10},eR={x:cx+12,y:cy-10};
  const grd=ctx.createLinearGradient(cx,cy,tx,ty);
  grd.addColorStop(0,`rgba(${color},${alpha*0.2})`);
  grd.addColorStop(1,`rgba(${color},0)`);
  ctx.beginPath();ctx.moveTo(eL.x,eL.y);ctx.lineTo(tx,ty);ctx.lineTo(eR.x,eR.y);ctx.closePath();
  ctx.fillStyle=grd;ctx.fill();
  // Lines
  ctx.strokeStyle=`rgba(${color},${alpha*0.5})`;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(eL.x,eL.y);ctx.lineTo(tx,ty);ctx.moveTo(eR.x,eR.y);ctx.lineTo(tx,ty);ctx.stroke();
}

function drawFocusPoint(x,y,alpha){
  const p=0.5+0.5*Math.sin(t*2);
  ctx.save();ctx.translate(x,y);ctx.globalAlpha=alpha;
  for(let i=2;i>=1;i--){
    ctx.beginPath();ctx.arc(0,0,6+i*4+p*2,0,Math.PI*2);
    ctx.strokeStyle=`rgba(160,210,230,${0.08*alpha})`;ctx.lineWidth=1.2;ctx.stroke();
  }
  ctx.beginPath();
  for(let i=0;i<6;i++){const a=(i*Math.PI)/3-Math.PI/2;i===0?ctx.moveTo(Math.cos(a)*5,Math.sin(a)*5):ctx.lineTo(Math.cos(a)*5,Math.sin(a)*5)}
  ctx.closePath();ctx.fillStyle=`rgba(180,230,255,${0.7+0.3*p})`;ctx.shadowColor='rgba(140,200,230,0.6)';ctx.shadowBlur=10;ctx.fill();
  ctx.restore();
}

function drawOpenCircle(cx,cy,radius,alpha){
  ctx.save();ctx.translate(cx,cy);ctx.globalAlpha=alpha;
  const pulse=0.5+0.5*Math.sin(t*0.8);
  const r=radius+pulse*5;
  // Expanding ripples
  for(let i=0;i<3;i++){
    const rr=((t*12+i*25)%r);
    const ra=Math.max(0,1-rr/r)*0.12;
    ctx.strokeStyle=`rgba(120,180,200,${ra})`;ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(0,0,rr,0,Math.PI*2);ctx.stroke();
  }
  // Main circle
  ctx.strokeStyle=`rgba(120,180,200,${0.2+pulse*0.05})`;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.stroke();
  // Sound waves left/right
  for(let s=-1;s<=1;s+=2){
    for(let i=1;i<=3;i++){
      const wr=i*10+((t*15)%15);
      const wa=Math.max(0,0.15-wr/80);
      ctx.strokeStyle=`rgba(140,185,200,${wa})`;ctx.lineWidth=0.8;
      ctx.beginPath();ctx.arc(s*25,5,wr,s>0?-0.6:Math.PI-0.6,s>0?0.6:Math.PI+0.6);ctx.stroke();
    }
  }
  ctx.restore();
}

function drawThought(x,y,label,alpha,pulsePhase){
  if(alpha<0.01)return;
  ctx.save();ctx.globalAlpha=alpha;ctx.translate(x,y);
  const p=0.5+0.5*Math.sin(t*1.2+pulsePhase);
  const grd=ctx.createRadialGradient(0,0,0,0,0,20);
  grd.addColorStop(0,`rgba(120,160,180,${0.35+p*0.1})`);
  grd.addColorStop(1,'rgba(120,160,180,0)');
  ctx.beginPath();ctx.arc(0,0,20,0,Math.PI*2);ctx.fillStyle=grd;ctx.fill();
  for(let i=0;i<4;i++){
    const a=t*0.8+i*Math.PI/2+pulsePhase,r=8+Math.random()*6;
    ctx.beginPath();ctx.arc(Math.cos(a)*r,Math.sin(a)*r,1.5,0,Math.PI*2);
    ctx.fillStyle='rgba(160,210,230,0.5)';ctx.fill();
  }
  ctx.fillStyle='rgba(180,220,240,0.8)';ctx.font='10px Cormorant Garamond,serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(label,0,0);
  ctx.restore();
}

// Stimuli for open attention
const STIMULI=[
  {angle:0.3,r:0.6,el:'ήχος',en:'sound',phase:0},
  {angle:1.8,r:0.5,el:'αίσθηση',en:'sensation',phase:1.5},
  {angle:3.2,r:0.7,el:'σκέψη',en:'thought',phase:3},
  {angle:4.5,r:0.4,el:'ανάμνηση',en:'memory',phase:4.5},
  {angle:5.8,r:0.55,el:'εικόνα',en:'image',phase:2.5},
];

// Dispersed thoughts
const DISP_THOUGHTS=[
  {x:-0.35,y:-0.3,el:'παρελθόν',en:'past',delay:0},
  {x:0.3,y:-0.2,el:'ανησυχία',en:'worry',delay:0.8},
  {x:-0.25,y:-0.55,el:'σχέδια',en:'plans',delay:1.6},
  {x:0.35,y:-0.45,el:'πόνος',en:'pain',delay:2.4},
  {x:-0.1,y:-0.15,el:'θυμός',en:'anger',delay:3.2},
  {x:0.15,y:-0.6,el:'αν...',en:'if...',delay:4},
];

// ═══ DRAW SCENES ═══
function drawScene(type,progress){
  const midX=W/2,botY=H*0.82;
  const sc=Math.min(W,H)/500;

  if(type==='focused'){
    const focusY=H*0.25;
    drawFocusPoint(midX,focusY,1);
    drawTriangle(midX,botY,midX,focusY,0.8,'200,169,110');
    drawHead(midX,botY,sc,0);
    // Label
    ctx.fillStyle='rgba(200,169,110,0.3)';ctx.font=`${11*sc}px Cormorant Garamond,serif`;ctx.textAlign='center';
    ctx.fillText(lang==='el'?'σημείο εστίασης':'focus point',midX,focusY+20*sc);
  }

  else if(type==='focused_distract'){
    const focusY=H*0.25;
    const thoughtX=midX-W*0.2,thoughtY=H*0.4;
    const lerpP=Math.min(1,progress*1.5);
    const tx=midX+(thoughtX-midX)*ease(lerpP);
    const ty=focusY+(thoughtY-focusY)*ease(lerpP);
    drawFocusPoint(midX,focusY,1-lerpP*0.5);
    drawThought(thoughtX,thoughtY,lang==='el'?'σκέψη':'thought',lerpP,0);
    drawTriangle(midX,botY,tx,ty,0.8,'200,169,110');
    drawHead(midX,botY,sc,0);
  }

  else if(type==='focused_return'){
    const focusY=H*0.25;
    const thoughtX=midX-W*0.2,thoughtY=H*0.4;
    const lerpP=Math.min(1,progress*1.2);
    const tx=thoughtX+(midX-thoughtX)*ease(lerpP);
    const ty=thoughtY+(focusY-thoughtY)*ease(lerpP);
    drawFocusPoint(midX,focusY,0.5+lerpP*0.5);
    drawThought(thoughtX,thoughtY,lang==='el'?'σκέψη':'thought',1-lerpP,0);
    drawTriangle(midX,botY,tx,ty,0.8,'200,169,110');
    drawHead(midX,botY,sc,0);
    // Recognition label
    if(lerpP<0.5){
      ctx.save();ctx.globalAlpha=(0.5-lerpP)*2;
      ctx.fillStyle='#c8a96e';ctx.font=`italic ${10*sc}px Cormorant Garamond,serif`;ctx.textAlign='center';
      ctx.fillText(lang==='el'?'αναγνώριση':'recognition',thoughtX,thoughtY+25);
      ctx.restore();
    }
  }

  else if(type==='open'){
    const centerY=botY-H*0.15;
    drawOpenCircle(midX,centerY,H*0.25,1);
    drawHead(midX,botY,sc,0);
    // No triangle — just circle
    ctx.fillStyle='rgba(120,180,200,0.25)';ctx.font=`${11*sc}px Cormorant Garamond,serif`;ctx.textAlign='center';
    ctx.fillText(lang==='el'?'ανοιχτή επίγνωση':'open awareness',midX,centerY-H*0.28);
  }

  else if(type==='open_stimuli'){
    const centerY=botY-H*0.15;
    const radius=H*0.25;
    drawOpenCircle(midX,centerY,radius,1);
    // Stimuli drift in
    STIMULI.forEach(s=>{
      const age=Math.max(0,(sceneT-s.phase)*0.4);
      const alpha=Math.min(0.7,age);
      const drift=Math.sin(t*0.5+s.phase)*8;
      const sx=midX+Math.cos(s.angle+t*0.1)*radius*s.r+drift;
      const sy=centerY+Math.sin(s.angle+t*0.1)*radius*s.r;
      drawThought(sx,sy,lang==='el'?s.el:s.en,alpha,s.phase);
    });
    drawHead(midX,botY,sc,0);
  }

  else if(type==='dispersed'){
    const focusY=H*0.25;
    drawFocusPoint(midX,focusY,Math.max(0.1,1-progress*1.5));
    // Thoughts accumulate
    const stress=Math.min(1,progress*1.3);
    DISP_THOUGHTS.forEach(dt=>{
      const age=Math.max(0,sceneT-dt.delay);
      const alpha=Math.min(1,age*0.6);
      if(alpha<0.01)return;
      const tx=midX+dt.x*W*0.45,ty=botY+dt.y*H*0.7;
      drawThought(tx,ty,lang==='el'?dt.el:dt.en,alpha,dt.delay);
      // Triangle stays lit — the key difference!
      const r=Math.min(220,140+stress*80),g=Math.max(80,170-stress*90),b=Math.max(80,200-stress*120);
      drawTriangle(midX,botY,tx,ty,alpha*0.6,`${r},${g},${b}`);
    });
    // Shake at high stress
    if(stress>0.5){
      const sh=(stress-0.5)*3;
      ctx.save();ctx.translate(Math.sin(t*13)*sh,Math.cos(t*17)*sh);
      drawHead(midX,botY,sc,stress);
      ctx.restore();
    } else {
      drawHead(midX,botY,sc,stress);
    }
  }

  else if(type==='compare'){
    // Three mini scenes side by side
    const w3=W/3,cy=H*0.55;
    // 1. Focused
    const f1x=w3*0.5,f1y=H*0.2;
    drawFocusPoint(f1x,f1y,0.8);
    drawTriangle(f1x,cy,f1x,f1y,0.6,'200,169,110');
    drawHead(f1x,cy,sc*0.6,0);
    ctx.fillStyle='rgba(200,169,110,0.5)';ctx.font=`${10*sc}px Cormorant Garamond,serif`;ctx.textAlign='center';
    ctx.fillText(lang==='el'?'Κλειστή':'Focused',f1x,cy+30*sc);

    // 2. Open
    const f2x=w3*1.5;
    drawOpenCircle(f2x,cy-H*0.1,H*0.12,0.8);
    drawHead(f2x,cy,sc*0.6,0);
    ctx.fillStyle='rgba(120,180,200,0.5)';
    ctx.fillText(lang==='el'?'Ανοιχτή':'Open',f2x,cy+30*sc);

    // 3. Dispersed
    const f3x=w3*2.5;
    [{dx:-20,dy:-40},{dx:25,dy:-30},{dx:-10,dy:-60},{dx:15,dy:-55}].forEach((d,i)=>{
      drawTriangle(f3x,cy,f3x+d.dx,cy+d.dy,0.4,`200,${100-i*15},${100-i*15}`);
    });
    drawHead(f3x,cy,sc*0.6,0.7);
    ctx.fillStyle='rgba(200,100,100,0.5)';
    ctx.fillText(lang==='el'?'Διασπασμένη':'Dispersed',f3x,cy+30*sc);

    // Dividers
    ctx.strokeStyle='rgba(100,120,140,0.08)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(w3,H*0.1);ctx.lineTo(w3,H*0.75);ctx.moveTo(w3*2,H*0.1);ctx.lineTo(w3*2,H*0.75);ctx.stroke();
  }
}

function ease(f){return f<0.5?2*f*f:-1+(4-2*f)*f}

// ═══ MAIN LOOP ═══
let lastTime=null;
function loop(ts){
  requestAnimationFrame(loop);
  const dt0=lastTime===null?0:(ts-lastTime)/1000;
  lastTime=ts;
  const dt=Math.min(dt0,0.05);
  t+=dt;
  sceneT+=dt;

  // Scene progression
  if(sceneT>=SCENES[sceneIdx].dur){
    sceneT=0;
    sceneIdx=(sceneIdx+1)%SCENES.length;
  }

  const scene=SCENES[sceneIdx];
  const progress=sceneT/scene.dur;

  // Update labels
  document.getElementById('phLabel').textContent=lang==='el'?scene.el:scene.en;
  document.getElementById('phEn').textContent=lang==='el'?scene.en:'';
  // Subtitle
  if(scene.el2){
    const sub=lang==='el'?scene.el2:scene.en2;
    const existing=document.getElementById('phEn').textContent;
    document.getElementById('phEn').textContent=lang==='el'?scene.en:sub;
  }
  // Dots
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===sceneIdx));

  // Draw
  ctx.clearRect(0,0,W,H);

  // Subtle grid
  ctx.strokeStyle='rgba(100,150,180,0.02)';ctx.lineWidth=0.5;
  ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();

  drawScene(scene.type,progress);
}

requestAnimationFrame(loop);

document.getElementById('intro').addEventListener('click',function(){this.classList.add('hidden')});
function goPrev(){if(typeof goScene==='function')goScene(Math.max(0,currentScene-1));else if(typeof phaseIdx!=='undefined'){phaseIdx=Math.max(0,phaseIdx-1);phaseT=0}}
function goNext(){if(typeof goScene==='function')goScene(currentScene+1);else if(typeof phaseIdx!=='undefined'){phaseIdx=Math.min(phaseIdx+1);phaseT=0}}
</script>
<div class="ctrls"><button onclick="goPrev()" aria-label="Previous">◀ </button><button onclick="goNext()" aria-label="Next"> ▶</button></div>
</body>
</html>
