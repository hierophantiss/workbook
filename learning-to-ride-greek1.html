<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>🚴 Μαθαίνοντας να Κάνουμε Ποδήλατο - 8-Εβδομάδων Πρόγραμμα</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #D9E8DA;
            --bg-card: #E8F0E9;
            --teal: #2A5D5E;
            --sage: #7A9E7E;
            --terra: #C07050;
            --gold: #C8922A;
            --lav: #B5A7D0;
            --text: #1F2B27;
            --text-soft: #5C6761;
            --text-hint: #6D7570;
            --border: #B8C4B9;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0e1117;
                --bg-card: #161b22;
                --text: #d8dde3;
                --text-soft: #8b949e;
                --text-hint: #6e7681;
                --border: #30363d;
                --teal: #58a6ff;
                --sage: #7ee787;
            }
        }

        html {
            touch-action: pan-y;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding-bottom: 100px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
        }

        /* HEADER */
        header {
            background: linear-gradient(135deg, var(--teal) 0%, var(--sage) 100%);
            color: white;
            padding: 24px 16px;
            margin: -16px -16px 24px -16px;
            text-align: center;
            border-radius: 0 0 16px 16px;
        }

        header h1 {
            font-size: 24px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .week-info {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 12px;
        }

        .progress-bar {
            background: rgba(255,255,255,0.3);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 12px;
        }

        .progress-fill {
            background: white;
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        /* SECTIONS */
        section {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }

        section h2 {
            color: var(--teal);
            margin-bottom: 12px;
            font-size: 18px;
        }

        section h3 {
            color: var(--sage);
            margin-bottom: 12px;
            font-size: 16px;
        }

        .lesson-content {
            color: var(--text);
            line-height: 1.8;
            margin-bottom: 16px;
        }

        .lesson-content p {
            margin-bottom: 12px;
        }

        .lesson-content strong {
            color: var(--teal);
        }

        .lesson-content ol, .lesson-content ul {
            margin-left: 20px;
            margin-bottom: 12px;
        }

        .lesson-content li {
            margin-bottom: 8px;
        }

        /* BREATHING GUIDE */
        .breathing-guide {
            background: var(--bg);
            border-radius: 8px;
            padding: 16px;
            margin: 16px 0;
            border: 2px dashed var(--teal);
        }

        .breath-step {
            margin: 12px 0;
            padding: 12px;
            background: white;
            border-left: 4px solid var(--teal);
            text-align: left;
            border-radius: 4px;
        }

        .breath-step strong {
            color: var(--teal);
        }

        .breath-step p {
            margin-top: 8px;
            margin-bottom: 0;
        }

        /* JOURNAL */
        textarea {
            width: 100%;
            min-height: 100px;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            background: var(--bg);
            color: var(--text);
            resize: vertical;
        }

        textarea:focus {
            outline: none;
            border-color: var(--teal);
            box-shadow: 0 0 0 3px rgba(42, 93, 94, 0.1);
        }

        /* BUTTONS */
        button {
            background: var(--teal);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-top: 12px;
        }

        button:hover {
            background: #236364;
            box-shadow: 0 4px 12px rgba(42, 93, 94, 0.3);
        }

        button:active {
            transform: scale(0.98);
        }

        button.secondary {
            background: var(--sage);
            width: auto;
            margin-top: 0;
            margin-right: 8px;
        }

        button.secondary:hover {
            background: #6a8e6c;
        }

        .button-group {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        /* NAVIGATION */
        .nav-buttons {
            display: flex;
            gap: 8px;
            justify-content: space-between;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .nav-buttons button {
            flex: 1;
            min-width: 80px;
        }

        /* REFLECTION */
        .reflection-prompt {
            background: var(--bg);
            padding: 12px;
            border-left: 4px solid var(--lav);
            border-radius: 4px;
            margin-bottom: 16px;
            font-style: italic;
            color: var(--text-soft);
        }

        /* OPEN SPACE */
        .open-space {
            background: linear-gradient(135deg, rgba(181, 167, 208, 0.1), rgba(122, 158, 126, 0.1));
            border-left: 4px solid var(--lav);
            border-radius: 8px;
            padding: 16px;
            margin: 20px 0;
            font-style: italic;
            line-height: 1.8;
            color: var(--text-soft);
        }

        /* WEEK SELECTOR */
        .week-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .week-btn {
            padding: 10px;
            border: 2px solid var(--border);
            background: var(--bg);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text);
            transition: all 0.2s ease;
            font-size: 12px;
        }

        .week-btn:hover {
            border-color: var(--teal);
            color: var(--teal);
        }

        .week-btn.active {
            background: var(--teal);
            color: white;
            border-color: var(--teal);
        }

        /* HOME BUTTON */
        .home-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--teal);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(42, 93, 94, 0.3);
            z-index: 100;
            width: calc(100% - 32px);
            max-width: 300px;
        }

        .home-btn:hover {
            box-shadow: 0 6px 16px rgba(42, 93, 94, 0.4);
        }

        /* RESPONSIVE */
        @media (max-width: 480px) {
            .container {
                padding: 12px;
            }

            header {
                margin: -12px -12px 16px -12px;
            }

            header h1 {
                font-size: 20px;
            }

            section {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚴 Μαθαίνοντας να Κάνουμε Ποδήλατο</h1>
            <div class="week-info">
                <span id="weekTitle">Εβδομάδα 1: Γνώρισε το Ποδήλατό σου</span>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
                <div style="margin-top: 8px; font-size: 12px;">
                    Ημέρα <span id="dayNumber">1</span>/7 · Πρόοδος: <span id="progressPercent">0</span>%
                </div>
            </div>
        </header>

        <!-- WEEK SELECTOR -->
        <div class="week-selector">
            <button class="week-btn active" onclick="selectWeek(1)">Εβ.1</button>
            <button class="week-btn" onclick="selectWeek(2)">Εβ.2</button>
            <button class="week-btn" onclick="selectWeek(3)">Εβ.3</button>
            <button class="week-btn" onclick="selectWeek(4)">Εβ.4</button>
        </div>

        <!-- LESSON SECTION -->
        <section id="lessonSection">
            <h2 id="lessonTitle">Ημέρα 1: Νιώστε τα Πεντάλια</h2>
            <div class="lesson-content" id="lessonContent">
                <!-- Loaded dynamically -->
            </div>
        </section>

        <!-- BREATHING SECTION -->
        <section id="breathingSection">
            <h3>🫁 Σημερινή Πρακτική</h3>
            <div class="breathing-guide" id="breathingGuide">
                <!-- Loaded dynamically -->
            </div>
            <button id="practiceBtn" onclick="markPracticed()">✓ Εξασκήθηκα</button>
        </section>

        <!-- JOURNAL SECTION -->
        <section id="journalSection">
            <h3>📝 Αναστοχασμός</h3>
            <div class="reflection-prompt" id="reflectionPrompt">
                <!-- Loaded dynamically -->
            </div>
            <textarea id="journalEntry" placeholder="Τι παρατήρησα σήμερα; Πώς ένιωσα;"></textarea>
            <button onclick="saveJournal()">Αποθήκευση στο Ημερολόγιο</button>
        </section>

        <!-- OPEN SPACE REFLECTION -->
        <section id="openSpaceSection">
            <h3>✨ Ανοιχτός Χώρος Αναστοχασμού</h3>
            <div class="open-space" id="openSpaceText">
                <!-- Loaded dynamically -->
            </div>
        </section>

        <!-- NAVIGATION -->
        <section>
            <div class="nav-buttons">
                <button class="secondary" onclick="previousDay()">← Προηγούμενη</button>
                <button class="secondary" onclick="nextDay()">Επόμενη →</button>
            </div>
        </section>
    </div>

    <button class="home-btn" onclick="goHome()">← Αρχική Σελίδα</button>

    <script>
        // ═══════════════════════════════════════════════════════════
        // PROGRAM DATA - Based on Theodoros Mpairaktaris' Book
        // ═══════════════════════════════════════════════════════════

        const programData = {
            1: {
                title: "Εβδομάδα 1: Γνώρισε το Ποδήλατό σου",
                subtitle: "Εδώ είμαι. Αυτό είναι το σώμα μου — το δικό μου ποδήλατο.",
                days: [
                    {
                        day: 1,
                        title: "Νιώστε τα Πεντάλια",
                        lesson: `
                            <p><strong>Πού:</strong> Οπουδήποτε — σπίτι, γράφειο, πάρκο</p>

                        `,

                    {

                    {day: 6, title: "Παρατηρήσεις Δρόμου", lesson: `5-6 φορές: Σταματήστε. Ελέγξτε (πέδιλα + άξονας + αναπνοή). Κοιτάξτε μπροστά. Ελέγξτε ξανά: Είμαι ακόμη γειωμένος/η;`, breathing: `<div class="breath-step"><strong>6 Σύνδεση Σημεία (30 δευτ. το καθένα)</strong><p>Νιώστε πώς η προσοχή δεν σε αποσυνδέει. Σε συνδέει.</p></div>`, reflection: "Όσο κοίταζα μπροστά, έμεινα γειωμένος/η;", openSpace: "Η προσοχή σου δίνει δύναμη. Όχι απώλεια."},
                    {day: 7, title: "Πλοήγηση στη Πραγματική Ζωή", lesson: `Εβδομάδα 3 Ολοκληρώθηκε! Μπορείτε τώρα να αντιμετωπίσετε προκλήσεις ενώ παραμένετε γειωμένος/η, ρυθμικός/η και συνειδητός/η. Αυτό είναι το θεμέλιο για τη ζωή.`, breathing: `<div class="breath-step"><strong>Πλοήγηση Ζωής Αναπνοή (Σε όλη την ημέρα)</strong><p>Κάθε πρόκληση είναι απλώς ένα άλλο εμπόδιο στο δρόμο. Έχετε τρεις αγκυρες. Είστε έτοιμοι/ες.</p></div>`, reflection: "Πότε ήταν χρήσιμη η προσοχή;", openSpace: "Κοίταξα μπροστά και <strong>παρέμεινα σπίτι</strong>. Αυτό είναι δυνατό."}
                ]
            },
            4: {
                title: "Εβδομάδα 4: Ποδηλασία στη Φύση",
                subtitle: "Κοίταξα. Παρέμεινα ήρεμος. Και αισθάνθηκα όλα.",
                days: [
                    {day: 1, title: "Μαλακά Μάτια", lesson: `Σταματήστε να κρατάτε τον δρόμο με την προσοχή. Ανοίξτε. Δείτε το δρόμο μπροστά ΚΑΙ το ουρανό πάνω. Νιώστε και τα δύο.`, breathing: `<div class="breath-step"><strong>Ανοιχτή Αναπνοή (10 λεπτά)</strong><p>Αφήστε την αναπνοή να διαστέλλεται πέρα από το σώμα. Νιώστε την συνδεδεμένη με τον αέρα, τον κόσμο.</p></div>`, reflection: "Τι ήταν διαφορετικό όταν μαλάκωσα το βλέμμα;", openSpace: "Ανοιχτή επίγνωση δεν σημαίνει χαμένος. Σημαίνει κοιτάζω μπροστά ΚΑΙ αισθάνομαι τα πάντα."},
                    {day: 2, title: "Μεταφορά Ουρανού", lesson: `Ο δρόμος είναι ένα σύννεφο στον ουρανό της συνείδησης. Δες το σύννεφο ΚΑΙ αισθανθείς τον ουρανό.`, breathing: `<div class="breath-step"><strong>Ουρανός Αναπνοή (10 λεπτά)</strong><p>Η αναπνοή σας είναι σαν ο ουρανός. Σκέψεις είναι σύννεφα. Εμφανίζονται και εξαφανίζονται στην ανοιχτή αναπνοή.</p></div>`, reflection: "Αν η προσοχή είναι ένα σύννεφο, τι είναι ο ουρανός;", openSpace: "Δεν είσαι μόνο προσοχή. Είσαι ένας ανοιχτός χώρος που χωράει τα πάντα."},
                    {day: 3, title: "Νιώστε, Μην Σκεφθείτε", lesson: `Μην προσπαθήσετε να 'βιώσετε'. Απλώς αφήστε την εισροή. Ο αέρας. Το έδαφος. Ο ουρανός. Απλό.`, breathing: `<div class="breath-step"><strong>Παθητική Αναπνοή (10 λεπτά)</strong><p>Μην ελέγχετε την αναπνοή. Αφήστε το να σας αναπνεύσει. Νιώστε τη διαφορά μεταξύ προσπάθειας και παράδοσης.</p></div>`, reflection: "Τι ένιωσα παθητικά;", openSpace: "Δεν κάνεις τίποτα. Απλώς... ανοίγεις."},
                    {day: 4, title: "Το Πλήρες Ποδήλατο", lesson: `Και τα τέσσερα στρώματα δουλεύουν μαζί. Δεν υπάρχει 'εγώ κάνω'. Υπάρχει απλώς η ποδηλασία που συμβαίνει.`, breathing: `<div class="breath-step"><strong>Ολοκληρωμένη Αναπνοή (15-20 λεπτά)</strong><p>Νιώστε και τα τέσσερα: γειωμένος, ρυθμός, κατεύθυνση, απεραντοσύνη. Όχι χωριστά. Ένας οργανισμός που κάνει ποδηλασία.</p></div>`, reflection: "Υπάρχει ένα σημείο όπου δεν υπάρχει 'εγώ';", openSpace: "Αυτό είναι η πλήρης ενσυνειδητότητα. Όχι ως ιδέα. Είναι κάτι που ανακαλύπτεις."},
                    {day: 5, title: "Δεν Υπάρχει Διαφορά", lesson: `Ποδηλάστε χωρίς προσπάθεια. Αφήστε και τα τέσσερα να δουλέψουν. Όταν σταματάς να προσπαθείς, ανακαλύπτεις: δεν υπάρχει διαχωρισμός μεταξύ σας και της ποδηλασίας.`, breathing: `<div class="breath-step"><strong>Αβίαστη Αναπνοή (20 λεπτά)</strong><p>Κάνω ποδηλασία. Η γη υποστηρίζει. Η αναπνοή ρέει. Τα μάτια βλέπουν. Η καρδιά αισθάνεται. Συμβαίνει. Δεν πρέπει να το κάνω.</p></div>`, reflection: "Τι συνέβη όταν σταμάτησα να προσπαθώ;", openSpace: "Δεν είμαι ο οδηγός. Είμαι το ποδήλατο."},
                    {day: 6, title: "Ποδηλασία Χωρίς Σκέψη", lesson: `Κάντε μια μεγαλύτερη ποδηλασία. Μην παρατηρείτε. Μην εξασκείστε. Απλώς ποδηλάστε. Αφήστε και τα τέσσερα να συμβούν από μόνα τους.`, breathing: `<div class="breath-step"><strong>Καθαρή Ποδηλασία Αναπνοή (20-30 λεπτά)</strong><p>Η αναπνοή ποδηλάζει. Το έδαφος σε φέρει. Τα μάτια σε οδηγούν. Η καρδιά σε νιώθει. Είσαι η ποδηλασία.</p></div>`, reflection: "Νιώθω ότι το ποδήλατο κάνει τα δικά του;", openSpace: "Όταν σταματάς να προσπαθείς, αρχίζει η ζωή."},
                    {day: 7, title: "Ολοκληρωμένη Αναστροφή", lesson: `ΕΒΔΟΜΑΔΑ 4 ΟΛΟΚΛΗΡΩΘΗΚΕ! Έχετε μάθει και τα τέσσερα στοιχεία: Βαρύτητα, Αναπνοή, Προσοχή, Χώρος. Τώρα κάνετε ποδηλασία τη ζωή σας.`, breathing: `<div class="breath-step"><strong>Ολοκληρωμένη Αναπνοή (Οποτεδήποτε)</strong><p>Δεν χρειάζεται ένα μάθημα πια. Είστε το μάθημα. Ποδηλάστε.</p></div>`, reflection: "Τι σημαίνει ότι είμαι ολόκληρος/η;", openSpace: "Δεν υπήρχε ποτέ τίποτα που λείπει. Ήταν πάντα εδώ. Χρειαζόμουν μόνο να κοιτάξω."}
                ]
            }
        };

        // ═══════════════════════════════════════════════════════════
        // STATE MANAGEMENT
        // ═══════════════════════════════════════════════════════════

        let currentWeek = 1;
        let currentDay = 1;

        function loadState() {
            const saved = localStorage.getItem('ltr-state');
            if (saved) {
                const state = JSON.parse(saved);
                currentWeek = state.week;
                currentDay = state.day;
            }
            updateUI();
        }

        function saveState() {
            localStorage.setItem('ltr-state', JSON.stringify({
                week: currentWeek,
                day: currentDay
            }));
        }

        // ═══════════════════════════════════════════════════════════
        // UI UPDATES
        // ═══════════════════════════════════════════════════════════

        function updateUI() {
            const week = programData[currentWeek];
            const dayData = week.days[currentDay - 1];

            document.getElementById('weekTitle').textContent = `${week.title} · ${dayData.title}`;
            document.getElementById('dayNumber').textContent = currentDay;
            document.getElementById('progressPercent').textContent = Math.round((currentDay / 7) * 100);
            document.getElementById('progressFill').style.width = `${(currentDay / 7) * 100}%`;

            document.getElementById('lessonTitle').textContent = `Ημέρα ${currentDay}: ${dayData.title}`;
            document.getElementById('lessonContent').innerHTML = dayData.lesson;

            document.getElementById('breathingGuide').innerHTML = dayData.breathing;

            document.getElementById('reflectionPrompt').textContent = dayData.reflection;
            document.getElementById('journalEntry').value = '';

            document.getElementById('openSpaceText').innerHTML = dayData.openSpace;

            document.querySelectorAll('.week-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i + 1 === currentWeek);
            });

            saveState();
        }

        function selectWeek(week) {
            currentWeek = week;
            currentDay = 1;
            updateUI();
        }

        function previousDay() {
            if (currentDay > 1) {
                currentDay--;
            } else if (currentWeek > 1) {
                currentWeek--;
                currentDay = 7;
            }
            updateUI();
        }

        function nextDay() {
            if (currentDay < 7) {
                currentDay++;
            } else if (currentWeek < 4) {
                currentWeek++;
                currentDay = 1;
            }
            updateUI();
        }

        function markPracticed() {
            document.getElementById('practiceBtn').textContent = '✓ Εξασκήθηκα Σήμερα!';
            document.getElementById('practiceBtn').style.background = 'var(--sage)';
        }

        function saveJournal() {
            const text = document.getElementById('journalEntry').value.trim();
            if (!text) {
                alert('Παρακαλώ γράψε κάτι πρώτα!');
                return;
            }
            document.getElementById('journalEntry').value = '';
            alert('✓ Αποθηκεύθηκε στο ημερολόγιο!');
        }

        function goHome() {
            if (confirm('Επιστροφή στην αρχική σελίδα;')) {
                window.location.href = 'index.html';
            }
        }

        document.addEventListener('DOMContentLoaded', loadState);
    </script>
</body>
</html>
