<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="color-scheme" content="light dark">
    <title>Τετραπλός Άξονας — Πρόγραμμα 8 Εβδομάδων</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=Instrument+Serif:opsz@14..32&display=swap" rel="stylesheet">
    <style>
        /* RESET & BASE — ήρεμη, προβλέψιμη βάση */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Φωτεινή λειτουργία (light mode) – ουδέτερο, ζεστό, χαμηλής αντίθεσης αλλά ευανάγνωστο */
            --bg-page: #f9f7f3;
            --bg-card: #ffffff;
            --bg-soft: #f2efe9;
            --teal: #2c6e6b;
            --teal-light: #4f9e9a;
            --gold: #bc8f4b;
            --gold-soft: #dbb067;
            --lav: #9c8eaa;
            --text-primary: #2b2a28;
            --text-secondary: #5b5a56;
            --text-muted: #8c8982;
            --border-light: #e2ddd4;
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.03), 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.05);
            --focus-ring: 0 0 0 3px rgba(44, 110, 107, 0.3);
            --transition: all 0.2s ease;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-page: #121210;
                --bg-card: #1e1f1c;
                --bg-soft: #2a2b27;
                --teal: #6fc2be;
                --teal-light: #8fd9d5;
                --gold: #e0b062;
                --gold-soft: #ecc67a;
                --lav: #b9accc;
                --text-primary: #ece9e2;
                --text-secondary: #b8b5ab;
                --text-muted: #827f76;
                --border-light: #34332e;
                --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.3);
                --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.4);
            }
        }

        body {
            background: var(--bg-page);
            color: var(--text-primary);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            padding-bottom: 100px;
            font-weight: 400;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 20px 16px 40px;
        }

        /* Κεφαλίδα – ήρεμη, χωρίς έντονες αντιθέσεις */
        header {
            background: linear-gradient(135deg, var(--teal) 0%, #1d5552 100%);
            color: white;
            padding: 32px 24px 28px;
            border-radius: 32px;
            margin-bottom: 28px;
            box-shadow: var(--shadow-md);
            position: relative;
            transition: var(--transition);
        }

        header h1 {
            font-family: 'Instrument Serif', serif;
            font-size: 2rem;
            font-weight: 400;
            letter-spacing: -0.01em;
            margin-bottom: 8px;
        }

        .header-sub {
            font-size: 0.9rem;
            opacity: 0.85;
            font-weight: 400;
            margin-bottom: 20px;
            letter-spacing: 0.2px;
        }

        .header-week {
            font-family: 'Instrument Serif', serif;
            font-size: 1.2rem;
            font-weight: 400;
            margin-bottom: 6px;
        }

        .header-day-title {
            font-size: 0.85rem;
            opacity: 0.8;
        }

        .progress-track {
            background: rgba(255, 255, 255, 0.25);
            height: 6px;
            border-radius: 6px;
            margin-top: 20px;
            overflow: hidden;
        }

        .progress-fill {
            background: var(--gold-soft);
            height: 100%;
            border-radius: 6px;
            transition: width 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .progress-label {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 8px;
            text-align: right;
        }

        /* Επιλογή εβδομάδων – πλέγμα με καθαρές περιοχές */
        .week-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }

        .week-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            padding: 12px 6px;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
            line-height: 1.3;
            backdrop-filter: blur(2px);
        }

        .week-btn:hover {
            border-color: var(--teal-light);
            background: var(--bg-soft);
            transform: translateY(-1px);
        }

        .week-btn.active {
            background: var(--teal);
            color: white;
            border-color: var(--teal);
            box-shadow: var(--shadow-sm);
        }

        .week-btn .axis-label {
            display: block;
            font-size: 0.7rem;
            opacity: 0.8;
            margin-top: 4px;
        }

        .axis-indicator {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 28px;
            padding: 6px 12px;
            background: var(--bg-soft);
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            border-radius: 40px;
            font-style: normal;
        }

        /* Κάρτες ενότητας */
        section {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 24px 24px;
            margin-bottom: 20px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
        }

        section h2 {
            font-family: 'Instrument Serif', serif;
            color: var(--teal);
            font-size: 1.6rem;
            font-weight: 400;
            margin-bottom: 12px;
            letter-spacing: -0.2px;
        }

        section h3 {
            font-family: 'Instrument Serif', serif;
            color: var(--gold);
            font-size: 1.35rem;
            font-weight: 400;
            margin-bottom: 16px;
            border-left: 3px solid var(--gold);
            padding-left: 14px;
        }

        /* Μεταδεδομένα */
        .meta-line {
            display: flex;
            gap: 24px;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-light);
            flex-wrap: wrap;
        }

        /* Κείμενο μαθήματος */
        .lesson-body {
            line-height: 1.7;
            font-size: 1rem;
            color: var(--text-primary);
        }

        .lesson-body p {
            margin-bottom: 1.2em;
        }

        .lesson-body strong {
            color: var(--teal);
            font-weight: 600;
        }

        .lesson-body em {
            color: var(--text-secondary);
            font-style: italic;
        }

        /* Πλαίσιο άσκησης */
        .exercise-box {
            background: var(--bg-soft);
            border-radius: 20px;
            padding: 20px;
            margin: 24px 0;
            border-left: 4px solid var(--teal);
            transition: var(--transition);
        }

        .exercise-box .ex-title {
            font-weight: 600;
            color: var(--teal);
            margin-bottom: 14px;
            font-size: 1rem;
            letter-spacing: -0.2px;
        }

        .exercise-box .step {
            margin-bottom: 12px;
            padding-left: 26px;
            position: relative;
            font-size: 0.95rem;
            line-height: 1.65;
        }

        .exercise-box .step::before {
            content: attr(data-n);
            position: absolute;
            left: 0;
            font-weight: 500;
            color: var(--teal-light);
            font-size: 0.85rem;
        }

        /* Αναπνοή (κάρτα) */
        .breath-card {
            background: var(--bg-soft);
            border-radius: 20px;
            padding: 20px;
            margin: 8px 0 16px;
            border: 1px solid var(--border-light);
        }

        .breath-card strong {
            color: var(--teal);
            font-weight: 600;
        }

        /* Αναστοχασμός */
        .reflection-q {
            background: var(--bg-soft);
            padding: 16px 20px;
            border-left: 4px solid var(--lav);
            border-radius: 16px;
            margin-bottom: 20px;
            font-style: normal;
            font-weight: 500;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        textarea {
            width: 100%;
            min-height: 100px;
            padding: 16px;
            border: 1.5px solid var(--border-light);
            border-radius: 20px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            background: var(--bg-card);
            color: var(--text-primary);
            resize: vertical;
            transition: var(--transition);
        }

        textarea:focus {
            outline: none;
            border-color: var(--teal);
            box-shadow: var(--focus-ring);
        }

        /* Ανοιχτός χώρος (insight) */
        .insight-box {
            background: linear-gradient(145deg, rgba(156, 142, 170, 0.08), rgba(44, 110, 107, 0.05));
            border-radius: 24px;
            padding: 20px 24px;
            font-family: 'Instrument Serif', serif;
            font-size: 1.2rem;
            font-style: normal;
            line-height: 1.6;
            color: var(--text-secondary);
            border: 1px solid var(--border-light);
        }

        /* Κουμπιά – μεγάλα, παχιά, ήρεμα */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--teal);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 60px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
            margin-top: 12px;
            box-shadow: var(--shadow-sm);
        }

        .btn:hover {
            filter: brightness(1.03);
            transform: scale(0.99);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-outline {
            background: transparent;
            color: var(--teal);
            border: 1.5px solid var(--border-light);
            box-shadow: none;
        }

        .btn-outline:hover {
            border-color: var(--teal);
            background: var(--bg-soft);
        }

        .btn-done {
            background: var(--gold);
            color: #1e1e1c;
        }

        .nav-row {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        /* Σταθερό κουμπί home (αναβαθμισμένο, πιο απαλό) */
        .home-float {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            color: var(--teal);
            border: 1px solid var(--border-light);
            padding: 14px 28px;
            border-radius: 60px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: var(--shadow-md);
            z-index: 100;
            width: auto;
            min-width: 200px;
            transition: var(--transition);
            backdrop-filter: blur(8px);
            background: rgba(255, 255, 255, 0.8);
        }

        @media (prefers-color-scheme: dark) {
            .home-float {
                background: rgba(30, 31, 28, 0.9);
                backdrop-filter: blur(10px);
                color: var(--teal-light);
            }
        }

        .home-float:hover {
            background: var(--teal);
            color: white;
            border-color: var(--teal);
            transform: translateX(-50%) scale(1.02);
        }

        /* Εστίαση για accessibility */
        button:focus-visible,
        textarea:focus-visible,
        .week-btn:focus-visible {
            outline: none;
            box-shadow: var(--focus-ring);
        }

        /* Μικρές προσαρμογές για κινητά */
        @media (max-width: 560px) {
            .container {
                padding: 16px 12px 40px;
            }
            header {
                padding: 24px 18px;
            }
            section {
                padding: 20px 18px;
            }
            .home-float {
                padding: 12px 20px;
                font-size: 0.85rem;
                min-width: 170px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Τετραπλός Άξονας</h1>
            <div class="header-sub">Σώμα · Αναπνοή · Προσοχή · Χώρος</div>
            <div class="header-week" id="headerWeek">Εβδομάδα 1 · Σώμα</div>
            <div class="header-day-title" id="headerDay">Ημέρα 1</div>
            <div class="progress-track">
                <div class="progress-fill" id="progressFill" style="width:0%"></div>
            </div>
            <div class="progress-label" id="progressLabel">Ημέρα 1 / 56</div>
        </header>

        <div class="week-grid" id="weekGrid"></div>
        <div class="axis-indicator" id="axisIndicator"></div>

        <section id="lessonSection">
            <h2 id="lessonTitle"></h2>
            <div class="meta-line" id="metaLine"></div>
            <div class="lesson-body" id="lessonBody"></div>
        </section>

        <section>
            <h3>Σημερινή Πρακτική</h3>
            <div class="breath-card" id="breathCard"></div>
            <button class="btn btn-done" id="practiceBtn" onclick="markDone()">Εξασκήθηκα</button>
        </section>

        <section>
            <h3>Αναστοχασμός</h3>
            <div class="reflection-q" id="reflectionQ"></div>
            <textarea id="journal" placeholder="Τι παρατήρησα σήμερα;"></textarea>
            <button class="btn" onclick="saveJournal()">Αποθήκευση</button>
        </section>

        <section>
            <h3>Ανοιχτός Χώρος</h3>
            <div class="insight-box" id="insightBox"></div>
        </section>

        <section>
            <div class="nav-row">
                <button class="btn btn-outline" onclick="go(-1)">← Προηγούμενη</button>
                <button class="btn btn-outline" onclick="go(1)">Επόμενη →</button>
            </div>
        </section>
    </div>

    <button class="home-float" onclick="goHome()">← Αρχική Σελίδα</button>

<script>
// ═══════════════════════════════════════
// DATA — 8 weeks, from the workbook (πλήρες περιεχόμενο, κανένα κείμενο δεν άλλαξε)
// ═══════════════════════════════════════

const AXES = [
    { name: 'Σώμα', icon: '◆', weeks: [1,2] },
    { name: 'Αναπνοή', icon: '◆', weeks: [3,4] },
    { name: 'Προσοχή', icon: '◆', weeks: [5,6] },
    { name: 'Χώρος', icon: '◆', weeks: [7,8] },
];

function ax(w) { return AXES.find(a => a.weeks.includes(w)); }

const D = {
1: {
  title: 'Η Σταθερότητα του «Εδώ»',
  days: [
    {
      title: 'Νιώσε τα Πέλματα',
      where: 'Οπουδήποτε', dur: '2-3 λεπτά',
      lesson: '<p>Το σώμα είναι η αναμφισβήτητη βάση της παρούσας στιγμής. Σήμερα ξεκινάμε από το πιο απλό: τα σημεία που αγγίζουν τη γη.</p><p>Σταθείτε ή καθίστε. Νιώστε τα πέλματα — την πίεση, τη θερμότητα, την επαφή με το έδαφος. Απλώς παρατηρήστε, χωρίς να αλλάξετε τίποτα.</p>',
      exercise: {
        title: 'Παρατήρηση Επαφής',
        steps: ['Σταθείτε ή καθίστε με άνεση.', 'Κλείστε τα μάτια αν θέλετε.', 'Νιώστε τα σημεία επαφής με τη γη — πέλματα ή λεκάνη.', 'Υπάρχει πίεση; Θερμότητα; Ισορροπία;', 'Μείνετε εκεί για 2 λεπτά. Απλώς παρατηρήστε.']
      },
      breathing: '<strong>Φυσική Παρατήρηση (2 λεπτά)</strong><p>Δεν ελέγχετε την αναπνοή. Απλώς παρατηρήστε πώς αναπνέετε φυσικά ενώ νιώθετε τα πέλματα.</p>',
      reflection: 'Ποιο ήταν το πρώτο πράγμα που ένιωσα;',
      insight: 'Η βαρύτητα είναι πάντα εδώ. Το σώμα είναι πάντα εδώ. Αυτό είναι αρκετό για να ξεκινήσουμε.'
    },
    {
      title: 'Νιώσε τον Άξονα',
      where: 'Ήσυχο μέρος', dur: '3-5 λεπτά',
      lesson: '<p>Το σώμα δεν είναι μόνο πόδια στη γη — έχει δομή. Φαντάστε μια γραμμή που ανεβαίνει μέσα σας: από τα πέλματα, μέσω της λεκάνης, τη σπονδυλική στήλη, μέχρι την κορυφή του κεφαλιού.</p><p>Αυτός ο κατακόρυφος άξονας σας κρατά. Δεν χρειάζεται να τον «φτιάξετε» — αρκεί να τον αναγνωρίσετε.</p>',
      exercise: {
        title: 'Ο Κατακόρυφος Άξονας',
        steps: ['Σταθείτε ή καθίστε.', 'Νιώστε πρώτα τα πέλματα (από χθες).', 'Τώρα φαντάστε μια γραμμή: πέλματα → λεκάνη → στομάχι → καρδιά → λαιμός → κεφάλι.', 'Νιώστε πώς αυτή η γραμμή σας κρατά όρθιους.', 'Μείνετε εδώ 3 λεπτά.']
      },
      breathing: '<strong>Αναπνοή Άξονα (3 λεπτά)</strong><p>Παρατηρήστε πώς η αναπνοή κινείται κατά μήκος αυτής της γραμμής. Η σπονδυλική στήλη είναι σαν κανάλι για τη ροή.</p>',
      reflection: 'Μπόρεσα να νιώσω τον άξονα; Πού τον αισθάνομαι περισσότερο;',
      insight: 'Ο άξονας σας είναι πάντα εκεί — ακόμη κι αν δεν τον προσέχετε. Σήμερα τον αναγνωρίσατε.'
    },
    {
      title: 'Νιώσε τη Βαρύτητα',
      where: 'Σπίτι ή ήσυχο μέρος', dur: '3 λεπτά',
      lesson: '<p>Η βαρύτητα δεν είναι εχθρός — είναι η απόδειξη του «Εδώ». Μας δείχνει, χωρίς αμφιβολία, ακριβώς το σημείο στο οποίο υπάρχουμε αυτή τη στιγμή.</p><p>Αφήστε το βάρος σας να πέσει προς τα κάτω — όχι με δύναμη, απλώς αφήστε το. Η γείωση είναι η πρώτη πράξη χαλάρωσης.</p>',
      exercise: {
        title: 'Παράδοση στη Βαρύτητα',
        steps: ['Σταθείτε ή καθίστε.', 'Νιώστε τα πέλματα + τον άξονα.', 'Τώρα: αφήστε το βάρος να βυθιστεί στη γη.', 'Νιώστε τη βαρύτητα που σας τραβάει — δεν αντιστέκεστε.', 'Παρατηρήστε: το σώμα γίνεται πιο σταθερό, πιο ήρεμο.']
      },
      breathing: '<strong>Βαρύτητα Αναπνοή (3 λεπτά)</strong><p>Στην εκπνοή, αφήστε τον εαυτό σας να γίνει πιο βαρύς. Στην εισπνοή, νιώστε τη γη να σας υποστηρίζει.</p>',
      reflection: 'Τι ένιωσα όταν άφησα το βάρος; Ήταν ανακούφιση ή δυσφορία;',
      insight: 'Η βαρύτητα δεν σας πατάει — σας αγκαλιάζει. Είναι η σταθερότητά σας.'
    },
    {
      title: 'Η Άσκηση του Βιβλίου',
      where: 'Σπίτι', dur: '5 λεπτά',
      lesson: '<p>Αυτή είναι μια κλασική άσκηση από τον οδηγό. Τοποθετείτε ένα βιβλίο ή κουτί στο κεφάλι σας και παρατηρείτε τι κάνει το σώμα μόνο του.</p><p>Δεν πρέπει να «φτιάξετε» τη στάση — απλώς παρατηρείτε πώς ο οργανισμός αυτορυθμίζεται. Όταν προσέχετε, το σώμα ευθυγραμμίζεται φυσικά.</p>',
      exercise: {
        title: 'Το Βιβλίο στο Κεφάλι',
        steps: ['Σταθείτε όρθιοι.', 'Τοποθετήστε ένα βιβλίο ή κουτί στο κεφάλι (προαιρετικό).', 'Παρατηρήστε πώς χρειάζεται να σταθείτε για να μην πέσει.', 'Νιώστε πώς το βάρος κατεβαίνει μέσα από τον λαιμό, τη σπονδυλική στήλη, τη λεκάνη.', 'Αφαιρέστε το βιβλίο — η αίσθηση δομής παραμένει.']
      },
      breathing: '<strong>Σταθερότητα Αναπνοή (5 λεπτά)</strong><p>Καθίστε όρθια. Αναπνέετε φυσικά. Παρατηρήστε πώς ο άξονας υποστηρίζει την αναπνοή.</p>',
      reflection: 'Ποιο μέρος του σώματος αντέδρασε πρώτο;',
      insight: 'Δεν κάνετε τίποτα. Απλώς παρατηρείτε — και το σώμα ανταποκρίνεται.'
    },
    {
      title: 'Πέλματα + Άξονας + Βαρύτητα',
      where: 'Οπουδήποτε', dur: '3-5 λεπτά',
      lesson: '<p>Σήμερα ενώνετε τα τρία στοιχεία που μάθατε: πέλματα, άξονας, βαρύτητα. Δεν είναι τρία ξεχωριστά πράγματα — είναι μία ενιαία αίσθηση γείωσης.</p>',

      lesson: '<p>Τέλος αναπνοής! Κάντε μια πλήρη πρακτική: γείωση + αναπνοή, 10 λεπτά. Από αύριο ξεκινάτε τον τρίτο άξονα: την <strong>Προσοχή</strong>.</p>',
      exercise: { title: 'Γείωση + Αναπνοή 10\'', steps: ['Γείωση πλήρης (2 λεπτά).', 'Παρατήρηση αναπνοής (3 λεπτά).', 'Ρύθμιση μέσω εκπνοής (2 λεπτά).', 'Αφήστε τα δύο μαζί (3 λεπτά).', 'Ανοίξτε τα μάτια. Τι αισθάνεστε;'] },

4: {
  title: 'Αναπνοή στη Ζωή',
  days: [
    { title: 'Αναπνοή και Συναισθήματα', where: 'Ήσυχο μέρος', dur: '5 λεπτά', lesson: '<p>Ένα έντονο συναίσθημα αλλάζει αμέσως την αναπνοή. Σήμερα παρατηρήστε αυτή τη σχέση: τι γίνεται στην αναπνοή σας όταν χαίρεστε, αγχώνεστε, θυμώνετε;</p>', exercise: { title: 'Αναπνοή-Συναίσθημα', steps: ['Γείωση (30").', 'Θυμηθείτε μια χαρούμενη στιγμή — πώς αναπνέετε;', 'Θυμηθείτε μια αγχώδη στιγμή — τι αλλάζει;', 'Επιστρέψτε στη φυσική αναπνοή.', 'Η αναπνοή αντικατοπτρίζει τα πάντα.'] }, breathing: '<strong>Αναπνοή Αντικατόπτρισμα (5 λεπτά)</strong><p>Σε κάθε κατάσταση η αναπνοή αλλάζει. Αρκεί να παρατηρήσετε.</p>', reflection: 'Πώς αλλάζει η αναπνοή μου ανάλογα με το συναίσθημα;', insight: 'Κάθε συναίσθημα είναι παροδικό — η αναπνοή μας το δείχνει.' },
    { title: 'Εκπνοή Σε Ένταση', where: 'Σε δύσκολη στιγμή', dur: '2 λεπτά', lesson: '<p>Σήμερα εφαρμόστε τη ρύθμιση αναπνοής σε πραγματική ένταση. Η αργή, παρατεταμένη εκπνοή από το στόμα στέλνει σήμα ασφάλειας στο νευρικό σύστημα.</p>', exercise: { title: 'Εκπνοή Ασφάλειας', steps: ['Σε στιγμή έντασης:', 'Γείωση (5").', 'Εισπνοή από μύτη.', 'Εκπνοή αργά από στόμα — σαν να φυσάτε μια φλόγα.', '3-5 κύκλοι. Νιώστε τη διαφορά.'] }, breathing: '<strong>Εκπνοή Φλόγας (2 λεπτά)</strong><p>Σαν να φυσάτε απαλά μια φλόγα. Αργά. Σταθερά. Ο εγκέφαλος «ακούει» ασφάλεια.</p>', reflection: 'Δούλεψε η εκπνοή σε πραγματική ένταση;', insight: 'Η αργή εκπνοή δεν είναι τεχνική — είναι γλώσσα που μιλά απευθείας στο νευρικό σύστημα.' },
    { title: 'Αναπνοή σε Περπάτημα', where: 'Εξωτερικά', dur: '10 λεπτά', lesson: '<p>Περπατήστε αργά, συγχρονίζοντας βήματα και αναπνοή. Η ρυθμική κίνηση «καίει» το άγχος φυσικά.</p>', exercise: { title: 'Ενσυνείδητο Περπάτημα με Αναπνοή', steps: ['Γείωση στα πέλματα.', 'Αρχίστε να περπατάτε αργά.', '3 βήματα εισπνοή — 3 βήματα εκπνοή.', 'Ή ό,τι ρυθμός σας βρίσκει.', '10 λεπτά. Αφήστε τα πόδια και την αναπνοή να γίνουν ένα.'] }, breathing: '<strong>Αναπνοή Βημάτων (10 λεπτά)</strong><p>Βήματα + αναπνοή = ένας ρυθμός. Το σώμα ξέρει.</p>', reflection: 'Πώς ένιωσα μετά το ενσυνείδητο περπάτημα;', insight: 'Η κίνηση και η αναπνοή ήταν πάντα ένα. Απλώς τώρα το παρατηρείτε.' },
    { title: 'Πρωτόκολλο Έντονου Άγχους', where: 'Οπουδήποτε', dur: '3 λεπτά', lesson: '<p>Σήμερα μαθαίνετε το πλήρες πρωτόκολλο για στιγμές έντονου άγχους — ένα εργαλείο που θα σας συνοδεύει πάντα:</p>', exercise: { title: 'Πρωτόκολλο Άγχους', steps: ['Γείωση: νιώστε το βάρος, τις εντάσεις — χωρίς ανάλυση.', 'Ρύθμιση: 3 βαθιές εισπνοές. Εκπνοή αργά από στόμα.', 'Αν ο νους κολλήσει: ταμπέλα (πχ. «Ανησυχία») → επιστροφή στην αναπνοή.', 'Άνοιγμα: περιφερειακή όραση — παρατηρήστε τον χώρο γύρω.', 'Κίνηση: περπατήστε λίγο νιώθοντας τα πέλματα.'] }, breathing: '<strong>Πρωτόκολλο Ηρεμίας (3 λεπτά)</strong><p>Γείωση → Εκπνοή → Ανοιχτό βλέμμα → Κίνηση. Αυτή η σειρά λειτουργεί. Εμπιστευτείτε τη.</p>', reflection: 'Εξασκήθηκα στο πρωτόκολλο; Πώς νιώθω μετά;', insight: 'Τώρα έχετε ένα εργαλείο για κάθε στιγμή έντασης.' },
    { title: 'Η Αναπνοή ως Γέφυρα', where: 'Ήσυχο μέρος', dur: '10 λεπτά', lesson: '<p>Αν το σώμα μας ενώνει με τη γη, η αναπνοή μας συνδέει με τον κόσμο. Είναι η γέφυρα μεταξύ μέσα και έξω, μεταξύ εμάς και του κόσμου.</p>', exercise: { title: 'Αναπνοή Γέφυρα', steps: ['Γείωση πλήρης (2 λεπτά).', 'Νιώστε τον αέρα που μπαίνει — έρχεται απ\' έξω.', 'Νιώστε τον αέρα που βγαίνει — επιστρέφει στον κόσμο.', 'Εσείς είστε η γέφυρα. Μέσα ↔ Έξω.', '10 λεπτά αυτής της αίσθησης.'] }, breathing: '<strong>Γέφυρα Αναπνοής (10 λεπτά)</strong><p>Εισπνοή: ο κόσμος μπαίνει σε σας. Εκπνοή: εσείς επιστρέφετε στον κόσμο. Δεν υπάρχει διαχωρισμός.</p>', reflection: 'Ένιωσα τη σύνδεση μέσα-έξω;', insight: 'Η αναπνοή δεν σας ανήκει. Την μοιράζεστε με τα πάντα.' },
    { title: 'Μέρα Ελεύθερης Πρακτικής', where: 'Παντού', dur: 'Όσο θέλετε', lesson: '<p>Σήμερα δεν υπάρχει δομή. Χρησιμοποιήστε ό,τι μάθατε — γείωση, αναπνοή, εκπνοή ρύθμισης — όπου και όποτε θέλετε. Η πρακτική γίνεται δική σας.</p>', exercise: { title: 'Ελεύθερη Πρακτική', steps: ['Χρησιμοποιήστε τη γείωση όποτε θέλετε.', 'Παρατηρήστε αναπνοή σε τυχαίες στιγμές.', 'Ρυθμίστε μέσω εκπνοής αν χρειαστεί.', 'Καμία υποχρέωση, καμία δομή.', 'Αφήστε το σώμα να σας οδηγήσει.'] }, breathing: '<strong>Χωρίς Οδηγίες</strong><p>Σήμερα εσείς αποφασίζετε. Τι χρειάζεστε;</p>', reflection: 'Τι επέλεξα να κάνω; Γιατί;', insight: 'Η καλύτερη πρακτική είναι αυτή που κάνετε χωρίς να σας το πει κανείς.' },
    { title: 'Ανασκόπηση: Δύο Άξονες', where: 'Ήσυχο μέρος', dur: '10 λεπτά', lesson: '<p>Τέσσερις εβδομάδες. Δύο άξονες: Σώμα και Αναπνοή. Από αύριο ξεκινάει ο τρίτος: η <strong>Προσοχή</strong> — ο φακός που φωτίζει την παρούσα στιγμή.</p>', exercise: { title: 'Πλήρης Σώμα + Αναπνοή', steps: ['Γείωση πλήρης (3 λεπτά).', 'Αναπνοή: παρατήρηση (3 λεπτά).', 'Ενεργή Επιστροφή: εκπνοή ρύθμισης (2 λεπτά).', 'Αφήστε τα δύο μαζί (2 λεπτά).', 'Αυτά τα δύο θα σας συνοδεύουν σε κάθε επόμενο βήμα.'] }, breathing: '<strong>Ολοκληρωμένη Πρακτική (10 λεπτά)</strong><p>Σώμα + Αναπνοή: δύο αγκυρές που μένουν για πάντα.</p>', reflection: 'Πώς αισθάνομαι τώρα σε σχέση με πριν τέσσερις εβδομάδες;', insight: 'Δύο αγκυρές. Η γη σας κρατά. Ο ρυθμός σας ηρεμεί. Τώρα θα μάθετε πού να κοιτάξετε.' }
  ]
},
5: {
  title: 'Ο Φακός της Συνείδησης',
  days: [
    { title: 'Πού Είναι η Προσοχή;', where: 'Ήσυχο μέρος', dur: '5 λεπτά', lesson: '<p>Η προσοχή είναι ο φακός του νου — μπορεί να εστιάζει, να ανοίγει ή να διασπάται. Σήμερα απλώς παρατηρήστε: πού πηγαίνει η προσοχή σας φυσικά;</p>', exercise: { title: 'Παρατήρηση Προσοχής', steps: ['Γείωση + Αναπνοή (1 λεπτό).', 'Κλείστε τα μάτια.', 'Πού πηγαίνει η προσοχή; Σε ήχους; Σκέψεις; Σωματικές αισθήσεις;', 'Μην την κατευθύνετε — απλώς παρακολουθήστε.', '5 λεπτά παρατήρησης. Πόσες φορές «μετακινήθηκε»;'] }, breathing: '<strong>Αναπνοή + Παρατήρηση (5 λεπτά)</strong><p>Διατηρήστε τη γείωση και την αναπνοή ενώ παρατηρείτε πού πηγαίνει η προσοχή.</p>', reflection: 'Πού τείνει να πηγαίνει η προσοχή μου;', insight: 'Η προσοχή δεν είναι κενή σκέψεων — είναι η ικανότητα να παρατηρείτε πού βρίσκεστε.' },
    { title: 'Κλειστή Εστίαση', where: 'Ήσυχο μέρος', dur: '5 λεπτά', lesson: '<p>Σήμερα δοκιμάζετε την κλειστή προσοχή: η δέσμη μαζεύεται σε ένα σημείο. Επιλέξτε ένα σταθερό σημείο εστίασης — οπτικό, ακουστικό ή σωματικό.</p>', exercise: { title: 'Σταθερό Σημείο', steps: ['Γείωση + Αναπνοή (1 λεπτό).', 'Ανοίξτε τα μάτια. Επιλέξτε ένα σημείο μπροστά σας.', 'Κοιτάξτε το με απαλό, σταθερό βλέμμα.', 'Αν η προσοχή φύγει, επιστρέψτε απαλά.', '5 λεπτά σε ένα σημείο.'] }, breathing: '<strong>Εστίαση Αναπνοής (5 λεπτά)</strong><p>Το σταθερό σημείο μπορεί να είναι και η ίδια η αναπνοή. Μείνετε εκεί.</p>', reflection: 'Πόσο εύκολο ήταν να μείνω σε ένα σημείο;', insight: 'Η εστίαση δεν είναι ένταση — είναι ήσυχη επιμονή.' },
    { title: 'Η Τεχνική της Ταμπέλας', where: 'Ήσυχο μέρος', dur: '5 λεπτά', lesson: '<p>Όταν μια σκέψη σας τραβάει, αντί να εμπλακείτε στο περιεχόμενό της, βάλτε μια απλή ταμπέλα: «Σχεδιασμός», «Κριτική», «Ανησυχία», «Σενάριο». Μετά επιστρέψτε.</p>', exercise: { title: 'Ταμπέλα + Επιστροφή', steps: ['Γείωση + Αναπνοή + Εστίαση σε σημείο (2 λεπτά).', 'Περιμένετε μια σκέψη να σας τραβήξει.', 'Βάλτε ταμπέλα: «Σχεδιασμός», «Ανησυχία», «Παρελθόν»...', 'Μην αναλύσετε τη σκέψη — μόνο ταμπέλα.', 'Επιστρέψτε στο σταθερό σημείο.'] }, breathing: '<strong>Ταμπέλα Αναπνοή (5 λεπτά)</strong><p>Σκέψη → Ταμπέλα → Αναπνοή → Σημείο. Αυτό είναι η άσκηση. Κάθε επιστροφή χτίζει νέες νευρικές διαδρομές.</p>', reflection: 'Ποιες ταμπέλες χρησιμοποίησα πιο συχνά;', insight: 'Η επιστροφή της προσοχής δεν είναι αποτυχία — είναι η ίδια η άσκηση.' },
    { title: 'Τετραπλή Επίγνωση', where: 'Ήσυχο μέρος', dur: '10 λεπτά', lesson: '<p>Σε αυτό το στάδιο η προσοχή γίνεται τετραπλή — κρατάτε ταυτόχρονα: σώμα, αναπνοή, ίδια την προσοχή, και σκέψεις που αναγνωρίζονται χωρίς να παρασύρουν.</p>', exercise: { title: 'Τετραπλή Επίγνωση', steps: ['Γείωση: νιώστε το σώμα.', 'Αναπνοή: νιώστε τον ρυθμό.', 'Προσοχή: κρατήστε ένα σταθερό σημείο.', 'Σκέψεις: αν έρθουν, ταμπέλα → επιστροφή.', '10 λεπτά. Και τα τέσσερα μαζί.'] }, breathing: '<strong>Τετραπλή Αναπνοή (10 λεπτά)</strong><p>Σώμα. Αναπνοή. Σημείο. Σκέψεις = σύννεφα. Εσείς = ο παρατηρητής.</p>', reflection: 'Μπόρεσα να κρατήσω και τα τέσσερα; Ποιο «χάνω» πρώτο;', insight: 'Δεν χρειάζεται τελειότητα. Χρειάζεται απαλή επιστροφή.' },
    { title: 'Αγκυλωμένη Προσοχή', where: 'Σε όλη τη μέρα', dur: 'Συνεχής παρατήρηση', lesson: '<p>Σήμερα παρατηρήστε: υπάρχουν στιγμές που η προσοχή «κολλάει»; Σε σκέψη, ανησυχία, εμμονή; Αυτή είναι η αγκυλωμένη προσοχή — ο hyperfocus σε κάτι αγχώδες.</p>', exercise: { title: 'Αναγνώριση Αγκύλωσης', steps: ['Σε 5-6 στιγμές μέσα στη μέρα:', 'Ελέγξτε: πού είναι η προσοχή μου τώρα;', 'Τρέχει (διάσπαση); Ή κολλάει (αγκύλωση);', 'Αν κολλάει: ταμπέλα → γείωση → αναπνοή → ανοιχτό βλέμμα.', 'Αν τρέχει: γείωση → αναπνοή → σταθερό σημείο.'] }, breathing: '<strong>Αποκόλληση (30" ανά στιγμή)</strong><p>Τρέχει: γείωση + σημείο. Κολλάει: γείωση + ανοιχτό βλέμμα. Η αναπνοή πάντα στη μέση.</p>', reflection: 'Πότε «τρέχει» ο νους μου; Πότε «κολλάει»; Ποιες καταστάσεις το προκαλούν;', insight: 'Ο νευροδιαφορετικός νους δεν είναι σπασμένος — έχει διαφορετική λειτουργία.' },
    { title: 'Προσοχή σε Κοινωνική Στιγμή', where: 'Σε συνάντηση ή συζήτηση', dur: '2-3 λεπτά', lesson: '<p>Σήμερα δοκιμάστε: σε μια κοινωνική στιγμή, επιλέξτε ένα ουδέτερο σημείο (φυτό, αντικείμενο) ως οπτική αναφορά. Νιώστε τα πόδια σταθερά. Χρησιμοποιήστε περιφερειακή όραση.</p>', exercise: { title: 'Κοινωνική Γείωση', steps: ['Σε κοινωνική κατάσταση:', 'Επιλέξτε ένα ουδέτερο σημείο ως αναφορά.', 'Νιώστε τα πόδια στο έδαφος.', 'Αν νιώθετε ένταση στο σαγόνι, αφήστε την με εκπνοή.', 'Χρησιμοποιήστε μαλακό βλέμμα — όχι τούνελ.'] }, breathing: '<strong>Αναπνοή Παρουσίας (Κατά τη διάρκεια)</strong><p>Κρατήστε μια ήσυχη αναπνοή ενώ είστε σε επαφή με τους άλλους.</p>', reflection: 'Βοήθησε η γείωση στην κοινωνική στιγμή;', insight: 'Μπορείτε να είστε παρόντες στον κόσμο χωρίς να χαθείτε σ\' αυτόν.' },
    { title: 'Ανασκόπηση: Τρεις Άξονες', where: 'Ήσυχο μέρος', dur: '10 λεπτά', lesson: '<p>Έξι εβδομάδες. Τρεις άξονες: Σώμα, Αναπνοή, Προσοχή. Από αύριο: ο τέταρτος και τελευταίος — ο <strong>Χώρος</strong>, η ανοιχτή επίγνωση.</p>', exercise: { title: 'Τρεις Άξονες Μαζί', steps: ['Σώμα: γείωση (2 λεπτά).', 'Αναπνοή: ρυθμός (2 λεπτά).', 'Προσοχή: σταθερό σημείο + ταμπέλα (3 λεπτά).', 'Και τα τρία μαζί (3 λεπτά).', 'Μάθατε πού στέκεστε, πώς αναπνέετε, πού κοιτάτε.'] }, breathing: '<strong>Πλήρης Τριπλή Πρακτική (10 λεπτά)</strong><p>Βάση. Ρυθμός. Φακός. Τώρα λείπει μόνο ένα: ο χώρος που χωράει τα πάντα.</p>', reflection: 'Ποιος άξονας νιώθω πιο δυνατός; Πού χρειάζομαι περισσότερη πρακτική;', insight: 'Τρεις αγκυρές. Μια ακόμη μένει — η πιο απελευθερωτική.' }
  ]
},
6: {
  title: 'Προσοχή στη Ζωή',
  days: [
    { title: 'Ο Νους που Τρέχει', where: 'Σε στιγμή διάσπασης', dur: '3 λεπτά', lesson: '<p>Ο νευροδιαφορετικός νους συχνά «τρέχει» — πολλά ερεθίσματα, χωρίς φίλτρο. Το εργαλείο: Σώμα (γείωση) + Αναπνοή (ρυθμός).</p>', exercise: { title: 'Γείωση στη Διάσπαση', steps: ['Αναγνωρίστε: «Ο νους μου τρέχει τώρα».', 'Άμεση γείωση: πέλματα, βαρύτητα.', 'Αναπνοή: 3 αργές εκπνοές.', 'Σταθερό σημείο: ένα πράγμα μπροστά σας.', 'Μείνετε εκεί 1 λεπτό. Αρκεί.'] }, breathing: '<strong>Αντίδοτο Διάσπασης</strong><p>Γείωση → Εκπνοή → Ένα σημείο. Τρία βήματα. 30 δευτερόλεπτα.</p>', reflection: 'Μπόρεσα να ηρεμήσω τον νου;', insight: 'Δεν πολεμάτε τη διάσπαση — τη χρησιμοποιείτε ως σήμα για επιστροφή.' },
    { title: 'Ο Νους που Κλειδώνει', where: 'Σε στιγμή εμμονής', dur: '3 λεπτά', lesson: '<p>Το αντίθετο: ο νους «κλειδώνει» σε μια σκέψη ή εμμονή (hyperfocus). Το εργαλείο: Χώρος (ανοιχτό βλέμμα) + Προσοχή (απαλή επιστροφή).</p>', exercise: { title: 'Ξεκλείδωμα', steps: ['Αναγνωρίστε: «Ο νους μου κόλλησε».', 'Ταμπέλα: «Εμμονή» ή «Κλείδωμα».', 'Μαλακώστε το βλέμμα — περιφερειακή όραση.', 'Νιώστε τον χώρο γύρω σας.', 'Η σκέψη μικραίνει μέσα στον μεγάλο χώρο.'] }, breathing: '<strong>Αντίδοτο Κλειδώματος</strong><p>Ταμπέλα → Ανοιχτό βλέμμα → Χώρος. Η εμμονή δεν είναι τόσο μεγάλη όσο φαίνεται.</p>', reflection: 'Τι συμβαίνει όταν ανοίγω τον χώρο γύρω από μια εμμονή;', insight: 'Ο Μηχανικός Νους δεν είναι εχθρός — είναι εργαλείο που «υπερθερμάνθηκε».' },
    { title: 'Θορυβώδεις Χώροι', where: 'Δημόσιος χώρος', dur: '5 λεπτά', lesson: '<p>Σε αισθητηριακή υπερφόρτωση: πόδια στο έδαφος, 3 αναπνοές, ανοίξτε περιφερειακή όραση. Μπορείτε να χρησιμοποιήσετε ακουστικά αν χρειαστεί.</p>', exercise: { title: 'Γείωση στο Χάος', steps: ['Νιώστε τα πόδια στο έδαφος — άμεση γείωση.', '3 ήσυχες αναπνοές, εκπνοή από στόμα.', 'Μαλακώστε το βλέμμα — μην εστιάζετε πουθενά.', 'Ακουστικά ή fidget toy αν βοηθά.', 'Θυμηθείτε: δεν είστε τα ερεθίσματα.'] }, breathing: '<strong>3 Αναπνοές στο Χάος</strong><p>Πέλματα. Εκπνοή. Μαλακό βλέμμα. Αρκεί.</p>', reflection: 'Πώς αντέδρασα στον θόρυβο με τα εργαλεία μου;', insight: 'Ο θόρυβος είναι έξω. Η γείωση είναι μέσα. Εσείς επιλέγετε πού μένετε.' },
    { title: 'Mindful Pacing', where: 'Εξωτερικά', dur: '10 λεπτά', lesson: '<p>Η ρυθμική κίνηση «καίει» το άγχος. Σήμερα περπατήστε με επίγνωση — κατακόρυφος άξονας, ανοιχτό βλέμμα, αίσθηση χώρου.</p>', exercise: { title: 'Ρυθμικό Περπάτημα', steps: ['Σταθείτε. Γείωση.', 'Αρχίστε να περπατάτε ρυθμικά.', 'Κρατήστε τον άξονα. Ανοιχτό βλέμμα.', 'Επίγνωση χώρου: τι υπάρχει γύρω σας;', '10 λεπτά. Η κίνηση ηρεμεί χωρίς σκέψη.'] }, breathing: '<strong>Αναπνοή σε Κίνηση (10 λεπτά)</strong><p>Βήματα + αναπνοή + ανοιχτό βλέμμα = κινούμενη παρουσία.</p>', reflection: 'Πώς ήταν να περπατώ με πλήρη επίγνωση;', insight: 'Η κίνηση δεν είναι αντίθετη στην παρουσία — μπορεί να είναι η ίδια η παρουσία.' },
    { title: 'Νους Τρέχει ή Κλειδώνει;', where: 'Σε όλη τη μέρα', dur: '6 × 30"', lesson: '<p>Σήμερα παρατηρήστε τα δικά σας μοτίβα: πότε «τρέχει» ο νους, πότε «κλειδώνει», ποιες καταστάσεις το προκαλούν. Χρησιμοποιήστε τα αντίστοιχα εργαλεία.</p>', exercise: { title: 'Αυτογνωσία Μοτίβων', steps: ['6 στιγμές στη μέρα:', 'Ελέγξτε: τρέχει ή κλειδώνει;', 'Τρέχει → γείωση + αναπνοή.', 'Κλειδώνει → ταμπέλα + ανοιχτό βλέμμα.', 'Σημειώστε τι προκαλεί κάθε κατάσταση.'] }, breathing: '<strong>Εναλλαγή Εργαλείων</strong><p>Κάθε κατάσταση ζητά διαφορετική απάντηση. Σήμερα μαθαίνετε πότε τι.</p>', reflection: 'Πότε τείνει να τρέχει, πότε κλειδώνει; Τι τα προκαλεί;', insight: 'Αυτογνωσία δεν είναι ανάλυση — είναι η αναγνώριση του μοτίβου χωρίς κρίση.' },
    { title: 'Ολοκλήρωση Προσοχής', where: 'Ήσυχο μέρος', dur: '5 λεπτά', lesson: '<p>Εφαρμόστε τη σταθεροποίηση του φακού: σώμα + αναπνοή + σταθερό σημείο + ταμπέλα + τετραπλή επίγνωση, σε μια ενιαία πρακτική.</p>', exercise: { title: 'Σταθεροποίηση Φακού', steps: ['Σώμα & Αναπνοή: κλείστε τα μάτια. Νιώστε. (2 λεπτά)', 'Σταθερό σημείο: ανοίξτε τα μάτια, επιλέξτε. (1 λεπτό)', 'Τετραπλή επίγνωση: σώμα + αναπνοή + σημείο + σκέψεις. (2 λεπτά)', 'Απαλή Επιστροφή: αν παρασυρθείτε, ταμπέλα → σώμα → αναπνοή → σημείο.', 'Κάθε «απαλή επιστροφή» χτίζει νέες νευρικές διαδρομές.'] }, breathing: '<strong>Φακός Αναπνοής (5 λεπτά)</strong><p>Σταθεροποιήστε τον φακό. Η αναπνοή τον κρατά στη θέση του.</p>', reflection: 'Πόσες επιστροφές έκανα; Τι αισθάνθηκα μετά;', insight: 'Κάθε φορά που επιστρέφετε, γίνεστε πιο δυνατοί. Η επιστροφή είναι η ίδια η πρακτική.' },
    { title: 'Ανασκόπηση: Τρεις Άξονες Πλήρεις', where: 'Ήσυχο μέρος', dur: '15 λεπτά', lesson: '<p>Ολοκληρώνονται 6 εβδομάδες — τρεις άξονες. Αύριο ξεκινά ο τελευταίος και ίσως πιο απελευθερωτικός: ο <strong>Χώρος</strong>.</p>', exercise: { title: 'Πλήρης Τριπλή Πρακτική', steps: ['Σώμα: γείωση (3 λεπτά).', 'Αναπνοή: ρυθμός + εκπνοή (3 λεπτά).', 'Προσοχή: σημείο + ταμπέλα + τετραπλή επίγνωση (5 λεπτά).', 'Και τα τρία μαζί (4 λεπτά).', 'Ανοίξτε τα μάτια. Πώς νιώθετε;'] }, breathing: '<strong>15 Λεπτά Πλήρους Πρακτικής</strong><p>Τρεις άξονες. Ένα σώμα. Μια παρουσία.</p>', reflection: 'Πού είμαι τώρα σε σχέση με την αρχή; Τι αλλάζε;', insight: 'Σώμα, Αναπνοή, Προσοχή — τρεις δρόμοι προς το ίδιο μέρος: εδώ.' }
  ]
},
7: {
  title: 'Η Ανοιχτή Επίγνωση',
  days: [
    { title: 'Μαλακά Μάτια', where: 'Ήσυχο μέρος', dur: '5 λεπτά', lesson: '<p>Ο Χώρος είναι το τελευταίο κέντρο. Μαθαίνετε να ανοίγετε την επίγνωση σαν ουρανό που χωράει τα πάντα. Ξεκινήστε μαλακώνοντας το βλέμμα.</p>', exercise: { title: 'Περιφερειακή Όραση', steps: ['Γείωση + Αναπνοή + Σημείο εστίασης (2 λεπτά).', 'Τώρα: μαλακώστε το βλέμμα.', 'Αφήστε τα μάτια να «δούνε» και στα πλάγια χωρίς να κινηθούν.', 'Δεν εστιάζετε πουθενά — αγκαλιάζετε όλο το οπτικό πεδίο.', '3 λεπτά σε αυτό. Τι αλλάζει μέσα σας;'] }, breathing: '<strong>Ανοιχτή Αναπνοή (5 λεπτά)</strong><p>Αφήστε την αναπνοή να διαστέλλεται πέρα από το σώμα. Νιώστε τη συνδεδεμένη με τον αέρα γύρω σας.</p>', reflection: 'Τι άλλαξε στην αίσθηση μου όταν μαλάκωσα το βλέμμα;', insight: 'Η ανοιχτή επίγνωση δεν σημαίνει χαμένος — σημαίνει να νιώθετε τα πάντα χωρίς να κολλάτε πουθενά.' },
    { title: 'Ο Ουρανός και τα Σύννεφα', where: 'Ήσυχο μέρος', dur: '10 λεπτά', lesson: '<p>Σκέψεις, συναισθήματα, αισθήσεις — είναι σύννεφα. Εσείς είστε ο χώρος που τα χωράει. Η ταυτότητα σας δεν είναι τα σύννεφα — είναι ο ουρανός.</p>', exercise: { title: 'Μεταφορά Ουρανού', steps: ['Πλήρης γείωση + αναπνοή + εστίαση (3 λεπτά).', 'Ανοίξτε περιφερειακή όραση.', 'Αφήστε σκέψεις να έρθουν — δεν τις κρατάτε.', 'Αναγνωρίστε: αυτές είναι σύννεφα. Εγώ είμαι ο ουρανός.', '7 λεπτά σε αυτή την αίσθηση ανοιχτότητας.'] }, breathing: '<strong>Αναπνοή Ουρανού (10 λεπτά)</strong><p>Η αναπνοή ρέει σαν αέρας στον ουρανό. Σκέψεις = σύννεφα. Περνούν.</p>', reflection: 'Μπόρεσα να νιώσω τον «ουρανό» πίσω από τις σκέψεις;', insight: 'Δεν είστε οι σκέψεις σας. Είστε ο χώρος που τις χωράει.' },
    { title: 'Το Αντίδοτο στην Υπερφόρτωση', where: 'Σε στιγμή πίεσης', dur: '3 λεπτά', lesson: '<p>Η ανοιχτή προσοχή είναι το πιο ισχυρό εργαλείο ενάντια στην υπερφόρτωση. Όταν νιώθετε σαν σε τούνελ, ανοίξτε — αυτό μειώνει αυτόματα την αίσθηση κινδύνου.</p>', exercise: { title: 'Πρωτόκολλο Υπερφόρτωσης', steps: ['Γείωση: πέλματα, βάρος. «Μηδενίστε» τη θέση σας.', 'Αναπνοή: εκπνοή από στόμα αν νιώθετε σφίξιμο.', 'Προσοχή: ένα σταθερό σημείο ως άγκυρα.', 'Χώρος: μαλακώστε το βλέμμα. Περιφερειακή όραση.', 'Θυμηθείτε: δεν είστε τα σύννεφα. Είστε ο χώρος.'] }, breathing: '<strong>Άνοιγμα στην Υπερφόρτωση (3 λεπτά)</strong><p>Αντί να μειώσετε τα ερεθίσματα, διευρύνετε τον χώρο που τα χωράει.</p>', reflection: 'Βοήθησε το «άνοιγμα» στην υπερφόρτωση;', insight: 'Αντί να πολεμάτε τα ερεθίσματα, ανοίγετε τον χώρο. Τα ίδια σύννεφα, μεγαλύτερος ουρανός.' },
    { title: 'Χώρος και Ασφάλεια', where: 'Ήσυχο μέρος', dur: '10 λεπτά', lesson: '<p>Η αίσθηση ανοιχτού χώρου στέλνει σήμα ασφάλειας. Η στένωση αυξάνει τον κίνδυνο — η διεύρυνση τον μειώνει. Σήμερα δοκιμάστε: πλήρης γείωση + πλήρης ανοιχτότητα.</p>', exercise: { title: 'Ασφάλεια μέσω Χώρου', steps: ['Πλήρης γείωση (2 λεπτά).', 'Αναπνοή ρύθμισης (2 λεπτά).', 'Εστίαση κλειστή → σιγά σιγά ανοίξτε (2 λεπτά).', 'Πλήρης ανοιχτή επίγνωση: ήχοι, αισθήσεις, σκέψεις, χώρος (4 λεπτά).', 'Νιώστε: αυτός ο χώρος σας χωρά.'] }, breathing: '<strong>Αναπνοή Ασφάλειας (10 λεπτά)</strong><p>Κάθε εκπνοή: ο χώρος ανοίγει. Κάθε εισπνοή: ο κόσμος μπαίνει. Είστε ασφαλείς.</p>', reflection: 'Πώς ένιωσα τον χώρο γύρω μου; Ασφάλεια;', insight: 'Η ανοιχτότητα δεν είναι ευαλωτότητα — είναι η μεγαλύτερη ασφάλεια.' },
    { title: 'Τα Τέσσερα Στάδια — Πλήρης Άσκηση', where: 'Ήσυχο μέρος', dur: '15 λεπτά', lesson: '<p>Για πρώτη φορά: η πλήρης, διαδοχική άσκηση του Τετραπλού Άξονα. Αυτή είναι η πρακτική που θα σας συνοδεύει από εδώ και πέρα.</p>', exercise: { title: 'Τα 4 Στάδια', steps: ['Στ. 1 — Νιώσε τη Γη: πέλματα, άξονας, βαρύτητα, χαλάρωση (3 λεπτά).', 'Στ. 2 — Νιώσε την Αναπνοή: μύτη → πνεύμονες → κοιλιά, φυσικός ρυθμός (3 λεπτά).', 'Στ. 3 — Εστίασε Μπροστά: ανοίξτε τα μάτια, απαλό βλέμμα σε σημείο, ταμπέλα αν χρειαστεί (4 λεπτά).', 'Στ. 4 — Άνοιξε στον Χώρο: περιφερειακή όραση, νιώστε ταυτόχρονα σώμα + αναπνοή + γη + ουρανό (5 λεπτά).', 'Άμεση αίσθηση παρουσίας χωρίς λέξεις ή προσπάθεια.'] }, breathing: '<strong>Πλήρης Τετραπλός Άξονας (15 λεπτά)</strong><p>Σταθερότητα → Ρυθμός → Φακός → Απεραντοσύνη. Ένας οργανισμός, μια παρουσία.</p>', reflection: 'Ποιο στάδιο μου φαίνεται πιο φυσικό; Πού δυσκολεύομαι;', insight: 'Αυτά δεν είναι τέσσερα βήματα. Είναι τέσσερα παράθυρα στην ίδια παρουσία.' },
    { title: 'Τετραπλός Άξονας σε Κίνηση', where: 'Εξωτερικά', dur: '15 λεπτά', lesson: '<p>Σήμερα: τα 4 στάδια ενώ περπατάτε. Η πρακτική μεταφέρεται στη ζωή — δεν χρειάζεστε ησυχία ή ειδικό χώρο.</p>', exercise: { title: '4 Στάδια σε Περπάτημα', steps: ['Ξεκινήστε στεκούμενοι: Στ. 1 — Γείωση (1 λεπτό).', 'Αρχίστε να περπατάτε αργά: Στ. 2 — Αναπνοή σε βήματα (3 λεπτά).', 'Σταθεροποιήστε: Στ. 3 — Βλέμμα μπροστά, επίγνωση (3 λεπτά).', 'Ανοίξτε: Στ. 4 — Μαλακό βλέμμα, χώρος, απεραντοσύνη (5 λεπτά).', 'Ολοκλήρωση: και τα 4 μαζί σε κίνηση (3 λεπτά).'] }, breathing: '<strong>Κινούμενη Παρουσία (15 λεπτά)</strong><p>Δεν χρειάζεστε μαξιλάρι. Η γη είναι αρκετή.</p>', reflection: 'Πώς νιώθει η πλήρης πρακτική σε κίνηση;', insight: 'Η ενσυνειδητότητα δεν είναι κάτι που κάνετε — είναι κάτι που είστε.' },
    { title: 'Σχεδόν Εκεί', where: 'Ήσυχο μέρος', dur: '15 λεπτά', lesson: '<p>Μια ακόμη εβδομάδα μένει. Σήμερα: πλήρης πρακτική 15 λεπτών. Εστιαστείτε στη μετάβαση μεταξύ σταδίων — πόσο ομαλά γίνεται;</p>', exercise: { title: 'Ομαλή Μετάβαση', steps: ['Στ. 1 → Στ. 2: πώς η αναπνοή δυναμώνει τη γείωση;', 'Στ. 2 → Στ. 3: πώς η εστίαση στηρίζεται στον ρυθμό;', 'Στ. 3 → Στ. 4: πώς ο χώρος ανοίγει μέσα από την εστίαση;', 'Δεν πηδάτε — ρέετε.', '15 λεπτά ρέουσας παρουσίας.'] }, breathing: '<strong>Ρέουσα Αναπνοή (15 λεπτά)</strong><p>Η αναπνοή δεν ανήκει σε κανένα στάδιο — είναι σε όλα.</p>', reflection: 'Πόσο ομαλά «ρέω» μεταξύ σταδίων;', insight: 'Τα στάδια είναι σκαλωσιές. Σιγά σιγά θα πέσουν — θα μείνει μόνο η παρουσία.' }
  ]
},
8: {
  title: 'Ολοκλήρωση',
  days: [
    { title: 'Νιώσε, Μην Σκεφθείς', where: 'Ήσυχο μέρος', dur: '15 λεπτά', lesson: '<p>Μην προσπαθήσετε να «βιώσετε». Αφήστε την εισροή: αέρας, έδαφος, ουρανός. Η διαφορά μεταξύ προσπάθειας και παράδοσης.</p>', exercise: { title: 'Παθητική Παρουσία', steps: ['Τα 4 στάδια — αλλά χωρίς προσπάθεια.', 'Μην ελέγχετε τίποτα.', 'Αφήστε τη γείωση να συμβεί.', 'Αφήστε την αναπνοή να ρέει.', 'Αφήστε τον χώρο να ανοίξει. Εσείς απλώς... ανοίγετε.'] }, breathing: '<strong>Παθητική Αναπνοή (15 λεπτά)</strong><p>Μην ελέγχετε. Αφήστε το σώμα να σας αναπνεύσει. Νιώστε τη διαφορά.</p>', reflection: 'Τι ένιωσα αφού σταμάτησα να προσπαθώ;', insight: 'Δεν κάνετε τίποτα. Απλώς ανοίγετε.' },
    { title: 'Χωρίς Διαχωρισμό', where: 'Σε δραστηριότητα', dur: '20 λεπτά', lesson: '<p>Σήμερα: εφαρμόστε τους 4 άξονες ενώ κάνετε κάτι καθημερινό — πλύσιμο πιάτων, μαγείρεμα, περπάτημα. Δεν υπάρχει διαχωρισμός μεταξύ «πρακτικής» και «ζωής».</p>', exercise: { title: 'Ζωή = Πρακτική', steps: ['Επιλέξτε μια καθημερινή δραστηριότητα.', 'Εφαρμόστε: γείωση + αναπνοή + εστίαση + ανοιχτότητα.', 'Κρατήστε την επίγνωση ενώ δραστηριοποιείστε.', 'Αν χαθείτε: απαλή επιστροφή.', 'Η δραστηριότητα γίνεται η πρακτική.'] }, breathing: '<strong>Αναπνοή σε Δράση</strong><p>Δεν ξεχωρίζετε. Ζείτε με παρουσία.</p>', reflection: 'Πώς ήταν να κάνω κάτι καθημερινό με πλήρη επίγνωση;', insight: 'Η ζωή δεν περιμένει να τελειώσει η πρακτική. Η ζωή είναι η πρακτική.' },
    { title: 'Αβίαστη Παρουσία', where: 'Οπουδήποτε', dur: '20 λεπτά', lesson: '<p>Σταματήστε να προσπαθείτε. Αφήστε και τα τέσσερα να δουλέψουν μόνα τους. Η γη υποστηρίζει. Η αναπνοή ρέει. Τα μάτια βλέπουν. Η καρδιά αισθάνεται.</p>', exercise: { title: 'Χωρίς Προσπάθεια', steps: ['Καθίστε ή σταθείτε.', 'Μην «κάνετε» τα 4 στάδια — αφήστε τα να συμβούν.', 'Το σώμα ξέρει. Η αναπνοή ξέρει.', 'Εσείς δεν χρειάζεται να κάνετε τίποτα.', '20 λεπτά αβίαστης παρουσίας.'] }, breathing: '<strong>Αβίαστη Αναπνοή (20 λεπτά)</strong><p>Συμβαίνει. Δεν χρειάζεται να το κάνετε.</p>', reflection: 'Τι ανακαλύπτω όταν σταματώ να προσπαθώ;', insight: 'Η πραγματική παρουσία δεν χρειάζεται προσπάθεια. Χρειάζεται μόνο αποδοχή.' },
    { title: 'Φύλλο Εργασίας Παρουσίας', where: 'Οπουδήποτε', dur: '5 λεπτά', lesson: '<p>Σήμερα εξασκείστε στο «Φύλλο Εργασίας» — 4 βήματα που σας φέρνουν πίσω στο «τώρα» σε δευτερόλεπτα. Αυτό θα σας συνοδεύει μετά το πρόγραμμα.</p>', exercise: { title: 'Φύλλο Εργασίας (4 Βήματα)', steps: ['1. ΣΩΜΑ: Νιώστε βάρος, άξονα, εντάσεις. Χαλαρώστε σαγόνι, ώμους.', '2. ΑΝΑΠΝΟΗ: Πώς είναι; Γρήγορη, ρηχή, σφιγμένη; Εκπνοή αργά.', '3. ΠΡΟΣΟΧΗ: Πού είναι; Τρέχει; Κολλάει; Επιστρέψτε σε σημείο.', '4. ΧΩΡΟΣ: Νιώθετε παγιδευμένοι; Μαλακώστε βλέμμα. Σκέψεις = σύννεφα.', 'Κάντε τα με σειρά ή διαλέξτε αυτό που χρειάζεστε.'] }, breathing: '<strong>Γρήγορη Επαναφορά (30"-2 λεπτά)</strong><p>4 βήματα. Δευτερόλεπτα. Παντού. Πάντα.</p>', reflection: 'Πόσο γρήγορα μπόρεσα να «γυρίσω» στο τώρα;', insight: 'Τώρα έχετε ένα εργαλείο για κάθε στιγμή. Δεν χρειάζεστε τίποτα άλλο.' },
    { title: 'Αυτονομία', where: 'Σε όλη τη μέρα', dur: 'Όσο θέλετε', lesson: '<p>Σήμερα δεν υπάρχουν οδηγίες. Χρησιμοποιήστε ό,τι χρειάζεστε, όπως χρειάζεστε. Αυτή η ελευθερία είναι ο στόχος.</p>', exercise: { title: 'Χωρίς Οδηγίες', steps: ['Εσείς αποφασίζετε τι, πότε, πώς.', 'Γείωση; Αναπνοή; Εστίαση; Χώρος;', 'Πλήρης πρακτική; Φύλλο εργασίας;', 'Τίποτα;', 'Η πραγματική πρακτική αρχίζει όταν τελειώνει το πρόγραμμα.'] }, breathing: '<strong>Δική σας Αναπνοή</strong><p>Εσείς ξέρετε πια.</p>', reflection: 'Τι επέλεξα; Γιατί;', insight: 'Δεν χρειάζεστε πρόγραμμα πια. Χρειάζεστε μόνο τον εαυτό σας.' },
    { title: 'Η Πρακτική της Καθημερινότητας', where: 'Σε κάθε στιγμή', dur: 'Συνεχής', lesson: '<p>Ο δρόμος δεν έχει τέλος. Η πρακτική γίνεται τρόπος ζωής: μικρές επιστροφές, μικρές αναγνωρίσεις, καθημερινά. Η συνέπεια σε μικρές δόσεις είναι η δική σας μεγαλύτερη πράξη φροντίδας.</p>', exercise: { title: 'Η Δική σας Ρουτίνα', steps: ['Πρωί: 2-5 λεπτά πλήρης πρακτική.', 'Μέσα στη μέρα: 3-5 μικρές στάσεις (φύλλο εργασίας).', 'Σε ένταση: πρωτόκολλο άγχους ή υπερφόρτωσης.', 'Βράδυ: 5 λεπτά ανασκόπηση.', 'Κάθε στιγμή μπορεί να γίνει μια μικρή επιστροφή.'] }, breathing: '<strong>Καθημερινή Αναπνοή</strong><p>Πρωί, μέρα, βράδυ. Μικρές δόσεις. Μεγάλη αλλαγή.</p>', reflection: 'Ποια θα είναι η δική μου καθημερινή ρουτίνα;', insight: 'Η ενσυνειδητότητα, τελικά, είναι να θυμηθείτε πως ήδη μέσα σας υπάρχει ένας ανοιχτός χώρος που σας χωράει όπως είστε.' },
    { title: 'Ολοκλήρωση: Συνέχισε να Επιστρέφεις', where: 'Ήσυχο μέρος', dur: '20 λεπτά', lesson: '<p>8 εβδομάδες. 4 άξονες. Σώμα · Αναπνοή · Προσοχή · Χώρος. Αυτό δεν είναι τέλος — είναι αρχή.</p><p>Κάντε μια τελευταία πλήρη πρακτική. 20 λεπτά. Αφιερώστε τα στον εαυτό σας.</p>', exercise: { title: 'Η Πλήρης Πρακτική', steps: ['Στ. 1 — Σώμα: γείωση, βαρύτητα, άξονας (5 λεπτά).', 'Στ. 2 — Αναπνοή: ρυθμός, εκπνοή, γέφυρα (5 λεπτά).', 'Στ. 3 — Προσοχή: εστίαση, ταμπέλα, τετραπλή (5 λεπτά).', 'Στ. 4 — Χώρος: ανοιχτή επίγνωση, ουρανός, αποδοχή (5 λεπτά).', 'Ανοίξτε τα μάτια. Αυτός ο χώρος δεν ζητά τίποτα — σας θυμίζει ότι είστε παρόντες, ζωντανοί και πλήρεις.'] }, breathing: '<strong>Η Τελευταία Πρακτική (20 λεπτά)</strong><p>Δεν χρειάζεται τίποτα πια. Μόνο η επιστροφή. Ξανά και ξανά.</p>', reflection: 'Πώς αισθάνομαι τώρα; Τι αλλάξε μέσα σε 8 εβδομάδες;', insight: 'Συνεχίστε να επιστρέφετε. Η συνέπεια σε μικρές δόσεις είναι η δική σας μεγαλύτερη πράξη φροντίδας.' }
  ]
}
};

// ═══════════════════════════════════════
// STATE & HELPERS
// ═══════════════════════════════════════
let W = 1, DAY = 1;

function load() {
    try {
        const s = localStorage.getItem('tax-state');
        if (s) { const o = JSON.parse(s); W = o.w || 1; DAY = o.d || 1; }
    } catch(e) {}
    render();
}

function save() {
    try { localStorage.setItem('tax-state', JSON.stringify({w:W, d:DAY})); } catch(e) {}
}

function render() {
    const week = D[W], day = week.days[DAY - 1], axis = ax(W);
    const totalDay = (W - 1) * 7 + DAY;
    const pct = Math.round((totalDay / 56) * 100);

    document.getElementById('headerWeek').textContent = `Εβδομάδα ${W} · ${axis.name}`;
    document.getElementById('headerDay').textContent = `Ημέρα ${DAY}: ${day.title}`;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = `Ημέρα ${totalDay} / 56 — ${pct}%`;

    const grid = document.getElementById('weekGrid');
    grid.innerHTML = '';
    for (let i = 1; i <= 8; i++) {
        const a = ax(i);
        const btn = document.createElement('button');
        btn.className = 'week-btn' + (i === W ? ' active' : '');
        btn.innerHTML = `Εβ.${i}<span class="axis-label">${a.name}</span>`;
        btn.onclick = () => { W = i; DAY = 1; save(); render(); };
        grid.appendChild(btn);
    }

    document.getElementById('axisIndicator').textContent = `Άξονας: ${axis.name} — ${week.title}`;
    document.getElementById('lessonTitle').textContent = `Ημέρα ${DAY}: ${day.title}`;
    document.getElementById('metaLine').innerHTML = `<span>${day.where}</span><span>${day.dur}</span>`;
    
    let bodyHtml = day.lesson;
    if (day.exercise) {
        bodyHtml += `<div class="exercise-box"><div class="ex-title">${day.exercise.title}</div>`;
        day.exercise.steps.forEach((s, i) => {
            bodyHtml += `<div class="step" data-n="${i+1}.">${s}</div>`;
        });
        bodyHtml += '</div>';
    }
    document.getElementById('lessonBody').innerHTML = bodyHtml;
    document.getElementById('breathCard').innerHTML = day.breathing;
    document.getElementById('reflectionQ').textContent = day.reflection;
    document.getElementById('journal').value = '';
    document.getElementById('insightBox').innerHTML = day.insight;

    const pb = document.getElementById('practiceBtn');
    pb.textContent = 'Εξασκήθηκα';
    pb.className = 'btn btn-done';

    save();
    window.scrollTo({top: 0, behavior: 'smooth'});
}

function go(dir) {
    if (dir === 1) {
        if (DAY < 7) DAY++;
        else if (W < 8) { W++; DAY = 1; }
    } else {
        if (DAY > 1) DAY--;
        else if (W > 1) { W--; DAY = 7; }
    }
    render();
}

function markDone() {
    const b = document.getElementById('practiceBtn');
    b.textContent = '✓ Εξασκήθηκα Σήμερα!';
    b.style.background = 'var(--gold)';
}

function saveJournal() {
    const t = document.getElementById('journal').value.trim();
    if (!t) { alert('Γράψτε κάτι πρώτα!'); return; }
    document.getElementById('journal').value = '';
    alert('✓ Αποθηκεύθηκε!');
}

function goHome() {
    if (confirm('Επιστροφή στην αρχική;')) window.location.href = 'index.html';
}

document.addEventListener('DOMContentLoaded', load);
</script>
