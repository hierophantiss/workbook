<canvas id="c"></canvas>
<div class="label" id="label"><div class="main" id="lm"></div><div class="sub" id="ls"></div></div>

<div class="ptrack"><div class="pbar" id="pb"></div></div>
<div class="dots"><button class="dot active" onclick="goTo(0)"></button><button class="dot" onclick="goTo(1)"></button><button class="dot" onclick="goTo(2)"></button><button class="dot" onclick="goTo(3)"></button></div>
<div class="ctrls"><button onclick="goTo(cur-1)">◀</button><button id="ab" onclick="togAuto()">▶ auto</button><button onclick="goTo(cur+1)">▶</button></div>

<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let W,H,cx,cy;
function resize(){const d=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;cv.width=W*d;cv.height=H*d;cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(d,0,0,d,0,0);cx=W/2;cy=H/2}
resize();addEventListener('resize',resize);

let lang='el';
const urlLang=new URLSearchParams(location.search).get('lang');
if(urlLang==='en'||urlLang==='el')lang=urlLang;
function toggleLang(){lang=lang==='el'?'en':'el';document.getElementById('langBtn').textContent=lang==='el'?'EN':'ΕΛ';updUI();updIntro()}
function updIntro(){document.getElementById('it').textContent=lang==='el'?'Χώρος':'Space';document.getElementById('is').textContent=lang==='el'?'Ανοιχτή Επίγνωση — Πλάνο από πάνω':'Open Awareness — View from Above';document.getElementById('ih').textContent=lang==='el'?'πάτησε για να ξεκινήσεις':'click anywhere to begin'}
if(lang==='en'){updIntro();document.getElementById('langBtn').textContent='ΕΛ'}

const scenes=[
  {label:'Εγκλωβισμός',label_en:'Entrapment',sub:'Τυλιγμένοι στα πέπλα των σκέψεων',sub_en:'Wrapped in veils of thought',bg:[30,15,35]},
  {label:'Γείωση & Εστίαση',label_en:'Grounding & Focus',sub:'Ο άξονας φωτίζει — το βλέμμα εστιάζει',sub_en:'The axis illuminates — the gaze focuses',bg:[15,20,38]},
  {label:'Διεύρυνση',label_en:'Expansion',sub:'Η βεντάλια ανοίγει — όραση, ακοή, αίσθηση',sub_en:'The fan opens — sight, hearing, sensation',bg:[12,25,30]},
  {label:'Ανοιχτή Επίγνωση',label_en:'Open Awareness',sub:'Ο ουρανός που χωράει τα πάντα',sub_en:'The sky that holds everything',bg:[15,30,25]}
];

let cur=0,tgt=0,tT=0,trans=false,time=0,gA=0,autoP=false,autoT=null;

// Noise
function n(x,y){const v=Math.sin(x*12.9898+y*78.233)*43758.5453;return v-Math.floor(v)}
function sn(x,y){const ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy;const sx=fx*fx*(3-2*fx),sy=fy*fy*(3-2*fy);return n(ix,iy)+(n(ix+1,iy)-n(ix,iy))*sx+(n(ix,iy+1)-n(ix,iy))*sy+(n(ix,iy)-n(ix+1,iy)-n(ix,iy+1)+n(ix+1,iy+1))*sx*sy}
function fbm(x,y,o=4){let v=0,a=0.5,f=1;for(let i=0;i<o;i++){v+=a*sn(x*f,y*f);a*=0.5;f*=2}return v}

// Ambient
const amb=[];for(let i=0;i<35;i++)amb.push({x:Math.random()*2000,y:Math.random()*2000,vx:(Math.random()-0.5)*0.12,vy:(Math.random()-0.5)*0.08,sz:0.3+Math.random()*1,al:0.03+Math.random()*0.06,ph:Math.random()*Math.PI*2});

// Veils (thought clouds) - for scenes 0-2
const veils=[];
for(let i=0;i<12;i++){
  const a=Math.random()*Math.PI*2,r=40+Math.random()*80;
  veils.push({x:Math.cos(a)*r,y:Math.sin(a)*r,w:25+Math.random()*40,h:15+Math.random()*25,rot:Math.random()*Math.PI*2,
    sp:0.1+Math.random()*0.3,drift:Math.random()*Math.PI*2,
    co:Math.random()>0.5?[180,140,190]:[160,120,170]});
}

// Λέξεις για τα συννεφάκια-σκέψεις
const thoughtWords = ['σκέψη', 'ανησυχία', 'σχέδιο', 'θυμός', 'χαρά', 'φόβος', 'ανάμνηση', 'προσδοκία', 'κρίση', 'επιθυμία'];

// Cloud-thoughts for scene 3 (συννεφάκια με λέξεις)
let cloudThoughts = [];
for (let i = 0; i < 10; i++) {
  cloudThoughts.push({
    active: false,
    timer: 0,
    x: 0, y: 0,
    size: 0,
    word: '',
    color: [200, 200, 230],
    speed: 0,
    angle: 0
  });
}

// ══════════════════════════
// DRAW TOP-DOWN BODY (head from above)
// ══════════════════════════
function drawTopBody(x,y,scale,alpha,lightLevel,transparent=1){
  ctx.save();ctx.translate(x,y);ctx.scale(scale,scale);
  ctx.globalAlpha = alpha * transparent;

  // Shoulders (oval from above)
  ctx.fillStyle=`rgba(180,170,155,${0.08*transparent})`;
  ctx.beginPath();ctx.ellipse(0,8,28,18,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=`rgba(200,190,175,${0.5*transparent})`;ctx.lineWidth=1.8;ctx.stroke();

  // Arms (two arcs going forward, hands in lap)
  ctx.strokeStyle=`rgba(200,190,175,${0.4*transparent})`;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(-26,4);ctx.quadraticCurveTo(-30,-12,-15,-18);ctx.stroke();
  ctx.beginPath();ctx.moveTo(26,4);ctx.quadraticCurveTo(30,-12,15,-18);ctx.stroke();
  // Hands (small circles in front)
  ctx.beginPath();ctx.arc(-14,-18,3,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(14,-18,3,0,Math.PI*2);ctx.stroke();

  // Head (circle from above)
  const headR=14;
  // Head glow based on light level
  if(lightLevel>0){
    const hg=ctx.createRadialGradient(0,-3,0,0,-3,headR*2+lightLevel*20);
    hg.addColorStop(0,`rgba(140,200,220,${alpha*lightLevel*0.2*transparent})`);
    hg.addColorStop(0.5,`rgba(120,180,200,${alpha*lightLevel*0.08*transparent})`);
    hg.addColorStop(1,'rgba(120,180,200,0)');
    ctx.fillStyle=hg;ctx.beginPath();ctx.arc(0,-3,headR*2+lightLevel*20,0,Math.PI*2);ctx.fill();
  }
  // Head fill
  ctx.fillStyle=`rgba(200,190,170,${0.15*transparent})`;
  ctx.beginPath();ctx.arc(0,-3,headR,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=`rgba(210,200,185,${0.7*transparent})`;ctx.lineWidth=2;ctx.stroke();

  // Hair parting (top of head detail)
  ctx.strokeStyle=`rgba(150,140,120,${0.3*transparent})`;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,-3-headR);ctx.lineTo(0,-3+4);ctx.stroke();

  // Nose (small triangle pointing forward/up)
  ctx.fillStyle=`rgba(210,200,185,${0.4*transparent})`;
  ctx.beginPath();ctx.moveTo(-3,-3-headR+2);ctx.lineTo(3,-3-headR+2);ctx.lineTo(0,-3-headR-4);ctx.closePath();ctx.fill();

  // Ears
  ctx.fillStyle=`rgba(200,190,175,${0.2*transparent})`;
  ctx.beginPath();ctx.ellipse(-headR-2,-3,3,5,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=`rgba(210,200,185,${0.4*transparent})`;ctx.lineWidth=1;ctx.stroke();
  ctx.beginPath();ctx.ellipse(headR+2,-3,3,5,0,0,Math.PI*2);ctx.fill();ctx.stroke();

  // Gravity axis dot (center of head)
  if(lightLevel>0){
    const ag=ctx.createRadialGradient(0,-3,0,0,-3,5+lightLevel*3);
    ag.addColorStop(0,`rgba(220,210,180,${alpha*lightLevel*0.8*transparent})`);
    ag.addColorStop(1,`rgba(220,210,180,0)`);
    ctx.fillStyle=ag;ctx.beginPath();ctx.arc(0,-3,5+lightLevel*3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=`rgba(240,230,200,${alpha*lightLevel*0.9*transparent})`;
    ctx.beginPath();ctx.arc(0,-3,2,0,Math.PI*2);ctx.fill();
  }

  ctx.restore();
}

// ══════════════════════════
// DRAW VEILS (thought clouds) - for scenes 0-2
// ══════════════════════════
function drawVeils(alpha,opacity,dissolve,extraDim=1){
  veils.forEach(v=>{
    const px=cx+v.x+Math.sin(time*v.sp+v.drift)*12;
    const py=cy+v.y+Math.cos(time*v.sp*0.7+v.drift)*8;
    const rot=v.rot+time*0.05;
    ctx.save();ctx.translate(px,py);ctx.rotate(rot);
    const nv=fbm(px*0.01+time*0.1,py*0.01+time*0.08,3);
    const w=v.w*(1+(nv-0.5)*0.3);
    const h=v.h*(1+(nv-0.5)*0.2);
    const vg=ctx.createRadialGradient(0,0,0,0,0,Math.max(w,h));
    const baseA=alpha*opacity*(dissolve?0.04:0.15)*extraDim;
    vg.addColorStop(0,`rgba(${v.co[0]},${v.co[1]},${v.co[2]},${baseA})`);
    vg.addColorStop(0.6,`rgba(${v.co[0]},${v.co[1]},${v.co[2]},${baseA*0.5})`);
    vg.addColorStop(1,`rgba(${v.co[0]},${v.co[1]},${v.co[2]},0)`);
    ctx.fillStyle=vg;
    ctx.beginPath();
    for(let a=0;a<=Math.PI*2+0.1;a+=0.1){
      const nr=1+fbm(Math.cos(a)+time*0.15+v.drift,Math.sin(a)+time*0.1,2)*0.35;
      const rx=Math.cos(a)*w*nr,ry=Math.sin(a)*h*nr;
      a===0?ctx.moveTo(rx,ry):ctx.lineTo(rx,ry);
    }
    ctx.closePath();ctx.fill();
    ctx.restore();
  });
}

// ══════════════════════════
// DRAW CLOUD-THOUGHTS (για σκηνή 3) - συννεφάκια με λέξεις
// ══════════════════════════
function drawCloudThoughts(alpha) {
  ctx.save();
  
  // Update and draw each cloud-thought
  cloudThoughts.forEach(cloud => {
    // Random activation
    if (!cloud.active && Math.random() < 0.003) {
      cloud.active = true;
      cloud.timer = 0;
      // Random position around the figure (but not too close)
      cloud.angle = Math.random() * Math.PI * 2;
      const dist = 90 + Math.random() * 70;
      cloud.x = cx + Math.cos(cloud.angle) * dist;
      cloud.y = cy - 3 + Math.sin(cloud.angle) * dist * 0.7;
      cloud.size = 12 + Math.random() * 12;
      cloud.speed = 0.015 + Math.random() * 0.025;
      cloud.word = thoughtWords[Math.floor(Math.random() * thoughtWords.length)];
      cloud.color = [
        200 + Math.floor(Math.random() * 40),
        190 + Math.floor(Math.random() * 40),
        220 + Math.floor(Math.random() * 30)
      ];
    }
    
    if (cloud.active) {
      cloud.timer += cloud.speed;
      
      // Lifecycle: appear, float, disappear
      const lifePhase = cloud.timer * Math.PI; // 0 to PI
      if (lifePhase < Math.PI) {
        const opacity = Math.sin(lifePhase) * 0.7; // rises then falls
        const driftX = Math.sin(lifePhase * 0.8) * 10;
        const driftY = Math.cos(lifePhase * 0.6) * 8;
        const currentX = cloud.x + driftX;
        const currentY = cloud.y + driftY - 15 * Math.sin(lifePhase); // lifts up
        
        // Draw cloud (soft, puffy shape)
        ctx.save();
        ctx.translate(currentX, currentY);
        ctx.globalAlpha = alpha * opacity;
        
        // Cloud shadow/glow
        ctx.shadowColor = 'rgba(220, 230, 255, 0.5)';
        ctx.shadowBlur = 20;
        
        // Main cloud body (several overlapping circles)
        const cloudR = cloud.size * 0.7;
        ctx.fillStyle = `rgba(${cloud.color[0]}, ${cloud.color[1]}, ${cloud.color[2]}, ${alpha * opacity * 0.6})`;
        ctx.beginPath();
        ctx.arc(0, 0, cloudR, 0, Math.PI*2);
        ctx.arc(cloudR*0.7, -cloudR*0.3, cloudR*0.8, 0, Math.PI*2);
        ctx.arc(-cloudR*0.7, -cloudR*0.2, cloudR*0.9, 0, Math.PI*2);
        ctx.arc(cloudR*0.3, -cloudR*0.6, cloudR*0.7, 0, Math.PI*2);
        ctx.arc(-cloudR*0.3, -cloudR*0.7, cloudR*0.8, 0, Math.PI*2);
        ctx.fill();
        
        // Text on cloud
        ctx.shadowBlur = 8;
        ctx.font = `${Math.floor(cloudR*0.8)}px 'Fraunces', serif`;
        ctx.fillStyle = `rgba(255, 255, 245, ${alpha * opacity * 0.9})`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(cloud.word, 0, -cloudR*0.2);
        
        ctx.restore();
      } else {
        // End of lifecycle, deactivate
        cloud.active = false;
      }
    }
  });
  
  ctx.restore();
}

// ══════════════════════════
// SCENE 0: TRAPPED
// ══════════════════════════
function s0(alpha){
  if(alpha<=0)return;ctx.save();
  // Body dimly visible, no light
  drawTopBody(cx,cy,1.2,alpha*0.6,0);
  // Dense veils all around
  drawVeils(alpha,1,false);
  // Extra fog overlay
  const fog=ctx.createRadialGradient(cx,cy,20,cx,cy,150);
  fog.addColorStop(0,`rgba(140,110,160,${alpha*0.04})`);
  fog.addColorStop(1,`rgba(100,80,130,${alpha*0.08})`);
  ctx.fillStyle=fog;ctx.fillRect(0,0,W,H);
  ctx.restore();
}

// ══════════════════════════
// SCENE 1: GROUNDING + FOCUS
// ══════════════════════════
function s1(alpha){
  if(alpha<=0)return;ctx.save();
  const pulse=Math.sin(time*0.6)*0.5+0.5;
  // Body with growing light
  drawTopBody(cx,cy,1.2,alpha,0.3+pulse*0.5);

  // Body aura (awareness spreading through body)
  const ba=ctx.createRadialGradient(cx,cy,10,cx,cy,55+pulse*15);
  ba.addColorStop(0,`rgba(130,200,220,${alpha*0.1})`);
  ba.addColorStop(0.6,`rgba(110,180,200,${alpha*0.04})`);
  ba.addColorStop(1,'rgba(110,180,200,0)');
  ctx.fillStyle=ba;ctx.beginPath();ctx.arc(cx,cy,55+pulse*15,0,Math.PI*2);ctx.fill();

  // Eye beams converging to a focus point
  const focusDist=100+Math.sin(time*0.3)*10;
  const focusX=cx,focusY=cy-14*1.2-focusDist;
  const eyeL={x:cx-5*1.2,y:cy-3*1.2-14*1.2};
  const eyeR={x:cx+5*1.2,y:cy-3*1.2-14*1.2};

  // Left beam
  const bl=ctx.createLinearGradient(eyeL.x,eyeL.y,focusX,focusY);
  bl.addColorStop(0,`rgba(235,200,80,${alpha*0.45})`);
  bl.addColorStop(1,`rgba(235,200,80,${alpha*0.6})`);
  ctx.strokeStyle=bl;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(eyeL.x,eyeL.y);ctx.lineTo(focusX,focusY);ctx.stroke();
  // Glow
  ctx.strokeStyle=`rgba(235,200,80,${alpha*0.04})`;ctx.lineWidth=8;
  ctx.beginPath();ctx.moveTo(eyeL.x,eyeL.y);ctx.lineTo(focusX,focusY);ctx.stroke();

  // Right beam
  const br=ctx.createLinearGradient(eyeR.x,eyeR.y,focusX,focusY);
  br.addColorStop(0,`rgba(235,200,80,${alpha*0.45})`);
  br.addColorStop(1,`rgba(235,200,80,${alpha*0.6})`);
  ctx.strokeStyle=br;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(eyeR.x,eyeR.y);ctx.lineTo(focusX,focusY);ctx.stroke();
  ctx.strokeStyle=`rgba(235,200,80,${alpha*0.04})`;ctx.lineWidth=8;
  ctx.beginPath();ctx.moveTo(eyeR.x,eyeR.y);ctx.lineTo(focusX,focusY);ctx.stroke();

  // Focus point glow
  const fp=ctx.createRadialGradient(focusX,focusY,0,focusX,focusY,12+pulse*5);
  fp.addColorStop(0,`rgba(245,220,90,${alpha*0.5})`);
  fp.addColorStop(1,'rgba(245,220,90,0)');
  ctx.fillStyle=fp;ctx.beginPath();ctx.arc(focusX,focusY,12+pulse*5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=`rgba(255,240,120,${alpha*0.7})`;
  ctx.beginPath();ctx.arc(focusX,focusY,2.5,0,Math.PI*2);ctx.fill();

  // Dim veils (receding)
  ctx.globalAlpha=0.3;drawVeils(alpha,0.3,false);ctx.globalAlpha=1;

  ctx.restore();
}

// ══════════════════════════
// SCENE 2: EXPANSION (fan open)
// ══════════════════════════
function s2(alpha){
  if(alpha<=0)return;ctx.save();
  const pulse=Math.sin(time*0.5)*0.5+0.5;
  const expand=Math.min(1,(time%100)*0.02); // grows over time

  drawTopBody(cx,cy,1.2,alpha,0.7);

  // Body aura
  const ba=ctx.createRadialGradient(cx,cy,15,cx,cy,70+pulse*10);
  ba.addColorStop(0,`rgba(120,190,210,${alpha*0.12})`);
  ba.addColorStop(1,'rgba(120,190,210,0)');
  ctx.fillStyle=ba;ctx.beginPath();ctx.arc(cx,cy,70+pulse*10,0,Math.PI*2);ctx.fill();

  // ── VISION FAN (from eyes, forward/up) ──
  const headY=cy-3*1.2;
  const noseY=cy-3*1.2-14*1.2-4*1.2;
  const fanDist=Math.min(W,H)*0.45;
  const fanAngleHalf=Math.PI*0.42; // ~75° each side = ~150° total

  // Vision fan gradient
  ctx.save();ctx.translate(cx,noseY);
  for(let i=20;i>=0;i--){
    const layerA=alpha*(0.008+i*0.003);
    const spread=fanAngleHalf*(0.5+i/20*0.5);
    ctx.beginPath();ctx.moveTo(0,0);
    ctx.arc(0,0,fanDist*(0.4+i/20*0.6),-Math.PI/2-spread,-Math.PI/2+spread);
    ctx.closePath();
    ctx.fillStyle=`rgba(235,210,100,${layerA})`;ctx.fill();
  }
  // Fan edge glow
  ctx.strokeStyle=`rgba(235,210,100,${alpha*0.06})`;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,0);
  ctx.arc(0,0,fanDist,-Math.PI/2-fanAngleHalf,-Math.PI/2+fanAngleHalf);
  ctx.closePath();ctx.stroke();
  ctx.restore();

  // ── EAR FANS (from ears, to sides and back) ──
  const earLx=cx-16*1.2-2*1.2,earRx=cx+16*1.2+2*1.2,earY=cy-3*1.2;

  // Left ear fan (covers left + back-left)
  ctx.save();ctx.translate(earLx,earY);
  for(let i=15;i>=0;i--){
    const layerA=alpha*(0.006+i*0.002);
    const spread=Math.PI*0.48;
    ctx.beginPath();ctx.moveTo(0,0);
    ctx.arc(0,0,fanDist*0.7*(0.4+i/15*0.6),Math.PI/2,Math.PI/2+Math.PI);
    ctx.closePath();
    ctx.fillStyle=`rgba(150,200,180,${layerA})`;ctx.fill();
  }
  ctx.restore();

  // Right ear fan (covers right + back-right)
  ctx.save();ctx.translate(earRx,earY);
  for(let i=15;i>=0;i--){
    const layerA=alpha*(0.006+i*0.002);
    ctx.beginPath();ctx.moveTo(0,0);
    ctx.arc(0,0,fanDist*0.7*(0.4+i/15*0.6),-Math.PI/2,-Math.PI/2+Math.PI);
    ctx.closePath();
    ctx.fillStyle=`rgba(150,200,180,${layerA})`;ctx.fill();
  }
  ctx.restore();

  // Faint awareness circle expanding from center
  const circR=40+pulse*20+((time*5)%120);
  const circA=Math.max(0,1-circR/200);
  ctx.strokeStyle=`rgba(180,220,200,${alpha*circA*0.08})`;ctx.lineWidth=0.8;
  ctx.beginPath();ctx.arc(cx,cy-3*1.2,circR,0,Math.PI*2);ctx.stroke();

  // Gravity axis line (vertical through head)
  const ag=ctx.createLinearGradient(cx,cy-120,cx,cy+40);
  ag.addColorStop(0,`rgba(220,210,180,0)`);
  ag.addColorStop(0.3,`rgba(220,210,180,${alpha*0.25})`);
  ag.addColorStop(0.7,`rgba(220,210,180,${alpha*0.25})`);
  ag.addColorStop(1,`rgba(220,210,180,0)`);
  ctx.strokeStyle=ag;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(cx,cy-120);ctx.lineTo(cx,cy+40);ctx.stroke();

  ctx.restore();
}

// ══════════════════════════
// SCENE 3: OPEN AWARENESS (με ορατό άνθρωπο, ουράνιο τόξο και συννεφάκια-σκέψεις)
// ══════════════════════════
function s3(alpha){
  if(alpha<=0)return;ctx.save();
  const pulse=Math.sin(time*0.4)*0.5+0.5;

  // ── Ακτίνες επίγνωσης (πιο διάχυτες, δεν καλύπτουν το κέντρο) ──
  for(let i=0;i<32;i++){
    const angle=(i/32)*Math.PI*2+time*0.02;
    const nv=fbm(Math.cos(angle)+time*0.08,Math.sin(angle)+time*0.06,3);
    const len=90+nv*130+Math.sin(time*0.2+i*0.4)*25;
    const sx=cx+Math.cos(angle)*22,sy=cy-3+Math.sin(angle)*22*0.85;
    const ex=cx+Math.cos(angle)*len,ey=cy-3+Math.sin(angle)*len*0.85;
    
    const rg=ctx.createRadialGradient(sx,sy,0,sx,sy,len*0.6);
    const isForward=angle>Math.PI*1.25||angle<Math.PI*0.75;
    const col=isForward?'235,210,100':'150,200,180';
    rg.addColorStop(0,`rgba(${col},${alpha*0.08})`);
    rg.addColorStop(0.4,`rgba(${col},${alpha*0.04})`);
    rg.addColorStop(1,`rgba(${col},0)`);
    
    ctx.fillStyle=rg;ctx.beginPath();ctx.arc(sx,sy,len*0.8,0,Math.PI*2);ctx.fill();
  }

  // ── ΟΥΡΑΝΙΟ ΤΟΞΟ (πλήρης κύκλος γύρω από τη φιγούρα) ──
  const rainbowRadius = Math.min(W,H)*0.35;
  const rainbowColors = [
    'rgba(255, 120, 120, 0.2)', // κόκκινο
    'rgba(255, 200, 100, 0.2)', // πορτοκαλί
    'rgba(255, 255, 120, 0.2)', // κίτρινο
    'rgba(120, 255, 120, 0.2)', // πράσινο
    'rgba(120, 200, 255, 0.2)', // μπλε
    'rgba(200, 120, 255, 0.2)'  // ιώδες
  ];
  
  for(let i=0; i<rainbowColors.length; i++){
    ctx.save();
    ctx.globalAlpha = alpha * 0.5;
    ctx.beginPath();
    ctx.arc(cx, cy-3, rainbowRadius + i*6, 0, Math.PI*2);
    ctx.strokeStyle = rainbowColors[i];
    ctx.lineWidth = 5;
    ctx.stroke();
    ctx.restore();
  }

  // Σώμα με καλή ορατότητα
  drawTopBody(cx,cy,1.2,alpha,1,0.8);

  // Αύρα σώματος (ήπια)
  const ba=ctx.createRadialGradient(cx,cy-3,10,cx,cy-3,90+pulse*15);
  ba.addColorStop(0,`rgba(160,220,200,${alpha*0.1})`);
  ba.addColorStop(0.6,`rgba(140,200,180,${alpha*0.05})`);
  ba.addColorStop(1,'rgba(140,200,180,0)');
  ctx.fillStyle=ba;ctx.beginPath();ctx.arc(cx,cy-3,90+pulse*15,0,Math.PI*2);ctx.fill();

  // Συννεφάκια-σκέψεις (εμφανίζονται και εξαφανίζονται)
  drawCloudThoughts(alpha);

  // Ελάχιστα πέπλα (για υφή, προαιρετικά)
  ctx.globalAlpha = alpha * 0.02;
  for(let i=0;i<3;i++){
    const dist = 150 + i*30;
    ctx.beginPath(); ctx.arc(cx, cy-3, dist, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(200,220,240,0.2)'; ctx.lineWidth = 0.5; ctx.stroke();
  }

  // Άξονας βαρύτητας (αχνός)
  ctx.strokeStyle=`rgba(220,210,180,${alpha*0.12})`;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(cx,cy-160);ctx.lineTo(cx,cy+80);ctx.stroke();

  ctx.restore();
}

const draws=[s0,s1,s2,s3];

function drawBg(sf){
  const idx=Math.floor(sf),fr=sf-idx,nx=Math.min(idx+1,3);
  const r=scenes[idx].bg[0]*(1-fr)+scenes[nx].bg[0]*fr;
  const g=scenes[idx].bg[1]*(1-fr)+scenes[nx].bg[1]*fr;
  const b=scenes[idx].bg[2]*(1-fr)+scenes[nx].bg[2]*fr;
  const gr=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H)*0.75);
  gr.addColorStop(0,`rgb(${r|0},${g|0},${b|0})`);gr.addColorStop(1,'rgb(5,5,16)');
  ctx.fillStyle=gr;ctx.fillRect(0,0,W,H);
  ctx.globalAlpha=gA;
  amb.forEach(p=>{p.x+=p.vx+Math.sin(time*0.2+p.ph)*0.02;p.y+=p.vy+Math.cos(time*0.15+p.ph)*0.015;
    if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
    ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,195,185,${p.al*(0.7+Math.sin(time*0.5+p.ph)*0.3)})`;ctx.fill()});
  ctx.globalAlpha=1;
}

function updUI(){const s=scenes[cur];document.getElementById('lm').textContent=lang==='el'?s.label:s.label_en;document.getElementById('ls').textContent=lang==='el'?s.sub:s.sub_en;
  document.getElementById('label').classList.add('vis');document.getElementById('sn').textContent=`${cur+1} / 4`;
  document.getElementById('pb').style.width=`${(cur/3)*100}%`;
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===cur))}

function goTo(i){if(i<0||i>3||i===cur||trans)return;tgt=i;trans=true;tT=0;
  document.getElementById('label').classList.remove('vis');
  setTimeout(()=>{cur=tgt;trans=false;updUI()},2000)}

function ease(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2}

function togAuto(){autoP=!autoP;document.getElementById('ab').innerHTML=autoP?'⏸ pause':'▶ auto';if(autoP)runA();else clearTimeout(autoT)}
function runA(){if(!autoP)return;autoT=setTimeout(()=>{if(cur<3){goTo(cur+1);setTimeout(runA,2200)}else{autoP=false;document.getElementById('ab').innerHTML='▶ auto'}},7000)}

document.getElementById('intro').addEventListener('click',()=>{document.getElementById('intro').classList.add('hidden');updUI()});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' ')goTo(cur+1);if(e.key==='ArrowLeft')goTo(cur-1)});

let lt=0;
function loop(ts){
  const dt=Math.min((ts-lt)/1000,0.05);lt=ts;time+=dt;
  if(gA<1)gA=Math.min(1,gA+dt*0.5);
  if(trans)tT=Math.min(tT+dt*0.6,1);
  ctx.clearRect(0,0,W,H);
  const sf=trans?cur+(tgt-cur)*ease(tT):cur;
  drawBg(sf);ctx.globalAlpha=gA;
  if(trans){const e2=ease(tT);draws[cur](1-e2);draws[tgt](e2)}
  else draws[cur](1);
  ctx.globalAlpha=1;
  requestAnimationFrame(loop)}
requestAnimationFrame(loop);
</script>
