<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Εσωτερική Αφή — Η Πράξη της Παρατήρησης</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,700;1,300&family=DM+Sans:wght@400;500&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#050510;overflow:hidden;height:100vh;width:100vw;font-family:'Fraunces',serif;color:#e8e4df;user-select:none}
  canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:1}
  .lang-toggle{
    position:fixed;top:20px;left:20px;z-index:20;
    background:rgba(20,25,35,0.8);border-radius:30px;border:1px solid rgba(200,180,140,0.3);
    display:flex;overflow:hidden;backdrop-filter:blur(4px);
  }
  .lang-btn{
    padding:5px 15px;font-size:12px;font-weight:400;letter-spacing:1px;
    background:transparent;border:none;color:rgba(232,228,223,0.5);cursor:pointer;
    transition:all 0.3s;font-family:'Fraunces',serif;
  }
  .lang-btn.active{background:rgba(200,180,140,0.2);color:#e8e4df}
  .label{
    position:fixed;bottom:70px;left:50%;transform:translateX(-50%);z-index:10;
    text-align:center;width:90%;opacity:0;transition:opacity 1.2s ease;
  }
  .label.vis{opacity:1}
  .label .main{font-size:clamp(1.3rem,4vw,2rem);font-weight:400;letter-spacing:0.1em;text-transform:uppercase}
  .label .sub{
    font-size:clamp(0.7rem,1.4vw,0.9rem);letter-spacing:0.05em;
    color:rgba(232,228,223,0.7);margin-top:8px;font-style:italic;line-height:1.5;
    background:rgba(10,12,18,0.6);padding:8px 18px;border-radius:40px;backdrop-filter:blur(4px);
    display:inline-block;max-width:700px;
  }
  .snum{position:fixed;top:24px;right:28px;z-index:10;font-size:0.7rem;letter-spacing:0.3em;color:rgba(232,228,223,0.2)}
  .ptrack{position:fixed;bottom:0;left:0;width:100%;height:2px;background:rgba(255,255,255,0.03);z-index:10}
  .pbar{height:100%;background:linear-gradient(90deg,rgba(160,130,90,0.4),rgba(200,180,100,0.5),rgba(120,190,170,0.4));transition:width 1.2s ease}
  .dots{position:fixed;right:22px;top:50%;transform:translateY(-50%);z-index:10;display:flex;flex-direction:column;gap:12px}
  .dot{width:6px;height:6px;border-radius:50%;background:rgba(232,228,223,0.12);transition:all .5s ease;cursor:pointer;border:none;padding:0}
  .dot.active{background:rgba(232,228,223,0.6);transform:scale(1.6);box-shadow:0 0 8px rgba(232,228,223,0.2)}
  .ctrls{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:8px}
  .ctrls button{
    background:rgba(232,228,223,0.05);border:1px solid rgba(232,228,223,0.1);
    color:rgba(232,228,223,0.4);padding:5px 14px;font-family:'Fraunces',serif;
    font-size:0.7rem;letter-spacing:0.1em;cursor:pointer;border-radius:18px;transition:all .3s
  }
  .ctrls button:active{background:rgba(232,228,223,0.15);color:rgba(232,228,223,0.7)}
  .intro{
    position:fixed;inset:0;z-index:100;background:#050510;
    display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;
    transition:opacity 2s ease
  }
  .intro.hidden{opacity:0;pointer-events:none}
  .intro-t{
    font-size:clamp(1.6rem,4.5vw,2.8rem);font-weight:300;letter-spacing:0.2em;
    background:linear-gradient(135deg,#e8e4df,#c8a860);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
    opacity:0;animation:fi 2s ease 0.5s forwards
  }
  .intro-s{
    font-size:clamp(0.7rem,1.4vw,0.95rem);letter-spacing:0.3em;color:rgba(232,228,223,0.25);
    margin-top:8px;font-style:italic;opacity:0;animation:fi 2s ease 1.2s forwards
  }
  .intro-q{
    font-size:clamp(0.6rem,1.1vw,0.75rem);letter-spacing:0.15em;color:rgba(232,228,223,0.15);
    margin-top:30px;max-width:400px;text-align:center;line-height:1.8;font-style:italic;
    opacity:0;animation:fi 2s ease 1.8s forwards
  }
  .intro-h{
    font-size:0.6rem;letter-spacing:0.4em;color:rgba(232,228,223,0.1);margin-top:40px;
    text-transform:uppercase;animation:pu 3.5s ease-in-out infinite
  }
  @keyframes fi{to{opacity:1}}
  @keyframes pu{0%,100%{opacity:0.1}50%{opacity:0.35}}
</style>
</head>
<body>
<div class="lang-toggle" id="langToggle">
  <button class="lang-btn active" data-lang="el">ΕΛ</button>
  <button class="lang-btn" data-lang="en">EN</button>
</div>
<div class="intro" id="intro">
  <div class="intro-t" id="introTitle">Εσωτερική Αφή</div>
  <div class="intro-s" id="introSub">Η Πράξη της Παρατήρησης</div>
  <div class="intro-q" id="introQuote">«Δεν χρειάζεται να ελέγξεις την αναπνοή σου.<br>Αρκεί να την παρατηρήσεις όπως είναι.»</div>
  <div class="intro-h" id="introHint">πάτησε για να ξεκινήσεις</div>
</div>
<canvas id="c"></canvas>
<div class="label" id="label">
  <div class="main" id="labelMain"></div>
  <div class="sub" id="labelSub"></div>
</div>
<div class="snum" id="sn"></div>
<div class="ptrack"><div class="pbar" id="pb"></div></div>
<div class="dots" id="dotsContainer"></div>
<div class="ctrls"><button onclick="goTo(cur-1)">◀</button><button id="ab" onclick="togAuto()">▶ auto</button><button onclick="goTo(cur+1)">▶</button></div>

<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let W,H,cx,cy;
function resize(){const d=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;cv.width=W*d;cv.height=H*d;cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(d,0,0,d,0,0);cx=W/2;cy=H/2}
resize();addEventListener('resize',resize);

// ================== SCENES (5 scenes) ==================
const scenes = [
  { // 0: Gravity
    label: { el: 'Βαρύτητα', en: 'Gravity' },
    sub: {
      el: 'Νιώσε το βάρος σου να κατεβαίνει προς τη γη\nΗ σπονδυλική στήλη ευθυγραμμίζεται',
      en: 'Feel your weight sinking into the earth\nThe spine aligns naturally'
    },
    bg: [25,18,22]  // deeper grounding colors
  },
  { // 1: Nostrils
    label: { el: 'Ρουθούνια', en: 'Nostrils' },
    sub: {
      el: 'Ο αέρας αγγίζει τα ρουθούνια\nΗ πρώτη αίσθηση της αναπνοής',
      en: 'Air touches the nostrils\nThe first sensation of breath'
    },
    bg: [20,22,35]
  },
  { // 2: Throat
    label: { el: 'Λαιμός', en: 'Throat' },
    sub: {
      el: 'Ο αέρας περνά από το λαιμό\nΠαρατήρησε την κίνηση',
      en: 'Air passes through the throat\nNotice the movement'
    },
    bg: [18,28,38]
  },
  { // 3: Chest & Belly
    label: { el: 'Στήθος & Κοιλιά', en: 'Chest & Belly' },
    sub: {
      el: 'Διαστολή και συστολή\nΗ κίνηση μέσα στο σώμα',
      en: 'Expansion and contraction\nThe movement inside the body'
    },
    bg: [18,28,32]
  },
  { // 4: Whole Body
    label: { el: 'Ολόκληρο το Σώμα', en: 'Whole Body' },
    sub: {
      el: 'Κάθε εισπνοή αλλάζει τη στάση\nΕσωτερική αφή παντού',
      en: 'Every breath changes posture\nInner touch everywhere'
    },
    bg: [15,30,25]
  }
];

let lang = 'el';
const langBtns = document.querySelectorAll('.lang-btn');
langBtns.forEach(btn=>{
  btn.addEventListener('click',()=>{
    langBtns.forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    lang = btn.dataset.lang;
    updateSceneLabels(cur);
    updateIntro();
  });
});

function updateIntro(){
  const t = lang==='el' ? 'Εσωτερική Αφή' : 'Inner Touch';
  const s = lang==='el' ? 'Η Πράξη της Παρατήρησης' : 'The Act of Observation';
  const q = lang==='el' ? '«Δεν χρειάζεται να ελέγξεις την αναπνοή σου.<br>Αρκεί να την παρατηρήσεις όπως είναι.»' : '"You do not need to control your breath.<br>Just observe it as it is."';
  const h = lang==='el' ? 'πάτησε για να ξεκινήσεις' : 'click to begin';
  document.getElementById('introTitle').textContent = t;
  document.getElementById('introSub').textContent = s;
  document.getElementById('introQuote').innerHTML = q;
  document.getElementById('introHint').textContent = h;
}

// ================== GRAPHICS HELPERS ==================
let time=0,gA=0,cur=0,tgt=0,tT=0,trans=false,autoP=false,autoTm=null;

// Noise functions for organic effects
function n(x,y){const v=Math.sin(x*12.9898+y*78.233)*43758.5453;return v-Math.floor(v)}
function sn(x,y){const ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy;const sx=fx*fx*(3-2*fx),sy=fy*fy*(3-2*fy);return n(ix,iy)+(n(ix+1,iy)-n(ix,iy))*sx+(n(ix,iy+1)-n(ix,iy))*sy+(n(ix,iy)-n(ix+1,iy)-n(ix,iy+1)+n(ix+1,iy+1))*sx*sy}
function fbm(x,y,o=4){let v=0,a=0.5,f=1;for(let i=0;i<o;i++){v+=a*sn(x*f,y*f);a*=0.5;f*=2}return v}

// Ambient particles
const amb=[];for(let i=0;i<40;i++)amb.push({x:Math.random()*2000,y:Math.random()*2000,vx:(Math.random()-0.5)*0.08,vy:(Math.random()-0.5)*0.06,sz:0.3+Math.random()*0.8,al:0.02+Math.random()*0.05,ph:Math.random()*Math.PI*2});

// ================== DRAWING FUNCTIONS ==================
function drawGravityAxis(alpha, intensity) {
  if (alpha<0.01) return;
  ctx.save();
  ctx.globalAlpha = alpha * Math.min(1, intensity*0.8);
  const x = cx;
  const y1 = cy-150;
  const y2 = cy+140;
  ctx.strokeStyle = '#e8d8b0';
  ctx.lineWidth = 2;
  ctx.setLineDash([10, 12]);
  ctx.beginPath(); ctx.moveTo(x, y1); ctx.lineTo(x, y2); ctx.stroke();
  ctx.setLineDash([]);
  // arrows down
  ctx.fillStyle = '#e8d8b0';
  ctx.shadowBlur = 6;
  for (let i = 0; i < 5; i++) {
    let y = cy + 20 + i * 25;
    ctx.beginPath(); ctx.moveTo(x-6, y-8); ctx.lineTo(x, y); ctx.lineTo(x+6, y-8); ctx.fill();
  }
  ctx.font = 'bold 12px "Fraunces"';
  ctx.fillStyle = 'rgba(232,216,176,0.7)';
  ctx.fillText(lang==='el' ? 'ΒΑΡΥΤΗΤΑ' : 'GRAVITY', x+18, cy-50);
  ctx.restore();
}

function drawBody(alpha, highlights) {
  ctx.save();
  ctx.translate(cx, cy+5);
  const col = `rgba(210,200,180,${alpha*0.75})`;
  const dim = `rgba(210,200,180,${alpha*0.3})`;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // Legs
  ctx.strokeStyle = col;
  ctx.lineWidth = 2.2;
  ctx.beginPath(); ctx.moveTo(-10,5); ctx.quadraticCurveTo(-12,45,-16,100); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(10,5); ctx.quadraticCurveTo(12,45,16,100); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-16,100); ctx.lineTo(-22,107); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(16,100); ctx.lineTo(22,107); ctx.stroke();

  // Pelvis
  ctx.fillStyle = `rgba(200,190,170,${alpha*0.2})`;
  ctx.beginPath(); ctx.ellipse(0,15,22,12,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = dim; ctx.lineWidth=1.5; ctx.stroke();

  // Torso outline
  ctx.strokeStyle = col;
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-18,-65); ctx.quadraticCurveTo(-20,-25,-18,5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(18,-65); ctx.quadraticCurveTo(20,-25,18,5); ctx.stroke();

  // Spine highlight if needed
  if (highlights.spine>0) {
    ctx.strokeStyle = `rgba(220,200,140,${alpha*highlights.spine*0.5})`;
    ctx.lineWidth = 1.2;
    for (let i=0; i<12; i++) {
      let y = -62 + i*11;
      ctx.beginPath(); ctx.moveTo(-2+Math.sin(time+i)*1.2, y); ctx.lineTo(2+Math.cos(time*0.5+i)*1.2, y-2); ctx.stroke();
    }
  }

  // Lungs
  if (highlights.chest>0) {
    const breath = Math.sin(time*0.5)*0.5+0.5;
    const lw = 14 + breath*5;
    const lh = 26 + breath*6;
    ctx.fillStyle = `rgba(180,200,220,${alpha*highlights.chest*0.25})`;
    ctx.strokeStyle = `rgba(180,200,220,${alpha*highlights.chest*0.6})`;
    ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.ellipse(-8,-35,lw*0.5,lh*0.5,0.1,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(8,-35,lw*0.5,lh*0.5,-0.1,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,-52); ctx.quadraticCurveTo(-4,-44,-8,-35); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,-52); ctx.quadraticCurveTo(4,-44,8,-35); ctx.stroke();
  }

  // Belly
  if (highlights.belly>0) {
    const breath = Math.sin(time*0.5)*0.5+0.5;
    const br = 14 + breath*6;
    ctx.fillStyle = `rgba(200,180,140,${alpha*highlights.belly*0.2})`;
    ctx.strokeStyle = `rgba(200,180,140,${alpha*highlights.belly*0.5})`;
    ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.ellipse(0,-5,br,br*0.8,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-16,-18); ctx.quadraticCurveTo(0,-12+breath*4,16,-18); ctx.stroke();
  }

  // Throat highlight
  if (highlights.throat>0) {
    const glow = Math.sin(time*0.8)*0.3+0.4;
    ctx.fillStyle = `rgba(220,200,150,${alpha*highlights.throat*0.3*glow})`;
    ctx.beginPath(); ctx.ellipse(0,-70,10,8,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = `rgba(220,200,150,${alpha*highlights.throat*0.7})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(0,-70,6,0,Math.PI*2); ctx.stroke();
  }

  // Shoulders and arms
  ctx.strokeStyle = col;
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-22,-65); ctx.quadraticCurveTo(-12,-72,0,-75); ctx.quadraticCurveTo(12,-72,22,-65); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-22,-65); ctx.quadraticCurveTo(-24,-42,-20,-10); ctx.quadraticCurveTo(-18,20,-16,35); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(22,-65); ctx.quadraticCurveTo(24,-42,20,-10); ctx.quadraticCurveTo(18,20,16,35); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-16,35); ctx.lineTo(-20,42); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(16,35); ctx.lineTo(20,42); ctx.stroke();

  // Neck
  ctx.strokeStyle = dim;
  ctx.lineWidth = 1.8;
  ctx.beginPath(); ctx.moveTo(0,-75); ctx.lineTo(0,-86); ctx.stroke();

  // Head
  ctx.fillStyle = `rgba(210,200,180,${alpha*0.2})`;
  ctx.beginPath(); ctx.ellipse(0,-96,14,16,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = col; ctx.lineWidth = 2; ctx.stroke();
  // Eyes closed
  ctx.strokeStyle = dim;
  ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.moveTo(-5,-96); ctx.quadraticCurveTo(-3,-94,-1,-96); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(1,-96); ctx.quadraticCurveTo(3,-94,5,-96); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,-94); ctx.lineTo(1,-89); ctx.lineTo(-1,-89); ctx.closePath(); ctx.stroke();

  // Nostril glow
  if (highlights.nose>0) {
    ctx.fillStyle = `rgba(240,210,140,${alpha*highlights.nose*0.5})`;
    ctx.beginPath(); ctx.arc(-2,-88,1.8,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(2,-88,1.8,0,Math.PI*2); ctx.fill();
    for (let i=0; i<6; i++) {
      let t = ((time*0.8 + i*0.2) % 1);
      let px = Math.sin(time*0.3 + i)*5*(1-t);
      let py = -88 - 8*(1-t);
      ctx.fillStyle = `rgba(240,220,150,${alpha*highlights.nose*(1-t)*0.4})`;
      ctx.beginPath(); ctx.arc(px, py, 0.8+t, 0, Math.PI*2); ctx.fill();
    }
  }

  ctx.restore();
}

function drawAttention(alpha, intensity) {
  if (intensity<=0) return;
  const fx = cx;
  const fy = cy+5-96;
  const pulse = Math.sin(time*1.2)*0.5+0.5;
  ctx.save();
  ctx.globalAlpha = alpha * 0.7;
  const gradCore = ctx.createRadialGradient(fx, fy, 0, fx, fy, 20);
  gradCore.addColorStop(0, 'rgba(255,240,180,0.9)');
  gradCore.addColorStop(0.6, 'rgba(255,220,120,0.5)');
  gradCore.addColorStop(1, 'rgba(255,200,80,0)');
  ctx.fillStyle = gradCore;
  ctx.beginPath(); ctx.arc(fx, fy, 20, 0, Math.PI*2); ctx.fill();

  const endY = fy + 40 + intensity*50;
  const streamGrad = ctx.createLinearGradient(fx, fy, fx, endY);
  streamGrad.addColorStop(0, `rgba(255,240,180,${alpha*0.4})`);
  streamGrad.addColorStop(1, `rgba(255,240,180,0)`);
  ctx.strokeStyle = streamGrad;
  ctx.lineWidth = 4 + intensity*2;
  ctx.beginPath(); ctx.moveTo(fx, fy); ctx.lineTo(fx, endY); ctx.stroke();

  for (let i=0; i<12; i++) {
    let t = ((time*0.5 + i*0.08) % 1);
    let y = fy + t * (endY-fy);
    let x = fx + Math.sin(time*0.8 + i*0.7) * 8 * (1-t);
    ctx.fillStyle = `rgba(255,240,180,${alpha*(1-t)*0.5})`;
    ctx.beginPath(); ctx.arc(x, y, 1.2+t*2, 0, Math.PI*2); ctx.fill();
  }
  ctx.font = 'bold 12px "Fraunces"';
  ctx.fillStyle = 'rgba(255,240,180,0.8)';
  ctx.shadowBlur = 8;
  ctx.fillText(lang==='el' ? 'ΠΡΟΣΟΧΗ' : 'ATTENTION', fx+22, fy-8);
  ctx.restore();
}

// Scene-specific drawing
function drawScene(idx, alpha) {
  switch(idx) {
    case 0: // Gravity
      drawBody(alpha, {nose:0,throat:0,chest:0.1,belly:0.1,spine:0.2});
      drawGravityAxis(alpha, 1.2);
      drawAttention(alpha*0.4, 0.3);
      break;
    case 1: // Nostrils
      drawBody(alpha, {nose:0.9,throat:0.1,chest:0.2,belly:0.1,spine:0.1});
      drawGravityAxis(alpha, 0.5);
      drawAttention(alpha*0.8, 1.2);
      break;
    case 2: // Throat
      drawBody(alpha, {nose:0.3,throat:0.9,chest:0.3,belly:0.2,spine:0.2});
      drawGravityAxis(alpha, 0.6);
      drawAttention(alpha*0.9, 1.5);
      break;
    case 3: // Chest & Belly
      drawBody(alpha, {nose:0.2,throat:0.3,chest:0.8,belly:0.7,spine:0.3});
      drawGravityAxis(alpha, 0.7);
      drawAttention(alpha*0.9, 2);
      break;
    case 4: // Whole Body
      drawBody(alpha, {nose:0.4,throat:0.5,chest:0.8,belly:0.8,spine:0.7});
      drawGravityAxis(alpha, 0.9);
      drawAttention(alpha*0.9, 2.5);
      break;
  }
}

function drawBg(sf){
  const idx=Math.floor(sf),fr=sf-idx,nx=Math.min(idx+1,4);
  const r=scenes[idx].bg[0]*(1-fr)+scenes[nx].bg[0]*fr;
  const g=scenes[idx].bg[1]*(1-fr)+scenes[nx].bg[1]*fr;
  const b=scenes[idx].bg[2]*(1-fr)+scenes[nx].bg[2]*fr;
  const gr=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H)*0.75);
  gr.addColorStop(0,`rgb(${r|0},${g|0},${b|0})`);gr.addColorStop(1,'rgb(5,5,16)');
  ctx.fillStyle=gr;ctx.fillRect(0,0,W,H);
  ctx.globalAlpha=gA;
  amb.forEach(p=>{
    p.x+=p.vx+Math.sin(time*0.2+p.ph)*0.02;
    p.y+=p.vy+Math.cos(time*0.15+p.ph)*0.015;
    if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
    ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,195,185,${p.al*(0.7+Math.sin(time*0.5+p.ph)*0.3)})`;
    ctx.fill();
  });
  ctx.globalAlpha=1;
}

// UI updates
function updateSceneLabels(idx){
  const s = scenes[idx];
  document.getElementById('labelMain').textContent = s.label[lang];
  document.getElementById('labelSub').innerHTML = s.sub[lang].replace(/\n/g,'<br>');
  document.getElementById('label').classList.add('vis');
  document.getElementById('sn').textContent = `${idx+1} / ${scenes.length}`;
  document.getElementById('pb').style.width = `${(idx/(scenes.length-1))*100}%`;
  const dotsDiv = document.getElementById('dotsContainer');
  dotsDiv.innerHTML = '';
  for(let i=0;i<scenes.length;i++){
    const d=document.createElement('button');
    d.className='dot'+(i===idx?' active':'');
    d.setAttribute('onclick',`goTo(${i})`);
    dotsDiv.appendChild(d);
  }
}

function updUI(){ updateSceneLabels(cur); }

function goTo(i){
  if(i<0||i>=scenes.length||i===cur||trans)return;
  tgt=i; trans=true; tT=0;
  document.getElementById('label').classList.remove('vis');
  setTimeout(()=>{cur=tgt;trans=false;updUI();},1800);
}
function ease(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2}
function togAuto(){
  autoP=!autoP;
  document.getElementById('ab').innerHTML=autoP?'⏸ pause':'▶ auto';
  if(autoP)runA(); else clearTimeout(autoTm);
}
function runA(){
  if(!autoP)return;
  autoTm=setTimeout(()=>{
    if(cur<scenes.length-1){goTo(cur+1);setTimeout(runA,7000);}
    else{autoP=false;document.getElementById('ab').innerHTML='▶ auto';}
  },7000);
}

document.getElementById('intro').addEventListener('click',()=>{
  document.getElementById('intro').classList.add('hidden');
  updateIntro(); updUI();
});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' ')goTo(cur+1);
  if(e.key==='ArrowLeft')goTo(cur-1);
});

let lt=0;
function loop(ts){
  const dt=Math.min((ts-lt)/1000,0.05); lt=ts; time+=dt;
  if(gA<1) gA=Math.min(1,gA+dt*0.5);
  if(trans) tT=Math.min(tT+dt*0.6,1);
  ctx.clearRect(0,0,W,H);
  const sf = trans ? cur+(tgt-cur)*ease(tT) : cur;
  drawBg(sf);
  ctx.globalAlpha = gA;
  if(trans){
    const e2=ease(tT);
    drawScene(cur, 1-e2);
    drawScene(tgt, e2);
  } else drawScene(cur, 1);
  ctx.globalAlpha=1;
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
