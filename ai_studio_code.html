<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Mindfulness — Οδηγός για Νευροδιαφορετικούς</title>
    
    <!-- CSS - Βεβαιώσου ότι τα αρχεία υπάρχουν στους φακέλους -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Literata:wght@400;700&family=Fraunces:wght@300;700;900&display=swap">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/companion2.css">
    <link rel="stylesheet" href="css/sos.css">

    <script>
        /* ═══════════════════════════════════════════
           1. INITIALIZATION (Πρέπει να τρέξει ΠΡΙΝ από όλα)
           ═══════════════════════════════════════════ */
        window.LANG = 'el'; 

        // Φόρτωση ή αρχικοποίηση μνήμης Companion
        window.companionData = JSON.parse(localStorage.getItem('companionData')) || {
            chapterProgress: {},
            moodHistory: [],
            faqSeen: {},
            conceptsSeen: [],
            depthPreference: 1,
            lastChapter: 1,
            microDosesDone: 0,
            lastMoodRoute: null
        };

        // Συνάρτηση για αποθήκευση των αλλαγών
        window.saveCompanionData = function(data) {
            localStorage.setItem('companionData', JSON.stringify(data));
            window.companionData = data;
        };

        // Feedback για τα κουμπιά
        window.tapFeedback = function() {
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(10);
            }
        };

        // Helper για την εναλλαγή οθονών (αν δεν υπάρχει στο app.js)
        window.showScreen = function(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const target = document.getElementById('screen-' + screenId);
            if (target) target.classList.add('active');
        };
    </script>
</head>
<body>

    <!-- TOP BAR -->
    <header class="top-bar">
        <div class="top-bar-inner">
            <span class="top-title">Mindfulness</span>
            <div class="top-actions">
                <!-- Toggle Γλώσσας -->
                <button class="top-lang" onclick="window.LANG = (window.LANG === 'el' ? 'en' : 'el'); alert('Language: ' + window.LANG);">EN/EL</button>
            </div>
        </div>
    </header>

    <main id="main-content">
        <!-- ΑΡΧΙΚΗ ΟΘΟΝΗ -->
        <div class="screen active" id="screen-home">
            <div class="home-cta" style="padding: 100px 20px; text-align: center;">
                <button class="cta-calm" onclick="showScreen('breath')" style="padding: 20px; border-radius: 50px; background: #2A5D5E; color: white; border: none; font-size: 1.1em; cursor: pointer;">
                    <span class="cta-icon">🫁</span>
                    <span>Ξεκίνα την Αναπνοή</span>
                </button>
            </div>
            
            <!-- ΤΟ ΚΟΥΜΠΙ ΤΟΥ COMPANION (FAB) -->
            <div id="companion-fab" class="companion-fab" style="position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: #C8922A; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 100;">
                ∞
            </div>
        </div>

        <!-- ΟΘΟΝΗ ΑΝΑΠΝΟΗΣ (Placeholder) -->
        <div class="screen" id="screen-breath" style="display: none;">
            <button onclick="showScreen('home')" style="margin: 20px;">← Πίσω</button>
            <h1 style="text-align: center;">Οθόνη Αναπνοής</h1>
        </div>
    </main>

    <!-- ═══════════════════════════════════════════
         SCRIPTS (Η σειρά είναι κρίσιμη!)
         ═══════════════════════════════════════════ -->

    <!-- ΠΡΩΤΑ ΤΑ ΔΕΔΟΜΕΝΑ (Data) -->
    <script src="js/data/chapters.js"></script>
    <script src="js/data/faq.js"></script>
    <script src="js/data/concepts.js"></script>
    <script src="js/data/routes.js"></script>

    <!-- ΜΕΤΑ ΟΙ ΜΗΧΑΝΕΣ (Logic) -->
    <script src="js/app.js"></script>
    <script src="js/companion2.js"></script>

    <style>
        /* Βασικό CSS για τις οθόνες */
        .screen { display: none; }
        .screen.active { display: block; }
        .companion-fab:active { transform: scale(0.9); }
    </style>

</body>
</html>
