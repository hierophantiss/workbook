<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    background: #0c1a20;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Fraunces', Georgia, serif;
    color: white;
    padding: 16px;
  }
  canvas {
    width: 90vw;
    max-width: 360px;
    aspect-ratio: 3 / 4;
    display: block;
    margin: 0 auto;
    border-radius: 20px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .phase-box {
    text-align: center;
    margin: 16px 0 12px;
    width: 100%;
  }
  .phase-name {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #F5E6C8;
    text-shadow: 0 0 8px rgba(200,150,70,0.4);
    min-height: 48px;
  }
  .info-panel {
    display: flex;
    justify-content: space-between;
    gap: 24px;
    margin-top: 10px;
    background: rgba(168,213,220,0.08);
    border-radius: 40px;
    padding: 10px 20px;
    backdrop-filter: blur(4px);
  }
  .stat {
    text-align: center;
  }
  .stat-val {
    font-size: 28px;
    font-weight: 700;
    font-family: monospace;
    letter-spacing: 1px;
    color: #A8D5DC;
  }
  .stat-lbl {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(168,213,220,0.6);
  }
  .controls {
    display: flex;
    gap: 20px;
    margin-top: 12px;
  }
  button {
    background: rgba(168,213,220,0.1);
    border: 2px solid rgba(168,213,220,0.3);
    color: white;
    padding: 10px 28px;
    border-radius: 40px;
    font-size: 16px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s ease;
    backdrop-filter: blur(4px);
  }
  button:active {
    transform: scale(0.96);
    background: rgba(168,213,220,0.2);
  }
  .lang-btn {
    position: absolute;
    top: 16px;
    right: 16px;
    background: rgba(168,213,220,0.12);
    border: 1px solid rgba(168,213,220,0.25);
    padding: 6px 12px;
    font-size: 12px;
  }
  .intro-guide {
    width: 90vw; max-width: 400px; max-height: 75vh; overflow-y: auto;

  .intro-guide h1 { font-size: 22px; font-weight: 700; color: #F5E6C8; margin-bottom: 4px; letter-spacing: 1px; }
  .intro-guide .sub-h { font-size: 12px; color: rgba(168,213,220,0.5); letter-spacing: 2px; margin-bottom: 16px; }
  .intro-timing { display: flex; justify-content: center; gap: 6px; margin: 14px 0; flex-wrap: wrap; }
  .intro-phase {
    padding: 8px 12px; border-radius: 12px; text-align: center; min-width: 60px;
    background: rgba(168,213,220,0.06); border: 1px solid rgba(168,213,220,0.12);
  }
  .intro-phase .num { font-size: 22px; font-weight: 700; color: #A8D5DC; }
  .intro-phase .lbl { font-size: 9px; color: rgba(168,213,220,0.5); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
  .intro-section { text-align: left; margin: 14px 0; padding: 12px 14px; background: rgba(168,213,220,0.04); border-radius: 12px; border-left: 3px solid rgba(168,213,220,0.15); }
  .intro-section h3 { font-size: 12px; color: #A8D5DC; margin-bottom: 6px; font-weight: 700; letter-spacing: 0.5px; }
  .intro-section p { font-size: 11.5px; color: rgba(220,230,235,0.55); line-height: 1.7; }
  .intro-ref { font-size: 10px; color: rgba(168,213,220,0.3); font-style: italic; margin-top: 4px; }
  .intro-note { font-size: 10px; color: rgba(220,190,60,0.35); margin-top: 12px; padding: 8px 12px; border: 1px solid rgba(220,190,60,0.1); border-radius: 10px; text-align: center; }
  .intro-start-btn {
    margin-top: 16px; padding: 14px 40px; border-radius: 30px;
    background: rgba(46,139,154,0.2); border: 2px solid rgba(168,213,220,0.3);
    color: white; font-size: 17px; font-family: inherit; cursor: pointer;
    transition: all 0.2s; letter-spacing: 1px;

  .intro-start-btn:active { transform: scale(0.96); background: rgba(46,139,154,0.3); }

    .stat-val { font-size: 22px; }
    .phase-name { font-size: 28px; }
    button { padding: 8px 20px; }
  }
</style>

<body>

<a href="index.html" style="position:fixed;top:12px;left:12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.5);padding:5px 12px;border-radius:14px;font-size:13px;text-decoration:none;font-family:inherit;z-index:10">←</a>
<button class="lang-btn" id="langBtn">EN</button>

<div class="intro-guide" id="introGuide">
  <h1 id="ig-title"></h1>
  <div class="sub-h" id="ig-sub"></div>
  <div class="intro-timing" id="ig-timing"></div>
  <div class="intro-section" id="ig-hands"></div>
  <div class="intro-section" id="ig-science"></div>
  <div class="intro-section" id="ig-vagus"></div>
  <div class="intro-section" id="ig-move"></div>
  <div class="intro-note" id="ig-note"></div>
  <button class="intro-start-btn" id="ig-start" onclick="startExercise()"></button>
</div>

<div class="exercise-area" id="exerciseArea">
<canvas id="breathCanvas"></canvas>

<div class="phase-box">
  <div class="phase-name" id="phaseName">Εισπνοή</div>
</div>

<div class="info-panel">
  <div class="stat">
    <div class="stat-val" id="timerDisplay">00:00</div>
    <div class="stat-lbl" id="timerLabel">Χρόνος</div>
  </div>
  <div class="stat">
    <div class="stat-val" id="cycleCount">0</div>
    <div class="stat-lbl" id="cycleLabel">Κύκλοι</div>
  </div>
</div>

<div class="controls">
  <button id="playPauseBtn">▶ Ξεκίνα</button>
  <button id="resetBtn">↺ Επαναφορά</button>
</div>
</div>

<script>
  // LANGUAGE DATA
  const LANG = {
    el: {
      phases: [
        { label: "Εισπνοή" },
        { label: "Κράτημα" },
        { label: "Εκπνοή" },
        { label: "Κράτημα" }
      ],
      timer: "Χρόνος",
      cycles: "Κύκλοι",
      play: "▶ Ξεκίνα",
      pause: "⏸ Παύση",
      reset: "↺ Επαναφορά",
      guide: {
        title: 'Άσκηση Αναπνοής',
        sub: 'ΤΕΤΡΑΠΛΟΣ ΑΞΟΝΑΣ · 4-2-6-1',
        timing: [
          {num:'4″', lbl:'Εισπνοή'},
          {num:'2″', lbl:'Κράτημα'},
          {num:'6″', lbl:'Εκπνοή'},
          {num:'1″', lbl:'Κράτημα'}
        ],
        hands: {
          h:'🙌 Κίνηση Χεριών (προαιρετικό)',
          p:'Εισπνοή — σήκωσε τα χέρια αργά, παράλληλα από το σώμα. Κράτα τα ψηλά στην παύση. Εκπνοή — κατέβασέ τα αργά. Στην τελευταία παύση, νιώσε το βάρος τους. Η κίνηση λειτουργεί ως οπτική και σωματική άγκυρα — ιδιαίτερα χρήσιμη όταν η εσωτερική εστίαση μόνη της είναι δύσκολη.',
          ref:'Kabat-Zinn, J. (1990). MBSR — ρυθμική κίνηση ως εργαλείο εστίασης.'
        },
        science: {
          h:'🫁 Γιατί 4-2-6-1;',
          p:'Η παρατεταμένη εκπνοή (6″) ενεργοποιεί το πνευμονογαστρικό νεύρο — τον κύριο κλάδο του παρασυμπαθητικού νευρικού συστήματος. Αυτό μειώνει τον καρδιακό ρυθμό, αυξάνει τη μεταβλητότητα καρδιακού ρυθμού (HRV), και ενεργοποιεί την κατάσταση «ξεκούραση και πέψη».',
          ref:'Gerritsen & Band (2018). "Breath of Life: The Respiratory Vagal Stimulation Model." Frontiers in Human Neuroscience.'
        },
        vagus: {
          h:'💓 Μεταβλητότητα Καρδιακού Ρυθμού',
          p:'Μία μόνο συνεδρία αργής αναπνοής αυξάνει σημαντικά τον παρασυμπαθητικό τόνο και μειώνει το άγχος — τόσο σε νέους όσο και σε ηλικιωμένους. Ο ρυθμός ~4.6 αναπνοές/λεπτό (13″ ανά κύκλο) βρίσκεται κοντά στη ζώνη "resonance breathing".',
          ref:'Magnon et al. (2021). Scientific Reports — "Benefits from one session of deep and slow breathing on vagal tone and anxiety."'
        },
        move: {
          h:'🧠 Ενδοδεκτικότητα & Σώμα',
          p:'Η ενσυνείδητη εστίαση στο σώμα ενισχύει την ενδοδεκτικότητα (interoception) — την αίσθηση του εαυτού μας από μέσα. Η δόνηση σε κάθε φάση λειτουργεί ως σωματοαισθητικό σήμα — μπορείς να κλείσεις τα μάτια και να ακολουθείς μόνο από την αφή.',
          ref:'Mehling et al. (2012). MAIA — Multidimensional Assessment of Interoceptive Awareness.'
        },
        note: '⚠️ Οι μελέτες αφορούν τα μέρη αυτής της πρακτικής (αργή αναπνοή, ρυθμική κίνηση, ενδοδεκτικότητα) — ο συνδυασμός είναι πρωτότυπος σχεδιασμός του Τετραπλού Άξονα.',
        start: '▶  Ξεκίνα την Άσκηση'
      }
    },
    en: {
      phases: [
        { label: "Inhale" },
        { label: "Hold" },
        { label: "Exhale" },
        { label: "Hold" }
      ],
      timer: "Time",
      cycles: "Cycles",
      play: "▶ Start",
      pause: "⏸ Pause",
      reset: "↺ Reset",
      guide: {
        title: 'Breathing Exercise',
        sub: 'FOURFOLD AXIS · 4-2-6-1',
        timing: [
          {num:'4″', lbl:'Inhale'},
          {num:'2″', lbl:'Hold'},
          {num:'6″', lbl:'Exhale'},
          {num:'1″', lbl:'Hold'}
        ],
        hands: {
          h:'🙌 Arm Movement (optional)',
          p:'Inhale — raise arms slowly, parallel to your body. Hold them up during the pause. Exhale — lower them slowly. In the final pause, feel their weight. The movement works as a visual and somatic anchor — especially useful when internal focus alone is difficult.',
          ref:'Kabat-Zinn, J. (1990). MBSR — rhythmic movement as a tool for focus.'
        },
        science: {
          h:'🫁 Why 4-2-6-1?',
          p:'The extended exhale (6″) activates the vagus nerve — the main branch of the parasympathetic nervous system. This reduces heart rate, increases heart rate variability (HRV), and activates the "rest and digest" state.',
          ref:'Gerritsen & Band (2018). "Breath of Life: The Respiratory Vagal Stimulation Model." Frontiers in Human Neuroscience.'
        },
        vagus: {
          h:'💓 Heart Rate Variability',
          p:'A single session of slow breathing significantly increases parasympathetic tone and reduces anxiety — in both young and older adults. The rate of ~4.6 breaths/min (13″ per cycle) is near the "resonance breathing" zone.',
          ref:'Magnon et al. (2021). Scientific Reports — "Benefits from one session of deep and slow breathing on vagal tone and anxiety."'
        },
        move: {
          h:'🧠 Interoception & Body',
          p:'Mindful body-focused attention enhances interoception — our inner sense of the body. The vibration at each phase works as a somatosensory signal — you can close your eyes and follow by touch alone.',
          ref:'Mehling et al. (2012). MAIA — Multidimensional Assessment of Interoceptive Awareness.'
        },
        note: '⚠️ Studies apply to the components of this practice (slow breathing, rhythmic movement, interoception) — the combination is an original design of the Fourfold Axis.',
        start: '▶  Start the Exercise'
      }
    }
  };

  let currentLang = 'el';

  const PHASES = [
    { dur: 4000, armFrom: 0, armTo: 1, labelKey: 0 },
    { dur: 2000, armFrom: 1, armTo: 1, labelKey: 1 },
    { dur: 6000, armFrom: 1, armTo: 0, labelKey: 2 },
    { dur: 1000, armFrom: 0, armTo: 0, labelKey: 3 }
  ];
  const TOTAL_PHASES = PHASES.length;

  let running = false;
  let phaseIdx = 0;
  let phaseStartTime = 0;
  let armPos = 0;
  let totalCycles = 0;
  let sessionSeconds = 0;
  let lastTimestamp = 0;
  let animationId = null;

  const canvas = document.getElementById('breathCanvas');
  const ctx = canvas.getContext('2d');
  const timerDisplay = document.getElementById('timerDisplay');
  const cycleDisplay = document.getElementById('cycleCount');
  const phaseNameEl = document.getElementById('phaseName');
  const playPauseBtn = document.getElementById('playPauseBtn');
  const resetBtn = document.getElementById('resetBtn');
  const timerLabel = document.getElementById('timerLabel');
  const cycleLabel = document.getElementById('cycleLabel');
  const langBtn = document.getElementById('langBtn');

  function updateLanguage() {
    const langData = LANG[currentLang];
    timerLabel.textContent = langData.timer;
    cycleLabel.textContent = langData.cycles;
    if (!running) playPauseBtn.textContent = langData.play;
    else playPauseBtn.textContent = langData.pause;
    resetBtn.textContent = langData.reset;
    langBtn.textContent = currentLang === 'el' ? 'EN' : 'ΕΛ';
    const phase = PHASES[phaseIdx];
    const phaseText = langData.phases[phase.labelKey];
    phaseNameEl.textContent = phaseText.label;
    buildGuide();
  }

  function buildGuide() {
    const g = LANG[currentLang].guide;
    document.getElementById('ig-title').textContent = g.title;
    document.getElementById('ig-sub').textContent = g.sub;
    document.getElementById('ig-timing').innerHTML = g.timing.map(t =>
      `<div class="intro-phase"><div class="num">${t.num}</div><div class="lbl">${t.lbl}</div></div>`
    ).join('');
    function sec(id, d) {
      document.getElementById(id).innerHTML = `<h3>${d.h}</h3><p>${d.p}</p><div class="intro-ref">📄 ${d.ref}</div>`;
    }
    sec('ig-hands', g.hands);
    sec('ig-science', g.science);
    sec('ig-vagus', g.vagus);
    sec('ig-move', g.move);
    document.getElementById('ig-note').textContent = g.note;
    document.getElementById('ig-start').textContent = g.start;
  }

  function startExercise() {
    document.getElementById('introGuide').style.display = 'none';
    document.getElementById('exerciseArea').classList.add('active');
    resizeCanvas();
    startBreathing();
  }

  function setLanguage(lang) {
    currentLang = lang;
    updateLanguage();
    localStorage.setItem('breath_lang', lang);
  }

  function toggleLang() {
    setLanguage(currentLang === 'el' ? 'en' : 'el');
  }
  langBtn.addEventListener('click', toggleLang);

  function resizeCanvas() {
    const rect = canvas.getBoundingClientRect();
    const w = rect.width;
    const h = rect.height;
    const dpr = Math.min(devicePixelRatio || 1, 2);
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', () => {
    resizeCanvas();
    drawFigure();
  });

  function easeInOutCubic(x) {
    return x < 0.5 ? 4 * x * x * x : 1 - Math.pow(-2 * x + 2, 3) / 2;
  }

  function updatePhase(now) {
    if (!running) return;
    const elapsed = now - phaseStartTime;
    const phase = PHASES[phaseIdx];
    const dur = phase.dur;
    let progress = Math.min(elapsed / dur, 1);
    const rawPos = phase.armFrom + (phase.armTo - phase.armFrom) * progress;
    armPos = easeInOutCubic(rawPos);
    const langData = LANG[currentLang];
    const phaseText = langData.phases[phase.labelKey];
    phaseNameEl.textContent = phaseText.label;
    if (progress >= 1) {
      phaseIdx = (phaseIdx + 1) % TOTAL_PHASES;
      phaseStartTime = now;
      if (navigator.vibrate) {
        const vibePatterns = [
          [30,30,30,30,30,30,30],
          [30,30,30],
          [30,30,30,30,30,30,30,30,30,30,30],
          [40]
        ];
        navigator.vibrate(vibePatterns[phaseIdx]);
      }
      if (phaseIdx === 0) {
        totalCycles++;
        cycleDisplay.textContent = totalCycles;
      }
    }
  }

  function updateTimer(now) {
    if (!running) return;
    if (lastTimestamp === 0) {
      lastTimestamp = now;
      return;
    }
    const delta = Math.min(now - lastTimestamp, 100);
    if (delta > 0) {
      sessionSeconds += delta / 1000;
      const mins = Math.floor(sessionSeconds / 60);
      const secs = Math.floor(sessionSeconds % 60);
      timerDisplay.textContent = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
    }
    lastTimestamp = now;
  }

  let time = 0;
  function drawFigure() {
    if (!canvas.width || !canvas.height) return;
    const w = canvas.width / (devicePixelRatio || 1);
    const h = canvas.height / (devicePixelRatio || 1);
    ctx.clearRect(0, 0, w, h);
    const cx = w / 2;
    // μεγάλη κλίμακα και βάση χαμηλά
    const groundY = h - 5;
    const sc = Math.min(w, h) / 200;
    const pulse = Math.sin(time * 1.2) * 0.5 + 0.5;

    ctx.save();
    ctx.translate(cx, groundY);
    ctx.scale(sc, sc);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // Gravity axis (μόνο διακοσμητική)
    const headTop = -110;
    const globeBottom = 48;
    const axTop = headTop - 18;
    const axBot = globeBottom + 12;
    const ag = ctx.createLinearGradient(0, axTop, 0, axBot);
    ag.addColorStop(0, 'rgba(220,190,60,0)');
    ag.addColorStop(0.05, 'rgba(220,190,60,0.2)');
    ag.addColorStop(0.5, 'rgba(220,190,60,0.35)');
    ag.addColorStop(0.95, 'rgba(220,190,60,0.2)');
    ag.addColorStop(1, 'rgba(220,190,60,0)');
    ctx.strokeStyle = ag;
    ctx.lineWidth = 2.2;
    ctx.beginPath();
    ctx.moveTo(0, axTop);
    ctx.lineTo(0, axBot);
    ctx.stroke();
    ctx.strokeStyle = 'rgba(220,190,60,0.05)';
    ctx.lineWidth = 10;
    ctx.beginPath();
    ctx.moveTo(0, axTop);
    ctx.lineTo(0, axBot);
    ctx.stroke();

    // Globe
    const globeR = 42, globeY = 0;
    const gradGlobe = ctx.createRadialGradient(-10, globeY - 8, 5, 0, globeY, globeR);
    gradGlobe.addColorStop(0, 'rgba(180,160,80,0.3)');
    gradGlobe.addColorStop(0.5, 'rgba(50,120,100,0.25)');
    gradGlobe.addColorStop(1, 'rgba(30,70,80,0.2)');
    ctx.fillStyle = gradGlobe;
    ctx.beginPath();
    ctx.arc(0, globeY, globeR, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(100,160,140,0.2)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillStyle = 'rgba(160,140,60,0.1)';
    ctx.beginPath();
    ctx.ellipse(-12, globeY - 5, 18, 12, -0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(15, globeY + 8, 10, 8, 0.3, 0, Math.PI * 2);
    ctx.fill();

    // ΑΦΑΙΡΕΘΗΚΕ Ο ΚΥΚΛΟΣ ΠΡΟΟΔΟΥ (breathing progress arc)

    const seatY = -globeR + 5;
    const pelvisY = seatY - 8;
    ctx.fillStyle = 'rgba(40,60,50,0.85)';
    ctx.beginPath();
    ctx.moveTo(-30, seatY + 5);
    ctx.quadraticCurveTo(-35, seatY + 18, -25, seatY + 22);
    ctx.quadraticCurveTo(-5, seatY + 25, 0, seatY + 15);
    ctx.quadraticCurveTo(5, seatY + 25, 25, seatY + 22);
    ctx.quadraticCurveTo(35, seatY + 18, 30, seatY + 5);
    ctx.quadraticCurveTo(15, seatY - 2, 0, pelvisY);
    ctx.quadraticCurveTo(-15, seatY - 2, -30, seatY + 5);
    ctx.fill();
    ctx.strokeStyle = 'rgba(30,50,40,0.25)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-20, seatY + 10);
    ctx.quadraticCurveTo(0, seatY + 20, 20, seatY + 10);
    ctx.stroke();

    const waistY = pelvisY - 20;
    const chestY = waistY - 25;
    const shoulderY = chestY - 10;
    ctx.fillStyle = 'rgba(60,85,75,0.8)';
    ctx.beginPath();
    ctx.moveTo(-22, pelvisY);
    ctx.quadraticCurveTo(-25, waistY, -24, chestY);
    ctx.lineTo(-20, shoulderY);
    ctx.lineTo(20, shoulderY);
    ctx.lineTo(24, chestY);
    ctx.quadraticCurveTo(25, waistY, 22, pelvisY);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = 'rgba(30,50,40,0.2)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, shoulderY + 5);
    ctx.lineTo(0, pelvisY);
    ctx.stroke();

    const armAngle = armPos * Math.PI;
    const armLen1 = 28, armLen2 = 26;
    for (let side = -1; side <= 1; side += 2) {
      const sx = side * 20, sy = shoulderY + 3;
      const angle = Math.PI / 2 - armAngle;
      const elbX = sx + Math.cos(angle) * side * armLen1 * 0.7;
      const elbY = sy + Math.sin(angle) * armLen1;
      const hx = elbX + Math.cos(angle) * side * armLen2 * 0.5;
      const hy = elbY + Math.sin(angle) * armLen2 * 0.7;
      ctx.fillStyle = `rgba(55,80,70,${0.6 + armPos * 0.15})`;
      ctx.beginPath();
      ctx.moveTo(sx - side * 4, sy);
      ctx.lineTo(sx + side * 4, sy);
      ctx.lineTo(elbX + side * 3, elbY);
      ctx.lineTo(elbX - side * 3, elbY);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = `rgba(200,170,120,${0.5 + armPos * 0.2})`;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(elbX, elbY);
      ctx.lineTo(hx, hy);
      ctx.stroke();
      ctx.fillStyle = `rgba(200,170,120,${0.4 + armPos * 0.2})`;
      ctx.beginPath();
      ctx.arc(hx, hy, 4, 0, Math.PI * 2);
      ctx.fill();
      if (armPos > 0.1 && running) {
        ctx.strokeStyle = `rgba(168,213,220,${armPos * 0.08})`;
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.quadraticCurveTo(elbX, elbY, hx, hy);
        ctx.stroke();
      }
    }

    if (armPos < 0.15) {
      const mudraY = waistY + 15;
      ctx.fillStyle = 'rgba(200,170,120,0.4)';
      ctx.beginPath();
      ctx.ellipse(0, mudraY, 8, 5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(180,150,100,0.3)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(0, mudraY, 5, 0.2, Math.PI - 0.2);
      ctx.stroke();
    }

    const infY = chestY + 8, infR = 8;
    const colors = ['rgba(220,60,60,0.4)', 'rgba(220,180,40,0.4)', 'rgba(60,180,60,0.4)', 'rgba(60,60,220,0.4)', 'rgba(180,60,180,0.4)'];
    ctx.lineWidth = 2;
    for (let i = 0; i < 5; i++) {
      ctx.strokeStyle = colors[i];
      const o = (i - 2) * 0.8;
      ctx.beginPath();
      ctx.moveTo(0, infY + o);
      ctx.bezierCurveTo(-infR * 1.2, infY - infR + o, -infR * 1.2, infY + infR + o, 0, infY + o);
      ctx.bezierCurveTo(infR * 1.2, infY - infR + o, infR * 1.2, infY + infR + o, 0, infY + o);
      ctx.stroke();
    }

    const neckY = shoulderY - 8;
    const headY = neckY - 18, headR = 16;
    const hoodTop = headY - headR - 6;
    ctx.fillStyle = 'rgba(200,170,120,0.7)';
    ctx.fillRect(-5, neckY, 10, shoulderY - neckY);
    ctx.fillStyle = 'rgba(60,85,75,0.8)';
    ctx.beginPath();
    ctx.moveTo(-22, shoulderY);
    ctx.quadraticCurveTo(-24, neckY - 5, -20, headY);
    ctx.quadraticCurveTo(-16, hoodTop, 0, hoodTop - 3);
    ctx.quadraticCurveTo(16, hoodTop, 20, headY);
    ctx.quadraticCurveTo(24, neckY - 5, 22, shoulderY);
    ctx.fill();
    ctx.strokeStyle = 'rgba(30,50,40,0.2)';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(-18, shoulderY - 2);
    ctx.quadraticCurveTo(-20, headY + 5, -14, headY - 5);
    ctx.quadraticCurveTo(0, headY - headR - 2, 14, headY - 5);
    ctx.quadraticCurveTo(20, headY + 5, 18, shoulderY - 2);
    ctx.stroke();
    ctx.fillStyle = 'rgba(200,170,120,0.65)';
    ctx.beginPath();
    ctx.arc(0, headY, headR - 3, -0.3, Math.PI + 0.3);
    ctx.fill();
    ctx.strokeStyle = 'rgba(80,60,40,0.4)';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(-7, headY + 1);
    ctx.quadraticCurveTo(-5, headY + 3, -3, headY + 1);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(3, headY + 1);
    ctx.quadraticCurveTo(5, headY + 3, 7, headY + 1);
    ctx.stroke();
    ctx.strokeStyle = 'rgba(80,60,40,0.2)';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(-4, headY + 7);
    ctx.quadraticCurveTo(0, headY + 9, 4, headY + 7);
    ctx.stroke();

    const tantienY = waistY + 8;
    const tg = ctx.createRadialGradient(0, tantienY, 0, 0, tantienY, 12 + pulse * 4);
    tg.addColorStop(0, `rgba(80,200,160,${0.15 + armPos * 0.1})`);
    tg.addColorStop(0.6, `rgba(80,200,160,${0.05 + armPos * 0.05})`);
    tg.addColorStop(1, 'rgba(80,200,160,0)');
    ctx.fillStyle = tg;
    ctx.beginPath();
    ctx.arc(0, tantienY, 12 + pulse * 4, 0, Math.PI * 2);
    ctx.fill();

    if (running && armPos > 0.2) {
      for (let i = 0; i < 3; i++) {
        const rr = ((time * 7 + i * 40) % 130);
        const ra = Math.max(0, 1 - rr / 130) * armPos * 0.06;
        ctx.strokeStyle = `rgba(168,213,220,${ra})`;
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.arc(0, chestY - 5, rr, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    // ΑΦΑΙΡΕΘΗΚΑΝ ΤΑ ΑΣΤΕΡΙΑ (moving stars)

    ctx.restore();
    time += 0.016;
  }

  function animate(nowMs) {
    if (!canvas.width) resizeCanvas();
    const now = nowMs;
    if (running) {
      updatePhase(now);
      updateTimer(now);
    }
    drawFigure();
    animationId = requestAnimationFrame(animate);
  }

  function startBreathing() {
    if (running) return;
    running = true;
    phaseStartTime = performance.now();
    lastTimestamp = phaseStartTime;
    playPauseBtn.textContent = LANG[currentLang].pause;
    if (navigator.vibrate) navigator.vibrate([50,30,50]);
  }

  function pauseBreathing() {
    if (!running) return;
    running = false;
    playPauseBtn.textContent = LANG[currentLang].play;
  }

  function resetBreathing() {
    const wasRunning = running;
    if (wasRunning) pauseBreathing();
    phaseIdx = 0;
    armPos = 0;
    totalCycles = 0;
    sessionSeconds = 0;
    timerDisplay.textContent = '00:00';
    cycleDisplay.textContent = '0';
    const now = performance.now();
    phaseStartTime = now;
    lastTimestamp = now;
    const langData = LANG[currentLang];
    const phase = PHASES[0];
    const phaseText = langData.phases[phase.labelKey];
    phaseNameEl.textContent = phaseText.label;
    if (!wasRunning) drawFigure();
  }

  function togglePlayPause() {
    if (running) pauseBreathing();
    else startBreathing();
  }

  playPauseBtn.addEventListener('click', togglePlayPause);
  resetBtn.addEventListener('click', resetBreathing);

  function init() {
    const urlLang = new URLSearchParams(location.search).get('lang');
    if (urlLang === 'en' || urlLang === 'el') { currentLang = urlLang; }
    else {
      const savedLang = localStorage.getItem('breath_lang');
      if (savedLang === 'en' || savedLang === 'el') currentLang = savedLang;
      else currentLang = 'el';
    }
    setLanguage(currentLang);
    resizeCanvas();
    resetBreathing();
    animationId = requestAnimationFrame(animate);
    window.addEventListener('resize', () => resizeCanvas());
  }

  init();
</script>
</body>
</html>
