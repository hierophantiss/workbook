<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let W,H,cx,cy;
function resize(){const d=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;cv.width=W*d;cv.height=H*d;cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(d,0,0,d,0,0);cx=W/2;cy=H/2}
resize();addEventListener('resize',resize);

const SC=[
  {label:'Βρες τον Άξονα',sub:'Κάθισε σε στάση διαλογισμού.\nΝιώσε τη βαρύτητα. Βρες τον κατακόρυφο άξονα.',sub_en:'Sit in meditation posture.\nFeel gravity. Find the vertical axis.',bg:[18,22,30]},
  {label:'Mindful Swaying',sub:'Η κίνηση ξεκινά από το κέντρο — την κοιλιά.\nΔεξιά, αριστερά. Ρυθμικά. Συνειδητά.\nΗ παρουσία ζει μέσα στην κίνηση.',sub_en:'Movement starts from the center — the belly.\nRight, left. Rhythmic. Conscious.\nPresence lives within movement.',bg:[22,25,28]}
];
const N=SC.length;

let cur=0,tgt=0,tT=0,trans=false,time=0,gA=0,autoP=false,autoTm=null;

// Ambient
const amb=[];for(let i=0;i<25;i++)amb.push({x:Math.random()*2000,y:Math.random()*2000,vx:(Math.random()-0.5)*0.08,vy:(Math.random()-0.5)*0.05,sz:0.3+Math.random()*0.7,al:0.02+Math.random()*0.04,ph:Math.random()*Math.PI*2});

// ══════════════════════════
// METRONOME BODY (background)
// ══════════════════════════
function drawMetronome(alpha){
  const mBot=cy+130, mH=300, mW=130;
  const mTop=mBot-mH;
  const topW=mW*0.35, botW=mW;

  // Wooden body
  ctx.fillStyle=`rgba(80,60,40,${alpha*0.07})`;
  ctx.beginPath();
  ctx.moveTo(cx-botW/2,mBot);
  ctx.lineTo(cx-topW/2,mTop+40);
  ctx.quadraticCurveTo(cx,mTop+28,cx+topW/2,mTop+40);
  ctx.lineTo(cx+botW/2,mBot);
  ctx.closePath();ctx.fill();

  // Outline
  ctx.strokeStyle=`rgba(160,130,90,${alpha*0.1})`;ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(cx-botW/2,mBot);
  ctx.lineTo(cx-topW/2,mTop+40);
  ctx.quadraticCurveTo(cx,mTop+28,cx+topW/2,mTop+40);
  ctx.lineTo(cx+botW/2,mBot);
  ctx.closePath();ctx.stroke();

  // Pivot point (at belly level of meditator)
  const pivotY=mBot-85;
  ctx.fillStyle=`rgba(200,180,120,${alpha*0.2})`;
  ctx.beginPath();ctx.arc(cx,pivotY,4,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=`rgba(200,180,120,${alpha*0.35})`;ctx.lineWidth=1.5;ctx.stroke();

  // Scale arc around pivot
  for(let i=-5;i<=5;i++){
    const a=-Math.PI/2+i*0.065;
    const r1=50,r2=56;
    const x1=cx+Math.cos(a)*r1, y1=pivotY+Math.sin(a)*r1;
    const x2=cx+Math.cos(a)*r2, y2=pivotY+Math.sin(a)*r2;
    const isCenter=i===0;
    ctx.strokeStyle=`rgba(200,180,120,${alpha*(isCenter?0.25:0.08)})`;
    ctx.lineWidth=isCenter?1.5:0.7;
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  }

  // Base platform
  ctx.fillStyle=`rgba(100,80,55,${alpha*0.08})`;
  ctx.beginPath();ctx.roundRect(cx-botW/2-12,mBot,botW+24,10,4);ctx.fill();
  ctx.strokeStyle=`rgba(160,130,90,${alpha*0.08})`;ctx.lineWidth=1;ctx.stroke();

  return {pivotX:cx, pivotY, topY:mTop+40, botY:mBot};
}

// ══════════════════════════
// MEDITATOR + PENDULUM (pivots from belly)
// ══════════════════════════
function drawMeditatorPendulum(alpha,pivotX,pivotY,topY,botY,angle,showTantien){
  const col=`rgba(210,200,185,${alpha*0.75})`;
  const dim=`rgba(210,200,185,${alpha*0.25})`;
  const armUp=pivotY-topY-10;
  const armDown=botY-pivotY-15;

  ctx.save();
  ctx.lineCap='round';ctx.lineJoin='round';

  // ══════════════════════════════
  // FIXED PART: Legs + Pelvis + Platform (NO rotation)
  // ══════════════════════════════
  // Sitting platform
  ctx.strokeStyle=`rgba(180,160,120,${alpha*0.3})`;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(pivotX-30,pivotY+32);ctx.lineTo(pivotX+30,pivotY+32);ctx.stroke();
  const ps=ctx.createLinearGradient(pivotX-25,pivotY+33,pivotX+25,pivotY+33);
  ps.addColorStop(0,'rgba(180,160,120,0)');ps.addColorStop(0.5,`rgba(180,160,120,${alpha*0.06})`);ps.addColorStop(1,'rgba(180,160,120,0)');
  ctx.fillStyle=ps;ctx.fillRect(pivotX-25,pivotY+32,50,5);

  // Legs (lotus) — FIXED, no rotation
  ctx.strokeStyle=col;ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(pivotX-10,pivotY+12);ctx.quadraticCurveTo(pivotX-26,pivotY+20,pivotX-22,pivotY+28);ctx.quadraticCurveTo(pivotX-14,pivotY+32,pivotX-3,pivotY+28);ctx.stroke();
  ctx.beginPath();ctx.moveTo(pivotX+10,pivotY+12);ctx.quadraticCurveTo(pivotX+26,pivotY+20,pivotX+22,pivotY+28);ctx.quadraticCurveTo(pivotX+14,pivotY+32,pivotX+3,pivotY+28);ctx.stroke();

  // Pelvis/hip area — FIXED
  ctx.strokeStyle=`rgba(210,200,185,${alpha*0.4})`;ctx.lineWidth=1.8;
  ctx.beginPath();ctx.moveTo(pivotX-12,pivotY+5);ctx.quadraticCurveTo(pivotX,pivotY+8,pivotX+12,pivotY+5);ctx.stroke();

  // Gravity axis BELOW pivot (fixed, straight down)
  const agDn=ctx.createLinearGradient(pivotX,pivotY,pivotX,pivotY+armDown);
  agDn.addColorStop(0,`rgba(200,185,120,${alpha*0.45})`);
  agDn.addColorStop(1,`rgba(200,185,120,${alpha*0.15})`);
  ctx.strokeStyle=agDn;ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(pivotX,pivotY);ctx.lineTo(pivotX,pivotY+armDown);ctx.stroke();
  // Weight arrow at bottom
  ctx.fillStyle=`rgba(200,180,120,${alpha*0.2})`;
  ctx.beginPath();ctx.moveTo(pivotX,pivotY+armDown+2);ctx.lineTo(pivotX-4,pivotY+armDown-6);ctx.lineTo(pivotX+4,pivotY+armDown-6);ctx.closePath();ctx.fill();

  // ══════════════════════════════
  // TANTIEN (pivot point glow) — at the junction
  // ══════════════════════════════
  if(showTantien){
    const pulse=Math.sin(time*1.5)*0.5+0.5;
    const tg=ctx.createRadialGradient(pivotX,pivotY,0,pivotX,pivotY,12+pulse*5);
    tg.addColorStop(0,`rgba(220,180,80,${alpha*0.25})`);
    tg.addColorStop(0.5,`rgba(200,160,60,${alpha*0.08})`);
    tg.addColorStop(1,'rgba(200,160,60,0)');
    ctx.fillStyle=tg;ctx.beginPath();ctx.arc(pivotX,pivotY,12+pulse*5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=`rgba(240,210,100,${alpha*(0.45+pulse*0.2)})`;
    ctx.beginPath();ctx.arc(pivotX,pivotY,3,0,Math.PI*2);ctx.fill();
  }

  // ══════════════════════════════
  // SWAYING PART: Upper body + Axis UP (ROTATED from belly)
  // ══════════════════════════════
  ctx.save();
  ctx.translate(pivotX,pivotY);
  ctx.rotate(angle);

  // Gravity axis going UP (sways with body)
  const agUp=ctx.createLinearGradient(0,0,0,-armUp);
  agUp.addColorStop(0,`rgba(200,185,120,${alpha*0.5})`);
  agUp.addColorStop(0.5,`rgba(200,185,120,${alpha*0.55})`);
  agUp.addColorStop(1,`rgba(200,185,120,${alpha*0.15})`);
  ctx.strokeStyle=agUp;ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-armUp);ctx.stroke();
  // Glow
  ctx.strokeStyle=`rgba(200,185,120,${alpha*0.04})`;ctx.lineWidth=10;
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-armUp);ctx.stroke();
  // Arrow at top
  ctx.fillStyle=`rgba(200,185,120,${alpha*0.25})`;
  ctx.beginPath();ctx.moveTo(0,-armUp);ctx.lineTo(-4,-armUp+10);ctx.lineTo(4,-armUp+10);ctx.closePath();ctx.fill();

  // Torso (from belly upward)
  ctx.strokeStyle=col;ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(-14,-20);ctx.quadraticCurveTo(-12,-3,-10,5);ctx.stroke();
  ctx.beginPath();ctx.moveTo(14,-20);ctx.quadraticCurveTo(12,-3,10,5);ctx.stroke();

  // Shoulders
  ctx.beginPath();ctx.moveTo(-20,-20);ctx.quadraticCurveTo(-15,-25,0,-26);ctx.quadraticCurveTo(15,-25,20,-20);ctx.stroke();

  // Arms
  ctx.lineWidth=1.8;
  ctx.beginPath();ctx.moveTo(-20,-20);ctx.quadraticCurveTo(-26,-5,-24,8);ctx.quadraticCurveTo(-23,16,-20,22);ctx.stroke();
  ctx.beginPath();ctx.arc(-20,23,2.5,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(20,-20);ctx.quadraticCurveTo(26,-5,24,8);ctx.quadraticCurveTo(23,16,20,22);ctx.stroke();
  ctx.beginPath();ctx.arc(20,23,2.5,0,Math.PI*2);ctx.stroke();

  // Neck
  ctx.strokeStyle=dim;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,-26);ctx.lineTo(0,-32);ctx.stroke();

  // Head
  ctx.fillStyle=`rgba(210,200,185,${alpha*0.08})`;
  ctx.beginPath();ctx.arc(0,-44,12,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=col;ctx.lineWidth=2;ctx.stroke();
  // Closed eyes
  ctx.strokeStyle=`rgba(210,200,185,${alpha*0.4})`;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(-5,-44);ctx.quadraticCurveTo(-3,-42.5,-1,-44);ctx.stroke();
  ctx.beginPath();ctx.moveTo(1,-44);ctx.quadraticCurveTo(3,-42.5,5,-44);ctx.stroke();
  // Smile
  ctx.beginPath();ctx.moveTo(-3,-40);ctx.quadraticCurveTo(0,-38.5,3,-40);ctx.stroke();

  // Body glow
  const bg=ctx.createRadialGradient(0,-10,0,0,-10,40);
  bg.addColorStop(0,`rgba(200,185,140,${alpha*0.03})`);
  bg.addColorStop(1,'rgba(200,185,140,0)');
  ctx.fillStyle=bg;ctx.beginPath();ctx.arc(0,-10,40,0,Math.PI*2);ctx.fill();

  ctx.restore(); // end upper body rotation
  ctx.restore(); // outer save
}

// ══════════════════════════
// SCENES
// ══════════════════════════
function drawScene(idx,alpha){
  if(alpha<=0)return;
  ctx.save();

  const met=drawMetronome(alpha);
  const speed=0.55;
  let angle;

  if(idx===0){
    // Finding axis — barely moving
    angle=Math.sin(time*0.3)*0.008;
    drawMeditatorPendulum(alpha,met.pivotX,met.pivotY,met.topY,met.botY,angle,false);

    // Vertical guide (target center)
    ctx.strokeStyle=`rgba(120,180,140,${alpha*0.06})`;ctx.lineWidth=0.8;
    ctx.setLineDash([4,6]);
    ctx.beginPath();ctx.moveTo(cx,cy-140);ctx.lineTo(cx,cy+130);ctx.stroke();
    ctx.setLineDash([]);

  } else {
    // Mindful swaying — continuous, from belly center
    angle=Math.sin(time*speed)*0.16;
    drawMeditatorPendulum(alpha,met.pivotX,met.pivotY,met.topY,met.botY,angle,true);

    // Direction arrows that pulse with movement
    const swing=Math.sin(time*speed);
    const arrowA=alpha*0.1;

    // Left arrow
    const la=arrowA*(swing<0?0.5+Math.abs(swing)*0.5:0.1);
    ctx.fillStyle=`rgba(200,180,120,${la})`;
    ctx.beginPath();ctx.moveTo(cx-85,met.pivotY);ctx.lineTo(cx-70,met.pivotY-7);ctx.lineTo(cx-70,met.pivotY+7);ctx.closePath();ctx.fill();

    // Right arrow
    const ra=arrowA*(swing>0?0.5+Math.abs(swing)*0.5:0.1);
    ctx.fillStyle=`rgba(200,180,120,${ra})`;
    ctx.beginPath();ctx.moveTo(cx+85,met.pivotY);ctx.lineTo(cx+70,met.pivotY-7);ctx.lineTo(cx+70,met.pivotY+7);ctx.closePath();ctx.fill();

    // Ghost trails (upper axis only)
    for(let i=1;i<=4;i++){
      const pastAngle=Math.sin((time-i*0.12)*speed)*0.16;
      const ghostA=alpha*0.015*(5-i);
      ctx.save();ctx.translate(met.pivotX,met.pivotY);ctx.rotate(pastAngle);
      ctx.strokeStyle=`rgba(200,185,120,${ghostA})`;ctx.lineWidth=0.8;
      ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-(met.pivotY-met.topY-10));ctx.stroke();
      ctx.restore();
    }

    // Tick highlight on scale
    const tickAngle=-Math.PI/2+Math.round(angle/0.065)*0.065;
    const tr=50;
    const tx=met.pivotX+Math.cos(tickAngle)*tr;
    const ty=met.pivotY+Math.sin(tickAngle)*tr;
    ctx.fillStyle=`rgba(240,220,140,${alpha*0.25})`;
    ctx.beginPath();ctx.arc(tx,ty,3,0,Math.PI*2);ctx.fill();

    // Subtle awareness particles around body
    for(let i=0;i<8;i++){
      const pa2=time*0.4+i*0.8;
      const dist=45+Math.sin(time*0.3+i)*10;
      const px=met.pivotX+Math.cos(pa2)*dist*Math.cos(angle);
      const py=met.pivotY-30+Math.sin(pa2)*dist*0.6;
      const pAlpha=0.04+Math.sin(time*0.6+i)*0.02;
      ctx.fillStyle=`rgba(200,190,160,${alpha*pAlpha})`;
      ctx.beginPath();ctx.arc(px,py,1,0,Math.PI*2);ctx.fill();
    }
  }

  ctx.restore();
}

function drawBg(sf){
  const idx=Math.floor(sf),fr=sf-idx,nx=Math.min(idx+1,N-1);
  const r=SC[idx].bg[0]*(1-fr)+SC[nx].bg[0]*fr;
  const g=SC[idx].bg[1]*(1-fr)+SC[nx].bg[1]*fr;
  const b=SC[idx].bg[2]*(1-fr)+SC[nx].bg[2]*fr;
  const gr=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H)*0.75);
  gr.addColorStop(0,`rgb(${r|0},${g|0},${b|0})`);gr.addColorStop(1,'rgb(5,5,14)');
  ctx.fillStyle=gr;ctx.fillRect(0,0,W,H);
  ctx.globalAlpha=gA;
  amb.forEach(p=>{p.x+=p.vx+Math.sin(time*0.2+p.ph)*0.02;p.y+=p.vy+Math.cos(time*0.15+p.ph)*0.015;
    if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
    ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,195,185,${p.al*(0.7+Math.sin(time*0.5+p.ph)*0.3)})`;ctx.fill()});
  ctx.globalAlpha=1;
}

function updUI(){const s=SC[cur];document.getElementById('lm').textContent=s.label;
  document.getElementById('ls').innerHTML=s.sub.replace(/\n/g,'<br>')+(s.sub_en?'<div style="margin-top:6px;font-size:0.8em;color:rgba(180,200,190,0.35);font-style:italic">'+s.sub_en.replace(/\n/g,'<br>')+'</div>':'');
  document.getElementById('label').classList.add('vis');document.getElementById('sn').textContent=`${cur+1} / ${N}`;
  document.getElementById('pb').style.width=`${(cur/(N-1))*100}%`;
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===cur))}

function goTo(i){if(i<0||i>=N||i===cur||trans)return;tgt=i;trans=true;tT=0;
  document.getElementById('label').classList.remove('vis');
  setTimeout(()=>{cur=tgt;trans=false;updUI()},1800)}
function ease(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2}
function togAuto(){autoP=!autoP;document.getElementById('ab').innerHTML=autoP?'\u23F8 pause':'\u25B6 auto';if(autoP)runA();else clearTimeout(autoTm)}
function runA(){if(!autoP)return;autoTm=setTimeout(()=>{if(cur<N-1){goTo(cur+1);setTimeout(runA,2000)}else{autoP=false;document.getElementById('ab').innerHTML='\u25B6 auto'}},10000)}

document.getElementById('intro').addEventListener('click',()=>{document.getElementById('intro').classList.add('hidden');updUI()});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' ')goTo(cur+1);if(e.key==='ArrowLeft')goTo(cur-1)});

let lt=0;
function loop(ts){
  const dt=Math.min((ts-lt)/1000,0.05);lt=ts;time+=dt;
  if(gA<1)gA=Math.min(1,gA+dt*0.5);
  if(trans)tT=Math.min(tT+dt*0.65,1);
  ctx.clearRect(0,0,W,H);
  const sf=trans?cur+(tgt-cur)*ease(tT):cur;
  drawBg(sf);ctx.globalAlpha=gA;
  if(trans){const e2=ease(tT);drawScene(cur,1-e2);drawScene(tgt,e2)}
  else drawScene(cur,1);
  ctx.globalAlpha=1;
  requestAnimationFrame(loop)}
requestAnimationFrame(loop);
</script>
