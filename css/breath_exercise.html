function easeInOutCubic(x) {
  return x < 0.5 ? 4 * x * x * x : 1 - Math.pow(-2 * x + 2, 3) / 2;
}

// ═══════════════════════════════════════════════════════════════════════
// SESSION HISTORY (localStorage)
// ═══════════════════════════════════════════════════════════════════════
function loadHistory() {
  try { return JSON.parse(localStorage.getItem('breath_history')) || { sessions: [], totalMin: 0 }; }
  catch { return { sessions: [], totalMin: 0 }; }
}
function saveHistory(h) { localStorage.setItem('breath_history', JSON.stringify(h)); }

function todayStr() { return new Date().toISOString().split('T')[0]; }

function computeStreak(sessions) {
  if (!sessions.length) return 0;
  // Get unique dates sorted descending
  const dates = [...new Set(sessions.map(s => s.date))].sort().reverse();
  const today = todayStr();
  const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
  // Streak must include today or yesterday
  if (dates[0] !== today && dates[0] !== yesterday) return 0;
  let streak = 1;
  for (let i = 1; i < dates.length; i++) {
    const prev = new Date(dates[i-1] + 'T00:00:00');
    const curr = new Date(dates[i] + 'T00:00:00');
    const diff = (prev - curr) / 86400000;
    if (diff === 1) streak++;
    else break;
  }
  return streak;
}

function recordCompletedSession(cycles, seconds) {
  const h = loadHistory();
  h.sessions.push({
    date: todayStr(),
    cycles: cycles,
    seconds: Math.round(seconds),
    ts: Date.now()
  });
  h.totalMin = Math.round((h.totalMin || 0) + seconds / 60);
  saveHistory(h);
  updateHistoryUI();
  // Also log for journal integration (compatible with original format)
  logBreathSessionForJournal();
}

function logBreathSessionForJournal() {
  try {
    const data = JSON.parse(localStorage.getItem('breath_sessions') || '{}');
    const now = new Date();
    const day = now.getDay();
    const diff = now.getDate() - day + (day === 0 ? -6 : 1);
    const monday = new Date(new Date(now).setDate(diff));
    const weekStart = monday.toISOString().split('T')[0];
    const dayIdx = (now.getDay() + 6) % 7;
    const key = weekStart + '_' + dayIdx;
    data[key] = (data[key] || 0) + 1;
    localStorage.setItem('breath_sessions', JSON.stringify(data));
  } catch(e) {}
}

function updateHistoryUI() {
  const h = loadHistory();
  const today = todayStr();
  const todaySessions = h.sessions.filter(s => s.date === today).length;
  const streak = computeStreak(h.sessions);
  document.getElementById('histTotal').textContent = h.sessions.length;
  document.getElementById('histToday').textContent = todaySessions;
  document.getElementById('histStreak').textContent = streak;
  document.getElementById('histMinutes').textContent = h.totalMin || 0;

  const ld = LANG_DATA[currentLang];
  document.getElementById('histTotalLbl').textContent = ld.histTotal;
  document.getElementById('histTodayLbl').textContent = ld.histToday;
  document.getElementById('histStreakLbl').textContent = ld.histStreak;
  document.getElementById('histMinLbl').textContent = ld.histMin;
}

// ═══════════════════════════════════════════════════════════════════════
// LANGUAGE
// ═══════════════════════════════════════════════════════════════════════
function updateLanguage() {
  const ld = LANG_DATA[currentLang];
  timerLabel.textContent = ld.timer;
  cycleLabel.textContent = ld.cycles;
  playPauseBtn.textContent = running ? ld.pause : ld.play;
  resetBtn.textContent = ld.reset;
  langBtn.textContent = currentLang === 'el' ? 'EN' : 'ΕΛ';
  const phaseText = ld.phases[PHASES[phaseIdx].labelKey];
  phaseNameEl.textContent = phaseText.label;
  phaseSubEl.textContent = phaseText.sub;
  buildGuide();
  updateHistoryUI();
}

function buildGuide() {
  const g = LANG_DATA[currentLang].guide;
  document.getElementById('ig-title').textContent = g.title;
  document.getElementById('ig-sub').textContent = g.sub;
  document.getElementById('ig-timing').innerHTML = g.timing.map(t =>
    `<div class="intro-phase"><div class="num">${t.num}</div><div class="lbl">${t.lbl}</div></div>`
  ).join('');
  function sec(id, d) {
    document.getElementById(id).innerHTML = `<h3>${d.h}</h3><p>${d.p}</p><div class="intro-ref">📄 ${d.ref}</div>`;
  }
  sec('ig-hands', g.hands);
  sec('ig-science', g.science);
  sec('ig-vagus', g.vagus);
  sec('ig-move', g.move);
  document.getElementById('ig-note').textContent = g.note;
  document.getElementById('ig-start').textContent = g.start;
}

function startExercise() {
  document.getElementById('introGuide').style.display = 'none';
  document.getElementById('exerciseArea').classList.add('active');
  resizeCanvas();
  startBreathing();
}

function setLanguage(lang) {
  currentLang = lang;
  updateLanguage();
  localStorage.setItem('breath_lang', lang);
}

langBtn.addEventListener('click', () => setLanguage(currentLang === 'el' ? 'en' : 'el'));

// ═══════════════════════════════════════════════════════════════════════
// CANVAS RESIZE
// ═══════════════════════════════════════════════════════════════════════
function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', () => { resizeCanvas(); drawFigure(); });

// ═══════════════════════════════════════════════════════════════════════
// PHASE UPDATE
// ═══════════════════════════════════════════════════════════════════════
function updatePhase(now) {
  if (!running) return;

  const elapsed = now - phaseStartTime;
  const phase = PHASES[phaseIdx];
  const progress = Math.min(elapsed / phase.dur, 1);

  // FIX: Apply easing to progress, THEN interpolate arm position
  const easedProgress = easeInOutCubic(progress);
  armPos = phase.armFrom + (phase.armTo - phase.armFrom) * easedProgress;

  const ld = LANG_DATA[currentLang];
  const phaseText = ld.phases[phase.labelKey];
  phaseNameEl.textContent = phaseText.label;
  phaseSubEl.textContent = phaseText.sub;

  if (progress >= 1) {
    phaseIdx = (phaseIdx + 1) % TOTAL_PHASES;
    phaseStartTime = now;

    // Haptic feedback
    if (navigator.vibrate) {
      const vibePatterns = [
        [30,30,30,30,30,30,30],
        [30,30,30],
        [30,30,30,30,30,30,30,30,30,30,30],
        [40]
      ];
      navigator.vibrate(vibePatterns[phaseIdx]);
    }

    // Cycle complete
    if (phaseIdx === 0) {
      totalCycles++;
      cycleDisplay.textContent = totalCycles;
      // Record session every 3 cycles (or first cycle)
      if (totalCycles === 1 || totalCycles % 3 === 0) {
        recordCompletedSession(totalCycles, sessionSeconds);
      }
    }
  }
}

// ═══════════════════════════════════════════════════════════════════════
// TIMER
// ═══════════════════════════════════════════════════════════════════════
function updateTimer(now) {
  if (!running) return;
  if (lastTimestamp === 0) { lastTimestamp = now; return; }
  const delta = Math.min(now - lastTimestamp, 100);
  if (delta > 0) {
    sessionSeconds += delta / 1000;
    const mins = Math.floor(sessionSeconds / 60);
    const secs = Math.floor(sessionSeconds % 60);
    timerDisplay.textContent = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
  }
  lastTimestamp = now;
}

// ═══════════════════════════════════════════════════════════════════════
// DRAW FIGURE — LARGER & CENTERED
// ═══════════════════════════════════════════════════════════════════════
function drawFigure() {
  if (!canvas.width || !canvas.height) return;
  const dpr = Math.min(devicePixelRatio || 1, 2);
  const w = canvas.width / dpr;
  const h = canvas.height / dpr;
  ctx.clearRect(0, 0, w, h);

  const cx = w / 2;
  // Center the figure vertically — place the seat at ~62% height
  const groundY = h * 0.65;
  // Scale factor: make figure fill more of the canvas
  const sc = Math.min(w / 200, h / 260);
  const pulse = Math.sin(time * 1.2) * 0.5 + 0.5;

  ctx.save();
  ctx.translate(cx, groundY);
  ctx.scale(sc, sc);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // ── GOLDEN GRAVITY AXIS ──
  const headTop = -118;
  const globeBottom = 52;
  const axTop = headTop - 28;
  const axBot = globeBottom + 18;
  const ag = ctx.createLinearGradient(0, axTop, 0, axBot);
  ag.addColorStop(0, 'rgba(220,190,60,0)');
  ag.addColorStop(0.05, 'rgba(220,190,60,0.18)');
  ag.addColorStop(0.5, 'rgba(220,190,60,0.32)');
  ag.addColorStop(0.95, 'rgba(220,190,60,0.18)');
  ag.addColorStop(1, 'rgba(220,190,60,0)');
  ctx.strokeStyle = ag;
  ctx.lineWidth = 2.2;
  ctx.beginPath(); ctx.moveTo(0, axTop); ctx.lineTo(0, axBot); ctx.stroke();
  ctx.strokeStyle = 'rgba(220,190,60,0.04)';
  ctx.lineWidth = 12;
  ctx.beginPath(); ctx.moveTo(0, axTop); ctx.lineTo(0, axBot); ctx.stroke();

  // ── GLOBE ──
  const globeR = 44, globeY = 0;
  const gradGlobe = ctx.createRadialGradient(-10, globeY - 8, 5, 0, globeY, globeR);
  gradGlobe.addColorStop(0, 'rgba(180,160,80,0.28)');
  gradGlobe.addColorStop(0.5, 'rgba(50,120,100,0.22)');
  gradGlobe.addColorStop(1, 'rgba(30,70,80,0.18)');
  ctx.fillStyle = gradGlobe;
  ctx.beginPath(); ctx.arc(0, globeY, globeR, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(100,160,140,0.18)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  // continents
  ctx.fillStyle = 'rgba(160,140,60,0.08)';
  ctx.beginPath(); ctx.ellipse(-12, globeY - 5, 18, 12, -0.2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(15, globeY + 8, 10, 8, 0.3, 0, Math.PI * 2); ctx.fill();

  // ── PHASE ARC ──
  if (running) {
    const phaseElapsed = performance.now() - phaseStartTime;
    const pProg = Math.min(phaseElapsed / PHASES[phaseIdx].dur, 1);
    const arcStart = -Math.PI / 2;
    const arcEnd = arcStart + pProg * Math.PI * 2;
    const arcColors = ['rgba(168,213,220,0.3)', 'rgba(180,180,180,0.15)', 'rgba(220,190,60,0.3)', 'rgba(180,180,180,0.12)'];
    ctx.strokeStyle = arcColors[phaseIdx];
    ctx.lineWidth = 2.8;
    ctx.beginPath(); ctx.arc(0, globeY, globeR + 6, arcStart, arcEnd); ctx.stroke();
  }

  // ── LOTUS LEGS ──
  const seatY = -globeR + 5;
  const pelvisY = seatY - 8;
  ctx.fillStyle = 'rgba(40,60,50,0.85)';
  ctx.beginPath();
  ctx.moveTo(-32, seatY + 5);
  ctx.quadraticCurveTo(-37, seatY + 18, -27, seatY + 24);
  ctx.quadraticCurveTo(-5, seatY + 27, 0, seatY + 15);
  ctx.quadraticCurveTo(5, seatY + 27, 27, seatY + 24);
  ctx.quadraticCurveTo(37, seatY + 18, 32, seatY + 5);
  ctx.quadraticCurveTo(16, seatY - 2, 0, pelvisY);
  ctx.quadraticCurveTo(-16, seatY - 2, -32, seatY + 5);
  ctx.fill();
  // fold line
  ctx.strokeStyle = 'rgba(30,50,40,0.22)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(-22, seatY + 10); ctx.quadraticCurveTo(0, seatY + 22, 22, seatY + 10); ctx.stroke();

  // ── TORSO ──
  const waistY = pelvisY - 22;
  const chestY = waistY - 28;
  const shoulderY = chestY - 12;
  ctx.fillStyle = 'rgba(60,85,75,0.8)';
  ctx.beginPath();
  ctx.moveTo(-24, pelvisY);
  ctx.quadraticCurveTo(-27, waistY, -26, chestY);
  ctx.lineTo(-22, shoulderY);
  ctx.lineTo(22, shoulderY);
  ctx.lineTo(26, chestY);
  ctx.quadraticCurveTo(27, waistY, 24, pelvisY);
  ctx.closePath();
  ctx.fill();
  // center line
  ctx.strokeStyle = 'rgba(30,50,40,0.18)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, shoulderY + 5); ctx.lineTo(0, pelvisY); ctx.stroke();

  // ── ARMS ──
  const armAngle = armPos * Math.PI;
  const armLen1 = 30, armLen2 = 28;
  for (let side = -1; side <= 1; side += 2) {
    const sx = side * 22, sy = shoulderY + 3;
    const angle = Math.PI / 2 - armAngle;
    const elbX = sx + Math.cos(angle) * side * armLen1 * 0.7;
    const elbY = sy + Math.sin(angle) * armLen1;
    const hx = elbX + Math.cos(angle) * side * armLen2 * 0.5;
    const hy = elbY + Math.sin(angle) * armLen2 * 0.7;

    // sleeve
    ctx.fillStyle = `rgba(55,80,70,${0.6 + armPos * 0.15})`;
    ctx.beginPath();
    ctx.moveTo(sx - side * 5, sy);
    ctx.lineTo(sx + side * 5, sy);
    ctx.lineTo(elbX + side * 3.5, elbY);
    ctx.lineTo(elbX - side * 3.5, elbY);
    ctx.closePath();
    ctx.fill();
    // forearm
    ctx.strokeStyle = `rgba(200,170,120,${0.5 + armPos * 0.2})`;
    ctx.lineWidth = 3.5;
    ctx.beginPath(); ctx.moveTo(elbX, elbY); ctx.lineTo(hx, hy); ctx.stroke();
    // hand
    ctx.fillStyle = `rgba(200,170,120,${0.4 + armPos * 0.2})`;
    ctx.beginPath(); ctx.arc(hx, hy, 4.5, 0, Math.PI * 2); ctx.fill();

    // glow trail
    if (armPos > 0.1 && running) {
      ctx.strokeStyle = `rgba(168,213,220,${armPos * 0.07})`;
      ctx.lineWidth = 7;
      ctx.beginPath(); ctx.moveTo(sx, sy); ctx.quadraticCurveTo(elbX, elbY, hx, hy); ctx.stroke();
    }
  }

  // Mudra when arms down
  if (armPos < 0.15) {
    const mudraY = waistY + 16;
    ctx.fillStyle = 'rgba(200,170,120,0.4)';
    ctx.beginPath(); ctx.ellipse(0, mudraY, 9, 5.5, 0, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(180,150,100,0.25)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(0, mudraY, 5.5, 0.2, Math.PI - 0.2); ctx.stroke();
  }

  // ── INFINITY SYMBOL ──
  const infY = chestY + 9, infR = 9;
  const colors = ['rgba(220,60,60,0.35)', 'rgba(220,180,40,0.35)', 'rgba(60,180,60,0.35)', 'rgba(60,60,220,0.35)', 'rgba(180,60,180,0.35)'];
  ctx.lineWidth = 2;
  for (let i = 0; i < 5; i++) {
    ctx.strokeStyle = colors[i];
    const o = (i - 2) * 0.9;
    ctx.beginPath();
    ctx.moveTo(0, infY + o);
    ctx.bezierCurveTo(-infR * 1.2, infY - infR + o, -infR * 1.2, infY + infR + o, 0, infY + o);
    ctx.bezierCurveTo(infR * 1.2, infY - infR + o, infR * 1.2, infY + infR + o, 0, infY + o);
    ctx.stroke();
  }

  // ── HEAD & HOOD ──
  const neckY = shoulderY - 9;
  const headY = neckY - 20, headR = 17;
  const hoodTop = headY - headR - 7;

  // Neck
  ctx.fillStyle = 'rgba(200,170,120,0.7)';
  ctx.fillRect(-5.5, neckY, 11, shoulderY - neckY);

  // Hood (behind head)
  ctx.fillStyle = 'rgba(60,85,75,0.8)';
  ctx.beginPath();
  ctx.moveTo(-24, shoulderY);
  ctx.quadraticCurveTo(-26, neckY - 5, -22, headY);
  ctx.quadraticCurveTo(-17, hoodTop, 0, hoodTop - 3);
  ctx.quadraticCurveTo(17, hoodTop, 22, headY);
  ctx.quadraticCurveTo(26, neckY - 5, 24, shoulderY);
  ctx.fill();
  // Hood edge
  ctx.strokeStyle = 'rgba(30,50,40,0.18)';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(-20, shoulderY - 2);
  ctx.quadraticCurveTo(-22, headY + 5, -15, headY - 5);
  ctx.quadraticCurveTo(0, headY - headR - 2, 15, headY - 5);
  ctx.quadraticCurveTo(22, headY + 5, 20, shoulderY - 2);
  ctx.stroke();

  // Face
  ctx.fillStyle = 'rgba(200,170,120,0.65)';
  ctx.beginPath(); ctx.arc(0, headY, headR - 3, -0.3, Math.PI + 0.3); ctx.fill();

  // Eyes closed
  ctx.strokeStyle = 'rgba(80,60,40,0.4)';
  ctx.lineWidth = 1.3;
  ctx.beginPath(); ctx.moveTo(-8, headY + 1); ctx.quadraticCurveTo(-5.5, headY + 3.5, -3, headY + 1); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(3, headY + 1); ctx.quadraticCurveTo(5.5, headY + 3.5, 8, headY + 1); ctx.stroke();
  // Smile
  ctx.strokeStyle = 'rgba(80,60,40,0.18)';
  ctx.lineWidth = 0.9;
  ctx.beginPath(); ctx.moveTo(-4.5, headY + 7.5); ctx.quadraticCurveTo(0, headY + 10, 4.5, headY + 7.5); ctx.stroke();

  // ── TANTIEN ──
  const tantienY = waistY + 9;
  const tg = ctx.createRadialGradient(0, tantienY, 0, 0, tantienY, 14 + pulse * 5);
  tg.addColorStop(0, `rgba(80,200,160,${0.15 + armPos * 0.1})`);
  tg.addColorStop(0.6, `rgba(80,200,160,${0.05 + armPos * 0.05})`);
  tg.addColorStop(1, 'rgba(80,200,160,0)');
  ctx.fillStyle = tg;
  ctx.beginPath(); ctx.arc(0, tantienY, 14 + pulse * 5, 0, Math.PI * 2); ctx.fill();

  // ── AURA ──
  if (running && armPos > 0.15) {
    for (let i = 0; i < 3; i++) {
      const rr = ((time * 7 + i * 40) % 140);
      const ra = Math.max(0, 1 - rr / 140) * armPos * 0.055;
      ctx.strokeStyle = `rgba(168,213,220,${ra})`;
      ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.arc(0, chestY - 5, rr, 0, Math.PI * 2); ctx.stroke();
    }
  }

  // ── STARS ──
  for (let i = 0; i < 14; i++) {
    const sx = Math.sin(i * 2.1 + time * 0.08) * 160;
    const sy = -155 - i * 10 + Math.cos(i * 1.5) * 35;
    ctx.fillStyle = `rgba(220,230,240,${0.08 + Math.sin(time * 0.7 + i) * 0.04})`;
    ctx.beginPath(); ctx.arc(sx, sy, 1.3, 0, Math.PI * 2); ctx.fill();
  }

  ctx.restore();

  // ── FLOATING CUES ──
  if (running && cues.length) {
    const nowSec = performance.now() / 1000;
    for (let i = cues.length - 1; i >= 0; i--) {
      const c = cues[i];
      const age = nowSec - c.born;
      if (age > 6) { cues.splice(i, 1); continue; }
      const alpha = age < 0.8 ? age / 0.8 : (age > 4 ? (6 - age) / 2 : 1);
      ctx.save();
      ctx.globalAlpha = Math.max(0, alpha * 0.3);
      ctx.font = "italic 13px 'Fraunces', Georgia, serif";
      ctx.fillStyle = '#A8D5DC';
      ctx.textAlign = 'center';
      ctx.fillText(c.text, c.x, c.y - age * 7);
      ctx.restore();
    }
  }

  time += 0.016;
}

// ═══════════════════════════════════════════════════════════════════════
// CUES
// ═══════════════════════════════════════════════════════════════════════
function maybeAddCue(now) {
  if (!running) return;
  if (now - lastCueTime < 5000) return;
  lastCueTime = now;
  const texts = LANG_DATA[currentLang].cues;
  const text = texts[Math.floor(Math.random() * texts.length)];
  const dpr = Math.min(devicePixelRatio || 1, 2);
  const w = canvas.width / dpr;
  const h = canvas.height / dpr;
  cues.push({ text, x: 20 + Math.random() * (w - 40), y: h * 0.5 + Math.random() * (h * 0.25), born: now / 1000 });
  if (cues.length > 5) cues.shift();
}

// ═══════════════════════════════════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════════════════════════════════
function animate(nowMs) {
  if (!canvas.width) resizeCanvas();
  if (running) {
    updatePhase(nowMs);
    updateTimer(nowMs);
    maybeAddCue(nowMs);
  }
  drawFigure();
  animationId = requestAnimationFrame(animate);
}

// ═══════════════════════════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════════════════════════
function startBreathing() {
  if (running) return;
  running = true;
  phaseStartTime = performance.now();
  lastTimestamp = phaseStartTime;
  playPauseBtn.textContent = LANG_DATA[currentLang].pause;
  if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
}

function pauseBreathing() {
  if (!running) return;
  running = false;
  playPauseBtn.textContent = LANG_DATA[currentLang].play;
  // Record session on pause if we have cycles
  if (totalCycles > 0) {
    recordCompletedSession(totalCycles, sessionSeconds);
  }
}

function resetBreathing() {
  const wasRunning = running;
  if (wasRunning) {
    running = false;
    // Record before reset
    if (totalCycles > 0) {
      recordCompletedSession(totalCycles, sessionSeconds);
    }
  }
  phaseIdx = 0;
  armPos = 0;
  totalCycles = 0;
  sessionSeconds = 0;
  cues = [];
  lastCueTime = 0;
  timerDisplay.textContent = '00:00';
  cycleDisplay.textContent = '0';
  const now = performance.now();
  phaseStartTime = now;
  lastTimestamp = now;
  const ld = LANG_DATA[currentLang];
  phaseNameEl.textContent = ld.phases[0].label;
  phaseSubEl.textContent = ld.phases[0].sub;
  playPauseBtn.textContent = ld.play;
  if (!wasRunning) drawFigure();
}

playPauseBtn.addEventListener('click', () => running ? pauseBreathing() : startBreathing());
resetBtn.addEventListener('click', resetBreathing);

// ═══════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════
function init() {
  const urlLang = new URLSearchParams(location.search).get('lang');
  if (urlLang === 'en' || urlLang === 'el') currentLang = urlLang;
  else {
    const saved = localStorage.getItem('breath_lang');
    if (saved === 'en' || saved === 'el') currentLang = saved;
    else currentLang = 'el';
  }
  setLanguage(currentLang);
  resizeCanvas();
  resetBreathing();
  updateHistoryUI();
  animationId = requestAnimationFrame(animate);
}

init();
</script>
