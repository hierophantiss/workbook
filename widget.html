<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="widget-manifest.json">
    <title>Widget Τετραπλού Άξονα</title>
    <style>
        :root {
            --bg-card: #ffffff;
            --bg-soft: #f2efe9;
            --teal: #2c6e6b;
            --text-primary: #2b2a28;
            --text-secondary: #5b5a56;
            --text-muted: #8c8982;
            --border-light: #e2ddd4;
        }
        body { margin: 0; padding: 10px; font-family: 'Inter', sans-serif; background: var(--bg-card); }
        .widget-container { padding: 15px; text-align: center; background: var(--bg-card); border-radius: 24px; border: 1px solid var(--border-light); }
        .widget-clock { font-size: 3.5rem; font-weight: 200; margin-bottom: 15px; color: var(--text-primary); }
        .widget-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px; }
        .widget-item { background: var(--bg-soft); padding: 8px 2px; border-radius: 12px; font-size: 1rem; color: var(--text-secondary); border: 2px solid transparent; }
        .axis-label { font-size: 0.6rem; display: block; margin-top: 2px; color: var(--text-muted); }
        .breath-btn { grid-column: span 4; background: var(--teal); color: white; font-size: 1.2rem; padding: 10px; border-radius: 12px; text-decoration: none; display: block; }
        .widget-item.active { border-color: var(--teal); box-shadow: 0 0 10px rgba(44, 110, 107, 0.3); }
    </style>
</head>
<body>
    <div class="widget-container" id="widget-root">
        <!-- Content will be injected by widget.js -->
    </div>
    <button onclick="installApp()" style="margin-top: 15px; padding: 10px 20px; background: var(--teal); color: white; border: none; border-radius: 8px; cursor: pointer;">Εγκατάσταση Widget</button>
    <div class="screen" id="screen-widget" style="display:none"></div>
    <script src="js/i18n.js"></script>
    <script src="js/app.js"></script>
    <script src="js/screens/widget.js"></script>
    <script>
        // Register service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(console.error);
        }

        // Initialize widget content
        const root = document.getElementById('widget-root');
        // We need to mock some functions to make widget.js work
        function t(key) { return (T.el && T.el[key]) || key; }
        function showScreen(id) { window.location.href = 'index.html#' + id; }
        
        // Load data for highlighting
        function loadCompanionData() { return JSON.parse(localStorage.getItem('companionData') || '{}'); }
        
        buildWidgetScreen();
        // Override the innerHTML to just show the widget content
        const screen = document.getElementById('screen-widget');
        root.innerHTML = screen.innerHTML;
        
        // Re-init clock and highlight
        updateWidgetClock();
        setInterval(updateWidgetClock, 1000);
        updateWidgetHighlight();
    </script>
</body>
</html>
