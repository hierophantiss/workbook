<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Εσωτερική Αφή · Ο Ήρωας της Αναπνοής</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,700;1,300&family=DM+Sans:wght@400;500&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#050510;overflow:hidden;height:100vh;width:100vw;font-family:'Fraunces',serif;color:#e8e4df;user-select:none}
    canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:1}
    .lang-toggle{
      position:fixed;top:20px;left:20px;z-index:20;
      background:rgba(20,25,35,0.8);border-radius:30px;border:1px solid rgba(200,180,140,0.3);
      display:flex;overflow:hidden;backdrop-filter:blur(4px);
    }
    .lang-btn{
      padding:5px 15px;font-size:12px;font-weight:400;letter-spacing:1px;
      background:transparent;border:none;color:rgba(232,228,223,0.5);cursor:pointer;
      transition:all 0.3s;font-family:'Fraunces',serif;
    }
    .lang-btn.active{background:rgba(200,180,140,0.2);color:#e8e4df}
    .label{
      position:fixed;bottom:70px;left:50%;transform:translateX(-50%);z-index:10;
      text-align:center;width:90%;opacity:0;transition:opacity 1.2s ease;
    }
    .label.vis{opacity:1}
    .label .main{font-size:clamp(1.3rem,4vw,2rem);font-weight:400;letter-spacing:0.1em;text-transform:uppercase}
    .label .sub{
      font-size:clamp(0.7rem,1.4vw,0.9rem);letter-spacing:0.05em;
      color:rgba(232,228,223,0.7);margin-top:8px;font-style:italic;line-height:1.5;
      background:rgba(10,12,18,0.6);padding:8px 18px;border-radius:40px;backdrop-filter:blur(4px);
      display:inline-block;max-width:700px;
    }
    .snum{position:fixed;top:24px;right:28px;z-index:10;font-size:0.7rem;letter-spacing:0.3em;color:rgba(232,228,223,0.2)}
    .ptrack{position:fixed;bottom:0;left:0;width:100%;height:2px;background:rgba(255,255,255,0.03);z-index:10}
    .pbar{height:100%;background:linear-gradient(90deg,rgba(160,130,90,0.4),rgba(200,180,100,0.5),rgba(120,190,170,0.4));transition:width 1.2s ease}
    .dots{position:fixed;right:22px;top:50%;transform:translateY(-50%);z-index:10;display:flex;flex-direction:column;gap:12px}
    .dot{width:6px;height:6px;border-radius:50%;background:rgba(232,228,223,0.12);transition:all .5s ease;cursor:pointer;border:none;padding:0}
    .dot.active{background:rgba(232,228,223,0.6);transform:scale(1.6);box-shadow:0 0 8px rgba(232,228,223,0.2)}
    .ctrls{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:8px}
    .ctrls button{
      background:rgba(232,228,223,0.05);border:1px solid rgba(232,228,223,0.1);
      color:rgba(232,228,223,0.4);padding:5px 14px;font-family:'Fraunces',serif;
      font-size:0.7rem;letter-spacing:0.1em;cursor:pointer;border-radius:18px;transition:all .3s
    }
    .ctrls button:active{background:rgba(232,228,223,0.15);color:rgba(232,228,223,0.7)}
    .intro{
      position:fixed;inset:0;z-index:100;background:#050510;
      display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;
      transition:opacity 2s ease
    }
    .intro.hidden{opacity:0;pointer-events:none}
    .intro-t{
      font-size:clamp(1.6rem,4.5vw,2.8rem);font-weight:300;letter-spacing:0.2em;
      background:linear-gradient(135deg,#e8e4df,#c8a860);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
      opacity:0;animation:fi 2s ease 0.5s forwards
    }
    .intro-s{
      font-size:clamp(0.7rem,1.4vw,0.95rem);letter-spacing:0.3em;color:rgba(232,228,223,0.25);
      margin-top:8px;font-style:italic;opacity:0;animation:fi 2s ease 1.2s forwards
    }
    .intro-q{
      font-size:clamp(0.6rem,1.1vw,0.75rem);letter-spacing:0.15em;color:rgba(232,228,223,0.15);
      margin-top:30px;max-width:400px;text-align:center;line-height:1.8;font-style:italic;
      opacity:0;animation:fi 2s ease 1.8s forwards
    }
    .intro-h{
      font-size:0.6rem;letter-spacing:0.4em;color:rgba(232,228,223,0.1);margin-top:40px;
      text-transform:uppercase;animation:pu 3.5s ease-in-out infinite
    }
    @keyframes fi{to{opacity:1}}
    @keyframes pu{0%,100%{opacity:0.1}50%{opacity:0.35}}
  </style>
</head>
<body>
<div class="lang-toggle" id="langToggle">
  <button class="lang-btn active" data-lang="el">ΕΛ</button>
  <button class="lang-btn" data-lang="en">EN</button>
</div>
<div class="intro" id="intro">
  <div class="intro-t" id="introTitle">Εσωτερική Αφή</div>
  <div class="intro-s" id="introSub">Η Πράξη της Παρατήρησης</div>
  <div class="intro-q" id="introQuote">«Δεν χρειάζεται να ελέγξεις την αναπνοή σου.<br>Αρκεί να την παρατηρήσεις όπως είναι.»</div>
  <div class="intro-h" id="introHint">πάτησε για να ξεκινήσεις</div>
</div>
<canvas id="c"></canvas>
<div class="label" id="label">
  <div class="main" id="labelMain"></div>
  <div class="sub" id="labelSub"></div>
</div>
<div class="snum" id="sn"></div>
<div class="ptrack"><div class="pbar" id="pb"></div></div>
<div class="dots" id="dotsContainer"></div>
<div class="ctrls"><button onclick="goTo(cur-1)">◀</button><button id="ab" onclick="togAuto()">▶ auto</button><button onclick="goTo(cur+1)">▶</button></div>

<script>
  // ========== ΕΚΤΕΤΑΜΕΝΟΣ ΗΡΩΑΣ ΜΕ ΕΣΩΤΕΡΙΚΗ ΛΑΜΨΗ ==========
  // Προσθήκη glowRegion: 0=καμία, 1=μύτη, 2=λαιμός, 3=στήθος/κοιλιά, 4=ολόσωμη αύρα
  function drawHero(ctx, x, y, alpha, tilt, headInflate, breathPhase, glowRegion, glowIntensity) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(tilt);
      const op = Math.min(1, alpha);
      
      // Rim light (απαλή λάμψη φόντου)
      const rimGlow = ctx.createRadialGradient(0, -30, 0, 0, -30, 65);
      rimGlow.addColorStop(0, `rgba(180, 210, 190, ${op * 0.15})`);
      rimGlow.addColorStop(1, `rgba(80, 110, 100, 0)`);
      ctx.fillStyle = rimGlow;
      ctx.beginPath();
      ctx.ellipse(0, -20, 45, 55, 0, 0, Math.PI * 2);
      ctx.fill();
      
      const headY = -58 - (headInflate > 1.1 ? 3 : 0);
      
      // ---- ΕΣΩΤΕΡΙΚΗ ΛΑΜΨΗ (πριν το σώμα για να είναι από κάτω) ----
      if (glowRegion > 0 && glowIntensity > 0.05) {
          ctx.save();
          ctx.shadowBlur = 18;
          ctx.shadowColor = '#b0e8c0';
          const glowAlpha = op * glowIntensity * 0.9;
          
          // 1: Μύτη / ρουθούνια
          if (glowRegion === 1) {
              const pulse = 0.7 + 0.3 * Math.sin(breathPhase * Math.PI * 2);
              const grad = ctx.createRadialGradient(-2, headY-2, 0, -2, headY-2, 18);
              grad.addColorStop(0, `rgba(220, 255, 200, ${glowAlpha * pulse})`);
              grad.addColorStop(0.7, `rgba(140, 220, 150, ${glowAlpha * 0.5})`);
              grad.addColorStop(1, 'transparent');
              ctx.fillStyle = grad;
              ctx.beginPath();
              ctx.arc(-2, headY-2, 16, 0, Math.PI*2);
              ctx.fill();
              ctx.beginPath();
              ctx.arc(2, headY-2, 14, 0, Math.PI*2);
              ctx.fill();
          }
          
          // 2: Λαιμός
          else if (glowRegion === 2) {
              const pulse = 0.6 + 0.4 * Math.sin(breathPhase * Math.PI * 2 + 0.5);
              const grad = ctx.createRadialGradient(0, headY+10, 0, 0, headY+10, 28);
              grad.addColorStop(0, `rgba(190, 240, 200, ${glowAlpha * pulse})`);
              grad.addColorStop(0.6, `rgba(120, 200, 140, ${glowAlpha * 0.5})`);
              grad.addColorStop(1, 'transparent');
              ctx.fillStyle = grad;
              ctx.beginPath();
              ctx.ellipse(0, headY+8, 20, 16, 0, 0, Math.PI*2);
              ctx.fill();
          }
          
          // 3: Στήθος & Κοιλιά
          else if (glowRegion === 3) {
              const breathPulse = 0.5 + 0.5 * Math.sin(breathPhase * Math.PI * 2);
              // Στήθος
              const chestGrad = ctx.createRadialGradient(0, headY+25, 0, 0, headY+25, 30);
              chestGrad.addColorStop(0, `rgba(210, 250, 190, ${glowAlpha * breathPulse})`);
              chestGrad.addColorStop(0.8, `rgba(130, 210, 150, ${glowAlpha * 0.4})`);
              ctx.fillStyle = chestGrad;
              ctx.beginPath();
              ctx.ellipse(0, headY+25, 26, 22, 0, 0, Math.PI*2);
              ctx.fill();
              // Κοιλιά
              const bellyGrad = ctx.createRadialGradient(0, headY+55, 0, 0, headY+55, 28);
              bellyGrad.addColorStop(0, `rgba(200, 240, 170, ${glowAlpha * breathPulse})`);
              bellyGrad.addColorStop(0.8, `rgba(110, 190, 130, ${glowAlpha * 0.4})`);
              ctx.fillStyle = bellyGrad;
              ctx.beginPath();
              ctx.ellipse(0, headY+55, 28, 20, 0, 0, Math.PI*2);
              ctx.fill();
          }
          
          // 4: Ολόσωμη αύρα (εξωτερική λάμψη)
          else if (glowRegion === 4) {
              const pulse = 0.7 + 0.3 * Math.sin(breathPhase * Math.PI * 2);
              const auraGrad = ctx.createRadialGradient(0, headY+30, 10, 0, headY+30, 110);
              auraGrad.addColorStop(0, `rgba(180, 240, 170, ${glowAlpha * pulse * 0.3})`);
              auraGrad.addColorStop(0.5, `rgba(140, 210, 140, ${glowAlpha * 0.2})`);
              auraGrad.addColorStop(1, 'transparent');
              ctx.fillStyle = auraGrad;
              ctx.beginPath();
              ctx.ellipse(0, headY+30, 90, 120, 0, 0, Math.PI*2);
              ctx.fill();
          }
          ctx.restore();
      }
      
      // Κουκούλα
      ctx.fillStyle = `rgba(30, 48, 52, ${op * 0.95})`;
      ctx.beginPath();
      ctx.ellipse(0, headY - 3, 24 + (headInflate - 1) * 5, 28 + (headInflate - 1) * 6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(-26, headY - 8);
      ctx.quadraticCurveTo(0, headY - 34, 26, headY - 8);
      ctx.lineTo(20, headY + 14);
      ctx.quadraticCurveTo(0, headY + 20, -20, headY + 14);
      ctx.fill();
      
      // Πρόσωπο
      ctx.fillStyle = `rgba(235, 205, 165, ${op * 0.9})`;
      ctx.beginPath();
      ctx.ellipse(0, headY, 17 + (headInflate - 1) * 3, 21 + (headInflate - 1) * 4, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // Μάτια (κλειστά, ήρεμα)
      ctx.strokeStyle = `rgba(35, 25, 20, ${op * 0.9})`;
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      ctx.moveTo(-11, headY - 1);
      ctx.quadraticCurveTo(-7, headY + 1.5, -4, headY - 1);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(11, headY - 1);
      ctx.quadraticCurveTo(7, headY + 1.5, 4, headY - 1);
      ctx.stroke();
      
      // Στόμα
      ctx.beginPath();
      ctx.moveTo(-5, headY + 7);
      ctx.quadraticCurveTo(0, headY + 11, 5, headY + 7);
      ctx.stroke();
      
      // Λαιμός
      ctx.fillStyle = `rgba(235, 205, 165, ${op * 0.75})`;
      ctx.fillRect(-6, headY + 13, 12, 15);
      
      // Σώμα (χιτώνας)
      ctx.fillStyle = `rgba(28, 34, 38, ${op * 0.98})`;
      ctx.beginPath();
      ctx.moveTo(-24, headY + 25);
      ctx.quadraticCurveTo(0, headY + 18, 24, headY + 25);
      ctx.lineTo(30, headY + 90);
      ctx.quadraticCurveTo(0, headY + 106, -30, headY + 90);
      ctx.fill();
      
      // Ενεργειακή γραμμή (αναπνοή)
      const breathFactor = 0.5 + 0.5 * Math.sin(breathPhase * Math.PI * 2);
      const energyIntensity = 0.4 + breathFactor * 0.6;
      ctx.shadowBlur = 10;
      ctx.shadowColor = '#a0d8a0';
      ctx.beginPath();
      ctx.moveTo(0, headY + 22);
      ctx.lineTo(0, headY + 88);
      ctx.lineWidth = 3 + energyIntensity * 2.2;
      ctx.strokeStyle = `rgba(180, 230, 170, ${op * (0.4 + energyIntensity*0.3)})`;
      ctx.stroke();
      ctx.shadowBlur = 0;
      
      // Σύμβολο αναπνοής
      const gradInf = ctx.createLinearGradient(-14, headY + 42, 14, headY + 58);
      gradInf.addColorStop(0, "#b8d9b0");
      gradInf.addColorStop(0.5, "#e0d8b0");
      gradInf.addColorStop(1, "#b0d9d0");
      ctx.lineWidth = 3.0;
      ctx.strokeStyle = gradInf;
      ctx.beginPath();
      ctx.ellipse(-8, headY + 50, 9, 5.5, -0.2, 0, Math.PI * 2);
      ctx.ellipse(8, headY + 50, 9, 5.5, 0.2, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-14, headY + 49);
      ctx.quadraticCurveTo(0, headY + 56, 14, headY + 49);
      ctx.stroke();
      
      // Διαμάντι γείωσης
      ctx.fillStyle = `rgba(140, 210, 140, ${op * 0.8})`;
      ctx.shadowBlur = 5;
      ctx.shadowColor = "#a0e0a0";
      ctx.beginPath();
      ctx.moveTo(0, headY + 73);
      ctx.lineTo(7, headY + 80);
      ctx.lineTo(0, headY + 87);
      ctx.lineTo(-7, headY + 80);
      ctx.fill();
      ctx.shadowBlur = 0;
      
      // Χέρια
      ctx.lineWidth = 3.2;
      ctx.strokeStyle = `rgba(210, 195, 170, ${op * 0.85})`;
      ctx.fillStyle = `rgba(235, 205, 165, ${op * 0.8})`;
      ctx.beginPath();
      ctx.moveTo(-24, headY + 34);
      ctx.quadraticCurveTo(-34, headY + 54, -30, headY + 84);
      ctx.stroke();
      ctx.beginPath();
      ctx.ellipse(-32, headY + 86, 8, 10, -0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(24, headY + 34);
      ctx.quadraticCurveTo(34, headY + 54, 30, headY + 84);
      ctx.stroke();
      ctx.beginPath();
      ctx.ellipse(32, headY + 86, 8, 10, 0.3, 0, Math.PI * 2);
      ctx.fill();
      
      // Πόδια
      ctx.lineWidth = 3.8;
      ctx.strokeStyle = `rgba(28, 34, 38, ${op * 0.96})`;
      ctx.beginPath();
      ctx.moveTo(-11, headY + 90);
      ctx.lineTo(-15, headY + 146);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(11, headY + 90);
      ctx.lineTo(15, headY + 146);
      ctx.stroke();
      ctx.fillStyle = `rgba(18, 22, 24, ${op * 0.95})`;
      ctx.beginPath();
      ctx.ellipse(-19, headY + 149, 13, 6, 0.1, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(19, headY + 149, 13, 6, -0.1, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.restore();
      return { hx: x, hy: y + headY };
  }

  // ========== ΚΥΡΙΟ ΠΡΟΓΡΑΜΜΑ ==========
  const cv = document.getElementById('c'), ctx = cv.getContext('2d');
  let W, H, cx, cy;
  function resize(){
    const d = Math.min(devicePixelRatio||1, 2);
    W = innerWidth; H = innerHeight;
    cv.width = W * d; cv.height = H * d;
    cv.style.width = W + 'px'; cv.style.height = H + 'px';
    ctx.setTransform(d,0,0,d,0,0);
    cx = W/2; cy = H/2 + 20;
  }
  resize(); addEventListener('resize', resize);

  // Σκηνές με ρύθμιση glowRegion: 0=καμία, 1=μύτη, 2=λαιμός, 3=στήθος/κοιλιά, 4=ολόσωμη αύρα
  const scenes = [
    { label: { el: 'Βαρύτητα', en: 'Gravity' }, sub: { el: 'Νιώσε το βάρος σου να κατεβαίνει προς τη γη<br>Η σπονδυλική στήλη ευθυγραμμίζεται', en: 'Feel your weight sinking into the earth<br>The spine aligns naturally' }, bg: [18,22,20], tilt: 0.0, headInflate: 1.0, breathAmp: 0.4, glowRegion: 0, glowIntensity: 0.0 },
    { label: { el: 'Ρουθούνια', en: 'Nostrils' }, sub: { el: 'Ο αέρας αγγίζει τα ρουθούνια<br>Η πρώτη αίσθηση της αναπνοής', en: 'Air touches the nostrils<br>The first sensation of breath' }, bg: [22,25,28], tilt: 0.02, headInflate: 1.05, breathAmp: 0.7, glowRegion: 1, glowIntensity: 0.9 },
    { label: { el: 'Λαιμός', en: 'Throat' }, sub: { el: 'Ο αέρας περνά από το λαιμό<br>Παρατήρησε την κίνηση', en: 'Air passes through the throat<br>Notice the movement' }, bg: [20,30,32], tilt: 0.01, headInflate: 1.0, breathAmp: 0.8, glowRegion: 2, glowIntensity: 1.0 },
    { label: { el: 'Στήθος & Κοιλιά', en: 'Chest & Belly' }, sub: { el: 'Διαστολή και συστολή<br>Η κίνηση μέσα στο σώμα', en: 'Expansion and contraction<br>The movement inside the body' }, bg: [22,28,28], tilt: 0.0, headInflate: 1.0, breathAmp: 1.0, glowRegion: 3, glowIntensity: 1.2 },
    { label: { el: 'Ολόκληρο το Σώμα', en: 'Whole Body' }, sub: { el: 'Κάθε εισπνοή αλλάζει τη στάση<br>Εσωτερική αφή παντού', en: 'Every breath changes posture<br>Inner touch everywhere' }, bg: [20,32,25], tilt: 0.0, headInflate: 1.0, breathAmp: 1.2, glowRegion: 4, glowIntensity: 1.0 }
  ];

  let lang = 'el';
  let cur = 0, tgt = 0, trans = false, tT = 0;
  let autoP = false, autoTm = null;
  let time = 0, gA = 0, breathTime = 0;

  // UI γλώσσα
  const langBtns = document.querySelectorAll('.lang-btn');
  langBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      langBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      lang = btn.dataset.lang;
      updateSceneLabels(cur);
      updateIntro();
    });
  });

  function updateIntro(){
    const t = lang==='el' ? 'Εσωτερική Αφή' : 'Inner Touch';
    const s = lang==='el' ? 'Η Πράξη της Παρατήρησης' : 'The Act of Observation';
    const q = lang==='el' ? '«Δεν χρειάζεται να ελέγξεις την αναπνοή σου.<br>Αρκεί να την παρατηρήσεις όπως είναι.»' : '"You do not need to control your breath.<br>Just observe it as it is."';
    const h = lang==='el' ? 'πάτησε για να ξεκινήσεις' : 'click to begin';
    document.getElementById('introTitle').textContent = t;
    document.getElementById('introSub').textContent = s;
    document.getElementById('introQuote').innerHTML = q;
    document.getElementById('introHint').textContent = h;
  }

  function updateSceneLabels(idx){
    const s = scenes[idx];
    document.getElementById('labelMain').textContent = s.label[lang];
    document.getElementById('labelSub').innerHTML = s.sub[lang].replace(/\n/g,'<br>');
    document.getElementById('label').classList.add('vis');
    document.getElementById('sn').textContent = `${idx+1} / ${scenes.length}`;
    document.getElementById('pb').style.width = `${(idx/(scenes.length-1))*100}%`;
    const dotsDiv = document.getElementById('dotsContainer');
    dotsDiv.innerHTML = '';
    for(let i=0; i<scenes.length; i++){
      const d = document.createElement('button');
      d.className = 'dot' + (i===idx ? ' active' : '');
      d.setAttribute('onclick', `goTo(${i})`);
      dotsDiv.appendChild(d);
    }
  }

  window.goTo = function(i){
    if(i<0 || i>=scenes.length || i===cur || trans) return;
    tgt = i; trans = true; tT = 0;
    document.getElementById('label').classList.remove('vis');
    setTimeout(() => { cur = tgt; trans = false; updateSceneLabels(cur); }, 1200);
  };

  function ease(t){ return t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }

  window.togAuto = function(){
    autoP = !autoP;
    document.getElementById('ab').innerHTML = autoP ? '⏸ pause' : '▶ auto';
    if(autoP) runAuto(); else clearTimeout(autoTm);
  };
  function runAuto(){
    if(!autoP) return;
    autoTm = setTimeout(() => {
      if(cur < scenes.length-1) { goTo(cur+1); setTimeout(runAuto, 7000); }
      else { autoP = false; document.getElementById('ab').innerHTML = '▶ auto'; }
    }, 7000);
  }

  // Σωματίδια φόντου
  const particles = [];
  for(let i=0; i<60; i++){
    particles.push({
      x: Math.random()*2000, y: Math.random()*2000,
      vx: (Math.random()-0.5)*0.05, vy: (Math.random()-0.5)*0.03,
      size: 0.3+Math.random()*1.0, alpha: 0.02+Math.random()*0.06,
      phase: Math.random()*Math.PI*2
    });
  }

  function drawBackground(sceneFactor){
    const idx = Math.floor(sceneFactor);
    const frac = sceneFactor - idx;
    const next = Math.min(idx+1, scenes.length-1);
    const bg0 = scenes[idx].bg, bg1 = scenes[next].bg;
    const r = bg0[0]*(1-frac) + bg1[0]*frac;
    const g = bg0[1]*(1-frac) + bg1[1]*frac;
    const b = bg0[2]*(1-frac) + bg1[2]*frac;
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W,H)*0.75);
    grad.addColorStop(0, `rgb(${r|0}, ${g|0}, ${b|0})`);
    grad.addColorStop(1, '#050510');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    
    ctx.globalAlpha = gA * 0.7;
    particles.forEach(p => {
      p.x += p.vx + Math.sin(time*0.2 + p.phase)*0.01;
      p.y += p.vy + Math.cos(time*0.15 + p.phase)*0.01;
      if(p.x<0) p.x=W; if(p.x>W) p.x=0;
      if(p.y<0) p.y=H; if(p.y>H) p.y=0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fillStyle = `rgba(200, 220, 190, ${p.alpha * (0.6+Math.sin(time*0.5+p.phase)*0.3)})`;
      ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  function drawSceneAt(factor){
    const idx = Math.floor(factor);
    const frac = factor - idx;
    const s0 = scenes[idx];
    const s1 = scenes[Math.min(idx+1, scenes.length-1)];
    
    const tilt = s0.tilt*(1-frac) + s1.tilt*frac;
    const headInflate = s0.headInflate*(1-frac) + s1.headInflate*frac;
    const breathAmp = s0.breathAmp*(1-frac) + s1.breathAmp*frac;
    // glowRegion: παρεμβολή μόνο αν είναι διαφορετικά, αλλά συνήθως ακέραιο
    let glowRegion = s0.glowRegion;
    let glowIntensity = s0.glowIntensity*(1-frac) + s1.glowIntensity*frac;
    if (frac > 0.01 && s0.glowRegion !== s1.glowRegion) {
        // ομαλή μετάβαση: κρατάμε το region του προηγούμενου με μειούμενη ένταση + επόμενο με αυξανόμενη
        // αλλά για απλότητα εδώ χρησιμοποιούμε το κυρίαρχο (το s0 αν frac<0.5)
        glowRegion = frac < 0.5 ? s0.glowRegion : s1.glowRegion;
    }
    
    const breathPhase = breathTime * 0.9;
    const breathTilt = Math.sin(breathPhase * Math.PI * 2) * 0.006 * breathAmp;
    
    // Σχεδίαση ήρωα με εσωτερική λάμψη
    drawHero(ctx, cx, cy, gA, tilt + breathTilt, headInflate, breathPhase, glowRegion, glowIntensity);
    
    // Προσθήκη μικρής εξωτερικής αύρας όταν glowRegion=4 (ήδη μέσα στην drawHero)
  }

  let lastTimestamp = 0;
  function loop(ts){
    const dt = Math.min((ts - lastTimestamp)/1000, 0.05);
    lastTimestamp = ts;
    time += dt;
    breathTime += dt * 0.85;
    
    if(gA < 1) gA = Math.min(1, gA + dt*0.6);
    if(trans) tT = Math.min(tT + dt*0.7, 1);
    
    ctx.clearRect(0, 0, W, H);
    
    const sceneFactor = trans ? cur + (tgt - cur) * ease(tT) : cur;
    drawBackground(sceneFactor);
    
    ctx.save();
    ctx.shadowColor = '#305030';
    ctx.shadowBlur = 12;
    drawSceneAt(sceneFactor);
    ctx.restore();
    
    requestAnimationFrame(loop);
  }

  document.getElementById('intro').addEventListener('click', () => {
    document.getElementById('intro').classList.add('hidden');
    updateIntro();
    updateSceneLabels(cur);
    requestAnimationFrame(loop);
  });

  document.addEventListener('keydown', e => {
    if(e.key === 'ArrowRight' || e.key === ' ') goTo(cur+1);
    if(e.key === 'ArrowLeft') goTo(cur-1);
  });

  updateIntro();
</script>
</body>
</html>
