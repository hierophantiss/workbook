<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Εσωτερική Αφή — Η Πράξη της Παρατήρησης</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,700;1,300&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#050510;overflow:hidden;height:100vh;width:100vw;font-family:'Fraunces',serif;color:#e8e4df;user-select:none}
  canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:1}
  .label{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);z-index:10;text-align:center;width:85%;opacity:0;transition:opacity 1.8s ease}
  .label.vis{opacity:1}
  .label .main{font-size:clamp(1.1rem,3vw,1.8rem);font-weight:300;letter-spacing:0.3em;text-transform:uppercase}
  .label .sub{font-size:clamp(0.6rem,1.2vw,0.8rem);letter-spacing:0.18em;color:rgba(232,228,223,0.3);margin-top:6px;font-style:italic;line-height:1.6}
  .snum{position:fixed;top:24px;right:28px;z-index:10;font-size:0.7rem;letter-spacing:0.3em;color:rgba(232,228,223,0.15)}
  .ptrack{position:fixed;bottom:0;left:0;width:100%;height:2px;background:rgba(255,255,255,0.03);z-index:10}
  .pbar{height:100%;background:linear-gradient(90deg,rgba(160,130,90,0.4),rgba(200,180,100,0.5),rgba(120,190,170,0.4));transition:width 1.5s ease}
  .dots{position:fixed;right:22px;top:50%;transform:translateY(-50%);z-index:10;display:flex;flex-direction:column;gap:14px}
  .dot{width:6px;height:6px;border-radius:50%;background:rgba(232,228,223,0.1);transition:all .6s ease;cursor:pointer;border:none;padding:0}
  .dot.active{background:rgba(232,228,223,0.5);transform:scale(1.5);box-shadow:0 0 10px rgba(232,228,223,0.12)}
  .ctrls{position:fixed;bottom:clamp(12px,3vh,24px);left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:10px;align-items:center}
  .ctrls button{background:rgba(232,228,223,0.06);border:1.5px solid rgba(232,228,223,0.15);color:rgba(232,228,223,0.5);padding:10px 22px;font-family:'Fraunces',serif;font-size:clamp(0.75rem,1.5vw,0.9rem);letter-spacing:0.12em;cursor:pointer;border-radius:24px;transition:all .3s;min-width:48px;min-height:44px}
  .ctrls button:active{background:rgba(232,228,223,0.18);color:rgba(232,228,223,0.8);transform:scale(0.95)}
  
  .intro{position:fixed;inset:0;z-index:100;background:#050510;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:opacity 2s ease}
  .intro.hidden{opacity:0;pointer-events:none}
  .intro-t{font-size:clamp(1.6rem,4.5vw,2.8rem);font-weight:300;letter-spacing:0.2em;background:linear-gradient(135deg,#e8e4df,#c8a860);-webkit-background-clip:text;-webkit-text-fill-color:transparent;opacity:0;animation:fi 2s ease 0.5s forwards}
  .intro-s{font-size:clamp(0.7rem,1.4vw,0.95rem);letter-spacing:0.3em;color:rgba(232,228,223,0.25);margin-top:8px;font-style:italic;opacity:0;animation:fi 2s ease 1.2s forwards}
  .intro-q{font-size:clamp(0.55rem,1vw,0.7rem);letter-spacing:0.12em;color:rgba(232,228,223,0.13);margin-top:30px;max-width:360px;text-align:center;line-height:1.8;font-style:italic;opacity:0;animation:fi 2s ease 1.8s forwards}
  .intro-h{
    position:absolute;bottom:clamp(40px,8vh,80px);left:50%;transform:translateX(-50%);
    font-size:clamp(0.85rem,2vw,1.1rem);letter-spacing:0.3em;color:rgba(232,228,223,0.55);
    text-transform:uppercase;cursor:pointer;
    padding:14px 36px;border:1.5px solid rgba(232,228,223,0.2);border-radius:30px;
    background:rgba(232,228,223,0.04);backdrop-filter:blur(4px);
    transition:all 0.3s;animation:pu 3s ease-in-out infinite;white-space:nowrap}
  .intro-h:active{background:rgba(232,228,223,0.12);color:rgba(232,228,223,0.8);transform:translateX(-50%) scale(0.96)}
  @keyframes fi{to{opacity:1}}
  @keyframes pu{0%,100%{opacity:0.1}50%{opacity:0.35}}
</style>
</head>
<body>
<div class="intro" id="intro">
  <div class="intro-t">Εσωτερική Αφή</div>
  <div class="intro-s">Η Πράξη της Παρατήρησης</div>
  <div class="intro-q">«Δεν χρειάζεται να ελέγξεις την αναπνοή σου. Αρκεί να την παρατηρήσεις όπως είναι.»</div>
  <div class="intro-h">πάτησε για να ξεκινήσεις</div>
</div>
<canvas id="c"></canvas>
<div class="label" id="label"><div class="main" id="lm"></div><div class="sub" id="ls"></div></div>
<div class="snum" id="sn"></div>
<div class="ptrack"><div class="pbar" id="pb"></div></div>
<div class="dots">
  <button class="dot active" onclick="goTo(0)"></button>
  <button class="dot" onclick="goTo(1)"></button>
  <button class="dot" onclick="goTo(2)"></button>
  <button class="dot" onclick="goTo(3)"></button>
</div>
<div class="ctrls"><button onclick="goTo(cur-1)" aria-label="Previous">◀ </button><button id="ab" onclick="togAuto()">▶ auto</button><button onclick="goTo(cur+1)" aria-label="Next"> ▶</button></div>

const scenes=[
  {label:'Αποσύνδεση',sub:'Το σώμα αόρατο — ο νους αλλού',sub_en:'The body invisible — the mind elsewhere',bg:[30,18,20]},

];

let cur=0,tgt=0,tT=0,trans=false,time=0,gA=0,autoP=false,autoTm=null;

// ── Image positioning ──
function getImgRect(){
  if(!imgReady)return{x:0,y:0,w:W,h:H,s:1};
  const iAR=img.width/img.height;
  const sAR=W/H;
  let dw,dh;
  if(iAR<sAR){dh=H*0.92;dw=dh*iAR}
  else{dw=W*0.85;dh=dw/iAR}
  return{x:cx-dw/2,y:cy-dh/2,w:dw,h:dh,s:dh/img.height};
}

// Key zones relative to image (percentage of image height/width from top-left)
// Adjusted for the illustration:
// Nose: ~42% from top, centered
// Forehead/crown: ~35% from top
// Chest (lungs): ~52% from top
// Belly: ~62% from top
// Full body center: ~50% from top
const zones={
  nose:    {yPct:0.50, r:0.04},
  forehead:{yPct:0.46, r:0.05},
  chest:   {yPct:0.60, r:0.08},
  belly:   {yPct:0.70, r:0.06},
  fullBody:{yPct:0.58, r:0.22}
};

function zonePos(zone,rect){
  return{x:rect.x+rect.w*0.5, y:rect.y+rect.h*zone.yPct, r:rect.h*zone.r};
}

// ══════════════════════════
// DRAW IMAGE WITH DARKNESS OVERLAY + ILLUMINATION
// ══════════════════════════
function drawIlluminated(alpha,litZones){
  if(!imgReady)return;
  const r=getImgRect();

  // Draw image
  ctx.globalAlpha=alpha;
  ctx.drawImage(img,r.x,r.y,r.w,r.h);
  ctx.globalAlpha=1;

  // Dark overlay (dims everything)
  const darkness=0.7;
  ctx.fillStyle=`rgba(5,5,16,${alpha*darkness})`;
  ctx.fillRect(r.x,r.y,r.w,r.h);

  // ── Reveal lit zones by drawing image again through circular masks ──
  litZones.forEach(z=>{
    if(z.intensity<=0)return;
    const pos=zonePos(z.zone,r);
    const radius=pos.r*(1+z.intensity*0.5);
    const pulse=Math.sin(time*1.2+z.phase)*0.5+0.5;

    ctx.save();
    // Clip to circle
    ctx.beginPath();
    // Soft edge via multiple concentric circles
    for(let layer=4;layer>=0;layer--){
      const lr=radius*(1+layer*0.3);
      const la=alpha*z.intensity*(0.15+layer*0.04);

      // Glow
      const glow=ctx.createRadialGradient(pos.x,pos.y,0,pos.x,pos.y,lr);
      glow.addColorStop(0,`rgba(220,200,120,${la})`);
      glow.addColorStop(0.6,`rgba(200,180,100,${la*0.4})`);
      glow.addColorStop(1,'rgba(200,180,100,0)');
      ctx.fillStyle=glow;
      ctx.beginPath();ctx.arc(pos.x,pos.y,lr,0,Math.PI*2);ctx.fill();
    }

    // Re-draw image portion inside the lit zone (reveal)
    ctx.save();
    ctx.beginPath();ctx.arc(pos.x,pos.y,radius*1.3,0,Math.PI*2);ctx.clip();
    ctx.globalAlpha=alpha*z.intensity*0.85;
    ctx.drawImage(img,r.x,r.y,r.w,r.h);
    ctx.restore();

    // Pulsing core
    ctx.fillStyle=`rgba(240,225,150,${alpha*z.intensity*(0.06+pulse*0.03)})`;
    ctx.beginPath();ctx.arc(pos.x,pos.y,radius*0.3,0,Math.PI*2);ctx.fill();

    ctx.restore();
  });

  // ── ΠΡΟΣΟΧΗ label at forehead if any zone is lit ──
  const maxIntensity=Math.max(...litZones.map(z=>z.intensity));
  if(maxIntensity>0.1){
    const fp=zonePos(zones.forehead,r);
    // Forehead point light
    const fpGlow=ctx.createRadialGradient(fp.x,fp.y,0,fp.x,fp.y,fp.r*2);
    fpGlow.addColorStop(0,`rgba(240,225,150,${alpha*maxIntensity*0.25})`);
    fpGlow.addColorStop(1,'rgba(240,225,150,0)');
    ctx.fillStyle=fpGlow;ctx.beginPath();ctx.arc(fp.x,fp.y,fp.r*2,0,Math.PI*2);ctx.fill();
    // Core dot
    ctx.fillStyle=`rgba(255,245,180,${alpha*maxIntensity*0.5})`;
    ctx.beginPath();ctx.arc(fp.x,fp.y,3,0,Math.PI*2);ctx.fill();

    // Label
    const lx=fp.x+50,ly=fp.y-5;
    ctx.strokeStyle=`rgba(200,195,160,${alpha*maxIntensity*0.12})`;ctx.lineWidth=0.7;
    ctx.beginPath();ctx.moveTo(fp.x+8,fp.y);ctx.lineTo(lx-2,ly+4);ctx.stroke();
    ctx.font='10px Fraunces';ctx.fillStyle=`rgba(220,210,170,${alpha*maxIntensity*0.25})`;
    ctx.textAlign='left';ctx.fillText('ΠΡΟΣΟΧΗ',lx,ly);

    // ── Light stream particles flowing down from forehead ──
    const streamZones=litZones.filter(z=>z.intensity>0);
    if(streamZones.length>0){
      const deepest=streamZones.reduce((a,b)=>zones[a.zone.yPct]>zones[b.zone.yPct]?a:b);
      const deepPos=zonePos(deepest.zone,r);
      const startY=fp.y;
      const endY=deepPos.y;
      for(let i=0;i<Math.floor(10*maxIntensity);i++){
        const t2=((time*(0.5)+i*0.08)%1);
        const py=startY+t2*(endY-startY);
        const px=fp.x+Math.sin(t2*5+time+i)*3;
        const pa=(1-t2*0.5)*0.12*maxIntensity;
        ctx.beginPath();ctx.arc(px,py,0.8+t2*1.2,0,Math.PI*2);
        ctx.fillStyle=`rgba(230,215,140,${alpha*pa})`;ctx.fill();
      }
    }
  }
}

// ══════════════════════════
// SCENES
// ══════════════════════════
function s0(alpha){
  if(alpha<=0)return;
  // Image fully dark — disconnected
  drawIlluminated(alpha,[
    {zone:zones.nose,intensity:0,phase:0},
  ]);
  // Thought clouds
  for(let i=0;i<6;i++){
    const r2=getImgRect();
    const hx=r2.x+r2.w*0.5+Math.cos(time*0.5+i)*25;
    const hy=r2.y+r2.h*0.35+Math.sin(time*0.4+i*1.1)*12;
    const cg=ctx.createRadialGradient(hx,hy,0,hx,hy,12);
    cg.addColorStop(0,`rgba(180,120,100,${alpha*0.07})`);
    cg.addColorStop(1,'rgba(180,120,100,0)');
    ctx.fillStyle=cg;ctx.beginPath();ctx.arc(hx,hy,12,0,Math.PI*2);ctx.fill();
  }
}

function s1(alpha){
  if(alpha<=0)return;
  const p=Math.sin(time*0.6)*0.5+0.5;
  drawIlluminated(alpha,[
    {zone:zones.nose,intensity:0.5+p*0.5,phase:0},
    {zone:zones.forehead,intensity:0.3+p*0.2,phase:1},
  ]);
}

function s2(alpha){
  if(alpha<=0)return;
  const p=Math.sin(time*0.45)*0.5+0.5;
  drawIlluminated(alpha,[
    {zone:zones.nose,intensity:0.6,phase:0},
    {zone:zones.forehead,intensity:0.5,phase:1},
    {zone:zones.chest,intensity:0.4+p*0.5,phase:2},
    {zone:zones.belly,intensity:0.3+p*0.4,phase:3},
  ]);
}

function s3(alpha){
  if(alpha<=0)return;
  const p=Math.sin(time*0.4)*0.5+0.5;
  drawIlluminated(alpha,[
    {zone:zones.nose,intensity:0.7,phase:0},
    {zone:zones.forehead,intensity:0.7,phase:1},
    {zone:zones.chest,intensity:0.8,phase:2},
    {zone:zones.belly,intensity:0.7,phase:3},
    {zone:zones.fullBody,intensity:0.4+p*0.3,phase:4},
  ]);

  // Expanding awareness rings
  const r2=getImgRect();
  const bx=r2.x+r2.w*0.5,by=r2.y+r2.h*0.52;
  for(let i=0;i<2;i++){
    const rr=((time*8+i*80)%160);
    const ra=Math.max(0,1-rr/160);
    ctx.globalAlpha=alpha*ra*0.05;
    ctx.strokeStyle='rgba(200,190,140,1)';ctx.lineWidth=0.6;
    ctx.beginPath();ctx.arc(bx,by,rr,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;
  }
}

const draws=[s0,s1,s2,s3];

function drawBg(sf){
  const idx=Math.floor(sf),fr=sf-idx,nx=Math.min(idx+1,3);
  const r=scenes[idx].bg[0]*(1-fr)+scenes[nx].bg[0]*fr;
  const g=scenes[idx].bg[1]*(1-fr)+scenes[nx].bg[1]*fr;
  const b=scenes[idx].bg[2]*(1-fr)+scenes[nx].bg[2]*fr;
  ctx.fillStyle=`rgb(${r|0},${g|0},${b|0})`;ctx.fillRect(0,0,W,H);
}

// ── UI ──
function updUI(){const s=scenes[cur];document.getElementById('lm').textContent=s.label;
  document.getElementById('ls').innerHTML=s.sub.replace(/\n/g,'<br>')+(s.sub_en?'<div style="margin-top:6px;font-size:0.8em;color:rgba(180,200,190,0.35);font-style:italic">'+s.sub_en.replace(/\n/g,'<br>')+'</div>':'');
  document.getElementById('label').classList.add('vis');document.getElementById('sn').textContent=`${cur+1} / 4`;
  document.getElementById('pb').style.width=`${(cur/3)*100}%`;
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===cur))}

function goTo(i){if(i<0||i>3||i===cur||trans)return;tgt=i;trans=true;tT=0;
  document.getElementById('label').classList.remove('vis');
  setTimeout(()=>{cur=tgt;trans=false;updUI()},2000)}
function ease(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2}
function togAuto(){autoP=!autoP;document.getElementById('ab').innerHTML=autoP?'\u23F8 pause':'\u25B6 auto';if(autoP)runA();else clearTimeout(autoTm)}
function runA(){if(!autoP)return;autoTm=setTimeout(()=>{if(cur<3){goTo(cur+1);setTimeout(runA,2200)}else{autoP=false;document.getElementById('ab').innerHTML='\u25B6 auto'}},8000)}

document.getElementById('intro').addEventListener('click',()=>{document.getElementById('intro').classList.add('hidden');updUI()});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' ')goTo(cur+1);if(e.key==='ArrowLeft')goTo(cur-1)});

let lt=0;
function loop(ts){
  const dt=Math.min((ts-lt)/1000,0.05);lt=ts;time+=dt;
  if(gA<1)gA=Math.min(1,gA+dt*0.5);
  if(trans)tT=Math.min(tT+dt*0.6,1);
  ctx.clearRect(0,0,W,H);
  const sf=trans?cur+(tgt-cur)*ease(tT):cur;
  drawBg(sf);ctx.globalAlpha=gA;
  if(trans){const e2=ease(tT);draws[cur](1-e2);draws[tgt](e2)}
  else draws[cur](1);
  ctx.globalAlpha=1;
  requestAnimationFrame(loop)}
requestAnimationFrame(loop);
</script>
