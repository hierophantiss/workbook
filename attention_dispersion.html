<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap');
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  body{background:#080a0f;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Cormorant Garamond',serif;overflow:hidden;user-select:none}
  #title{color:#c85050;font-size:clamp(16px,2.8vw,22px);font-weight:300;letter-spacing:0.3em;text-transform:uppercase;margin-bottom:16px;opacity:0.9;text-align:center}
  #title-en{color:rgba(200,80,80,0.4);font-size:clamp(10px,1.6vw,13px);letter-spacing:0.2em;margin-top:4px}
  #canvas-wrap{position:relative;width:min(560px,95vw);height:min(560px,95vw)}
  canvas{width:100%;height:100%;border-radius:50%;box-shadow:0 0 80px rgba(200,60,60,0.06),inset 0 0 50px rgba(0,0,0,0.8);background:radial-gradient(circle at center,#101520 0%,#05070a 100%)}
  #phase-label{margin-top:20px;color:#cc7070;font-size:clamp(13px,2vw,16px);letter-spacing:0.12em;font-weight:400;text-align:center;min-height:22px;transition:opacity 0.5s}
  #phase-en{color:rgba(200,100,100,0.35);font-size:clamp(10px,1.5vw,12px);letter-spacing:0.12em;text-align:center;margin-top:4px;font-style:italic;min-height:18px}
  #stress-bar{width:min(300px,70vw);height:6px;background:rgba(255,255,255,0.05);border-radius:3px;margin-top:14px;overflow:hidden}
  #stress-fill{height:100%;width:0%;border-radius:3px;transition:width 0.5s,background 0.3s}
  #stress-label{font-size:11px;color:rgba(200,100,100,0.4);letter-spacing:0.2em;margin-top:4px;text-align:center}
  .back-btn{position:fixed;top:10px;left:12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.5);padding:5px 12px;border-radius:14px;font-size:13px;text-decoration:none;font-family:inherit;z-index:10}
  .lang-btn{position:fixed;top:10px;right:12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.5);padding:4px 10px;border-radius:12px;font-size:11px;cursor:pointer;font-family:inherit;z-index:10;border:1px solid rgba(255,255,255,0.12)}

  .ex-intro{position:fixed;inset:0;z-index:100;background:#080a0f;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:opacity 2s ease}
  .ex-intro.hidden{opacity:0;pointer-events:none}
  .ex-intro-t{font-family:'Cormorant Garamond',serif;font-size:clamp(1.6rem,4.5vw,2.8rem);font-weight:300;letter-spacing:0.2em;color:#c85050;opacity:0;animation:xfi 2s ease 0.5s forwards}
  .ex-intro-s{font-family:'Cormorant Garamond',serif;font-size:clamp(0.7rem,1.4vw,0.95rem);letter-spacing:0.3em;color:rgba(200,80,80,0.3);margin-top:8px;font-style:italic;opacity:0;animation:xfi 2s ease 1.2s forwards}
  .ex-intro-h{position:absolute;bottom:clamp(40px,8vh,80px);left:50%;transform:translateX(-50%);font-family:'Cormorant Garamond',serif;font-size:clamp(0.85rem,2vw,1.1rem);letter-spacing:0.3em;color:rgba(200,100,100,0.55);text-transform:uppercase;cursor:pointer;padding:14px 36px;border:1.5px solid rgba(200,80,80,0.2);border-radius:30px;background:rgba(200,80,80,0.04);transition:all 0.3s;animation:xpu 3s ease-in-out infinite;white-space:nowrap}
  .ex-intro-h:active{background:rgba(200,80,80,0.12);color:rgba(200,100,100,0.8);transform:translateX(-50%) scale(0.96)}
  @keyframes xfi{to{opacity:1}}
  @keyframes xpu{0%,100%{opacity:0.55}50%{opacity:0.9}}

<body>

<div class="ex-intro" id="exIntro" onclick="this.classList.add('hidden')">
  <div class="ex-intro-t">Διάσπαση Προσοχής</div>
  <div class="ex-intro-s">Attention Dispersion</div>
  <div class="ex-intro-h">πάτησε για να ξεκινήσεις</div>
</div>
<a class="back-btn" href="index.html">←</a>
<button class="lang-btn" id="langBtn" onclick="toggleLang()">EN</button>

<div id="title">Διάσπαση Προσοχής<div id="title-en">Attention Dispersion</div></div>
<div id="canvas-wrap"><canvas id="c" width="600" height="600"></canvas></div>
<div id="phase-label"></div>
<div id="phase-en"></div>
<div id="stress-bar"><div id="stress-fill"></div></div>
<div id="stress-label"></div>

<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const W=600,H=600,CX=300,CY=300;
const MED={x:CX,y:440};
const FOCUS={x:CX,y:150};
const EYE_L={x:-30,y:-30},EYE_R={x:30,y:-30};

let t=0,lang='el';
const urlLang=new URLSearchParams(location.search).get('lang');
if(urlLang==='en'||urlLang==='el')lang=urlLang;

function toggleLang(){lang=lang==='el'?'en':'el';document.getElementById('langBtn').textContent=lang==='el'?'EN':'ΕΛ'}

// ═══ THOUGHTS — they appear and STAY, accumulating ═══
const THOUGHT_POSITIONS=[
  {x:CX-120,y:250,label_el:'παρελθόν',label_en:'past'},
  {x:CX+100,y:280,label_el:'ανησυχία',label_en:'worry'},
  {x:CX-80,y:180,label_el:'σχέδια',label_en:'plans'},
  {x:CX+120,y:200,label_el:'σώμα / πόνος',label_en:'body / pain'},
  {x:CX-30,y:310,label_el:'θυμός',label_en:'anger'},
  {x:CX+60,y:150,label_el:'αν...',label_en:'what if...'},
  {x:CX-130,y:340,label_el:'κρίση',label_en:'judgment'},
  {x:CX+140,y:340,label_el:'φόβος',label_en:'fear'},
];

class Thought{
  constructor(pos,delay){
    this.x=pos.x;this.y=pos.y;
    this.label_el=pos.label_el;this.label_en=pos.label_en;
    this.delay=delay;this.opacity=0;this.scale=0;
    this.active=false;this.hasTriangle=false;
    this.pulsePhase=Math.random()*Math.PI*2;
    this.pulseSpeed=0.8+Math.random()*1.2;
    this.particles=[];
    for(let i=0;i<6;i++){this.particles.push({angle:Math.random()*Math.PI*2,r:10+Math.random()*15,speed:0.3+Math.random()*0.6})}
  }
  update(dt,globalT){
    if(globalT>this.delay&&!this.active)this.active=true;
    if(this.active){
      this.opacity=Math.min(1,this.opacity+dt*0.8);
      this.scale=Math.min(1,this.scale+dt*0.8);
      if(this.opacity>0.6)this.hasTriangle=true;
    }
    this.particles.forEach(p=>{p.angle+=p.speed*dt});
  }
  draw(){
    if(this.opacity<0.01)return;
    const pulse=0.5+0.5*Math.sin(t*this.pulseSpeed+this.pulsePhase);
    ctx.save();ctx.globalAlpha=this.opacity;
    ctx.translate(this.x,this.y);ctx.scale(this.scale,this.scale);
    
    // Glow — gets REDDER as more thoughts accumulate
    const stress=getStress();
    const r=Math.min(200,120+stress*80);
    const g=Math.max(80,160-stress*80);
    const b=Math.max(80,180-stress*100);
    
    const grd=ctx.createRadialGradient(0,0,0,0,0,35);
    grd.addColorStop(0,`rgba(${r},${g},${b},${0.3+pulse*0.15})`);
    grd.addColorStop(1,`rgba(${r},${g},${b},0)`);
    ctx.beginPath();ctx.arc(0,0,35,0,Math.PI*2);ctx.fillStyle=grd;ctx.fill();
    
    // Swirling particles
    this.particles.forEach(p=>{
      const px=Math.cos(p.angle)*p.r,py=Math.sin(p.angle)*p.r;
      ctx.beginPath();ctx.arc(px,py,2,0,Math.PI*2);
      ctx.fillStyle=`rgba(${r},${g+40},${b+40},${0.5+pulse*0.3})`;ctx.fill();
    });
    
    // Label
    ctx.fillStyle=`rgba(${r},${g+30},${b+30},0.85)`;
    ctx.font='12px Cormorant Garamond,serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(lang==='el'?this.label_el:this.label_en,0,0);
    
    ctx.restore();
  }
}

const thoughts=THOUGHT_POSITIONS.map((pos,i)=>new Thought(pos,2+i*3));

function getStress(){
  const active=thoughts.filter(t=>t.hasTriangle).length;
  return Math.min(1,active/THOUGHT_POSITIONS.length);
}

// ═══ PHASES ═══
const PHASES=[
  {dur:2,el:'Σταθερός άξονας — εστίαση στο σημείο',en:'Stable axis — focus on the point'},
  {dur:3,el:'Μια σκέψη εμφανίζεται... η προσοχή τραβιέται',en:'A thought appears... attention is pulled'},
  {dur:3,el:'Η προσοχή ΔΕΝ επιστρέφει — μένει κολλημένη',en:'Attention does NOT return — it stays stuck'},
  {dur:3,el:'Δεύτερη σκέψη — νέο τρίγωνο αναμμένο',en:'Second thought — another triangle lit'},
  {dur:3,el:'Τρίτη, τέταρτη... κάθε μία κρατά ένα κομμάτι προσοχής',en:'Third, fourth... each one holds a piece of attention'},
  {dur:4,el:'Σκέψεις παντού — νοητική υπερφόρτωση',en:'Thoughts everywhere — cognitive overload'},
  {dur:4,el:'Αισθητηριακή υπερφόρτωση — το σύστημα δεν αντέχει',en:'Sensory overload — the system cannot cope'},
  {dur:4,el:'Χωρίς επιστροφή στον άξονα, ο νους χάνεται',en:'Without returning to the axis, the mind is lost'},
];

let phaseIdx=0,phaseT=0;
function updatePhase(dt){
  phaseT+=dt;
  if(phaseIdx<PHASES.length-1&&phaseT>=PHASES[phaseIdx].dur){
    phaseT=0;phaseIdx++;
  }
  const p=PHASES[phaseIdx];
  document.getElementById('phase-label').textContent=lang==='el'?p.el:p.el;
  document.getElementById('phase-en').textContent=lang==='el'?'':p.en;
  // If lang is en, show en as main
  if(lang==='en'){
    document.getElementById('phase-label').textContent=p.en;
    document.getElementById('phase-en').textContent='';
  } else {
    document.getElementById('phase-label').textContent=p.el;
    document.getElementById('phase-en').textContent=p.en;
  }
  
  // Stress bar
  const stress=getStress();
  const fill=document.getElementById('stress-fill');
  fill.style.width=(stress*100)+'%';
  fill.style.background=stress<0.3?'rgba(100,180,140,0.5)':stress<0.6?'rgba(200,180,80,0.6)':'rgba(200,70,70,0.7)';
  document.getElementById('stress-label').textContent=
    lang==='el'?'ΝΟΗΤΙΚΟ ΦΟΡΤΙΟ':'COGNITIVE LOAD';
}

// ═══ DRAWING ═══
function drawMeditator(){
  ctx.save();ctx.translate(MED.x,MED.y);
  
  // Breath circle — gets SHAKY with stress
  const stress=getStress();
  const shake=stress*4;
  const sx=Math.sin(t*8)*shake,sy=Math.cos(t*11)*shake;
  const breathR=90+Math.sin(t*1.5)*8;
  ctx.beginPath();ctx.arc(sx,sy,breathR,0,Math.PI*2);
  ctx.strokeStyle=`rgba(140,190,210,${0.15-stress*0.1})`;ctx.lineWidth=2;ctx.stroke();
  
  // Head — shakes with overload
  ctx.beginPath();ctx.ellipse(sx,sy,45,32,0,0,Math.PI*2);
  ctx.fillStyle='rgba(25,35,45,0.8)';
  ctx.strokeStyle=`rgba(${120+stress*80},${160-stress*60},${180-stress*80},0.6)`;
  ctx.lineWidth=1.5;ctx.fill();ctx.stroke();
  
  // Ears
  ctx.beginPath();ctx.ellipse(-48+sx,sy,12,28,-Math.PI/10,0,Math.PI*2);
  ctx.fillStyle='rgba(20,30,40,0.9)';ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.ellipse(48+sx,sy,12,28,Math.PI/10,0,Math.PI*2);
  ctx.fillStyle='rgba(20,30,40,0.9)';ctx.fill();ctx.stroke();
  
  // Center — dims with overload
  ctx.beginPath();ctx.arc(sx,sy,4,0,Math.PI*2);
  ctx.fillStyle=`rgba(255,255,255,${1-stress*0.7})`;
  ctx.shadowColor='#ffffff';ctx.shadowBlur=10*(1-stress);ctx.fill();ctx.shadowBlur=0;
  
  // Eyes — get strained
  const eyeGlow=stress>0.5?`rgba(200,80,80,${0.5+stress*0.5})`:'#c8a96e';
  ctx.beginPath();ctx.arc(EYE_L.x+sx,EYE_L.y+sy,5,0,Math.PI*2);
  ctx.fillStyle=eyeGlow;ctx.shadowColor=eyeGlow;ctx.shadowBlur=8+stress*12;ctx.fill();
  ctx.beginPath();ctx.arc(EYE_R.x+sx,EYE_R.y+sy,5,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  
  ctx.restore();
}

function drawFocusObject(){
  const stress=getStress();
  const p=0.5+0.5*Math.sin(t*2);
  ctx.save();ctx.translate(FOCUS.x,FOCUS.y);
  
  // Gets dimmer as attention disperses
  const alpha=Math.max(0.1,1-stress*0.8);
  for(let i=2;i>=1;i--){
    const r=10+i*6+p*3;
    ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);
    ctx.strokeStyle=`rgba(160,210,230,${(0.1-i*0.02)*alpha})`;ctx.lineWidth=1.5;ctx.stroke();
  }
  ctx.beginPath();
  for(let i=0;i<6;i++){const a=(i*Math.PI)/3-Math.PI/2;i===0?ctx.moveTo(Math.cos(a)*8,Math.sin(a)*8):ctx.lineTo(Math.cos(a)*8,Math.sin(a)*8)}
  ctx.closePath();
  ctx.fillStyle=`rgba(180,230,255,${(0.8+0.2*p)*alpha})`;
  ctx.shadowColor=`rgba(140,200,230,${0.8*alpha})`;ctx.shadowBlur=15*alpha;ctx.fill();
  
  // "Lost" label when very dispersed
  if(stress>0.6){
    ctx.shadowBlur=0;
    ctx.globalAlpha=stress-0.6;
    ctx.fillStyle='rgba(200,100,100,0.6)';ctx.font='italic 11px Cormorant Garamond,serif';
    ctx.textAlign='center';ctx.fillText(lang==='el'?'χαμένο σημείο':'lost point',0,25);
  }
  ctx.restore();
}

// Draw ALL accumulated triangles
function drawTriangles(){
  const stress=getStress();
  thoughts.forEach(th=>{
    if(!th.hasTriangle)return;
    const eL={x:MED.x+EYE_L.x,y:MED.y+EYE_L.y};
    const eR={x:MED.x+EYE_R.x,y:MED.y+EYE_R.y};
    
    const pulse=0.5+0.5*Math.sin(t*th.pulseSpeed+th.pulsePhase);
    const alpha=0.15+pulse*0.1;
    
    // Red-shifting gradient
    const r=Math.min(220,140+stress*80);
    const g=Math.max(80,170-stress*90);
    const b=Math.max(80,200-stress*120);
    
    const grd=ctx.createLinearGradient(MED.x,MED.y,th.x,th.y);
    grd.addColorStop(0,`rgba(${r},${g},${b},${alpha})`);
    grd.addColorStop(1,`rgba(${r},${g},${b},0)`);
    
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(eL.x,eL.y);ctx.lineTo(th.x,th.y);ctx.lineTo(eR.x,eR.y);
    ctx.closePath();ctx.fillStyle=grd;ctx.fill();
    
    // Lines — get more chaotic
    const lineGrd=ctx.createLinearGradient(MED.x,MED.y,th.x,th.y);
    lineGrd.addColorStop(0,`rgba(${r},${g-20},${b-20},${0.4+pulse*0.3})`);
    lineGrd.addColorStop(1,`rgba(${r},${g},${b},0.1)`);
    ctx.beginPath();
    ctx.moveTo(eL.x,eL.y);ctx.lineTo(th.x,th.y);
    ctx.moveTo(eR.x,eR.y);ctx.lineTo(th.x,th.y);
    ctx.strokeStyle=lineGrd;ctx.lineWidth=1+stress;
    ctx.stroke();
    ctx.restore();
  });
}

// Screen shake effect at high stress
function getShake(){
  const s=getStress();
  if(s<0.5)return{x:0,y:0};
  const intensity=(s-0.5)*6;
  return{x:Math.sin(t*13)*intensity,y:Math.cos(t*17)*intensity};
}

// ═══ MAIN LOOP ═══
let lastTime=null;
function loop(ts){
  requestAnimationFrame(loop);
  const dt0=lastTime===null?0:(ts-lastTime)/1000;
  lastTime=ts;
  const dt=Math.min(dt0,0.05);
  t+=dt;
  
  thoughts.forEach(th=>th.update(dt,t));
  updatePhase(dt);
  
  const shake=getShake();
  ctx.save();
  ctx.clearRect(0,0,W,H);
  ctx.translate(shake.x,shake.y);
  
  // Dim grid
  ctx.beginPath();ctx.moveTo(CX,0);ctx.lineTo(CX,H);
  ctx.moveTo(0,MED.y);ctx.lineTo(W,MED.y);
  ctx.strokeStyle='rgba(100,150,180,0.03)';ctx.stroke();
  
  drawFocusObject();
  thoughts.forEach(th=>th.draw());
  drawTriangles();
  drawMeditator();
  
  // Phase dots
  ctx.translate(-shake.x,-shake.y);
  const dotCount=PHASES.length;
  const dotSpacing=16;
  const totalDW=(dotCount-1)*dotSpacing;
  for(let i=0;i<dotCount;i++){
    const dx=CX-totalDW/2+i*dotSpacing;
    ctx.beginPath();ctx.arc(dx,H-20,i===phaseIdx?3.5:2,0,Math.PI*2);
    ctx.fillStyle=i===phaseIdx?'rgba(200,100,100,0.9)':'rgba(80,80,80,0.3)';ctx.fill();
  }
  
  ctx.restore();
}

requestAnimationFrame(loop);
</script>
</body>
