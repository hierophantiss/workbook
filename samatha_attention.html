<div id="title">Η Σκηνή του Νου</div>

<div id="canvas-wrap">
  <canvas id="c" width="600" height="600"></canvas>
</div>

<div id="phase-label">Σταθερός Άξονας & Κύκλος Αναπνοής (Σάμαθα)</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 600, H = 600, CX = 300, CY = 300;
const labelEl = document.getElementById('phase-label');
const labelEn = document.getElementById('phase-el');
const btnPause = document.getElementById('btn-pause');
const speedEl = document.getElementById('speed');

let paused = false;
let speedMult = 1;
let t = 0; // global time in seconds
let animId;

btnPause.onclick = () => {
  paused = !paused;
  btnPause.textContent = paused ? '▶ ΣΥΝΕΧΕΙΑ' : '⏸ ΠΑΥΣΗ';
  if (!paused) loop();
};
speedEl.oninput = () => { speedMult = parseFloat(speedEl.value); };

// ── Γεωμετρία (Ο Χάρτης) ──────────────────────────────────────────────────
const MED = { x: CX, y: 440 }; // Η θέση του Παρατηρητή (Κέντρο Βαρύτητας)
const OBJECT = { x: CX, y: 150 }; // Το σημείο Εστίασης / Στόχος

// Τα μάτια του αισθητήρα (από πού βγαίνει ο προβολέας)
const EYE_L = { x: -30, y: -30 };
const EYE_R = { x: 30, y: -30 };

// ── Νοητικά Γεγονότα (Σκέψεις) ─────────────────────────────────────────────
class Thought {
  constructor(side) {
    this.side = side;
    this.opacity = 0;
    this.scale = 0;
    this.recognized = false;
    this.recogOpacity = 0;
    this.particles = [];
    for (let i = 0; i < 5; i++) {
      this.particles.push({
        angle: Math.random() * Math.PI * 2,
        r: 12 + Math.random() * 12,
        speed: 0.3 + Math.random() * 0.5
      });
    }
    // Τοποθετούμε τις σκέψεις να μπαίνουν μέσα στη "Σκηνή" του Τριγώνου
    if (side === 'left')  { this.x = CX - 90; this.y = 280; }
    if (side === 'front') { this.x = CX + 10;  this.y = 240; }
  }

  update(dt, show, recognized) {
    if (show)       this.opacity = Math.min(1, this.opacity + dt * 1.5);
    else            this.opacity = Math.max(0, this.opacity - dt * 1.5);
    
    if (show)       this.scale  = Math.min(1, this.scale  + dt * 1.5);
    else            this.scale  = Math.max(0, this.scale  - dt * 2.0);

    this.recognized = recognized;
    if (recognized) this.recogOpacity = Math.min(1, this.recogOpacity + dt * 2);
    else            this.recogOpacity = Math.max(0, this.recogOpacity - dt * 3);

    this.particles.forEach(p => { p.angle += p.speed * dt; });
  }

  draw() {
    if (this.opacity < 0.01) return;
    ctx.save();
    ctx.globalAlpha = this.opacity;
    ctx.translate(this.x, this.y);
    ctx.scale(this.scale, this.scale);

    const r = 30;
    
    // Εξωτερικό νέφος σκέψης
    const grd = ctx.createRadialGradient(0, 0, 0, 0, 0, r);
    grd.addColorStop(0, 'rgba(120, 160, 180, 0.4)');
    grd.addColorStop(1, 'rgba(80, 120, 140, 0.0)');
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fillStyle = grd; ctx.fill();

    // Σωματίδια που στροβιλίζονται
    this.particles.forEach(p => {
      const px = Math.cos(p.angle) * p.r;
      const py = Math.sin(p.angle) * p.r;
      ctx.beginPath(); ctx.arc(px, py, 2, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(160, 210, 230, 0.7)';
      ctx.fill();
    });

    // Κείμενο "Νοητικό Γεγονός"
    ctx.fillStyle = 'rgba(180, 220, 240, 0.9)';
    ctx.font = '11px Cormorant Garamond, serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('σκέψη', 0, 0);

    // Ταμπέλα Αποταύτισης / Βιπάσανα
    if (this.recogOpacity > 0.01) {
      ctx.globalAlpha = this.opacity * this.recogOpacity;
      ctx.fillStyle = '#c8a96e';
      ctx.font = 'italic 11px Cormorant Garamond, serif';
      ctx.fillText('αποταύτιση', 0, r + 15);
    }

    ctx.restore();
  }
}

// ── Το Τρίγωνο της Προσοχής (Η Σκηνή του Νου) ──────────────────────────────
function drawStage(targetX, targetY, alpha = 1) {
  const eL = { x: MED.x + EYE_L.x, y: MED.y + EYE_L.y };
  const eR = { x: MED.x + EYE_R.x, y: MED.y + EYE_R.y };

  // Γέμισμα του Τριγώνου (Η Σκηνή)
  const grd = ctx.createLinearGradient(MED.x, MED.y, targetX, targetY);
  grd.addColorStop(0,   `rgba(200, 169, 110, ${0.15 * alpha})`);
  grd.addColorStop(0.6, `rgba(140, 190, 210, ${0.05 * alpha})`);
  grd.addColorStop(1,   `rgba(100, 150, 180, 0)`);

  ctx.save();
  ctx.beginPath();
  ctx.moveTo(eL.x, eL.y);
  ctx.lineTo(targetX, targetY);
  ctx.lineTo(eR.x, eR.y);
  ctx.closePath();
  ctx.fillStyle = grd;
  ctx.fill();

  // Οι δύο ακτίνες / όρια της σκηνής
  ctx.beginPath();
  ctx.moveTo(eL.x, eL.y); ctx.lineTo(targetX, targetY);
  ctx.moveTo(eR.x, eR.y); ctx.lineTo(targetX, targetY);
  
  const lineGrd = ctx.createLinearGradient(MED.x, MED.y, targetX, targetY);
  lineGrd.addColorStop(0, `rgba(220, 190, 130, ${0.8 * alpha})`);
  lineGrd.addColorStop(1, `rgba(150, 190, 220, ${0.2 * alpha})`);
  
  ctx.strokeStyle = lineGrd;
  ctx.lineWidth = 1.5;
  ctx.shadowColor = 'rgba(200, 169, 110, 0.6)';
  ctx.shadowBlur = 8;
  ctx.stroke();
  ctx.restore();
}

// ── Ο Παρατηρητής (Σημείο Βαρύτητας & Αναπνοή) ───────────────────────────
function drawMeditator(pulse) {
  ctx.save();
  ctx.translate(MED.x, MED.y);

  // 1. Ο Απέραντος Χώρος (Pristine Mind)
  ctx.beginPath();
  ctx.arc(0, 0, 250, 0, Math.PI * 2);
  const spaceGrd = ctx.createRadialGradient(0, 0, 100, 0, 0, 250);
  spaceGrd.addColorStop(0, 'rgba(80, 110, 130, 0.05)');
  spaceGrd.addColorStop(1, 'rgba(80, 110, 130, 0)');
  ctx.fillStyle = spaceGrd; ctx.fill();

  // 2. Ο Κύκλος της Αναπνοής (Breath Circle) - Πάλλεται απαλά
  const breathRadius = 90 + Math.sin(pulse * Math.PI * 0.5) * 8; // Αναπνοή 4 δευτερολέπτων
  ctx.beginPath();
  ctx.arc(0, 0, breathRadius, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(140, 190, 210, ${0.15 + Math.sin(pulse * Math.PI * 0.5)*0.05})`;
  ctx.lineWidth = 2;
  ctx.stroke();

  // 3. Ακουστικά Κύματα (από τα πλάγια)
  const waveOffset = (t * 15) % 20;
  for(let i=0; i<3; i++) {
    const r = waveOffset + i * 20;
    const alpha = Math.max(0, 0.3 - r/100);
    ctx.strokeStyle = `rgba(140, 185, 200, ${alpha})`;
    ctx.lineWidth = 1;
    // Αριστερό αυτί
    ctx.beginPath(); ctx.arc(-45, 0, r, Math.PI*0.6, Math.PI*1.4); ctx.stroke();
    // Δεξί αυτί
    ctx.beginPath(); ctx.arc(45, 0, r, -Math.PI*0.4, Math.PI*0.4); ctx.stroke();
  }

  // 4. Το Σώμα του Αισθητήρα (Τεχνολογικό / Γεωμετρικό)
  // Κεντρικό κεφάλι
  ctx.beginPath();
  ctx.ellipse(0, 0, 45, 32, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(25, 35, 45, 0.8)';
  ctx.strokeStyle = 'rgba(120, 160, 180, 0.6)';
  ctx.lineWidth = 1.5;
  ctx.fill(); ctx.stroke();

  // Λοβοί Αυτιών (Ακουστική Λήψη)
  ctx.beginPath(); ctx.ellipse(-48, 0, 12, 28, -Math.PI/10, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(20, 30, 40, 0.9)'; ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(48, 0, 12, 28, Math.PI/10, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(20, 30, 40, 0.9)'; ctx.fill(); ctx.stroke();

  // 5. Ο Άξονας Βαρύτητας (Η κεντρική τελεία / Το Σημείο Μηδέν)
  ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.shadowColor = '#ffffff'; ctx.shadowBlur = 10;
  ctx.fill(); ctx.shadowBlur = 0;

  // 6. Τα Μάτια (Οι πομποί της προσοχής)
  ctx.beginPath(); ctx.arc(EYE_L.x, EYE_L.y, 5, 0, Math.PI * 2);
  ctx.fillStyle = '#c8a96e'; ctx.shadowColor = '#c8a96e'; ctx.shadowBlur = 8;
  ctx.fill();
  
  ctx.beginPath(); ctx.arc(EYE_R.x, EYE_R.y, 5, 0, Math.PI * 2);
  ctx.fillStyle = '#c8a96e';
  ctx.fill(); ctx.shadowBlur = 0;

  ctx.restore();
}

// ── Το Αντικείμενο Εστίασης ───────────────────────────────────────────────
function drawObject(pulse) {
  const p = 0.5 + 0.5 * Math.sin(pulse * Math.PI * 2);

  ctx.save();
  ctx.translate(OBJECT.x, OBJECT.y);

  // glow rings
  for (let i = 2; i >= 1; i--) {
    const r = 10 + i * 6 + p * 3;
    const a = (0.1 - i * 0.02) * (0.7 + 0.3 * p);
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(160, 210, 230, ${a})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // core (Εξάγωνο ή πολύγωνο)
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = (i * Math.PI) / 3 - Math.PI/2;
    const px = Math.cos(angle) * 8;
    const py = Math.sin(angle) * 8;
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fillStyle = `rgba(180, 230, 255, ${0.8 + 0.2*p})`;
  ctx.shadowColor = 'rgba(140, 200, 230, 0.8)';
  ctx.shadowBlur = 15;
  ctx.fill();
  ctx.restore();
}

// ── SEQUENCER (Οι Φάσεις της Πρακτικής) ───────────────────────────────────
const PHASE_DUR = [3, 2.5, 2, 1.5, 2.5, 2.5, 2, 1.5, 1.5, 2.5];
const PHASE_LABELS_EL = [
  'Σταθερός Άξονας & Κύκλος Αναπνοής (Σάμαθα)',
  'Ένα νοητικό γεγονός εισέρχεται στη Σκηνή...',
  'Ταύτιση: Ο προβολέας εγκλωβίζεται στη σκέψη',
  'Επίγνωση: Επιστροφή στον Άξονα',
  'Ανοιχτή Σκηνή του Νου (Βιπάσανα)',
  'Νέα σκέψη αναδύεται στον Χώρο...',
  'Ταύτιση: Απορρόφηση από τη σκέψη',
  'Αποταύτιση — «Δεν είμαι αυτή η σκέψη»',
  'Άφεση — Η σκέψη διαλύεται στον Χώρο',
  'Σταθερός Άξονας & Κύκλος Αναπνοής',
];
const PHASE_LABELS_EN = [
  'Stable Axis & Breath Circle (Shamatha)',
  'A mental event enters the Stage...',
  'Identification: The spotlight is caught',
  'Awareness: Returning to the Axis',
  'Open Stage of the Mind (Vipassana)',
  'A new thought arises in Space...',
  'Identification: Absorbed by the thought',
  'Defusion — "I am not this thought"',
  'Release — The thought dissolves in Space',
  'Stable Axis & Breath Circle',
];

function getPhase(globalT) {
  const totalCycle = PHASE_DUR.reduce((a,b) => a+b, 0);
  let t = globalT % totalCycle;
  let phase = 0;
  for (let i = 0; i < PHASE_DUR.length; i++) {
    if (t < PHASE_DUR[i]) { phase = i; break; }
    t -= PHASE_DUR[i];
    phase = i + 1;
  }
  return Math.min(phase, PHASE_DUR.length - 1);
}

function getPhaseT(globalT) {
  const totalCycle = PHASE_DUR.reduce((a,b) => a+b, 0);
  let t = globalT % totalCycle;
  for (let i = 0; i < PHASE_DUR.length; i++) {
    if (t < PHASE_DUR[i]) return t / PHASE_DUR[i];
    t -= PHASE_DUR[i];
  }
  return 1;
}

const thoughtL = new Thought('left');
const thoughtF = new Thought('front');
let lastLabel = -1;

function lerp(a, b, f) { return a + (b-a)*f; }
function ease(f) { return f < 0.5 ? 2*f*f : -1+(4-2*f)*f; }

function getGazeTarget(phase, phaseT) {
  const obj = OBJECT;
  const tL = thoughtL;
  const tF = thoughtF;

  switch(phase) {
    case 0: case 4: case 9: return { x: obj.x, y: obj.y };
    case 1: return { x: lerp(obj.x, tL.x, ease(phaseT)), y: lerp(obj.y, tL.y, ease(phaseT)) };
    case 2: return { x: tL.x, y: tL.y };
    case 3: return { x: lerp(tL.x, obj.x, ease(phaseT)), y: lerp(tL.y, obj.y, ease(phaseT)) };
    case 5: return { x: lerp(obj.x, tF.x, ease(phaseT)), y: lerp(obj.y, tF.y, ease(phaseT)) };
    case 6: return { x: tF.x, y: tF.y };
    case 7: return { x: tF.x, y: tF.y };
    case 8: return { x: lerp(tF.x, obj.x, ease(phaseT)), y: lerp(tF.y, obj.y, ease(phaseT)) };
  }
  return { x: obj.x, y: obj.y };
}

// ── Βασικός Βρόχος (Main Loop) ─────────────────────────────────────────────
let lastTime = null;
function loop(ts) {
  if (paused) return;
  animId = requestAnimationFrame(loop);

  const dt0 = lastTime === null ? 0 : (ts - lastTime) / 1000;
  lastTime = ts;
  const dt = dt0 * speedMult;
  t += dt;

  const phase = getPhase(t / speedMult * speedMult);
  const phaseT = getPhaseT(t);

  // Update labels
  if (phase !== lastLabel) {
    lastLabel = phase;
    labelEl.textContent = PHASE_LABELS_EL[phase];
    labelEn.textContent = PHASE_LABELS_EN[phase];
  }

  // Update thoughts
  const showL = phase >= 1 && phase <= 3;
  const showF = phase >= 5 && phase <= 8;
  const recognizedF = phase === 7;

  thoughtL.update(dt, showL, false);
  thoughtF.update(dt, showF, recognizedF);

  const gaze = getGazeTarget(phase, phaseT);

  // ── ΣΧΕΔΙΑΣΗ (Draw)
  ctx.clearRect(0, 0, W, H);
  
  // Grid / Σταυρός στο κέντρο για αναφορά (προαιρετικό, πολύ αχνό)
  ctx.beginPath(); ctx.moveTo(CX, 0); ctx.lineTo(CX, H);
  ctx.moveTo(0, MED.y); ctx.lineTo(W, MED.y);
  ctx.strokeStyle = 'rgba(100, 150, 180, 0.03)'; ctx.stroke();

  drawObject(t * 0.5);

  // Oι σκέψεις ζωγραφίζονται ΠΙΣΩ από το τρίγωνο
  thoughtL.draw();
  thoughtF.draw();

  // Ζωγραφίζουμε τη Σκηνή / Το Τρίγωνο
  drawStage(gaze.x, gaze.y);
  
  // Ζωγραφίζουμε τον Παρατηρητή (Άξονας & Κύκλοι)
  drawMeditator(t);

  // Phase dots
  ctx.save();
  ctx.translate(CX, H - 20);
  const dotCount = PHASE_DUR.length;
  const dotSpacing = 16;
  const totalW = (dotCount - 1) * dotSpacing;
  for (let i = 0; i < dotCount; i++) {
    const dx = -totalW / 2 + i * dotSpacing;
    ctx.beginPath();
    ctx.arc(dx, 0, i === phase ? 3.5 : 2, 0, Math.PI * 2);
    ctx.fillStyle = i === phase ? 'rgba(200,169,110,0.9)' : 'rgba(80,120,140,0.3)';
    ctx.fill();
  }
  ctx.restore();
}

requestAnimationFrame(loop);
</script>
</body>
</html>
