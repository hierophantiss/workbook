<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,700;1,300&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#050510;overflow:hidden;height:100vh;width:100vw;font-family:'Fraunces',serif;color:#e8e4df;user-select:none}
  canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:1}
  .sub-box{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);z-index:10;text-align:center;width:90%;max-width:530px;opacity:0;transition:opacity 1.5s ease}
  .sub-box.vis{opacity:1}
  .sub-box .stag{font-size:clamp(0.5rem,0.9vw,0.65rem);letter-spacing:0.3em;text-transform:uppercase;color:rgba(200,180,120,0.45);margin-bottom:5px}
  .sub-box .main{font-size:clamp(0.7rem,1.4vw,0.9rem);font-weight:400;letter-spacing:0.06em;color:rgba(232,228,223,0.7);line-height:1.7;font-style:italic}
  .sub-box .sci{font-size:clamp(0.45rem,0.8vw,0.55rem);color:rgba(140,200,180,0.35);margin-top:8px;line-height:1.5}
  .snum{position:fixed;top:20px;right:24px;z-index:10;font-size:0.6rem;letter-spacing:0.3em;color:rgba(232,228,223,0.1)}
  .ptrack{position:fixed;bottom:0;left:0;width:100%;height:2px;background:rgba(255,255,255,0.03);z-index:10}
  .pbar{height:100%;background:linear-gradient(90deg,rgba(200,160,80,0.4),rgba(100,180,150,0.4));transition:width 1s ease}
  .dots{position:fixed;right:18px;top:50%;transform:translateY(-50%);z-index:10;display:flex;flex-direction:column;gap:12px}
  .dot{width:5px;height:5px;border-radius:50%;background:rgba(232,228,223,0.07);transition:all .4s ease;cursor:pointer;border:none;padding:0}
  .dot.active{background:rgba(232,228,223,0.4);transform:scale(1.3)}
  .ctrls{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:6px}
  .ctrls button{background:rgba(232,228,223,0.06);border:1.5px solid rgba(232,228,223,0.15);color:rgba(232,228,223,0.5);padding:10px 22px;font-family:'Fraunces',serif;font-size:clamp(0.75rem,1.5vw,0.9rem);letter-spacing:0.12em;cursor:pointer;border-radius:24px;transition:all .3s;min-width:48px;min-height:44px}
  .intro{position:fixed;inset:0;z-index:100;background:#050510;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:opacity 2s ease}
  .intro.hidden{opacity:0;pointer-events:none}
  .intro-t{font-size:clamp(1.4rem,4vw,2.4rem);font-weight:300;letter-spacing:0.15em;background:linear-gradient(135deg,#e8e4df,#c8a860);-webkit-background-clip:text;-webkit-text-fill-color:transparent;opacity:0;animation:fi 2s ease 0.5s forwards}
  .intro-s{font-size:clamp(0.6rem,1.1vw,0.8rem);letter-spacing:0.25em;color:rgba(232,228,223,0.18);margin-top:8px;font-style:italic;opacity:0;animation:fi 2s ease 1.2s forwards}
  .intro-h{
    position:absolute;bottom:clamp(40px,8vh,80px);left:50%;transform:translateX(-50%);
    font-size:clamp(0.85rem,2vw,1.1rem);letter-spacing:0.3em;color:rgba(232,228,223,0.55);
    text-transform:uppercase;cursor:pointer;
    padding:14px 36px;border:1.5px solid rgba(232,228,223,0.2);border-radius:30px;
    background:rgba(232,228,223,0.04);backdrop-filter:blur(4px);
    transition:all 0.3s;animation:pu 3s ease-in-out infinite;white-space:nowrap}
  .intro-h:active{background:rgba(232,228,223,0.12);color:rgba(232,228,223,0.8);transform:translateX(-50%) scale(0.96)}
  @keyframes fi{to{opacity:1}}
  @keyframes pu{0%,100%{opacity:0.07}50%{opacity:0.25}}
</style>

<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let W,H,cx,cy;
function resize(){const d=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;cv.width=W*d;cv.height=H*d;cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(d,0,0,d,0,0);cx=W/2;cy=H/2}
resize();addEventListener('resize',resize);
const SC=[
  {tag:'Σκηνή 1 · Zoom In',sub:'Κράτα το τηλέφωνο μπροστά σου — κάνε zoom.\nΤο σώμα σου δεν είναι σταθερό τρίποδο.\nΠαρατήρησε πόσο τρέμει η εικόνα.',sub_en:'Hold your phone in front of you — zoom in.\nYour body is not a stable tripod.\nNotice how much the image shakes.',sci_en:'📷 Narrow focus increases postural sway — zoom amplifies every micro-movement (Woollacott, 2002).',tag_en:'Scene 1 · Zoom In',sci:'📷 Η στενή εστίαση αυξάνει τη σωματική αστάθεια — το zoom μεγεθύνει κάθε μικροκίνηση (Woollacott, 2002).',bg:[28,20,30]},
  {tag:'Σκηνή 2 · Ultra Wide',sub:'Βάλε ultra wide — ανοιχτό πλάνο.\nΤο σώμα ακόμα δεν είναι σταθερό τρίποδο.\nΌμως η εικόνα είναι πολύ πιο σταθερή!',sub_en:'Switch to ultra wide — open frame.\nYour body is still not a stable tripod.\nBut the image looks much more stable!',sci_en:'📐 Wide vision reduces apparent instability — same movement becomes invisible in wide frame.',tag_en:'Scene 2 · Ultra Wide',sci:'📐 Η ευρεία όραση μειώνει τη φαινόμενη αστάθεια — η ίδια κίνηση γίνεται αόρατη σε ευρύ πλάνο.',bg:[18,25,32]},
  {tag:'Σκηνή 3 · Εστιασμένο Βλέμμα',sub:'Άφησε το τηλέφωνο. Κάθισε οκλαδόν.\nΤο σώμα γίνεται τρίποδο — λεκάνη + δύο γόνατα.\nΕστίασε με τα μάτια σε ένα σημείο.',sub_en:'Put the phone down. Sit cross-legged.\nYour body becomes a tripod — pelvis + two knees.\nFocus your eyes on a single point.',sci_en:'🧠 Focused attention activates ACC — stability improves with a stable base (Woollacott, 2002).',tag_en:'Scene 3 · Focused Gaze',sci:'🧠 Η εστιασμένη προσοχή ενεργοποιεί ACC — η σταθερότητα αυξάνεται με σταθερή βάση (Woollacott, 2002).',bg:[20,28,25]},
  {tag:'Σκηνή 4 · Ανοιχτή Προσοχή',sub:'Μαλάκωσε το βλέμμα — άφησε το πεδίο να ανοίξει.\nΌραση, ακοή, αίσθηση — χωρίς εστίαση.\nΟ άξονας βαρύτητας στο κέντρο του κεφαλιού.\nΕίσαι ο χώρος που αντιλαμβάνεται.',sub_en:'Soften your gaze — let the field open.\nVision, hearing, sensation — without focus.\nThe gravity axis at the center of the head.\nYou are the space that perceives.',sci_en:'🧘 Open attention produces synchronized Alpha waves across hemispheres (Fehmi, 2007) — relaxed alertness.',tag_en:'Scene 4 · Open Awareness',sci:'🧘 Η ανοιχτή προσοχή παράγει συγχρονισμένα κύματα Άλφα (Fehmi, 2007) — χαλαρή εγρήγορση.',bg:[12,30,22]}
];
const N=SC.length;
document.getElementById('dotsC').innerHTML=SC.map((_,i)=>`<button class="dot${i===0?' active':''}" onclick="goTo(${i})"></button>`).join('');
let cur=0,tgt=0,tT=0,trans=false,time=0,gA=0,autoP=false,autoTm=null;

function drawMtn(ox,oy,sc,a){ctx.save();ctx.translate(ox,oy);ctx.scale(sc,sc);ctx.fillStyle=`rgba(70,90,80,${a*0.2})`;ctx.beginPath();ctx.moveTo(-180,40);ctx.lineTo(-30,-100);ctx.lineTo(20,-70);ctx.lineTo(90,-120);ctx.lineTo(220,40);ctx.closePath();ctx.fill();ctx.fillStyle=`rgba(55,75,65,${a*0.15})`;ctx.beginPath();ctx.moveTo(-120,40);ctx.lineTo(40,-80);ctx.lineTo(180,40);ctx.closePath();ctx.fill();ctx.fillStyle=`rgba(200,210,215,${a*0.08})`;ctx.beginPath();ctx.moveTo(-30,-100);ctx.lineTo(-18,-82);ctx.lineTo(-42,-82);ctx.closePath();ctx.fill();ctx.strokeStyle=`rgba(90,110,80,${a*0.15})`;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(-250,40);ctx.lineTo(250,40);ctx.stroke();ctx.restore()}

function drawStanding(x,y,a,shake,zLabel){
  ctx.save();ctx.translate(x,y);
  const sx=Math.sin(time*7)*shake,sy=Math.cos(time*5.5)*shake*0.7,rot=Math.sin(time*4)*shake*0.008;
  ctx.save();ctx.translate(sx*0.3,sy*0.3);ctx.rotate(rot);
  const col=`rgba(200,190,170,${a*0.5})`,dim=`rgba(200,190,170,${a*0.2})`;
  ctx.lineCap='round';ctx.strokeStyle=col;ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(-8,0);ctx.lineTo(-12,55);ctx.lineTo(-10,95);ctx.stroke();
  ctx.beginPath();ctx.moveTo(8,0);ctx.lineTo(12,55);ctx.lineTo(10,95);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-10,95);ctx.lineTo(-16,100);ctx.stroke();
  ctx.beginPath();ctx.moveTo(10,95);ctx.lineTo(16,100);ctx.stroke();
  ctx.strokeStyle=`rgba(200,80,60,${a*0.15})`;ctx.lineWidth=0.8;ctx.setLineDash([2,3]);
  ctx.beginPath();ctx.moveTo(-12,55);ctx.lineTo(12,55);ctx.stroke();ctx.setLineDash([]);
  ctx.font='7px Fraunces';ctx.fillStyle=`rgba(200,80,60,${a*0.2})`;ctx.textAlign='center';ctx.fillText('≠ τρίποδο',0,65);
  ctx.strokeStyle=col;ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(-10,-30);ctx.lineTo(-8,0);ctx.stroke();
  ctx.beginPath();ctx.moveTo(10,-30);ctx.lineTo(8,0);ctx.stroke();
  ctx.strokeStyle=dim;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(-14,-30);ctx.quadraticCurveTo(-20,-45,-10,-55);ctx.stroke();
  ctx.beginPath();ctx.moveTo(14,-30);ctx.quadraticCurveTo(20,-45,10,-55);ctx.stroke();
  const pw=22,ph=32;ctx.strokeStyle=`rgba(180,180,190,${a*0.5})`;ctx.lineWidth=2;
  ctx.beginPath();ctx.roundRect(-pw/2,-55-ph,pw,ph,4);ctx.stroke();ctx.fillStyle=`rgba(20,25,35,${a*0.5})`;ctx.fill();
  ctx.fillStyle=`rgba(80,120,140,${a*0.4})`;ctx.beginPath();ctx.arc(0,-55-ph/2,5,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=`rgba(120,160,180,${a*0.5})`;ctx.lineWidth=1;ctx.stroke();
  ctx.fillStyle=`rgba(180,200,220,${a*0.3})`;ctx.beginPath();ctx.arc(0,-55-ph/2,2,0,Math.PI*2);ctx.fill();
  ctx.restore();
  const sw=Math.min(W*0.38,150),sh=sw*0.65,scX=x+55,scY=y-75;
  ctx.strokeStyle=`rgba(180,180,190,${a*0.3})`;ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(scX-sw/2,scY-sh/2,sw,sh,6);ctx.stroke();ctx.fillStyle=`rgba(15,20,30,${a*0.4})`;ctx.fill();
  ctx.save();ctx.beginPath();ctx.roundRect(scX-sw/2+2,scY-sh/2+2,sw-4,sh-4,4);ctx.clip();
  const vs=zLabel==='5x'?1.8:0.6;drawMtn(scX+sx*vs*2,scY+sy*vs*2,vs*0.3,a*0.7);ctx.restore();
  ctx.font='10px Fraunces';ctx.fillStyle=`rgba(200,180,100,${a*0.4})`;ctx.textAlign='center';
  ctx.fillText(zLabel==='5x'?'🔍 ZOOM 5x':'📷 WIDE 0.5x',scX,scY-sh/2-8);
  if(shake>2){for(let i=0;i<4;i++){const ag=time*4+i*Math.PI/2,r=18+Math.sin(time*5+i)*2;ctx.strokeStyle=`rgba(200,100,80,${a*0.1})`;ctx.lineWidth=0.8;ctx.beginPath();ctx.moveTo(x+Math.cos(ag)*r,y-70+Math.sin(ag)*r*0.5);ctx.lineTo(x+Math.cos(ag)*(r+6),y-70+Math.sin(ag)*(r+6)*0.5);ctx.stroke()}}
  ctx.restore();
}

function drawSeated(x,y,a,focus,open){
  ctx.save();ctx.translate(x,y);
  const col=`rgba(210,200,185,${a*0.7})`,dim=`rgba(210,200,185,${a*0.3})`;
  const axisCol=`rgba(210,80,70,${a*0.45})`;
  const tc=`rgba(220,170,60,${a*0.6})`;
  ctx.lineCap='round';ctx.lineJoin='round';

  // Proportions (frontal seated)
  const headR=14, headY=-68, neckY=-55, shoulderY=-48, shoulderW=24;
  const chestY=-25, waistY=-5, pelvisY=5, kneeY=25, kneeW=35;
  const groundY=28;

  // ══ GRAVITY AXIS (prominent, through entire body) ══
  const axTop=headY-headR-18, axBot=groundY+20;
  const ag=ctx.createLinearGradient(0,axTop,0,axBot);
  ag.addColorStop(0,`rgba(210,80,70,0)`);
  ag.addColorStop(0.06,`rgba(210,80,70,${a*0.35})`);
  ag.addColorStop(0.5,`rgba(210,80,70,${a*0.5})`);
  ag.addColorStop(0.94,`rgba(210,80,70,${a*0.35})`);
  ag.addColorStop(1,`rgba(210,80,70,0)`);
  ctx.strokeStyle=ag;ctx.lineWidth=2.2;
  ctx.beginPath();ctx.moveTo(0,axTop);ctx.lineTo(0,axBot);ctx.stroke();
  // Axis glow
  ctx.strokeStyle=`rgba(210,80,70,${a*0.04})`;ctx.lineWidth=12;
  ctx.beginPath();ctx.moveTo(0,axTop);ctx.lineTo(0,axBot);ctx.stroke();
  // Bottom arrow (gravity points DOWN)
  ctx.fillStyle=`rgba(210,80,70,${a*0.35})`;
  ctx.beginPath();ctx.moveTo(0,axBot);ctx.lineTo(-4,axBot-8);ctx.lineTo(4,axBot-8);ctx.closePath();ctx.fill();
  // Top dot (subtle)
  ctx.fillStyle=`rgba(210,80,70,${a*0.15})`;
  ctx.beginPath();ctx.arc(0,axTop,2,0,Math.PI*2);ctx.fill();

  // ══ TRIPOD (pelvis + 2 knees) ══
  ctx.fillStyle=`rgba(220,170,60,${a*0.05})`;
  ctx.beginPath();ctx.moveTo(0,pelvisY);ctx.lineTo(-kneeW,kneeY);ctx.lineTo(kneeW,kneeY);ctx.closePath();ctx.fill();
  ctx.strokeStyle=tc;ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(0,pelvisY);ctx.lineTo(-kneeW,kneeY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,pelvisY);ctx.lineTo(kneeW,kneeY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-kneeW,kneeY);ctx.lineTo(kneeW,kneeY);ctx.stroke();
  ctx.fillStyle=`rgba(240,200,80,${a*0.5})`;
  ctx.beginPath();ctx.arc(0,pelvisY,4,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(-kneeW,kneeY,3.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(kneeW,kneeY,3.5,0,Math.PI*2);ctx.fill();
  ctx.font='8px Fraunces';ctx.fillStyle=`rgba(220,170,60,${a*0.3})`;ctx.textAlign='center';ctx.fillText('τρίποδο ✓',0,kneeY+16);

  // ══ LEGS (lotus, frontal) ══
  ctx.strokeStyle=col;ctx.lineWidth=2;
  // Left leg: hip → knee out left → foot crosses to right
  ctx.beginPath();ctx.moveTo(-8,pelvisY+3);ctx.quadraticCurveTo(-kneeW-5,pelvisY+10,-kneeW,kneeY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-kneeW,kneeY);ctx.quadraticCurveTo(-kneeW+12,kneeY+4,5,kneeY-5);ctx.stroke();
  // Right leg: hip → knee out right → foot crosses to left
  ctx.beginPath();ctx.moveTo(8,pelvisY+3);ctx.quadraticCurveTo(kneeW+5,pelvisY+10,kneeW,kneeY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(kneeW,kneeY);ctx.quadraticCurveTo(kneeW-12,kneeY+4,-5,kneeY-5);ctx.stroke();

  // Ground line
  ctx.strokeStyle=`rgba(180,160,120,${a*0.2})`;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(-45,groundY);ctx.lineTo(45,groundY);ctx.stroke();

  // ══ TORSO (frontal, symmetric around axis) ══
  ctx.strokeStyle=col;ctx.lineWidth=2;
  // Left side contour
  ctx.beginPath();ctx.moveTo(-shoulderW,shoulderY);ctx.quadraticCurveTo(-14,chestY,-10,waistY);ctx.quadraticCurveTo(-9,pelvisY-2,-8,pelvisY+3);ctx.stroke();
  // Right side contour
  ctx.beginPath();ctx.moveTo(shoulderW,shoulderY);ctx.quadraticCurveTo(14,chestY,10,waistY);ctx.quadraticCurveTo(9,pelvisY-2,8,pelvisY+3);ctx.stroke();

  // ══ SHOULDERS ══
  ctx.strokeStyle=col;ctx.lineWidth=2.2;
  ctx.beginPath();ctx.moveTo(-shoulderW,shoulderY);ctx.lineTo(shoulderW,shoulderY);ctx.stroke();

  // ══ ARMS (hands on knees) ══
  ctx.strokeStyle=dim;ctx.lineWidth=1.8;
  ctx.beginPath();ctx.moveTo(-shoulderW,shoulderY);ctx.quadraticCurveTo(-shoulderW-6,chestY,-shoulderW-3,waistY);ctx.quadraticCurveTo(-kneeW+2,pelvisY+5,-kneeW+4,kneeY-3);ctx.stroke();
  ctx.beginPath();ctx.moveTo(shoulderW,shoulderY);ctx.quadraticCurveTo(shoulderW+6,chestY,shoulderW+3,waistY);ctx.quadraticCurveTo(kneeW-2,pelvisY+5,kneeW-4,kneeY-3);ctx.stroke();

  // ══ NECK ══
  ctx.strokeStyle=dim;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(-4,neckY);ctx.lineTo(-4,shoulderY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(4,neckY);ctx.lineTo(4,shoulderY);ctx.stroke();

  // ══ HEAD (frontal) ══
  ctx.fillStyle=`rgba(210,200,185,${a*0.06})`;
  ctx.beginPath();ctx.arc(0,headY,headR,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=col;ctx.lineWidth=2;ctx.stroke();

  // Axis dot on forehead
  ctx.fillStyle=`rgba(210,80,70,${a*0.3})`;
  ctx.beginPath();ctx.arc(0,headY-headR+5,2,0,Math.PI*2);ctx.fill();

  // ══ EYES (frontal, symmetric) ══
  if(focus&&!open){
    // Focused eyes — small dots looking forward
    ctx.fillStyle=`rgba(210,200,185,${a*0.5})`;
    ctx.beginPath();ctx.arc(-5,headY-1,2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(5,headY-1,2,0,Math.PI*2);ctx.fill();
  } else {
    // Soft/relaxed eyes — half-closed crescents
    ctx.strokeStyle=`rgba(210,200,185,${a*0.4})`;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(-8,headY);ctx.quadraticCurveTo(-5,headY+2,-2,headY);ctx.stroke();
    ctx.beginPath();ctx.moveTo(2,headY);ctx.quadraticCurveTo(5,headY+2,8,headY);ctx.stroke();
  }

  // ══ FOCUSED GAZE (scene 3) ══
  if(focus&&!open){
    const gl=100,p=Math.sin(time*2)*0.5+0.5;
    // Two beams from eyes converging below (2-3m ahead on ground)
    const fxL=-5,fxR=5,fy=headY-1;
    const tgtX=0,tgtY=groundY+gl*0.6;
    ctx.strokeStyle=`rgba(220,200,100,${a*0.2})`;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(fxL,fy);ctx.lineTo(tgtX,tgtY);ctx.stroke();
    ctx.beginPath();ctx.moveTo(fxR,fy);ctx.lineTo(tgtX,tgtY);ctx.stroke();
    // Glow
    ctx.strokeStyle=`rgba(220,200,100,${a*0.03})`;ctx.lineWidth=10;
    ctx.beginPath();ctx.moveTo(0,fy);ctx.lineTo(tgtX,tgtY);ctx.stroke();
    // Focus point
    const fg=ctx.createRadialGradient(tgtX,tgtY,0,tgtX,tgtY,8+p*3);
    fg.addColorStop(0,`rgba(240,220,100,${a*0.3})`);fg.addColorStop(1,'rgba(240,220,100,0)');
    ctx.fillStyle=fg;ctx.beginPath();ctx.arc(tgtX,tgtY,8+p*3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=`rgba(255,240,120,${a*0.5})`;ctx.beginPath();ctx.arc(tgtX,tgtY,2,0,Math.PI*2);ctx.fill();
    ctx.font='8px Fraunces';ctx.fillStyle=`rgba(220,200,100,${a*0.25})`;ctx.textAlign='center';ctx.fillText('Εστίαση',tgtX,tgtY+16);
  }

  // ══ OPEN AWARENESS (scene 4) ══
  if(open){
    const p=Math.sin(time*0.5)*0.5+0.5,fd=Math.min(W,H)*0.32;
    // Vision fan (upward/forward from head, frontal = radiating outward)
    for(let i=12;i>=0;i--){
      const la=a*(0.005+i*0.003),sp=Math.PI*0.35*(0.5+i/12*0.5);
      ctx.beginPath();ctx.moveTo(0,headY);
      ctx.arc(0,headY,fd*(0.3+i/12*0.7),-Math.PI/2-sp,-Math.PI/2+sp);
      ctx.closePath();ctx.fillStyle=`rgba(130,200,160,${la})`;ctx.fill();
    }
    // Ear/sense fans (sides)
    for(let s=-1;s<=1;s+=2){
      const ex=s*(headR+2),ey=headY;
      for(let i=8;i>=0;i--){
        const la=a*(0.004+i*0.002);
        const startA=s>0?-Math.PI*0.3:Math.PI-Math.PI*0.7;
        const endA=s>0?Math.PI*0.3:Math.PI+Math.PI*0.7;
        ctx.beginPath();ctx.moveTo(ex,ey);
        ctx.arc(ex,ey,fd*0.45*(0.3+i/8*0.7),startA,endA);
        ctx.closePath();ctx.fillStyle=`rgba(100,170,180,${la})`;ctx.fill();
      }
    }
    // Gravity axis dot (center of head) — prominent
    const dg=ctx.createRadialGradient(0,headY,0,0,headY,10+p*4);
    dg.addColorStop(0,`rgba(200,185,120,${a*0.45})`);
    dg.addColorStop(0.4,`rgba(200,185,120,${a*0.15})`);
    dg.addColorStop(1,'rgba(200,185,120,0)');
    ctx.fillStyle=dg;ctx.beginPath();ctx.arc(0,headY,10+p*4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=`rgba(245,230,140,${a*0.8})`;ctx.beginPath();ctx.arc(0,headY,3,0,Math.PI*2);ctx.fill();
    ctx.font='7px Fraunces';ctx.fillStyle=`rgba(200,185,120,${a*0.3})`;ctx.textAlign='center';ctx.fillText('Άξονας',0,headY-headR-8);
    // Expanding rings
    for(let i=0;i<3;i++){const rr=((time*7+i*45)%140),ra=Math.max(0,1-rr/140);ctx.globalAlpha=a*ra*0.04;ctx.strokeStyle='rgba(140,200,170,1)';ctx.lineWidth=0.5;ctx.beginPath();ctx.arc(0,headY,rr,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1}
  }
  ctx.restore();
}

function drawScene(idx,a){
  if(a<=0)return;ctx.save();
  if(idx===0)drawStanding(cx-30,cy+40,a,4,'5x');
  else if(idx===1){drawStanding(cx-30,cy+40,a,3.5,'0.5x');ctx.font='9px Fraunces';ctx.fillStyle=`rgba(120,190,160,${a*0.25})`;ctx.textAlign='center';ctx.fillText('ίδια αστάθεια — αλλά λιγότερο ορατή ↓',cx+20,cy-55)}
  else if(idx===2)drawSeated(cx,cy+10,a,true,false);
  else drawSeated(cx,cy+10,a,false,true);
  ctx.restore();
}
function drawBg(sf){const i=Math.floor(sf),fr=sf-i,n=Math.min(i+1,N-1);const r=SC[i].bg[0]*(1-fr)+SC[n].bg[0]*fr,g=SC[i].bg[1]*(1-fr)+SC[n].bg[1]*fr,b=SC[i].bg[2]*(1-fr)+SC[n].bg[2]*fr;const gr=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H)*0.7);gr.addColorStop(0,`rgb(${r|0},${g|0},${b|0})`);gr.addColorStop(1,'rgb(5,5,14)');ctx.fillStyle=gr;ctx.fillRect(0,0,W,H)}
function updUI(){const s=SC[cur];document.getElementById('stag').textContent=s.tag+(s.tag_en?' · '+s.tag_en:'');document.getElementById('msub').innerHTML=s.sub.replace(/\n/g,'<br>')+(s.sub_en?'<div style="margin-top:6px;font-size:0.75em;color:rgba(180,200,190,0.35);font-style:italic">'+s.sub_en.replace(/\n/g,'<br>')+'</div>':'');document.getElementById('ssci').innerHTML=s.sci+(s.sci_en?'<br>'+s.sci_en:'');document.getElementById('sub').classList.add('vis');document.getElementById('sn').textContent=`${cur+1} / ${N}`;document.getElementById('pb').style.width=`${(cur/(N-1))*100}%`;document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===cur))}
function goTo(i){if(i<0||i>=N||i===cur||trans)return;tgt=i;trans=true;tT=0;document.getElementById('sub').classList.remove('vis');setTimeout(()=>{cur=tgt;trans=false;updUI()},1800)}
function ease(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2}
function togAuto(){autoP=!autoP;document.getElementById('ab').innerHTML=autoP?'\u23F8 pause':'\u25B6 auto';if(autoP)runA();else clearTimeout(autoTm)}
function runA(){if(!autoP)return;autoTm=setTimeout(()=>{if(cur<N-1){goTo(cur+1);setTimeout(runA,2000)}else{autoP=false;document.getElementById('ab').innerHTML='\u25B6 auto'}},9000)}
document.getElementById('intro').addEventListener('click',()=>{document.getElementById('intro').classList.add('hidden');updUI()});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' ')goTo(cur+1);if(e.key==='ArrowLeft')goTo(cur-1)});
let lt=0;
function loop(ts){const dt=Math.min((ts-lt)/1000,0.05);lt=ts;time+=dt;if(gA<1)gA=Math.min(1,gA+dt*0.5);if(trans)tT=Math.min(tT+dt*0.65,1);ctx.clearRect(0,0,W,H);const sf=trans?cur+(tgt-cur)*ease(tT):cur;drawBg(sf);ctx.globalAlpha=gA;if(trans){const e2=ease(tT);drawScene(cur,1-e2);drawScene(tgt,e2)}else drawScene(cur,1);ctx.globalAlpha=1;requestAnimationFrame(loop)}
requestAnimationFrame(loop);
</script>
</body>
